<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>包子铺大亨 · AI4399</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; }
body {
  background:#0a0a12;
  background-image:
    radial-gradient(circle 3px at 12% 14%, rgba(255,190,90,.18) 0, transparent 100%),
    radial-gradient(circle 2px at 88% 9%, rgba(255,170,70,.15) 0, transparent 100%),
    radial-gradient(circle 2.5px at 72% 22%, rgba(255,190,90,.12) 0, transparent 100%),
    radial-gradient(circle 2px at 28% 6%, rgba(255,190,90,.14) 0, transparent 100%),
    radial-gradient(ellipse 70% 45% at 50% 0%, rgba(255,150,50,.08), transparent),
    radial-gradient(ellipse 45% 32% at 82% 100%, rgba(255,100,40,.06), transparent),
    radial-gradient(ellipse 40% 30% at 12% 92%, rgba(255,140,50,.05), transparent);
  color:#e8e8f0;
  font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  overflow-x:hidden;
  user-select:none; -webkit-user-select:none;
}
a.back {
  position:fixed; top:10px; left:12px; z-index:200;
  color:#8888a0; text-decoration:none; font-size:13px;
  background:rgba(20,20,31,.6); border:1px solid #2a2a3d; border-radius:20px;
  padding:5px 12px; backdrop-filter:blur(6px); opacity:.85; transition:.2s;
}
a.back:hover { color:#ffcc00; border-color:#ffcc00; opacity:1; }

/* ===== 顶部统计栏 ===== */
header.stats {
  position:sticky; top:0; z-index:100;
  background:rgba(12,9,8,.9); backdrop-filter:blur(10px);
  border-bottom:1px solid #3a2b1a;
  box-shadow:0 1px 0 rgba(255,180,80,.06);
  padding:10px 16px 8px; text-align:center;
}
header.stats h1 { font-size:15px; color:#9a8a70; font-weight:600; letter-spacing:2px; margin-bottom:2px; }
header.stats h1 b { color:#ffcc00; }
.bignum { font-size:30px; font-weight:800; color:#ffcc00; line-height:1.15; text-shadow:0 0 24px rgba(255,190,60,.45), 0 1px 0 rgba(120,60,0,.6); font-variant-numeric:tabular-nums; }
.bignum small { font-size:16px; font-weight:600; color:#e8e8f0; margin-left:3px; }
.substats { display:flex; justify-content:center; gap:18px; font-size:12px; color:#9a8a70; margin-top:2px; flex-wrap:wrap; }
.substats b { color:#f0e2c8; font-weight:600; }
#buffchips { display:flex; justify-content:center; gap:8px; margin-top:4px; min-height:0; flex-wrap:wrap; }
.chip {
  font-size:12px; color:#0a0a12; background:linear-gradient(135deg,#ffe066,#ffcc00);
  border-radius:12px; padding:2px 10px; font-weight:700;
  animation:chipIn .3s ease; box-shadow:0 0 14px rgba(255,204,0,.5);
}
@keyframes chipIn { from { transform:scale(.5); opacity:0; } }

/* ===== 主布局 ===== */
main { display:flex; max-width:1060px; margin:0 auto; padding:14px; gap:14px; align-items:flex-start; }
#left { flex:1.1; position:sticky; top:96px; }
#right { flex:1; min-width:0; }
@media (max-width:760px) {
  main { flex-direction:column; padding:10px; }
  #left { position:static; width:100%; }
  #right { width:100%; }
  .bignum { font-size:26px; }
}

/* ===== 点击区：夜市包子铺 ===== */
#clickwrap {
  background:#1b120a; border:1px solid #4a3318; border-radius:16px;
  padding:18px 10px 22px; text-align:center; position:relative; overflow:hidden;
  box-shadow:0 8px 30px rgba(0,0,0,.5), inset 0 0 60px rgba(255,140,40,.05);
}
#scene { position:absolute; inset:0; z-index:0; pointer-events:none; }
#scene svg { width:100%; height:100%; display:block; }
.lant { transform-box:fill-box; transform-origin:50% 0; animation:lantSway 5.2s ease-in-out infinite alternate; }
.lant.l2 { animation-duration:6.6s; animation-delay:-2.4s; }
@keyframes lantSway { from { transform:rotate(-3deg); } to { transform:rotate(3deg); } }
.lglow { animation:lantFlicker 3.4s ease-in-out infinite; }
.lglow.g2 { animation-delay:-1.5s; }
@keyframes lantFlicker { 0%,100% { opacity:.55; } 38% { opacity:.85; } 62% { opacity:.65; } }
.flagsway { transform-box:fill-box; transform-origin:50% 0; animation:flagSway 4.8s ease-in-out infinite alternate; }
@keyframes flagSway { from { transform:rotate(-2.6deg); } to { transform:rotate(2.4deg); } }
.bokeh { animation:bokehDrift 7s ease-in-out infinite alternate; }
@keyframes bokehDrift { from { transform:translateY(0); } to { transform:translateY(-7px); } }

#shopsign {
  display:inline-block; position:relative; z-index:2;
  font-size:18px; font-weight:800; letter-spacing:6px; color:#ffd75e;
  text-shadow:0 1px 0 #2a1605, 0 0 14px rgba(255,190,70,.4);
  border:2px solid #c89b3f; border-radius:8px; padding:4px 18px 4px 24px;
  background:linear-gradient(180deg,#4a2f15,#32200c);
  background-image:linear-gradient(180deg,rgba(255,220,140,.08),rgba(0,0,0,.18)),
    repeating-linear-gradient(90deg, rgba(0,0,0,.1) 0 2px, transparent 2px 11px);
  box-shadow:0 4px 14px rgba(0,0,0,.55), inset 0 0 16px rgba(255,190,70,.1);
  margin-bottom:6px;
}
#clickarea { position:relative; z-index:2; width:min(78vw,310px); height:min(78vw,310px); margin:0 auto; cursor:pointer; touch-action:manipulation; }
#halo {
  position:absolute; inset:4%; border-radius:50%; pointer-events:none; opacity:0; z-index:1;
  background:radial-gradient(circle, rgba(255,205,95,.36) 0%, rgba(255,170,60,.16) 46%, transparent 70%);
  transition:opacity 1.2s ease;
}
#clickarea.glow1 #halo { opacity:.55; animation:haloPulse 3s ease-in-out infinite; }
#clickarea.glow2 #halo { opacity:.95; animation:haloPulse 2s ease-in-out infinite; }
@keyframes haloPulse { 0%,100% { transform:scale(.95); } 50% { transform:scale(1.06); } }
#bigbaozi { position:relative; z-index:2; width:100%; height:100%; transform-origin:50% 84%; filter:drop-shadow(0 14px 22px rgba(0,0,0,.55)); transition:transform .08s; }
#clickarea.squish #bigbaozi { animation:squish .3s cubic-bezier(.36,1.6,.5,1); }
@keyframes squish {
  0%   { transform:scale(1,1); }
  28%  { transform:scale(1.16,.78) translateY(3%); }
  58%  { transform:scale(.9,1.13) translateY(-2%); }
  80%  { transform:scale(1.05,.96); }
  100% { transform:scale(1,1); }
}
/* 常驻蒸汽缕 */
.wisp {
  position:absolute; left:50%; top:13%; width:16px; height:44px; margin-left:-8px; z-index:3;
  border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
  background:linear-gradient(180deg, rgba(255,250,240,0), rgba(255,250,240,.55) 45%, rgba(255,250,240,0));
  filter:blur(4px); opacity:0; pointer-events:none;
  animation:wispRise 3.4s ease-out infinite;
}
.wisp.w1 { margin-left:-28px; animation-delay:0s; }
.wisp.w2 { animation-delay:1.15s; }
.wisp.w3 { margin-left:12px; animation-delay:2.3s; animation-duration:3.8s; }
@keyframes wispRise {
  0%   { transform:translate(0,8px) scaleY(.6); opacity:0; }
  20%  { opacity:.75; }
  60%  { transform:translate(8px,-48px) scaleY(1.12); opacity:.4; }
  100% { transform:translate(-7px,-90px) scaleY(1.3); opacity:0; }
}
#clickarea .float {
  position:absolute; pointer-events:none; font-weight:900; font-size:21px; color:#ffe28a;
  text-shadow:-1px 0 0 #5e3300, 1px 0 0 #5e3300, 0 -1px 0 #5e3300, 0 1.5px 0 #5e3300,
    0 3px 8px rgba(0,0,0,.7), 0 0 16px rgba(255,180,60,.55);
  animation:floatUp 1s ease-out forwards; z-index:5; white-space:nowrap;
}
@keyframes floatUp { 0%{ transform:translate(-50%,0) scale(.8); opacity:1; } 100%{ transform:translate(-50%,-84px) scale(1.18); opacity:0; } }
.steam {
  position:absolute; pointer-events:none; border-radius:50%;
  background:radial-gradient(circle, rgba(255,250,242,.55), rgba(255,250,242,0) 68%);
  filter:blur(2px);
  animation:steamUp 2.2s ease-out forwards; z-index:4;
}
@keyframes steamUp {
  0%   { transform:translate(0,0) scale(.6); opacity:0; }
  15%  { opacity:.85; }
  55%  { transform:translate(calc(var(--dx)*.45),-66px) scale(1.25); }
  100% { transform:translate(var(--dx),-132px) scale(1.75); opacity:0; }
}
#clickhint { position:relative; z-index:2; font-size:12px; color:#d9c5a0; margin-top:8px; text-shadow:0 1px 3px rgba(0,0,0,.8); }
#clickhint b { color:#ffd75e; }

/* ===== 金包子 ===== */
#golden {
  position:fixed; z-index:300; width:64px; height:64px; cursor:pointer;
  animation:flyby linear forwards, bob 1.2s ease-in-out infinite alternate;
  filter:drop-shadow(0 0 14px rgba(255,204,0,.9));
}
@keyframes flyby { from { left:-80px; } to { left:105vw; } }
@keyframes bob { from { margin-top:-14px; } to { margin-top:14px; } }
.gspark {
  position:fixed; pointer-events:none; z-index:299; border-radius:50%;
  background:radial-gradient(circle, #fff8e0, #ffd75e 45%, rgba(255,200,60,0) 72%);
  animation:gsparkOut .85s ease-out forwards;
}
.gspark.star {
  border-radius:0; background:none; color:#ffe28a; font-size:13px; line-height:1;
  text-shadow:0 0 8px rgba(255,200,60,.9);
}
@keyframes gsparkOut { 0% { transform:scale(1) rotate(0deg); opacity:.95; } 100% { transform:scale(.15) rotate(70deg) translateY(16px); opacity:0; } }

/* ===== 右侧面板 ===== */
#panel { background:#171110; border:1px solid #3a2b1a; border-radius:16px; overflow:hidden; box-shadow:0 8px 30px rgba(0,0,0,.4); }
.tabs { display:flex; border-bottom:1px solid #3a2b1a; background:rgba(255,160,60,.025); }
.tabs button {
  flex:1; background:none; border:none; color:#9a8a70; font-family:inherit; font-size:14px; font-weight:600;
  padding:12px 4px; cursor:pointer; border-bottom:2px solid transparent; transition:.15s; position:relative;
}
.tabs button.on { color:#ffcc00; border-bottom-color:#ffcc00; background:rgba(255,190,60,.06); }
.tabs button .dot {
  display:inline-block; min-width:17px; height:17px; line-height:17px; border-radius:9px;
  background:#ffcc00; color:#0a0a12; font-size:11px; font-weight:800; padding:0 4px; margin-left:4px; vertical-align:1px;
}
.tabbody { padding:10px; max-height:60vh; overflow-y:auto; }
@media (max-width:760px) { .tabbody { max-height:none; } }

/* 购买数量 */
.qtybar { display:flex; gap:6px; margin-bottom:8px; align-items:center; }
.qtybar span { font-size:12px; color:#9a8a70; margin-right:2px; }
.qtybar button {
  background:#241a10; border:1px solid #3a2b1a; color:#9a8a70; border-radius:8px;
  font-family:inherit; font-size:12px; padding:4px 12px; cursor:pointer;
}
.qtybar button.on { color:#ffcc00; border-color:#c89b3f; background:rgba(255,190,60,.1); }

/* 建筑行 */
.brow {
  display:flex; align-items:center; gap:10px; padding:9px 10px; margin-bottom:7px;
  background:#211711; border:1px solid #38291a; border-radius:12px; cursor:pointer; transition:border-color .12s, background .12s, transform .12s;
}
.brow.can { border-color:#6a4e26; animation:canBreathe 2.6s ease-in-out infinite; }
.brow.can:hover { border-color:#ffcc00; background:#2a1d13; transform:translateX(2px); }
.brow.cant { opacity:.6; cursor:not-allowed; filter:saturate(.35) brightness(.85); }
@keyframes canBreathe {
  0%,100% { box-shadow:0 0 0 rgba(255,170,60,0); }
  50% { box-shadow:0 0 14px rgba(255,170,60,.22), inset 0 0 10px rgba(255,170,60,.05); }
}
.brow .bicon { width:44px; text-align:center; flex-shrink:0; font-size:27px; }
.brow .bicon svg { width:38px; height:38px; display:block; margin:0 auto; }
.brow .binfo { flex:1; min-width:0; }
.brow .bname { font-size:14px; font-weight:700; color:#f0e2c8; }
.brow .bname .cnt { color:#ffcc00; font-size:13px; margin-left:5px; display:inline-block; }
.brow .bname .cnt.flip { animation:cntFlip .45s ease; }
@keyframes cntFlip { 0% { transform:rotateX(90deg) translateY(-4px); opacity:0; } 60% { transform:rotateX(-20deg); } 100% { transform:rotateX(0); } }
.brow .bsub { font-size:11.5px; color:#9a8a70; margin-top:1px; }
.brow .bbuy { text-align:right; flex-shrink:0; }
.brow .bcost { font-size:13.5px; font-weight:700; color:#e8e8f0; }
.brow.can .bcost { color:#ffcc00; }
.brow .bk { font-size:10.5px; color:#9a8a70; }
.brow.mystery { opacity:.5; cursor:default; animation:none; }
.brow.mystery .bicon { filter:grayscale(1) brightness(.6); }
.brow.flash { animation:buyflash .4s ease; }
.brow.flash .bicon svg, .brow.flash .bicon { animation:iconPop .5s cubic-bezier(.34,1.9,.5,1); }
@keyframes buyflash { 0% { background:rgba(255,190,60,.28); } }
@keyframes iconPop { 0% { transform:scale(1); } 35% { transform:scale(1.35) rotate(-6deg); } 70% { transform:scale(.92); } 100% { transform:scale(1); } }

/* 升级卡：菜单牌 */
.urow {
  display:flex; align-items:center; gap:10px; padding:9px 10px 9px 20px; margin-bottom:7px; position:relative;
  background:linear-gradient(180deg,#30220f,#261a0b);
  background-image:linear-gradient(180deg,rgba(255,220,140,.05),rgba(0,0,0,.14)),
    repeating-linear-gradient(90deg, rgba(0,0,0,.08) 0 2px, transparent 2px 10px);
  border:1px solid #5a4224; border-radius:10px; cursor:pointer; transition:border-color .12s, transform .12s;
}
.urow::before {
  content:''; position:absolute; left:8px; top:50%; width:4px; height:62%; transform:translateY(-50%);
  border-radius:2px; background:linear-gradient(180deg,#c8502e,#8a2a1c);
  box-shadow:0 0 4px rgba(0,0,0,.5);
}
.urow.can { border-color:#c89b3f; animation:canBreathe 2.6s ease-in-out infinite; }
.urow.can:hover { border-color:#ffcc00; transform:translateX(2px); }
.urow.cant { opacity:.6; cursor:not-allowed; filter:saturate(.4) brightness(.85); }
.urow .uicon { font-size:23px; width:36px; text-align:center; flex-shrink:0; }
.urow .uname { font-size:13.5px; font-weight:700; color:#f0d9a8; }
.urow .udesc { font-size:11.5px; color:#9a8a70; margin-top:1px; }
.urow .ucost { font-size:13px; font-weight:700; color:#ffcc00; flex-shrink:0; }
.urow.cant .ucost { color:#9a8a70; }
.empty { text-align:center; color:#9a8a70; font-size:13px; padding:26px 10px; }

/* 成就 */
.agrid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
@media (max-width:420px) { .agrid { grid-template-columns:1fr; } }
.acard { background:#1d150f; border:1px solid #38291a; border-radius:10px; padding:8px 10px; }
.acard.got { border-color:#8a6a2a; background:linear-gradient(135deg,#2c2210,#1d150f); box-shadow:inset 0 0 12px rgba(255,190,70,.07); }
.acard .aname { font-size:13px; font-weight:700; color:#9a8a70; }
.acard.got .aname { color:#ffcc00; }
.acard .adesc { font-size:11px; color:#9a8a70; margin-top:2px; opacity:.8; }

/* 底部操作 */
.foot { display:flex; gap:8px; padding:10px; border-top:1px solid #3a2b1a; flex-wrap:wrap; }
.foot button {
  flex:1; background:#241a10; border:1px solid #3a2b1a; color:#9a8a70; border-radius:8px;
  font-family:inherit; font-size:12px; padding:7px 4px; cursor:pointer; transition:.15s; white-space:nowrap;
}
.foot button:hover { color:#f0e2c8; border-color:#9a8a70; }
.foot button.danger { color:#ff7766; }
.foot button.armed { background:#3d1a14; border-color:#ff7766; color:#ff9988; font-weight:700; }

/* toast */
#toasts { position:fixed; top:14px; right:14px; z-index:400; display:flex; flex-direction:column; gap:8px; align-items:flex-end; pointer-events:none; }
.toast {
  background:#1d150f; border:1px solid #ffcc00; border-radius:12px; padding:10px 14px; max-width:270px;
  box-shadow:0 6px 24px rgba(0,0,0,.6), 0 0 18px rgba(255,204,0,.18);
  animation:toastIn .35s cubic-bezier(.2,1.4,.4,1), toastOut .4s ease 3.6s forwards;
}
.toast .tt { font-size:13px; font-weight:800; color:#ffcc00; }
.toast .td { font-size:12px; color:#e8e8f0; margin-top:2px; }
.toast.plain { border-color:#3a2b1a; box-shadow:0 6px 24px rgba(0,0,0,.6); }
.toast.plain .tt { color:#f0e2c8; }
/* 成就：木牌 */
.toast.ach {
  position:relative;
  background:linear-gradient(180deg,#3d2a13,#2a1c0b);
  background-image:linear-gradient(180deg,rgba(255,220,140,.07),rgba(0,0,0,.14)),
    repeating-linear-gradient(90deg, rgba(0,0,0,.09) 0 2px, transparent 2px 10px);
  border:2px solid #d9a93f; border-radius:10px; padding:11px 18px;
  box-shadow:0 8px 24px rgba(0,0,0,.6), 0 0 22px rgba(255,190,70,.3), inset 0 0 0 1px rgba(110,70,20,.9);
  animation:plaqueIn .5s cubic-bezier(.2,1.5,.4,1), toastOut .4s ease 3.6s forwards;
}
.toast.ach::before, .toast.ach::after {
  content:''; position:absolute; top:6px; width:5px; height:5px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #ffe9a0, #8a6420);
}
.toast.ach::before { left:7px; } .toast.ach::after { right:7px; }
.toast.ach .tt { color:#ffd75e; text-shadow:0 1px 0 rgba(60,30,0,.8); }
.toast.ach .td { color:#e8d5ae; }
@keyframes plaqueIn { 0% { transform:translateX(70px) rotate(4deg); opacity:0; } 100% { transform:none; opacity:1; } }
@keyframes toastIn { from { transform:translateX(60px); opacity:0; } }
@keyframes toastOut { to { transform:translateY(-8px); opacity:0; } }

/* 弹窗 */
#modalbg { position:fixed; inset:0; background:rgba(8,5,3,.78); z-index:500; display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
#modalbg.show { display:flex; }
#modal {
  background:#1d150f; border:1px solid #ffcc00; border-radius:16px; padding:24px 22px; max-width:330px; margin:16px;
  text-align:center; box-shadow:0 0 40px rgba(255,204,0,.2); animation:chipIn .3s ease;
}
#modal h3 { color:#ffcc00; font-size:17px; margin-bottom:10px; }
#modal p { font-size:13.5px; color:#e8e8f0; line-height:1.7; }
#modal p b { color:#ffcc00; }
#modal button {
  margin-top:16px; background:linear-gradient(135deg,#ffe066,#ffcc00); color:#0a0a12; border:none;
  border-radius:10px; font-family:inherit; font-size:14px; font-weight:800; padding:9px 34px; cursor:pointer;
}
</style>
</head>
<body>
<a class="back" href="../">← AI4399</a>
<div id="toasts"></div>

<header class="stats">
  <h1>🥟 <b>包子铺大亨</b></h1>
  <div class="bignum"><span id="st-baozi">0</span><small>个包子</small></div>
  <div class="substats">
    <span>每秒 <b id="st-cps">0</b></span>
    <span>每次点击 <b id="st-click">1</b></span>
    <span>累计点击 <b id="st-clicks">0</b></span>
  </div>
  <div id="buffchips"></div>
</header>

<main>
  <section id="left">
    <div id="clickwrap">
      <div id="scene"><svg viewBox="0 0 420 460" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="skyg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#1c1017"/><stop offset=".5" stop-color="#231408"/><stop offset="1" stop-color="#2c1a0c"/>
          </linearGradient>
          <radialGradient id="lglowg"><stop offset="0" stop-color="#ff9a3c" stop-opacity=".5"/><stop offset="1" stop-color="#ff9a3c" stop-opacity="0"/></radialGradient>
          <linearGradient id="lbody" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ff9646"/><stop offset=".55" stop-color="#e8542e"/><stop offset="1" stop-color="#b83a1e"/>
          </linearGradient>
          <linearGradient id="woodg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#3c2613"/><stop offset="1" stop-color="#26150a"/>
          </linearGradient>
        </defs>
        <rect width="420" height="460" fill="url(#skyg)"/>
        <ellipse class="lglow" cx="70" cy="75" rx="125" ry="105" fill="url(#lglowg)"/>
        <ellipse class="lglow g2" cx="352" cy="62" rx="100" ry="88" fill="url(#lglowg)"/>
        <ellipse cx="210" cy="430" rx="250" ry="120" fill="url(#lglowg)" opacity=".28"/>
        <g fill="#ffba66">
          <circle class="bokeh" cx="152" cy="62" r="2.2" opacity=".35"/>
          <circle class="bokeh" cx="252" cy="40" r="1.6" opacity=".3" style="animation-delay:-2s"/>

/* ---------- 状态 ---------- */
let S = freshState();
function freshState() {
  return { baozi:0, total:0, clicks:0, counts:{}, ups:[], ach:[], golden:0, muted:false, last:Date.now() };
}
function cnt(s,id){ return s.counts[id]||0; }
function tcnt(s){ let n=0; for(const b of BUILDINGS) n+=cnt(s,b.id); return n; }

/* 派生数值 */
const D = { cps:0, clickMult:1, ccps:0, bMult:{}, gMult:1, bdur:1 };
function recalc() {
  D.clickMult=1; D.ccps=0; D.gMult=1; D.bdur=1; D.bMult={};
  for(const b of BUILDINGS) D.bMult[b.id]=1;
  for(const uid of S.ups) {
    const u=UPGRADES.find(x=>x.id===uid); if(!u) continue;
    if(u.t==='click') D.clickMult*=u.m;
    else if(u.t==='b') D.bMult[u.b]*=u.m;
    else if(u.t==='global') D.gMult*=u.m;
    else if(u.t==='ccps') D.ccps+=u.m;
    else if(u.t==='bdur') D.bdur*=u.m;
  }
  let c=0;
  for(const b of BUILDINGS) c+=b.cps*cnt(S,b.id)*D.bMult[b.id];
  D.cps=c*D.gMult;
}
let buff = { mult:1, until:0 };  // 金包子点击加成
function clickValue(){
  const base = 1*D.clickMult + D.cps*D.ccps;
  return base * (Date.now()<buff.until ? buff.mult : 1);
}

/* ---------- 中文大数格式化 ---------- */
const UNITS=[[1e32,'沟'],[1e28,'穰'],[1e24,'秭'],[1e20,'垓'],[1e16,'京'],[1e12,'兆'],[1e8,'亿'],[1e4,'万']];
function fmt(n){
  if(!isFinite(n)) return '∞';
  if(n<0) return '-'+fmt(-n);
  for(const [v,u] of UNITS){
    if(n>=v){ const x=n/v; return (x>=100?x.toFixed(0):x>=10?x.toFixed(1):x.toFixed(2))+u; }
  }
  return String(Math.floor(n));
}
function fmtCps(n){
  if(n===0) return '0';
  if(n<1e4) return n<10 ? (Math.round(n*10)/10).toFixed(1) : String(Math.floor(n));
  return fmt(n);
}
function fmtTime(ms){
  const m=Math.floor(ms/60000), h=Math.floor(m/60);
  return h>0 ? h+' 小时 '+(m%60)+' 分钟' : Math.max(1,m)+' 分钟';
}

/* ---------- 音效（WebAudio 合成） ---------- */
let AC=null;
function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended') AC.resume(); return AC; }
function tone(freq,dur,type,vol,delay,slide){
  if(S.muted) return; const ctx=ac(); if(!ctx) return;
  const t0=ctx.currentTime+(delay||0);
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(freq,t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(40,freq+slide),t0+dur);
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(vol||0.12,t0+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g); g.connect(ctx.destination); o.start(t0); o.stop(t0+dur+0.05);
}

  upgrade(){ tone(523,0.1,'triangle',0.12); tone(659,0.1,'triangle',0.12,0.08); tone(880,0.18,'triangle',0.12,0.16); },
  ach(){ tone(523,0.12,'sine',0.13); tone(659,0.12,'sine',0.13,0.09); tone(784,0.12,'sine',0.13,0.18); tone(1047,0.25,'sine',0.13,0.27); },
  gold(){ tone(880,0.12,'sine',0.14); tone(1175,0.12,'sine',0.14,0.08); tone(1568,0.3,'sine',0.14,0.16); tone(2093,0.35,'sine',0.1,0.24); },

};

function costOf(b,from,k){ return b.cost*Math.pow(1.15,from)*(Math.pow(1.15,k)-1)/0.15; }
function maxAfford(b){
  let k=0, n=cnt(S,b.id), money=S.baozi;
  let c=b.cost*Math.pow(1.15,n);
  while(money>=c && k<500){ money-=c; c*=1.15; k++; }
  return k;
}
const brows={};
(function buildStore(){
  for(const b of BUILDINGS){
    const d=document.createElement('div');
    d.className='brow'; d.id='brow-'+b.id; d.style.display='none';
    d.innerHTML=`<div class="bicon">${BICONS[b.id]||b.icon}</div>
      <div class="binfo"><div class="bname"><span class="nm"></span><span class="cnt"></span></div><div class="bsub"></div></div>
      <div class="bbuy"><div class="bcost"></div><div class="bk"></div></div>`;
    d.addEventListener('click',()=>buyBuilding(b,d));
    blist.appendChild(d); brows[b.id]=d;
  }
})();
function buyBuilding(b,row){
  if(row.classList.contains('mystery')) return;
  const n=cnt(S,b.id);
  let k = qty==='max' ? maxAfford(b) : parseInt(qty);
  if(qty!=='max'){ if(S.baozi<costOf(b,n,k)) k=0; }
  if(k<1){ SFX.err(); return; }
  const price=costOf(b,n,k);
  S.baozi-=price; S.counts[b.id]=n+k;
  recalc(); SFX.buy();
  updateStore(); updateUpgrades(); renderStats();
  /* 购买反馈：行闪光 + 图标弹跳 + 数量翻牌（updateStore 会重写 className，需在其后追加） */
  void row.offsetWidth; row.classList.add('flash');
  setTimeout(()=>row.classList.remove('flash'),520);
  const cl=row.querySelector('.cnt');
  if(cl){ cl.classList.remove('flip'); void cl.offsetWidth; cl.classList.add('flip'); }
}
function updateStore(){
  let mysteryShown=false;
  for(const b of BUILDINGS){
    const row=brows[b.id], n=cnt(S,b.id);
    const unlocked = n>0 || S.total>=b.cost*0.35;
    if(!unlocked){
      if(!mysteryShown){
        mysteryShown=true; row.style.display='flex';
        row.className='brow mystery';
        row.querySelector('.nm').textContent='？？？';
        row.querySelector('.cnt').textContent='';
        row.querySelector('.bsub').textContent='继续攒包子来解锁…';
        row.querySelector('.bcost').textContent=fmt(b.cost);
        row.querySelector('.bk').textContent='';
      } else row.style.display='none';
      continue;
    }
    row.style.display='flex';
    let k = qty==='max' ? Math.max(1,maxAfford(b)) : parseInt(qty);
    const price=costOf(b,n,k);
    const can=S.baozi>=price && (qty!=='max' || maxAfford(b)>=1);
    row.className='brow '+(can?'can':'cant')+(row.classList.contains('flash')?' flash':'');
    row.querySelector('.nm').textContent=b.name;
    row.querySelector('.cnt').textContent=n>0?'×'+n:'';
    const each=b.cps*D.bMult[b.id]*D.gMult;
    row.querySelector('.bsub').textContent = n>0
      ? `单体 ${fmtCps(each)}/秒 · 合计 ${fmtCps(each*n)}/秒`
      : `${b.desc} · 单体 ${fmtCps(each)}/秒`;
    row.querySelector('.bcost').textContent='🥟 '+fmt(Math.ceil(price));
    row.querySelector('.bk').textContent = k>1 ? '×'+k : '';
  }
}

  try{ raw=localStorage.getItem(SAVE_KEY); }catch(e){}
  if(!raw) return;
  try{
    const o=JSON.parse(raw);
    S=Object.assign(freshState(),o);
    S.counts=o.counts||{}; S.ups=o.ups||[]; S.ach=o.ach||[];
    recalc();
    /* 离线收益 */
    const dt=Math.min(Date.now()-(S.last||Date.now()), 8*3600*1000);
    if(dt>60000 && D.cps>0){
      const gain=dt/1000*D.cps*0.5;
      S.baozi+=gain; S.total+=gain;
      modal('🌙 欢迎回来！',
        '你离开了 <b>'+fmtTime(dt)+'</b>，<br>外婆们替你看着蒸笼，'+
        '补发离线收益<br><b>'+fmt(gain)+'</b> 个包子<br>'+
        '<span style="color:#8888a0;font-size:12px">（按离线时长 × 每秒产量的 50%，上限 8 小时）</span>');
    }
    for(const id of S.ach) if(acards[id]) markAch(id);
  }catch(e){ console.warn('存档损坏',e); }
}

/* 手动存档 / 音效 / 重置 */
$('btn-save').addEventListener('click',()=>{ save(); toast('💾 已保存','进度已写入本地存档',true); });
function renderSound(){ $('btn-sound').textContent=S.muted?'🔇 音效：关':'🔊 音效：开'; }
$('btn-sound').addEventListener('click',()=>{ S.muted=!S.muted; renderSound(); if(!S.muted) SFX.click(); });
let resetArmed=false, resetT=null;
$('btn-reset').addEventListener('click',()=>{
  const b=$('btn-reset');
  if(!resetArmed){
    resetArmed=true; b.classList.add('armed'); b.textContent='⚠️ 再点一次确认重置';
    clearTimeout(resetT);
    resetT=setTimeout(()=>{ resetArmed=false; b.classList.remove('armed'); b.textContent='🗑 重置进度'; },5000);
    return;
  }
  clearTimeout(resetT); resetArmed=false;
  b.classList.remove('armed'); b.textContent='🗑 重置进度';
  if(!confirm('真的要清空所有进度吗？此操作不可恢复！')) return;
  try{ localStorage.removeItem(SAVE_KEY); }catch(e){}
  S=freshState(); buff={mult:1,until:0};
  recalc();
  for(const a of ACHIEVEMENTS){
    const d=acards[a.id]; d.className='acard';
    d.querySelector('.aname').textContent='🔒 '+a.name;
  }
  upKey='\0'; updateUpgrades(); updateStore(); renderStats(); checkAch(); renderSound();
  toast('🗑 已重置','包子铺重新开张！',true);
});

/* ---------- 主循环 ---------- */
let lastTick=Date.now();
setInterval(()=>{
  const now=Date.now(), dt=Math.min((now-lastTick)/1000,2);
  lastTick=now;
  if(D.cps>0){ const g=D.cps*dt; S.baozi+=g; S.total+=g; }
  renderStats();
},100);
setInterval(()=>{ updateStore(); updateUpgrades(); checkAch(); },250);
setInterval(save,10000);
window.addEventListener('beforeunload',save);
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){ save(); return; }
  /* 页面挂后台时定时器被节流：回到前台按全速补足这段时间（上限 8 小时） */
  const now=Date.now(), gap=Math.min(now-lastTick, 8*3600*1000);
  if(gap>3000 && D.cps>0){ const g=D.cps*gap/1000; S.baozi+=g; S.total+=g; }
  lastTick=now;
});

/* ---------- 启动 ---------- */
load();
recalc(); renderSound();
updateStore(); updateUpgrades(); checkAch(); renderStats();
shownBaozi=S.baozi; requestAnimationFrame(animNum);
scheduleGolden();
</script>
</body>
</html>
