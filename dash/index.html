<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="description" content="节奏冲刺 - 一键节奏跳跃跑酷，跟着 128 BPM 的节拍踩点冲到终点！">
<title>节奏冲刺 · AI4399</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0a0a12;
    font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    -webkit-user-select:none;user-select:none;touch-action:none;}
  #cv{position:fixed;inset:0;display:block;touch-action:none;}
  #back{position:fixed;top:14px;left:16px;z-index:30;color:rgba(255,255,255,.45);
    text-decoration:none;font-size:14px;padding:4px 10px;border-radius:8px;
    background:rgba(255,255,255,.06);backdrop-filter:blur(4px);transition:color .2s;}
  #back:hover{color:#ffcc00;}
  #mute{position:fixed;top:12px;right:14px;z-index:30;width:38px;height:34px;
    background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
    border-radius:9px;color:#eee;font-size:16px;cursor:pointer;}
  .ov{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:20;
    min-width:270px;max-width:86vw;padding:26px 34px 24px;text-align:center;color:#e8e8f0;
    background:rgba(12,12,22,.78);border:1px solid rgba(255,204,0,.28);border-radius:18px;
    backdrop-filter:blur(8px);box-shadow:0 10px 50px rgba(0,0,0,.6),0 0 40px rgba(255,204,0,.07);}
  .ov.hide{display:none;}

  .ov button:active{transform:scale(.95);}
  .ov .small{margin-top:10px;font-size:12px;color:#77778c;}
  #failPr{color:#ff5577!important;}
</style>

<body>
<canvas id="cv"></canvas>
<a id="back" href="../">← AI4399</a>
<button id="mute" title="静音/取消静音">🔊</button>

<div id="menu" class="ov">
  <h1>节奏冲刺</h1>
  <div class="sub">单键节奏跑酷 · 跟着节拍跳</div>
  <div class="tip">
    <b>点击 / 空格 / ↑</b>＝跳跃，<b>按住</b>＝连跳<br>
    碰到 <b>黄色光环</b> 时再点一下＝空中弹跳<br>
    障碍都踩在 <b>128 BPM</b> 的节拍上，跟着鼓点跳！
  </div>
  <div class="stat">最佳进度 <em id="bestM">0%</em></div>
  <button id="btnStart">开始挑战</button>
  <div class="small">建议开启声音游玩 · 进度自动保存</div>
</div>

<div id="fail" class="ov hide">
  <h2>💥 失败了</h2>
  <div class="stat">
    本次进度 <em id="failPr">0%</em><br>
    尝试次数 <span id="failAt" style="color:#fff">1</span> ·
    最佳进度 <span id="failBe" style="color:#ffcc00">0%</span>
  </div>
  <button id="btnRetry">立即重试</button>
  <div class="small">点击任意处 / 空格 立即重开</div>
</div>

<div id="winov" class="ov hide">
  <h2 style="color:#ffcc00">🏆 通关！</h2>
  <div class="stat">
    进度 <em>100%</em><br>
    共尝试 <span id="winAt" style="color:#fff">1</span> 次
  </div>
  <button id="btnAgain">再来一次</button>
  <div class="small">你已征服整条节奏轴！</div>
</div>

<script>
'use strict';
/* ================= 节奏冲刺 =================
   核心：BPM 时间轴 = 音乐时间轴 = 关卡坐标轴。
   玩家 x 由节拍直接驱动（x = xOfBeat(t/SPB)），
   音符与障碍共享同一拍点，保证音画踩点同步。 */

/* ---------- 常量 ---------- */
const BPM = 128, SPB = 60 / BPM, S16 = SPB / 4, FDT = 1 / 240;
const FIN = 207;                        // 终点拍（进度 100%）
const SPEED = [[0, 4], [96, 5], [160, 4]];     // [起始拍, 每拍格数] —— 中段加速
const GRAVS = [[0, 1], [160, 0.55], [176, 1]]; // 低重力段落（160~176 拍）
const G = 72.8, V0 = 17.06, VMAX = -27;        // 平地滞空恰好 1 拍
const HB = 0.45;                        // 方块判定半宽
const LSK = 'ai4399-dash-best', LSM = 'ai4399-dash-mute';

function segVal(map, b) { let v = map[0][1]; for (const s of map) if (b >= s[0]) v = s[1]; return v; }
const cpbOf = b => segVal(SPEED, b);
const gravOf = b => segVal(GRAVS, b);
function xOfBeat(b) {
  let x = 0;
  for (let i = 0; i < SPEED.length; i++) {
    const b0 = SPEED[i][0], v = SPEED[i][1];
    const b1 = i + 1 < SPEED.length ? SPEED[i + 1][0] : 1e9;
    if (b <= b0) break;
    x += (Math.min(b, b1) - b0) * v;
  }
  return x;
}

/* ---------- 关卡（按"按键拍"生成，结构上保证可通过） ---------- */
const L = { spikes: [], blocks: [], plats: [], orbs: [], pits: [], portals: [] };
(function buildLevel() {
  const X = xOfBeat;
  const sp   = (c, n, h) => { h = h || 0; for (let i = 0; i < n; i++) L.spikes.push({ x: X(c) + (i - (n - 1) / 2), h }); };
  const blk  = (b0, b1, top) => L.blocks.push({ x0: X(b0), x1: X(b1), top });
  const wall = (b, top) => L.blocks.push({ x0: X(b), x1: X(b) + 1, top });
  const plat = (b0, b1, top) => L.plats.push({ x0: X(b0), x1: X(b1), top });
  const orb  = (b, y) => L.orbs.push({ x: X(b), y, at: -1, t: 0 });
  const pit  = (b0, b1) => L.pits.push({ x0: X(b0), x1: X(b1) });
  /* 模式：p = 按键拍。地刺位于弧线中点 p+0.5（低重力段为 p+0.8） */
  const P1 = p => sp(p + 0.5, 1);
  const P2 = p => sp(p + 0.5, 2);
  const P3 = p => sp(p + 0.5, 3);
  const PL = (p, n) => sp(p + 0.8, n);                 // 低重力地刺
  const stair = p => { blk(p + 0.6, p + 2.5, 1); blk(p + 2.6, p + 4.5, 2); }; // 按 p、p+2 上台阶
  const orbWall = p => { orb(p + 0.5, 2.0); wall(p + 1.1, 3); };     // p 起跳，p+0.5 点环越墙
  const orbPit  = p => { pit(p + 0.35, p + 1.75); orb(p + 0.75, 1.7); }; // p 起跳，p+0.75 点环过坑
  const platRun4 = p => { pit(p + 0.6, p + 8.8);       // 按 p,p+2,p+4,p+6,p+8 踩浮板
    plat(p + 0.7, p + 2.3, 1); plat(p + 2.7, p + 4.3, 2);
    plat(p + 4.7, p + 6.3, 2); plat(p + 6.7, p + 8.3, 1); };
  const platRun3 = p => { pit(p + 0.6, p + 6.8);
    plat(p + 0.7, p + 2.3, 1); plat(p + 2.7, p + 4.3, 2); plat(p + 4.7, p + 6.3, 1); };

  /* —— 段0-1（0-32拍）热身 —— */
  P1(8); P1(12);
  [16, 18, 20, 22, 24, 26, 28, 30].forEach(P1);
  /* —— 段2（32-48）双刺登场 —— */
  P1(33); P2(35); P1(37); P2(39); P1(41); P1(43); P2(45);
  /* —— 段3（48-64）方块台阶 —— */
  stair(48); P1(54); stair(56); P1(62);
  /* —— 段4（64-80）浮空平台 —— */
  platRun4(63);
  P1(74); P2(76); P1(78);
  /* —— 段5（80-96）跳跃环 —— */
  orbWall(80); P1(83); orbWall(85); P1(88); orbPit(90); P2(93);
  L.portals.push({ b: 95.3, x: X(95.3), txt: '加 速', col: '#ff5577' });
  /* —— 段6-7（96-128）加速地带 —— */
  P1(97); P1(99); P1(101); P2(103); P1(105); P1(107); P2(109); P1(111);
  P2(113); P1(115); P1(116); P2(118); P1(120); P1(121); P2(123); P1(125); P1(126);
  /* —— 段8-9（128-160）高速平台+环 —— */
  platRun3(128);
  orbWall(136); P2(139); orbWall(141);
  stair(144); P1(150); P1(152); orbPit(154); P2(157);
  L.portals.push({ b: 159.3, x: X(159.3), txt: '低重力', col: '#66bbff' });
  /* —— 段10（160-176）低重力喘息 —— */
  PL(162, 1); PL(165, 2); PL(168, 1); PL(171, 2); PL(174, 1);
  L.portals.push({ b: 175.5, x: X(175.5), txt: '重力恢复', col: '#88ffaa' });
  /* —— 段11（176-200）终局高潮 —— */
  P2(177); P1(179); P2(181); P2(183); orbWall(185); P1(188);
  P3(190); orbPit(192); P2(195); P1(197); P2(199);
  /* —— 200-207 终点冲线 —— */
})();
function inPit(x) { for (const p of L.pits) { if (x > p.x0 && x < p.x1) return true; } return false; }

/* ---------- 音频引擎（全程序化合成） ---------- */
let actx = null, master = null, noiseBuf = null, delaySend = null;
let muted = localStorage.getItem(LSM) === '1';
function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  const comp = actx.createDynamicsCompressor();
  comp.threshold.value = -16; comp.ratio.value = 5; comp.attack.value = .003; comp.release.value = .2;
  master = actx.createGain(); master.gain.value = muted ? 0 : 0.8;
  master.connect(comp); comp.connect(actx.destination);
  noiseBuf = actx.createBuffer(1, actx.sampleRate, actx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const dl = actx.createDelay(1); dl.delayTime.value = SPB * 0.75;
  const fb = actx.createGain(); fb.gain.value = 0.28;
  const wet = actx.createGain(); wet.gain.value = 0.4;
  dl.connect(fb); fb.connect(dl); dl.connect(wet); wet.connect(master);
  delaySend = dl;
}
function adsr(g, t, a, peak, dec) {
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(peak, t + a);
  g.gain.exponentialRampToValueAtTime(0.0001, t + a + dec);
}
let kickTimes = [];
function kick(t) {
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(150, t);
  o.frequency.exponentialRampToValueAtTime(42, t + 0.11);
  adsr(g, t, 0.002, 0.9, 0.18);
  o.connect(g); g.connect(master); o.start(t); o.stop(t + 0.25);
  kickTimes.push(t); if (kickTimes.length > 12) kickTimes.shift();
}
function hat(t, open) {
  const s = actx.createBufferSource(); s.buffer = noiseBuf;
  s.playbackRate.value = 1.4;
  const f = actx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 7500;
  const g = actx.createGain();
  adsr(g, t, 0.001, open ? 0.14 : 0.13, open ? 0.18 : 0.035);
  s.connect(f); f.connect(g); g.connect(master); s.start(t); s.stop(t + 0.25);
}
function snare(t) {
  const s = actx.createBufferSource(); s.buffer = noiseBuf;
  const f = actx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 1900; f.Q.value = 0.8;
  const g = actx.createGain(); adsr(g, t, 0.001, 0.4, 0.14);
  s.connect(f); f.connect(g); g.connect(master); s.start(t); s.stop(t + 0.2);
  const o = actx.createOscillator(), g2 = actx.createGain();
  o.type = 'triangle'; o.frequency.setValueAtTime(220, t);
  o.frequency.exponentialRampToValueAtTime(120, t + 0.07);
  adsr(g2, t, 0.001, 0.25, 0.09);
  o.connect(g2); g2.connect(master); o.start(t); o.stop(t + 0.12);
}
function bassN(t, f, acc) {
  const o = actx.createOscillator(), g = actx.createGain();
  const lp = actx.createBiquadFilter(); lp.type = 'lowpass';
  lp.frequency.value = acc ? 900 : 550; lp.Q.value = 2;
  o.type = 'sawtooth'; o.frequency.value = f;
  adsr(g, t, 0.004, acc ? 0.3 : 0.24, 0.2);
  o.connect(lp); lp.connect(g); g.connect(master); o.start(t); o.stop(t + 0.25);
}
function pad(t, fs) {
  for (const f of fs) {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    adsr(g, t, 0.05, 0.065, 1.5);
    o.connect(g); g.connect(master); o.start(t); o.stop(t + 1.7);
  }
}
function lead(t, f) {
  const g = actx.createGain();
  const lp = actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 2600; lp.Q.value = 1.2;
  adsr(g, t, 0.006, 0.15, 0.26);
  for (const dt of [-7, 7]) {
    const o = actx.createOscillator();
    o.type = 'sawtooth'; o.frequency.value = f; o.detune.value = dt;
    o.connect(lp); o.start(t); o.stop(t + 0.32);
  }
  lp.connect(g); g.connect(master); g.connect(delaySend);
}
/* —— 编曲数据 —— */
const ROOTS = [55, 43.65, 65.41, 49];          // Am F C G
const CHORDS = [[220, 261.63, 329.63], [220, 261.63, 349.23], [196, 261.63, 329.63], [196, 246.94, 293.66]];
const SCALE = [440, 523.25, 587.33, 659.26, 783.99, 880];
const MELA = [1,0,2,0,4,0,3,2, 1,0,1,2,3,0,2,0, 4,0,3,0,2,0,3,4, 5,0,4,0,3,2,3,0];
const MELB = [6,0,5,4,5,0,4,3, 4,3,4,0,3,2,3,0, 5,0,4,5,6,0,5,4, 5,4,3,4,2,3,4,5];
const SECF = [ // k=底鼓 s=军鼓 h=8分镲 h2=16分镲 oh=开镲 b=贝斯 p=和弦 l=主旋律 L=旋律B
  { k:1, h:1 },
  { k:1, h:1, s:1, b:1 },
  { k:1, h:1, s:1, b:1, p:1 },
  { k:1, h:1, s:1, b:1, p:1, l:1 },
  { k:1, h:1, s:1, b:1, p:1, l:1, oh:1 },
  { k:1, h:1, s:1, b:1, p:1, l:1, oh:1 },
  { k:1, h2:1, s:1, b:1, p:1, l:1, L:1, oh:1 },
  { k:1, h2:1, s:1, b:1, p:1, l:1, L:1, oh:1 },
  { k:1, h2:1, s:1, b:1, p:1, l:1, L:1, oh:1 },
  { k:1, h2:1, s:1, b:1, p:1, l:1, L:1, oh:1 },
  { k:1, h:1, b:1, p:1 },                      // 低重力：抽掉鼓组喘息
  { k:1, h2:1, s:1, b:1, p:1, l:1, L:1, oh:1 },// 高潮
  { p:1, b:1 }                                  // 冲线
];
let s16 = 0, songStart = 0;
function playStep(s, t) {
  const beat = s / 4;
  const sec = Math.min(12, (beat / 16) | 0);
  const F = SECF[sec], pos = s % 16, ci = ((beat / 4) | 0) % 4;
  if (F.k && pos % 4 === 0) kick(t);
  if (F.s && (pos === 4 || pos === 12)) snare(t);
  if (F.h && pos % 4 === 2) hat(t, false);
  if (F.h2 && pos % 2 === 1) hat(t, false);
  if (F.oh && pos === 14) hat(t, true);
  if (F.b && pos % 2 === 0) bassN(t, ROOTS[ci] * ((pos === 6 || pos === 14) ? 2 : 1), pos % 4 === 0);
  if (F.p && pos === 0) pad(t, CHORDS[ci]);
  if (F.l && pos % 2 === 0) {
    const m = (F.L ? MELB : MELA)[((beat * 2) | 0) % 32];
    if (m) lead(t, SCALE[m - 1]);
  }
}
function schedule() {
  if (!actx || state !== 'play') return;
  const ahead = actx.currentTime + 0.16;
  while (songStart + s16 * S16 < ahead) {
    if (s16 / 4 <= FIN + 1) playStep(s16, songStart + s16 * S16);
    s16++;
  }
}
/* —— 音效 —— */
function sfxDeath() {
  if (!actx) return; const t = actx.currentTime;
  const s = actx.createBufferSource(); s.buffer = noiseBuf;
  const f = actx.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(5000, t); f.frequency.exponentialRampToValueAtTime(150, t + 0.4);
  const g = actx.createGain(); adsr(g, t, 0.002, 0.55, 0.4);
  s.connect(f); f.connect(g); g.connect(master); s.start(t); s.stop(t + 0.45);
  const o = actx.createOscillator(), g2 = actx.createGain();
  o.type = 'square'; o.frequency.setValueAtTime(220, t);
  o.frequency.exponentialRampToValueAtTime(35, t + 0.35);
  adsr(g2, t, 0.002, 0.3, 0.35);
  o.connect(g2); g2.connect(master); o.start(t); o.stop(t + 0.4);
}
function sfxOrb() {
  if (!actx) return; const t = actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'sine'; o.frequency.setValueAtTime(660, t);
  o.frequency.exponentialRampToValueAtTime(1450, t + 0.1);
  adsr(g, t, 0.003, 0.3, 0.13);
  o.connect(g); g.connect(master); o.start(t); o.stop(t + 0.16);
}
function sfxWin() {
  if (!actx) return; const t0 = actx.currentTime;
  [523.25, 659.26, 783.99, 1046.5, 1318.5].forEach((f, i) => {
    const t = t0 + i * 0.13;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    adsr(g, t, 0.005, 0.3, i === 4 ? 0.9 : 0.18);
    o.connect(g); g.connect(master); o.start(t); o.stop(t + 1.1);
  });
}

/* ---------- 状态 ---------- */
let state = 'menu';        // menu | play | dead | win
let attempts = 0, deaths = 0;
let best = parseFloat(localStorage.getItem(LSK) || '0') || 0;
let simTime = 0, holding = false, pressBuf = 0;
let deadT = 0, winT = 0, failShown = false, shake = 0;
let lastDeathBeat = -99, deathX = 0, deathY = 0;
const P = { x: 0, y: 0, vy: 0, onGround: true, beat: 0, coyote: 0, rot: 0 };
const parts = [];

function saveBest() { localStorage.setItem(LSK, best.toFixed(1)); }
const $ = id => document.getElementById(id);
function showOv(id) { ['menu', 'fail', 'winov'].forEach(k => $(k).classList.toggle('hide', k !== id)); }
function hideOv() { ['menu', 'fail', 'winov'].forEach(k => $(k).classList.add('hide')); }

function resetPlayer() {
  P.x = 0; P.y = 0; P.vy = 0; P.onGround = true; P.beat = 0; P.coyote = 0; P.rot = 0;
}
function startAttempt() {
  initAudio();
  if (actx.state === 'suspended') actx.resume();
  attempts++;
  resetPlayer();
  parts.length = 0;
  simTime = 0; s16 = 0; pressBuf = 0; shake = 0;
  songStart = actx.currentTime + 0.1;
  state = 'play'; failShown = false;
  hideOv();
}
function die() {
  if (state !== 'play') return;
  state = 'dead'; deadT = 0; deaths++;
  lastDeathBeat = P.beat; deathX = P.x; deathY = P.y;
  holding = false; shake = 1;
  const pr = Math.max(0, Math.min(100, P.beat / FIN * 100));
  if (pr > best) { best = pr; saveBest(); }
  $('failPr').textContent = pr.toFixed(1) + '%';
  $('failAt').textContent = attempts;
  $('failBe').textContent = best.toFixed(1) + '%';
  sfxDeath();
  for (let i = 0; i < 46; i++) {
    const a = Math.random() * Math.PI * 2, sp = 4 + Math.random() * 14;
    parts.push({ x: deathX, y: deathY + 0.45, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp + 4,
      life: 0.9 + Math.random() * 0.5, max: 1.2, size: 0.1 + Math.random() * 0.22,
      col: Math.random() < 0.7 ? '#ffcc00' : '#ffffff', grav: 1, type: 'sq' });
  }
}
function winGame() {

/* ---------- 物理（固定步长 240Hz，时钟＝音频时钟） ---------- */
function step() {
  simTime += FDT;
  const beat = simTime / SPB; P.beat = beat;
  if (beat >= FIN) { winGame(); return; }
  const x = xOfBeat(beat); P.x = x;
  if (pressBuf > 0) pressBuf -= FDT;
  if (P.coyote > 0) P.coyote -= FDT;
  const g = G * gravOf(beat);
  const wasGround = P.onGround;
  const y1 = P.y;
  P.vy -= g * FDT; if (P.vy < VMAX) P.vy = VMAX;
  let y2 = y1 + P.vy * FDT;
  /* 落地检测（地面/方块/浮板，浮板仅可从上方落下） */
  let landTop = null;
  if (P.vy <= 0) {
    if (!inPit(x) && y1 >= -0.01 && y2 <= 0) landTop = 0;
    for (const o of L.blocks) {
      if (o.x0 - HB < x && x < o.x1 + HB && y1 >= o.top - 0.12 && y2 <= o.top && (landTop === null || o.top > landTop)) landTop = o.top;
    }
    for (const o of L.plats) {
      if (o.x0 - HB < x && x < o.x1 + HB && y1 >= o.top - 0.12 && y2 <= o.top && (landTop === null || o.top > landTop)) landTop = o.top;
    }
  }
  if (landTop !== null) { y2 = landTop; P.vy = 0; P.onGround = true; }
  else { if (wasGround) P.coyote = 0.08; P.onGround = false; }
  P.y = y2;
  /* 跳跃（含按住连跳 + 0.12s 输入缓冲 + 土狼时间） */
  if (P.onGround && (holding || pressBuf > 0)) {
    P.vy = V0; P.onGround = false; pressBuf = 0;
  } else if (!P.onGround && P.coyote > 0 && P.vy <= 0.1 && (holding || pressBuf > 0)) {
    P.vy = V0; P.coyote = 0; pressBuf = 0;
  }
  /* 跳跃环：需要"新的一次点按"（缓冲内），触发空中弹跳 */
  if (pressBuf > 0) {
    for (const o of L.orbs) {
      if (o.at === attempts) continue;
      const dx = o.x - x, dy = o.y - (P.y + 0.45);
      if (dx * dx + dy * dy < 1.5) {
        o.at = attempts; o.t = performance.now() / 1000;
        P.vy = V0; P.onGround = false; pressBuf = 0;
        sfxOrb();
        for (let i = 0; i < 10; i++) {
          const a = Math.random() * Math.PI * 2;
          parts.push({ x: o.x, y: o.y, vx: Math.cos(a) * 6, vy: Math.sin(a) * 6,
            life: 0.4, max: 0.4, size: 0.12, col: '#ffcc00', grav: 0, type: 'sq' });
        }
        break;
      }
    }
  }
  /* 方块侧面：低于顶面 0.35 格＝撞死，否则容错上挪 */
  for (const o of L.blocks) {
    if (o.x0 < x + HB && x - HB < o.x1) {
      if (P.y < o.top - 0.35) { die(); return; }
      else if (P.y < o.top) { P.y = o.top; P.vy = Math.max(P.vy, 0); P.onGround = true; }
    }
  }
  /* 地刺：三角形判定（核心区小于贴图，越靠近刺尖越窄，宽容） */
  for (const s of L.spikes) {
    const dy = P.y - s.h;
    if (dy < 0.75 && P.y + 0.9 > s.h) {
      const hw = 0.34 + 0.30 * Math.max(0, 1 - Math.max(0, dy) / 0.75);
      if (Math.abs(x - s.x) < hw) { die(); return; }
    }
  }
  if (P.y < -4) die();
}

/* ---------- 画布与渲染 ---------- */
const cv = $('cv'), C = cv.getContext('2d');
let DPR = 1, W = 0, H = 0, camY = 0;
function resize() {
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
}
window.addEventListener('resize', resize); resize();

}

function render(rdt) {

  camY += (camT - camY) * Math.min(1, rdt * 6);
  if (shake > 0) shake = Math.max(0, shake - rdt * 2);
  const shX = (Math.random() - 0.5) * 14 * shake, shY = (Math.random() - 0.5) * 14 * shake;
  const gy = H * 0.74 + camY + shY;

    const fxp = P.x + Math.random() * 8 - 2, fyp = 3 + Math.random() * 5;
    for (let i = 0; i < 14; i++) {
      const a = a0 + i / 14 * Math.PI * 2;
      parts.push({ x: fxp, y: fyp, vx: Math.cos(a) * 7, vy: Math.sin(a) * 7,
        life: 0.8, max: 0.8, size: 0.12, col: ['#ffcc00', '#ff5577', '#66bbff', '#88ffaa'][i % 4], grav: 1, type: 'sq' });
    }
  }
}

/* ---------- 主循环 ---------- */
let lastT = performance.now();
function frame(now) {
  requestAnimationFrame(frame);
  const rdt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  if (state === 'play' && actx && !document.hidden) {
    let target = actx.currentTime - songStart;
    if (target - simTime > 0.3) { songStart = actx.currentTime - simTime - 0.05; target = simTime + 0.05; }
    let guard = 0;
    while (state === 'play' && simTime < target && guard++ < 200) step();
    schedule();
  }
  if (state === 'dead') {
    deadT += rdt;
    if (deadT > 0.45 && !failShown) { failShown = true; showOv('fail'); }
  }
  if (state === 'win') winT += rdt;
  render(rdt);
}
setInterval(schedule, 30);
$('bestM').textContent = best.toFixed(1) + '%';
requestAnimationFrame(frame);
</script>
</body>
