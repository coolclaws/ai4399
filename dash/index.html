<script>
'use strict';
/* ================= 节奏冲刺 =================
   核心：BPM 时间轴 = 音乐时间轴 = 关卡坐标轴。
   玩家 x 由节拍直接驱动（x = xOfBeat(t/SPB)），
   音符与障碍共享同一拍点，保证音画踩点同步。 */

/* ---------- 常量 ---------- */
const BPM = 128, SPB = 60 / BPM, S16 = SPB / 4, FDT = 1 / 240;
const FIN = 207;                        // 终点拍（进度 100%）
const SPEED = [[0, 4], [96, 5], [160, 4]];     // [起始拍, 每拍格数] —— 中段加速
const GRAVS = [[0, 1], [160, 0.55], [176, 1]]; // 低重力段落（160~176 拍）
const G = 72.8, V0 = 17.06, VMAX = -27;        // 平地滞空恰好 1 拍
const HB = 0.45;                        // 方块判定半宽
const LSK = 'ai4399-dash-best', LSM = 'ai4399-dash-mute';

function segVal(map, b) { let v = map[0][1]; for (const s of map) if (b >= s[0]) v = s[1]; return v; }
const cpbOf = b => segVal(SPEED, b);
const gravOf = b => segVal(GRAVS, b);
function xOfBeat(b) {
  let x = 0;
  for (let i = 0; i < SPEED.length; i++) {
    const b0 = SPEED[i][0], v = SPEED[i][1];
    const b1 = i + 1 < SPEED.length ? SPEED[i + 1][0] : 1e9;
    if (b <= b0) break;
    x += (Math.min(b, b1) - b0) * v;
  }
  return x;
}

/* ---------- 关卡（按"按键拍"生成，结构上保证可通过） ---------- */
const L = { spikes: [], blocks: [], plats: [], orbs: [], pits: [], portals: [] };
(function buildLevel() {
  const X = xOfBeat;
  const sp   = (c, n, h) => { h = h || 0; for (let i = 0; i < n; i++) L.spikes.push({ x: X(c) + (i - (n - 1) / 2), h }); };
  const blk  = (b0, b1, top) => L.blocks.push({ x0: X(b0), x1: X(b1), top });
  const wall = (b, top) => L.blocks.push({ x0: X(b), x1: X(b) + 1, top });
  const plat = (b0, b1, top) => L.plats.push({ x0: X(b0), x1: X(b1), top });
  const orb  = (b, y) => L.orbs.push({ x: X(b), y, at: -1, t: 0 });
  const pit  = (b0, b1) => L.pits.push({ x0: X(b0), x1: X(b1) });
  /* 模式：p = 按键拍。地刺位于弧线中点 p+0.5（低重力段为 p+0.8） */
  const P1 = p => sp(p + 0.5, 1);
  const P2 = p => sp(p + 0.5, 2);
  const P3 = p => sp(p + 0.5, 3);
  const PL = (p, n) => sp(p + 0.8, n);                 // 低重力地刺
  const stair = p => { blk(p + 0.6, p + 2.5, 1); blk(p + 2.6, p + 4.5, 2); }; // 按 p、p+2 上台阶
  const orbWall = p => { orb(p + 0.5, 2.0); wall(p + 1.1, 3); };     // p 起跳，p+0.5 点环越墙
  const orbPit  = p => { pit(p + 0.35, p + 1.75); orb(p + 0.75, 1.7); }; // p 起跳，p+0.75 点环过坑
  const platRun4 = p => { pit(p + 0.6, p + 8.8);       // 按 p,p+2,p+4,p+6,p+8 踩浮板
    plat(p + 0.7, p + 2.3, 1); plat(p + 2.7, p + 4.3, 2);
    plat(p + 4.7, p + 6.3, 2); plat(p + 6.7, p + 8.3, 1); };
  const platRun3 = p => { pit(p + 0.6, p + 6.8);
    plat(p + 0.7, p + 2.3, 1); plat(p + 2.7, p + 4.3, 2); plat(p + 4.7, p + 6.3, 1); };

  /* —— 段0-1（0-32拍）热身 —— */
  P1(8); P1(12);
  [16, 18, 20, 22, 24, 26, 28, 30].forEach(P1);
  /* —— 段2（32-48）双刺登场 —— */
  P1(33); P2(35); P1(37); P2(39); P1(41); P1(43); P2(45);
  /* —— 段3（48-64）方块台阶 —— */
  stair(48); P1(54); stair(56); P1(62);
  /* —— 段4（64-80）浮空平台 —— */
  platRun4(63);
  P1(74); P2(76); P1(78);
  /* —— 段5（80-96）跳跃环 —— */
  orbWall(80); P1(83); orbWall(85); P1(88); orbPit(90); P2(93);
  L.portals.push({ b: 95.3, x: X(95.3), txt: '加 速', col: '#ff5577' });
  /* —— 段6-7（96-128）加速地带 —— */
  P1(97); P1(99); P1(101); P2(103); P1(105); P1(107); P2(109); P1(111);
  P2(113); P1(115); P1(116); P2(118); P1(120); P1(121); P2(123); P1(125); P1(126);
  /* —— 段8-9（128-160）高速平台+环 —— */
  platRun3(128);
  orbWall(136); P2(139); orbWall(141);
  stair(144); P1(150); P1(152); orbPit(154); P2(157);
  L.portals.push({ b: 159.3, x: X(159.3), txt: '低重力', col: '#66bbff' });
  /* —— 段10（160-176）低重力喘息 —— */
  PL(162, 1); PL(165, 2); PL(168, 1); PL(171, 2); PL(174, 1);
  L.portals.push({ b: 175.5, x: X(175.5), txt: '重力恢复', col: '#88ffaa' });
  /* —— 段11（176-200）终局高潮 —— */
  P2(177); P1(179); P2(181); P2(183); orbWall(185); P1(188);
  P3(190); orbPit(192); P2(195); P1(197); P2(199);
  /* —— 200-207 终点冲线 —— */
})();
function inPit(x) { for (const p of L.pits) { if (x > p.x0 && x < p.x1) return true; } return false; }

/* ---------- 音频引擎（全程序化合成） ---------- */
let actx = null, master = null, noiseBuf = null, delaySend = null;
let muted = localStorage.getItem(LSM) === '1';
function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  const comp = actx.createDynamicsCompressor();
  comp.threshold.value = -16; comp.ratio.value = 5; comp.attack.value = .003; comp.release.value = .2;
  master = actx.createGain(); master.gain.value = muted ? 0 : 0.8;
  master.connect(comp); comp.connect(actx.destination);
  noiseBuf = actx.createBuffer(1, actx.sampleRate, actx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const dl = actx.createDelay(1); dl.delayTime.value = SPB * 0.75;
  const fb = actx.createGain(); fb.gain.value = 0.28;
  const wet = actx.createGain(); wet.gain.value = 0.4;
  dl.connect(fb); fb.connect(dl); dl.connect(wet); wet.connect(master);
  delaySend = dl;
}
function adsr(g, t, a, peak, dec) {
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(peak, t + a);
  g.gain.exponentialRampToValueAtTime(0.0001, t + a + dec);
}
let kickTimes = [];
function kick(t) {
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(150, t);
  o.frequency.exponentialRampToValueAtTime(42, t + 0.11);
  adsr(g, t, 0.002, 0.9, 0.18);
  o.connect(g); g.connect(master); o.start(t); o.stop(t + 0.25);
  kickTimes.push(t); if (kickTimes.length > 12) kickTimes.shift();
}
function hat(t, open) {
  const s = actx.createBufferSource(); s.buffer = noiseBuf;
  s.playbackRate.value = 1.4;
  const f = actx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 7500;
  const g = actx.createGain();
  adsr(g, t, 0.001, open ? 0.14 : 0.13, open ? 0.18 : 0.035);
  s.connect(f); f.connect(g); g.connect(master); s.start(t); s.stop(t + 0.25);
}
function snare(t) {
  const s = actx.createBufferSource(); s.buffer = noiseBuf;
  const f = actx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 1900; f.Q.value = 0.8;
  const g = actx.createGain(); adsr(g, t, 0.001, 0.4, 0.14);
  s.connect(f); f.connect(g); g.connect(master); s.start(t); s.stop(t + 0.2);
  const o = actx.createOscillator(), g2 = actx.createGain();
  o.type = 'triangle'; o.frequency.setValueAtTime(220, t);
  o.frequency.exponentialRampToValueAtTime(120, t + 0.07);
  adsr(g2, t, 0.001, 0.25, 0.09);
  o.connect(g2); g2.connect(master); o.start(t); o.stop(t + 0.12);
}
function bassN(t, f, acc) {
  const o = actx.createOscillator(), g = actx.createGain();
  const lp = actx.createBiquadFilter(); lp.type = 'lowpass';
  lp.frequency.value = acc ? 900 : 550; lp.Q.value = 2;
  o.type = 'sawtooth'; o.frequency.value = f;
  adsr(g, t, 0.004, acc ? 0.3 : 0.24, 0.2);
  o.connect(lp); lp.connect(g); g.connect(master); o.start(t); o.stop(t + 0.25);
}
function pad(t, fs) {
  for (const f of fs) {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    adsr(g, t, 0.05, 0.065, 1.5);
    o.connect(g); g.connect(master); o.start(t); o.stop(t + 1.7);
  }
}
function lead(t, f) {
  const g = actx.createGain();
  const lp = actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 2600; lp.Q.value = 1.2;
  adsr(g, t, 0.006, 0.15, 0.26);
  for (const dt of [-7, 7]) {
    const o = actx.createOscillator();
    o.type = 'sawtooth'; o.frequency.value = f; o.detune.value = dt;
    o.connect(lp); o.start(t); o.stop(t + 0.32);
  }
  lp.connect(g); g.connect(master); g.connect(delaySend);
}
/* —— 编曲数据 —— */
const ROOTS = [55, 43.65, 65.41, 49];          // Am F C G
const CHORDS = [[220, 261.63, 329.63], [220, 261.63, 349.23], [196, 261.63, 329.63], [196, 246.94, 293.66]];
const SCALE = [440, 523.25, 587.33, 659.26, 783.99, 880];
const MELA = [1,0,2,0,4,0,3,2, 1,0,1,2,3,0,2,0, 4,0,3,0,2,0,3,4, 5,0,4,0,3,2,3,0];
const MELB = [6,0,5,4,5,0,4,3, 4,3,4,0,3,2,3,0, 5,0,4,5,6,0,5,4, 5,4,3,4,2,3,4,5];
const SECF = [ // k=底鼓 s=军鼓 h=8分镲 h2=16分镲 oh=开镲 b=贝斯 p=和弦 l=主旋律 L=旋律B
  { k:1, h:1 },
  { k:1, h:1, s:1, b:1 },
  { k:1, h:1, s:1, b:1, p:1 },
  { k:1, h:1, s:1, b:1, p:1, l:1 },
  { k:1, h:1, s:1, b:1, p:1, l:1, oh:1 },
  { k:1, h:1, s:1, b:1, p:1, l:1, oh:1 },
  { k:1, h2:1, s:1, b:1, p:1, l:1, L:1, oh:1 },
  { k:1, h2:1, s:1, b:1, p:1, l:1, L:1, oh:1 },
  { k:1, h2:1, s:1, b:1, p:1, l:1, L:1, oh:1 },
  { k:1, h2:1, s:1, b:1, p:1, l:1, L:1, oh:1 },
  { k:1, h:1, b:1, p:1 },                      // 低重力：抽掉鼓组喘息
  { k:1, h2:1, s:1, b:1, p:1, l:1, L:1, oh:1 },// 高潮
  { p:1, b:1 }                                  // 冲线
];
let s16 = 0, songStart = 0;
function playStep(s, t) {
  const beat = s / 4;
  const sec = Math.min(12, (beat / 16) | 0);
  const F = SECF[sec], pos = s % 16, ci = ((beat / 4) | 0) % 4;
  if (F.k && pos % 4 === 0) kick(t);
  if (F.s && (pos === 4 || pos === 12)) snare(t);
  if (F.h && pos % 4 === 2) hat(t, false);
  if (F.h2 && pos % 2 === 1) hat(t, false);
  if (F.oh && pos === 14) hat(t, true);
  if (F.b && pos % 2 === 0) bassN(t, ROOTS[ci] * ((pos === 6 || pos === 14) ? 2 : 1), pos % 4 === 0);
  if (F.p && pos === 0) pad(t, CHORDS[ci]);
  if (F.l && pos % 2 === 0) {
    const m = (F.L ? MELB : MELA)[((beat * 2) | 0) % 32];
    if (m) lead(t, SCALE[m - 1]);
  }
}
function schedule() {
  if (!actx || state !== 'play') return;
  const ahead = actx.currentTime + 0.16;
  while (songStart + s16 * S16 < ahead) {
    if (s16 / 4 <= FIN + 1) playStep(s16, songStart + s16 * S16);
    s16++;
  }
}
/* —— 音效 —— */
function sfxDeath() {
  if (!actx) return; const t = actx.currentTime;
  const s = actx.createBufferSource(); s.buffer = noiseBuf;
  const f = actx.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(5000, t); f.frequency.exponentialRampToValueAtTime(150, t + 0.4);
  const g = actx.createGain(); adsr(g, t, 0.002, 0.55, 0.4);
  s.connect(f); f.connect(g); g.connect(master); s.start(t); s.stop(t + 0.45);
  const o = actx.createOscillator(), g2 = actx.createGain();
  o.type = 'square'; o.frequency.setValueAtTime(220, t);
  o.frequency.exponentialRampToValueAtTime(35, t + 0.35);
  adsr(g2, t, 0.002, 0.3, 0.35);
  o.connect(g2); g2.connect(master); o.start(t); o.stop(t + 0.4);
}
function sfxOrb() {
  if (!actx) return; const t = actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'sine'; o.frequency.setValueAtTime(660, t);
  o.frequency.exponentialRampToValueAtTime(1450, t + 0.1);
  adsr(g, t, 0.003, 0.3, 0.13);
  o.connect(g); g.connect(master); o.start(t); o.stop(t + 0.16);
}
function sfxWin() {
  if (!actx) return; const t0 = actx.currentTime;
  [523.25, 659.26, 783.99, 1046.5, 1318.5].forEach((f, i) => {
    const t = t0 + i * 0.13;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    adsr(g, t, 0.005, 0.3, i === 4 ? 0.9 : 0.18);
    o.connect(g); g.connect(master); o.start(t); o.stop(t + 1.1);
  });
}

/* ---------- 状态 ---------- */
let state = 'menu';        // menu | play | dead | win
let attempts = 0, deaths = 0;
let best = parseFloat(localStorage.getItem(LSK) || '0') || 0;
let simTime = 0, holding = false, pressBuf = 0;
let deadT = 0, winT = 0, failShown = false, shake = 0;
let lastDeathBeat = -99, deathX = 0, deathY = 0;
const P = { x: 0, y: 0, vy: 0, onGround: true, beat: 0, coyote: 0, rot: 0 };
const parts = [];

function saveBest() { localStorage.setItem(LSK, best.toFixed(1)); }
const $ = id => document.getElementById(id);
function showOv(id) { ['menu', 'fail', 'winov'].forEach(k => $(k).classList.toggle('hide', k !== id)); }
function hideOv() { ['menu', 'fail', 'winov'].forEach(k => $(k).classList.add('hide')); }

function resetPlayer() {

/* ---------- 物理（固定步长 240Hz，时钟＝音频时钟） ---------- */
function step() {
  simTime += FDT;
  const beat = simTime / SPB; P.beat = beat;
  if (beat >= FIN) { winGame(); return; }
  const x = xOfBeat(beat); P.x = x;
  if (pressBuf > 0) pressBuf -= FDT;
  if (P.coyote > 0) P.coyote -= FDT;
  const g = G * gravOf(beat);
  const wasGround = P.onGround;
  const y1 = P.y;
  P.vy -= g * FDT; if (P.vy < VMAX) P.vy = VMAX;
  let y2 = y1 + P.vy * FDT;
  /* 落地检测（地面/方块/浮板，浮板仅可从上方落下） */
  let landTop = null;
  if (P.vy <= 0) {
    if (!inPit(x) && y1 >= -0.01 && y2 <= 0) landTop = 0;
    for (const o of L.blocks) {
      if (o.x0 - HB < x && x < o.x1 + HB && y1 >= o.top - 0.12 && y2 <= o.top && (landTop === null || o.top > landTop)) landTop = o.top;
    }
    for (const o of L.plats) {
      if (o.x0 - HB < x && x < o.x1 + HB && y1 >= o.top - 0.12 && y2 <= o.top && (landTop === null || o.top > landTop)) landTop = o.top;
    }
  }
  if (landTop !== null) { y2 = landTop; P.vy = 0; P.onGround = true; }
  else { if (wasGround) P.coyote = 0.08; P.onGround = false; }
  P.y = y2;
  /* 跳跃（含按住连跳 + 0.12s 输入缓冲 + 土狼时间） */
  if (P.onGround && (holding || pressBuf > 0)) {
    P.vy = V0; P.onGround = false; pressBuf = 0;
  } else if (!P.onGround && P.coyote > 0 && P.vy <= 0.1 && (holding || pressBuf > 0)) {
    P.vy = V0; P.coyote = 0; pressBuf = 0;
  }
  /* 跳跃环：需要"新的一次点按"（缓冲内），触发空中弹跳 */
  if (pressBuf > 0) {
    for (const o of L.orbs) {
      if (o.at === attempts) continue;
      const dx = o.x - x, dy = o.y - (P.y + 0.45);
      if (dx * dx + dy * dy < 1.5) {
        o.at = attempts; o.t = performance.now() / 1000;
        P.vy = V0; P.onGround = false; pressBuf = 0;
        sfxOrb();
        for (let i = 0; i < 10; i++) {
          const a = Math.random() * Math.PI * 2;
          parts.push({ x: o.x, y: o.y, vx: Math.cos(a) * 6, vy: Math.sin(a) * 6,
            life: 0.4, max: 0.4, size: 0.12, col: '#ffcc00', grav: 0, type: 'sq' });
        }
        break;
      }
    }
  }
  /* 方块侧面：低于顶面 0.35 格＝撞死，否则容错上挪 */
  for (const o of L.blocks) {
    if (o.x0 < x + HB && x - HB < o.x1) {
      if (P.y < o.top - 0.35) { die(); return; }
      else if (P.y < o.top) { P.y = o.top; P.vy = Math.max(P.vy, 0); P.onGround = true; }
    }
  }
  /* 地刺：三角形判定（核心区小于贴图，越靠近刺尖越窄，宽容） */
  for (const s of L.spikes) {
    const dy = P.y - s.h;
    if (dy < 0.75 && P.y + 0.9 > s.h) {
      const hw = 0.34 + 0.30 * Math.max(0, 1 - Math.max(0, dy) / 0.75);
      if (Math.abs(x - s.x) < hw) { die(); return; }
    }
  }
  if (P.y < -4) die();
}

  if (VFX.att !== attempts) {
    VFX.att = attempts; VFX.pg = true;
    VFX.ms[0] = VFX.ms[1] = VFX.ms[2] = 0;
    VFX.sweep = -1; VFX.cpb = cpbOf(0); VFX.spd = 0;

  }
  /* 相机 */
  const camT = Math.max(0, (P.y - 2.4)) * cell * 0.55;
  camY += (camT - camY) * Math.min(1, rdt * 6);
  if (shake > 0) shake = Math.max(0, shake - rdt * 2);
  const shX = (Math.random() - 0.5) * 14 * shake, shY = (Math.random() - 0.5) * 14 * shake;
  const gy = H * 0.74 + camY + shY;
  const pxs = W * 0.30 + shX;
  const sx = x => (x - P.x) * cell + pxs;
  const sy = y => gy - y * cell;
  /* —— 背景渐变（缓存渐变 + 底鼓脉冲叠色，不每帧新建） —— */
  C.fillStyle = bgGrad(hq); C.fillRect(0, 0, W, H);

  if (state === 'play' && kickTimes.length) {

      KR.push(lk); if (KR.length > 4) KR.shift();

  }
  for (let i = KR.length - 1; i >= 0; i--) {
    const age = nowA - KR[i];
    if (age > 0.55) { KR.splice(i, 1); continue; }
    if (age < 0) continue;
    const al = 0.15 * (1 - age / 0.55);
    C.strokeStyle = `hsla(${hq + 25},90%,70%,${al.toFixed(3)})`;
    C.lineWidth = 2;
    C.beginPath(); C.arc(pxs, gy - cell * 3, cell * (0.6 + age * 17), 0, 7); C.stroke();

  }
  /* —— 竖直光柱阵列（视差滚动 + 底鼓呼吸） —— */
  {
    const spn = cell * 9, ph2 = ((P.x * cell * 0.5) % spn + spn) % spn;
    C.globalAlpha = 0.35 + kEnv * 0.65;
    for (let x0 = -ph2; x0 < W + spn; x0 += spn) {

    C.globalAlpha = 1;
  }
  /* —— 远景几何视差（三角/菱形漂移，随节拍轻缩放） —— */
  for (let k = 0; k < 16; k++) {
    const par = 0.10 + 0.07 * (k % 3);
    const span = W + 360;
    let dx = ((k * 431.7) - P.x * cell * par) % span; if (dx < 0) dx += span;
    const dy = H * 0.06 + ((k * 263) % 67) / 100 * H * 0.52;
    const sz = (30 + (k * 97) % 90) * (1 + kEnv * 0.07);
    C.globalAlpha = 0.10 + kEnv * 0.08;
    C.drawImage(k % 2 ? SPR.dia : SPR.tri, dx - 180 - sz / 2, dy - sz / 2, sz, sz);
  }
  C.globalAlpha = 1;
  /* —— 加速段速度线（进入瞬间增亮提示） —— */
  if (VFX.spd > 0) VFX.spd -= rdt;
  const cpbNow = state === 'menu' ? 4 : cpbOf(P.beat);
  if (cpbNow > VFX.cpb) VFX.spd = 0.6;
  VFX.cpb = cpbNow;
  if (state === 'play' && cpbNow > 4) {
    const boost = Math.max(0, VFX.spd) * 0.4;
    C.fillStyle = `hsla(${hq + 20},90%,78%,${(0.05 + kEnv * 0.04 + boost).toFixed(3)})`;
    for (let i = 0; i < 10; i++) {
      const yy2 = ((i * 173) % 97) / 97 * H * 0.92;
      const len = 90 + (i * 53) % 130;
      const xo = ((P.x * cell * 1.7) + i * 317) % (W + 260);
      C.fillRect(W + 130 - xo, yy2, len, 1.5);
    }
  }
  /* 低重力段：上浮微粒氛围 */
  if (lowG && Math.random() < 0.6) {
    parts.push({ x: P.x + (Math.random() * 16 - 3), y: -1 + Math.random() * 2, vx: 0, vy: 2.5 + Math.random() * 3,
      life: 1.5, max: 1.5, size: 0.05 + Math.random() * 0.05, col: '#8fd4ff', grav: 0, type: 'sq' });
  }
  const xv0 = P.x - pxs / cell - 2, xv1 = P.x + (W - pxs) / cell + 2;
  /* —— 地面（带坑：发光透视网格 + 节拍扫描线） —— */
  let segs = [], cur = xv0;
  for (const p of L.pits) {
    if (p.x1 < xv0 || p.x0 > xv1) continue;
    if (p.x0 > cur) segs.push([cur, p.x0]);
    cur = Math.max(cur, p.x1);
  }
  if (cur < xv1) segs.push([cur, xv1]);
  const scanP = state === 'menu' ? (tNow % 2) / 2 : ((P.beat % 2) + 2) % 2 / 2;
  for (const s of segs) {
    const a = sx(s[0]), b = sx(s[1]);
    C.fillStyle = `hsl(${hq},36%,8%)`;
    C.fillRect(a, gy, b - a, H - gy + 40);
    C.save();
    C.beginPath(); C.rect(a, gy, b - a, H - gy); C.clip();
    /* 透视网格（向下扇出） */
    C.strokeStyle = `hsla(${hq + 20},85%,65%,.10)`;
    C.lineWidth = 1;
    C.beginPath();
    for (let gx = Math.ceil(s[0] - 5); gx < s[1] + 5; gx++) {
      const xt = sx(gx);
      C.moveTo(xt, gy); C.lineTo(pxs + (xt - pxs) * 2.0, H);
    }
    for (let r = 1; r <= 5; r++) {
      const yy2 = gy + Math.pow(r / 5, 1.65) * (H - gy);
      C.moveTo(a, yy2); C.lineTo(b, yy2);
    }
    C.stroke();
    /* 扫描线（每 2 拍向远处推进一次） */
    const syl = gy + Math.pow(scanP, 1.65) * (H - gy);
    C.fillStyle = `hsla(${hq + 20},90%,72%,${(0.12 * (1 - scanP) + kEnv * 0.05).toFixed(3)})`;
    C.fillRect(a, syl, b - a, 2.5);
    C.restore();
    /* 顶线发光（预渲染条带拉伸） */
    C.drawImage(SPR.gline, a, gy - 15, b - a, 30);
    /* 坑壁 */
    C.strokeStyle = 'rgba(255,204,0,.5)'; C.lineWidth = 2;
    if (s[0] > xv0 + 0.1) { C.beginPath(); C.moveTo(a, gy); C.lineTo(a, H); C.stroke(); }
    if (s[1] < xv1 - 0.1) { C.beginPath(); C.moveTo(b, gy); C.lineTo(b, H); C.stroke(); }
  }
  /* —— 传送门标记 —— */
  for (const p of L.portals) {
    if (p.x < xv0 - 2 || p.x > xv1 + 2) continue;
    const xx = sx(p.x);
    C.save();
    C.strokeStyle = p.col; C.lineWidth = 3;
    C.shadowColor = p.col; C.shadowBlur = 16;
    const ph = cell * 3.4, pw = cell * 0.85;
    C.globalAlpha = 0.14; C.fillStyle = p.col;
    roundRect(xx - pw, gy - ph, pw * 0.55, ph, 8); C.fill();
    roundRect(xx + pw * 0.45, gy - ph, pw * 0.55, ph, 8); C.fill();
    C.globalAlpha = 1;
    roundRect(xx - pw, gy - ph, pw * 0.55, ph, 8); C.stroke();
    roundRect(xx + pw * 0.45, gy - ph, pw * 0.55, ph, 8); C.stroke();
    C.fillStyle = p.col; C.font = FONT(13, 1); C.textAlign = 'center';
    C.fillText(p.txt, xx, gy - ph - 10);
    C.restore();
  }
  /* —— 浮空平台（预渲染霓虹面板 + 顶边流光） —— */
  for (const o of L.plats) {
    if (o.x1 < xv0 || o.x0 > xv1) continue;
    const a = sx(o.x0), b = sx(o.x1), yy = sy(o.top);
    C.drawImage(SPR.plat, a, yy - SPR.platPad, b - a, cell * 0.32 + SPR.platPad * 2);
    C.fillStyle = 'rgba(0,0,0,.25)';
    for (let gx = Math.ceil(o.x0); gx < o.x1; gx++) C.fillRect(sx(gx), yy + 3, 1.5, cell * 0.32 - 6);
    C.strokeStyle = 'rgba(255,250,220,.85)'; C.lineWidth = 2;
    C.setLineDash([cell * 0.5, cell * 1.6]);
    C.lineDashOffset = -(tNow * cell * 2.6) % (cell * 2.1);
    C.beginPath(); C.moveTo(a, yy); C.lineTo(b, yy); C.stroke();
    C.setLineDash([]);
  }
  /* —— 方块（霓虹描边面板 + 边缘流光，双层描边假发光） —— */
  for (const o of L.blocks) {
    if (o.x1 < xv0 || o.x0 > xv1) continue;
    const a = sx(o.x0), b = sx(o.x1), yy = sy(o.top);
    C.fillStyle = `hsl(${hq},32%,12%)`;
    C.fillRect(a, yy, b - a, gy - yy + 1);
    C.strokeStyle = 'rgba(255,255,255,.07)'; C.lineWidth = 1;
    C.beginPath();
    for (let gx = Math.ceil(o.x0); gx < o.x1; gx++) { C.moveTo(sx(gx), yy); C.lineTo(sx(gx), gy); }
    for (let r = 1; r < o.top; r++) { C.moveTo(a, sy(r)); C.lineTo(b, sy(r)); }
    C.stroke();
    C.fillStyle = `hsla(${hq + 20},80%,60%,.10)`;
    C.fillRect(a, yy, b - a, Math.min(cell * 0.4, gy - yy));

    C.strokeStyle = AC; C.lineWidth = 2.2;
    C.strokeRect(a, yy, b - a, gy - yy);
    C.strokeStyle = 'rgba(255,250,220,.8)'; C.lineWidth = 2.2;
    C.setLineDash([cell * 0.55, cell * 2.2]);
    C.lineDashOffset = -(tNow * cell * 3) % (cell * 2.75);
    C.strokeRect(a, yy, b - a, gy - yy);
    C.setLineDash([]);
  }
  /* —— 地刺（预渲染水晶精灵） —— */
  for (const s of L.spikes) {
    if (s.x < xv0 - 1 || s.x > xv1 + 1) continue;
    const sp2 = spikeSprite(hue);
    C.drawImage(sp2, sx(s.x) - sp2._w / 2, sy(s.h) - sp2._h + 4, sp2._w, sp2._h);
  }
  /* —— 跳跃环（双层反向旋转 + 触发爆闪） —— */
  for (const o of L.orbs) {
    if (o.x < xv0 - 2 || o.x > xv1 + 2) continue;
    const xx = sx(o.x), yy = sy(o.y);
    const used = o.at === attempts;
    C.save();
    C.translate(xx, yy);
    if (used) {
      const e = Math.min(1, (tNow - o.t) * 3);
      if (e < 0.55) {
        C.globalAlpha = 1 - e / 0.55;
        const fs = SPR.flash._w * (0.6 + e * 1.4);
        C.drawImage(SPR.flash, -fs / 2, -fs / 2, fs, fs);
      }
      C.globalAlpha = 0.5 * (1 - e);
      C.strokeStyle = '#fff'; C.lineWidth = 3;
      C.beginPath(); C.arc(0, 0, cell * (0.55 + e * 1.1), 0, 7); C.stroke();
    } else {
      const pul = 1 + Math.sin(tNow * 6 + o.x) * 0.07 + kEnv * 0.16;
      const ow = SPR.orbOuter._w;
      C.rotate(tNow * 1.6);
      C.drawImage(SPR.orbOuter, -ow / 2 * pul, -ow / 2 * pul, ow * pul, ow * pul);
      C.rotate(-tNow * 3.9);
      C.drawImage(SPR.orbInner, -ow / 2, -ow / 2, ow, ow);
      C.globalAlpha = 0.75 + kEnv * 0.25;

    }

  }
  /* —— 终点线（缓存渐变平移复用） —— */
  const fx = xOfBeat(FIN);
  if (fx < xv1 + 4) {
    const xx = sx(fx);
    C.save();
    C.translate(0, gy);
    C.strokeStyle = finGrad; C.lineWidth = 5;
    C.shadowColor = AC; C.shadowBlur = 20;
    C.beginPath(); C.moveTo(xx, -cell * 7); C.lineTo(xx, 0); C.stroke();

    C.fillStyle = AC; C.font = FONT(15, 1); C.textAlign = 'center';
    C.fillText('终 点', xx, gy - cell * 7 - 12);

  if (deaths >= 10 && (state === 'play' || state === 'dead') && lastDeathBeat > 2) {

    const mx = xOfBeat(mb);
    if (mx > xv0 && mx < xv1) {

      C.save();
      C.globalAlpha = 0.4;
      C.strokeStyle = '#7ef0ff'; C.lineWidth = 3;
      C.beginPath(); C.arc(xx, gy, cell * (0.3 + ph * 0.35), 0, 7); C.stroke();
      C.globalAlpha = 0.55;
      C.fillStyle = '#7ef0ff';
      C.beginPath();
      C.moveTo(xx, gy - cell * 1.5); C.lineTo(xx - cell * 0.3, gy - cell * 1.0);
      C.lineTo(xx + cell * 0.3, gy - cell * 1.0); C.closePath(); C.fill();
      C.font = FONT(12, 1); C.textAlign = 'center';

  /* —— 粒子（死亡瞬间前 0.14s 减速播放＝短暂时停感） —— */
  const pdt = (state === 'dead' && deadT < 0.14) ? rdt * 0.22 : rdt;
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];

    if (p.life <= 0) { parts.splice(i, 1); continue; }
    p.x += p.vx * pdt; p.y += p.vy * pdt;
    if (p.grav) p.vy -= 40 * pdt;
    const k2 = Math.max(0, p.life / p.max);
    if (p.type === 'ring') {            // 着地光环（贴地椭圆扩散）
      C.globalAlpha = k2 * 0.7;
      C.strokeStyle = p.col; C.lineWidth = 2.5;
      C.beginPath();
      C.ellipse(sx(p.x), sy(p.y), cell * (0.25 + (1 - k2) * 1.3), cell * (0.09 + (1 - k2) * 0.45), 0, 0, 7);
      C.stroke();
    } else if (p.type === 'shock') {    // 死亡冲击波
      C.globalAlpha = k2 * 0.85;
      C.strokeStyle = p.col; C.lineWidth = cell * 0.16 * k2 + 1;
      C.beginPath(); C.arc(sx(p.x), sy(p.y), cell * (0.4 + (1 - k2) * 6.5), 0, 7); C.stroke();
    } else if (p.type === 'shard') {    // 发光旋转碎片
      p.rot += p.vr * pdt;
      const ps = p.size * cell;
      C.globalAlpha = k2 * 0.95;
      C.save();
      C.translate(sx(p.x), sy(p.y)); C.rotate(p.rot);
      C.fillStyle = p.col;
      C.fillRect(-ps / 2, -ps / 2, ps, ps);
      C.strokeStyle = 'rgba(255,255,255,.7)'; C.lineWidth = 1;
      C.strokeRect(-ps / 2, -ps / 2, ps, ps);
      C.restore();
    } else {
      C.globalAlpha = k2 * 0.85;
      C.fillStyle = p.col;
      const ps = p.size * cell;
      C.fillRect(sx(p.x) - ps / 2, sy(p.y) - ps / 2, ps, ps);
    }
  }

  if (state !== 'dead') {

      if (P.onGround && !VFX.pg && simTime > 0.05) {

      }
      VFX.pg = P.onGround;
      /* 流光带轨迹采样 */
      TRAIL.push({ x: P.x - 0.12, y: P.y + 0.5, al: P.onGround ? 0.3 : 1 });
      if (TRAIL.length > 15) TRAIL.shift();
      /* 喷射拖尾粒子 */
      parts.push({ x: P.x - 0.38, y: P.y + 0.25 + Math.random() * 0.4, vx: -2, vy: (Math.random() - 0.5) * 2,
        life: 0.3, max: 0.3, size: 0.13 + Math.random() * 0.1,
        col: Math.random() < 0.5 ? '#ffcc00' : '#ff9100', grav: 0, type: 'sq' });
    }
    /* 渐变流光带（旋转滞空时最亮） */
    if (state === 'play' && TRAIL.length > 2) {
      C.save(); C.lineCap = 'round'; C.lineJoin = 'round';
      for (let i = 1; i < TRAIL.length; i++) {
        const q = i / TRAIL.length;
        const p0 = TRAIL[i - 1], p1 = TRAIL[i];
        C.strokeStyle = `hsla(${38 + q * 14},100%,${60 + q * 25}%,${(q * q * 0.5 * p1.al).toFixed(3)})`;
        C.lineWidth = cell * (0.1 + 0.45 * q);
        C.beginPath(); C.moveTo(sx(p0.x), sy(p0.y)); C.lineTo(sx(p1.x), sy(p1.y)); C.stroke();
      }
      C.restore();
    }
    /* 旋转 */
    if (state === 'play') {
      if (!P.onGround) P.rot += rdt * 265 * (cpbOf(P.beat) / 4) * (lowG ? 0.55 : 1);
      else { const tgt = Math.round(P.rot / 90) * 90; P.rot += (tgt - P.rot) * Math.min(1, rdt * 20); }
    }
    const cx = sx(P.x), cyy = sy(P.y + 0.5);
    const bob = state === 'menu' ? Math.sin(performance.now() / 400) * 3 : 0;
    C.save();
    C.translate(cx, cyy + bob);
    C.rotate(P.rot * Math.PI / 180);
    const pf = SPR.player._w;
    C.drawImage(SPR.player, -pf / 2, -pf / 2, pf, pf);
    const cf = SPR.core._w * (1 + kEnv * 0.1);
    C.globalAlpha = 0.35 + kEnv * 0.65;
    C.drawImage(SPR.core, -cf / 2, -cf / 2, cf, cf);
    C.globalAlpha = 1;
    C.restore();
  }
  /* —— 进度里程碑横扫光（25/50/75%） —— */
  if (state === 'play') {
    const pr0 = P.beat / FIN;
    if (!VFX.ms[0] && pr0 >= 0.25) { VFX.ms[0] = 1; VFX.sweep = 0; }
    if (!VFX.ms[1] && pr0 >= 0.5)  { VFX.ms[1] = 1; VFX.sweep = 0; }
    if (!VFX.ms[2] && pr0 >= 0.75) { VFX.ms[2] = 1; VFX.sweep = 0; }
  }
  if (VFX.sweep >= 0) {
    VFX.sweep += rdt;
    const t2 = VFX.sweep / 0.55;
    if (t2 >= 1) VFX.sweep = -1;
    else {
      C.globalAlpha = 0.7 * (1 - t2);
      C.drawImage(SPR.sweep, -200 + (W + 400) * t2 - 90, 0, 180, H);
      C.globalAlpha = 1;
    }
  }
  /* —— HUD：能量管进度条 —— */
  if (state === 'play' || state === 'dead' || state === 'win') {
    const pr = Math.max(0, Math.min(1, P.beat / FIN));
    const bw = Math.min(W * 0.46, 520), bx = (W - bw) / 2, by = 16, bh = 12;
    /* 管壳 */
    C.fillStyle = 'rgba(8,8,18,.6)';
    roundRect(bx - 3, by - 3, bw + 6, bh + 6, (bh + 6) / 2); C.fill();
    C.strokeStyle = `rgba(255,204,0,${(0.3 + kEnv * 0.25).toFixed(3)})`; C.lineWidth = 1.5;
    roundRect(bx - 3, by - 3, bw + 6, bh + 6, (bh + 6) / 2); C.stroke();
    /* 里程碑刻度 */
    C.fillStyle = 'rgba(255,255,255,.28)';
    for (let i = 1; i < 4; i++) C.fillRect(bx + bw * i / 4 - 0.75, by + bh + 6, 1.5, 4);
    /* 能量填充 + 流动光（缓存渐变 + 预渲染流光贴片） */
    if (bw * pr > bh) {
      C.save();
      roundRect(bx, by, bw * pr, bh, bh / 2); C.clip();
      C.translate(bx, by);
      C.fillStyle = hudGrad; C.fillRect(0, 0, bw, bh);
      const off = (tNow * 110) % 128;
      C.globalAlpha = 0.3 + kEnv * 0.4;
      for (let fx2 = off - 128; fx2 < bw * pr; fx2 += 128) C.drawImage(SPR.flow, fx2, -1, 128, bh + 2);
      C.globalAlpha = 0.5;
      C.fillStyle = 'rgba(255,255,255,.6)';
      C.fillRect(0, 1.5, bw * pr, 1.5);
      C.restore();
      C.globalAlpha = 1;
    }
    /* 最佳进度刻度 */
    if (best > 0.5 && best < 100) {
      const tx = bx + bw * best / 100;
      C.fillStyle = 'rgba(255,255,255,.75)';
      C.beginPath(); C.moveTo(tx, by - 6); C.lineTo(tx - 4, by - 12); C.lineTo(tx + 4, by - 12); C.closePath(); C.fill();
    }
    C.fillStyle = '#ffe9a0'; C.font = FONT(15, 1); C.textAlign = 'left';
    C.fillText((pr * 100).toFixed(0) + '%', bx + bw + 14, by + bh - 1);
    C.textAlign = 'right'; C.fillStyle = 'rgba(255,255,255,.55)'; C.font = FONT(13);
    C.fillText('第 ' + attempts + ' 次', bx - 14, by + bh - 1);
  }
  /* 死亡白闪 */
  if (state === 'dead' && deadT < 0.18) {
    C.fillStyle = 'rgba(255,255,255,' + (0.35 * (1 - deadT / 0.18)) + ')';
    C.fillRect(0, 0, W, H);
  }
  /* 通关烟花 */
  if (state === 'win' && Math.random() < 0.25) {
    const a0 = Math.random() * Math.PI * 2;
    const fxp = P.x + Math.random() * 8 - 2, fyp = 3 + Math.random() * 5;
    for (let i = 0; i < 14; i++) {
      const a = a0 + i / 14 * Math.PI * 2;
      parts.push({ x: fxp, y: fyp, vx: Math.cos(a) * 7, vy: Math.sin(a) * 7,
        life: 0.8, max: 0.8, size: 0.12, col: ['#ffcc00', '#ff5577', '#66bbff', '#88ffaa'][i % 4], grav: 1, type: 'sq' });
    }
  }
}

/* ---------- 主循环 ---------- */
let lastT = performance.now();
function frame(now) {
  requestAnimationFrame(frame);
  const rdt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  if (state === 'play' && actx && !document.hidden) {
    let target = actx.currentTime - songStart;
    if (target - simTime > 0.3) { songStart = actx.currentTime - simTime - 0.05; target = simTime + 0.05; }
    let guard = 0;
    while (state === 'play' && simTime < target && guard++ < 200) step();
    schedule();
  }
  if (state === 'dead') {
    deadT += rdt;
    if (deadT > 0.45 && !failShown) { failShown = true; showOv('fail'); }
  }
  if (state === 'win') winT += rdt;
  render(rdt);
}
setInterval(schedule, 30);
$('bestM').textContent = best.toFixed(1) + '%';
requestAnimationFrame(frame);
</script>
</body>
