<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>深渊百层 · AI4399</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body {
    width:100%; height:100%; overflow:hidden;
    background:#0a0a12; color:#e8e8f0;
    font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    touch-action:none; -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  #back {
    position:fixed; top:10px; left:12px; z-index:50;
    color:#8888a0; text-decoration:none; font-size:14px;
    background:rgba(20,20,31,.55); border:1px solid #2a2a3d;
    padding:5px 12px; border-radius:8px; backdrop-filter:blur(4px);
    opacity:.85; transition:opacity .2s,color .2s;

  #back:hover { opacity:1; color:#ffcc00; }

    position:fixed; left:50%; top:50%; transform:translate(-50%,-50%);

  .overlay {
    position:absolute; inset:0; z-index:20;
    display:none; flex-direction:column; align-items:center; justify-content:center;

  }
  .overlay.show { display:flex; }
  .panel {
    background:rgba(20,20,31,.92); border:1px solid #2a2a3d; border-radius:16px;
    padding:30px 36px; max-width:86%;
    box-shadow:0 12px 50px rgba(0,0,0,.6);
  }
  h1.title {
    font-size:42px; letter-spacing:8px; color:#ffcc00; font-weight:800;
    text-shadow:0 0 24px rgba(255,204,0,.35), 0 3px 0 #5a4400;
    margin-bottom:8px;
  }
  .subtitle { font-size:15px; color:#8888a0; letter-spacing:3px; margin-bottom:20px; }
  .bigbtn {
    display:inline-block; cursor:pointer; border:none; outline:none;
    font-family:inherit; font-size:19px; font-weight:700; letter-spacing:4px;
    color:#1a1408; background:linear-gradient(180deg,#ffe066,#ffcc00 55%,#e0a800);
    padding:13px 46px; border-radius:12px; margin-top:6px;
    box-shadow:0 4px 0 #8a6a00, 0 8px 24px rgba(255,204,0,.25);
    transition:transform .08s, box-shadow .08s;
  }
  .bigbtn:active { transform:translateY(3px); box-shadow:0 1px 0 #8a6a00; }
  .ghostbtn {
    display:inline-block; cursor:pointer; font-family:inherit; font-size:14px;
    color:#8888a0; background:none; border:1px solid #2a2a3d; border-radius:10px;
    padding:9px 24px; margin-top:14px; letter-spacing:2px; transition:color .2s,border-color .2s;
  }
  .ghostbtn:hover { color:#e8e8f0; border-color:#8888a0; }
  .hint { font-size:13px; color:#8888a0; line-height:2; margin-top:18px; }
  .hint b { color:#e8e8f0; font-weight:600; }
  .best { font-size:14px; color:#8888a0; margin-top:14px; }
  .best em { font-style:normal; color:#ffcc00; font-weight:700; }
  #overStats { margin:10px 0 16px; }
  #overFloor { font-size:54px; font-weight:800; color:#ffcc00; line-height:1.15;
    text-shadow:0 0 20px rgba(255,204,0,.3); }
  #overFloor small { font-size:20px; color:#8888a0; font-weight:400; margin-left:4px; }
  #overBest { font-size:14px; color:#8888a0; margin-top:6px; }
  #overBest em { font-style:normal; color:#ffcc00; }
  #newRec {
    display:none; font-size:14px; color:#0a0a12; background:#ffcc00; border-radius:6px;
    padding:2px 12px; margin:8px auto 0; width:fit-content; font-weight:700;
    animation:pop .5s ease;
  }
  #overTitle { font-size:26px; font-weight:800; color:#e8e8f0; letter-spacing:6px; margin-bottom:4px; }
  @keyframes pop { 0%{transform:scale(.3)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }
  .legend { display:flex; flex-wrap:wrap; gap:7px 14px; justify-content:center; margin-top:16px;
    font-size:12px; color:#8888a0; max-width:330px; }
  .legend span { white-space:nowrap; }
  .legend i { display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:5px; vertical-align:-1px; }
</style>

<body>
<a id="back" href="../">← AI4399</a>
<div id="stage">
  <canvas id="cv"></canvas>

  <div id="menu" class="overlay show">
    <div class="panel">
      <h1 class="title">深渊百层</h1>
      <div class="subtitle">—— 是男人就下一百层 ——</div>

      <div class="best" id="menuBest"></div>
      <div class="hint">
        <b>← →</b> 或 <b>A D</b> 左右移动 · 触屏按住<b>左右半屏</b><br>
        踩普通平台<b>回血</b> · 尖刺与天花板<b>扣血</b> · 跌出屏幕即死<br>
        <b>M</b> 静音
      </div>
      <div class="legend">
        <span><i style="background:#8f6f48"></i>普通(回血)</span>
        <span><i style="background:#cdd2de"></i>尖刺(-3)</span>
        <span><i style="background:#565666"></i>传送带</span>
        <span><i style="background:#cc4444"></i>弹簧</span>
        <span><i style="background:#b3925c"></i>脆裂板</span>

      </div>
    </div>
  </div>

  <div id="over" class="overlay">
    <div class="panel">
      <div id="overTitle">坠落终结</div>
      <div id="overStats">
        <div id="overFloor">0<small>层</small></div>
        <div id="newRec">★ 新纪录 ★</div>
        <div id="overBest">最深纪录 <em>0</em> 层</div>
      </div>
      <button class="bigbtn" id="btnRetry">再来一局</button><br>
      <button class="ghostbtn" id="btnMenu">返回菜单</button>
    </div>
  </div>
</div>

<script>
'use strict';
/* ============ 深渊百层 — NS-Shaft 类下落闯关 ============ */
const W = 420, H = 700;            // 逻辑分辨率（竖屏）
const WALL = 30;                   // 两侧井壁宽
const INNER_L = WALL, INNER_R = W - WALL;
const ROW = 84;                    // 层间距
const GRAV = 1900;
const MOVE_ACC = 2700, MOVE_MAX = 295, FRICTION = 2400;
const BELT_SPD = 118;
const SPRING_VY = -705;
const CEIL_H = 36;                 // 天花板尖刺底线(视口内)
const PW = 22, PH = 30;            // 玩家尺寸
const MAX_HP = 10;
const BEST_KEY = 'ai4399-down100-best';

const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const stage = document.getElementById('stage');
let viewScale = 1;

/* roundRect 兼容补丁 (旧 Safari) */
if (!ctx.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    this.moveTo(x + r[0], y);
    this.arcTo(x + w, y, x + w, y + h, r[1]);
    this.arcTo(x + w, y + h, x, y + h, r[2]);
    this.arcTo(x, y + h, x, y, r[3]);
    this.arcTo(x, y, x + w, y, r[0]);
    this.closePath();
    return this;
  };
}

function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  viewScale = s;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  cv.width = Math.round(W * s * dpr);
  cv.height = Math.round(H * s * dpr);
  cv.style.width = (W * s) + 'px';
  cv.style.height = (H * s) + 'px';
  stage.style.width = (W * s) + 'px';
  stage.style.height = (H * s) + 'px';
  ctx.setTransform(s * dpr, 0, 0, s * dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

/* ---------------- 音效 (WebAudio 合成) ---------------- */
let AC = null, masterGain = null, muted = false, noiseBuf = null;
function initAudio() {
  if (AC) return;
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = AC.createGain();
    masterGain.gain.value = 0.45;
    masterGain.connect(AC.destination);
    noiseBuf = AC.createBuffer(1, AC.sampleRate * 0.5, AC.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  } catch (e) { AC = null; }
}
function tone(f0, f1, dur, type, vol, delay) {
  if (!AC || muted) return;
  const t = AC.currentTime + (delay || 0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(f0, t);
  o.frequency.exponentialRampToValueAtTime(Math.max(f1, 1), t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + dur + 0.02);
}
function noise(dur, vol, f, delay) {
  if (!AC || muted) return;
  const t = AC.currentTime + (delay || 0);
  const s = AC.createBufferSource(); s.buffer = noiseBuf; s.loop = true;
  const flt = AC.createBiquadFilter(); flt.type = 'lowpass'; flt.frequency.value = f || 1200;
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  s.connect(flt); flt.connect(g); g.connect(masterGain);
  s.start(t); s.stop(t + dur + 0.02);
}
const sfx = {
  land()    { noise(0.06, 0.25, 900); tone(150, 90, 0.07, 'triangle', 0.18); },
  heal()    { tone(620, 880, 0.09, 'sine', 0.12); },
  hurt()    { tone(240, 70, 0.28, 'sawtooth', 0.35); noise(0.15, 0.3, 2500); },
  spring()  { tone(280, 940, 0.2, 'sine', 0.3); tone(140, 470, 0.2, 'square', 0.08); },
  crack()   { noise(0.1, 0.3, 3000); },
  breakP()  { noise(0.3, 0.35, 1400); tone(160, 60, 0.2, 'triangle', 0.15); },
  flip()    { tone(420, 200, 0.1, 'square', 0.1); },
  belt()    { },
  milestone(){ tone(660, 660, 0.12, 'sine', 0.25); tone(880, 880, 0.18, 'sine', 0.25, 0.1); },
  fanfare() { [523, 659, 784, 1047].forEach((f, i) => tone(f, f, 0.28, 'square', 0.16, i * 0.13));
              [262, 330, 392, 523].forEach((f, i) => tone(f, f, 0.3, 'triangle', 0.18, i * 0.13)); },
  dead()    { tone(220, 35, 0.7, 'sawtooth', 0.35); noise(0.5, 0.3, 700); },
  pin()     { noise(0.12, 0.4, 4000); tone(900, 200, 0.18, 'square', 0.2); },
  click()   { tone(840, 620, 0.06, 'square', 0.1); }
};

/* ---------------- 状态 ---------------- */
const ST = { MENU: 0, PLAY: 1, DYING: 2, OVER: 3 };
let state = ST.MENU;
let best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10) || 0;

let camY, player, plats, parts, embers, layer, baseY, nextRowN, lastPlatX, lastTypes;
let gameT, flashT, bannerT, bannerShown, shake, deathType, deathT, hurtFlash, healFlash, newRecord;
let milestoneN = 0, torchSeed = 0;

function rnd(a, b) { return a + Math.random() * (b - a); }
function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }
function lerp(a, b, t) { return a + (b - a) * t; }

/* 颜色按深度插值: 土 → 岩 → 熔岩 */
const PAL = [
  { bgT: [36, 26, 16],  bgB: [24, 17, 9],   brick: [76, 58, 38],  mortar: [42, 32, 20], glow: [0, 0, 0] },
  { bgT: [30, 30, 44],  bgB: [19, 19, 30],  brick: [58, 58, 76],  mortar: [32, 32, 46], glow: [40, 40, 80] },
  { bgT: [44, 14, 12],  bgB: [26, 7, 5],    brick: [80, 34, 26],  mortar: [44, 16, 12], glow: [255, 70, 20] }
];
function palMix(t) {
  t = clamp(t, 0, 1) * 2;
  const i = t < 1 ? 0 : 1, f = t < 1 ? t : t - 1;
  const A = PAL[i], B = PAL[i + 1], o = {};
  for (const k in A) o[k] = A[k].map((v, j) => Math.round(lerp(v, B[k][j], f)));
  return o;
}
function rgb(a, alpha) { return alpha === undefined ? `rgb(${a[0]},${a[1]},${a[2]})` : `rgba(${a[0]},${a[1]},${a[2]},${alpha})`; }

/* ================ 渲染缓存与纯视觉状态（美术层，不碰玩法） ================ */
function mkCanvas(w, h) { const c = document.createElement('canvas'); c.width = w; c.height = h; return c; }
function h01(n) { const x = Math.sin(n * 127.1 + 311.7) * 43758.5453; return x - Math.floor(x); }

let renderDt = 0.016;
let uiParts = [], hpPrev = -1;
let flipTrail = [];
let mileT = 0, mileN = 0;
let shockT = -1, shockX = 0;
let hudGrad = null;

/* 一次性预渲染: 火把光晕 / 头灯光锥 / 暗角 / 熔岩底光 */
const torchGlow = mkCanvas(160, 160);
(function () {
  const g = torchGlow.getContext('2d');
  const rg = g.createRadialGradient(80, 80, 4, 80, 80, 80);
  rg.addColorStop(0, 'rgba(255,190,90,0.32)');
  rg.addColorStop(0.4, 'rgba(255,160,50,0.15)');
  rg.addColorStop(1, 'rgba(255,150,40,0)');
  g.fillStyle = rg; g.fillRect(0, 0, 160, 160);
})();
const lampCone = mkCanvas(190, 130);
(function () {
  const g = lampCone.getContext('2d');
  const rg = g.createRadialGradient(0, 65, 6, 0, 65, 185);
  rg.addColorStop(0, 'rgba(255,240,170,0.5)');
  rg.addColorStop(0.5, 'rgba(255,225,130,0.17)');
  rg.addColorStop(1, 'rgba(255,210,100,0)');
  g.fillStyle = rg;
  g.beginPath(); g.moveTo(0, 65); g.lineTo(186, 2); g.lineTo(186, 128); g.closePath(); g.fill();
})();
const vignetteC = mkCanvas(W, H);
(function () {
  const g = vignetteC.getContext('2d');
  const rg = g.createRadialGradient(W / 2, H / 2, H * 0.3, W / 2, H / 2, H * 0.74);
  rg.addColorStop(0, 'rgba(0,0,0,0)');
  rg.addColorStop(1, 'rgba(0,0,0,0.6)');
  g.fillStyle = rg; g.fillRect(0, 0, W, H);
})();
const lavaGradC = mkCanvas(W, Math.ceil(H * 0.45));
(function () {
  const g = lavaGradC.getContext('2d'), hh = lavaGradC.height;
  const lg = g.createLinearGradient(0, 0, 0, hh);
  lg.addColorStop(0, 'rgba(255,70,20,0)');
  lg.addColorStop(0.7, 'rgba(255,80,20,0.13)');
  lg.addColorStop(1, 'rgba(255,110,30,0.34)');
  g.fillStyle = lg; g.fillRect(0, 0, W, hh);
})();

/* ---- 随深度分桶重建的缓存（一局最多 ~30 次，避免每帧建渐变） ---- */
let palBucket = -1, palC = palMix(0), bgGrad = null;
let wallTileL = null, wallTileR = null, backTile = null, ceilSpr = null;

function buildWallTile(pal, mirror) {
  const bh = 17, rows = 8, c = mkCanvas(WALL, bh * rows), g = c.getContext('2d');
  g.fillStyle = rgb(pal.brick); g.fillRect(0, 0, WALL, bh * rows);
  for (let r = 0; r < rows; r++) {
    const y = r * bh, off = (r % 2) * 16;
    for (let bx = off - 32; bx < WALL; bx += 32) {
      const sd = h01(r * 31.7 + bx + (mirror ? 7 : 0));
      g.fillStyle = sd > 0.5 ? 'rgba(255,255,255,' + (0.03 + sd * 0.05).toFixed(3) + ')'
                             : 'rgba(0,0,0,' + (0.06 + sd * 0.1).toFixed(3) + ')';
      g.fillRect(bx + 1, y + 1, 30, bh - 2);
      if (sd > 0.72) { g.fillStyle = 'rgba(0,0,0,0.18)'; g.fillRect(bx + 6 + sd * 10, y + 4, 7, 2); }
    }
    g.fillStyle = rgb(pal.mortar);
    g.fillRect(0, y, WALL, 2);
    for (let bx = off - 32; bx < WALL; bx += 32) g.fillRect(bx, y, 2, bh);
  }
  const eg = g.createLinearGradient(0, 0, WALL, 0);
  if (!mirror) { eg.addColorStop(0, 'rgba(0,0,0,0)'); eg.addColorStop(1, 'rgba(0,0,0,0.35)'); }
  else { eg.addColorStop(0, 'rgba(0,0,0,0.35)'); eg.addColorStop(1, 'rgba(0,0,0,0)'); }
  g.fillStyle = eg; g.fillRect(0, 0, WALL, bh * rows);
  return c;
}
function buildBackTile(pal) {
  const bw = 56, bh = 30, rows = 4, wIn = INNER_R - INNER_L;
  const c = mkCanvas(wIn, bh * rows), g = c.getContext('2d');
  for (let r = 0; r < rows; r++) {
    const y = r * bh, off = (r % 2) * bw / 2;
    for (let bx = off - bw; bx < wIn; bx += bw) {
      const sd = h01(r * 57.3 + bx);
      g.fillStyle = sd > 0.5 ? 'rgba(255,255,255,' + (0.012 + sd * 0.025).toFixed(3) + ')'
                             : 'rgba(0,0,0,' + (0.05 + sd * 0.09).toFixed(3) + ')';
      g.fillRect(bx + 1, y + 1, bw - 2, bh - 2);
    }
    g.strokeStyle = rgb(pal.mortar, 0.4);
    g.lineWidth = 2;
    g.beginPath();
    g.moveTo(0, y); g.lineTo(wIn, y);
    for (let bx = off; bx < wIn; bx += bw) { g.moveTo(bx, y); g.lineTo(bx, y + bh); }
    g.stroke();
  }
  return c;
}
function buildCeil(pal) {
  const c = mkCanvas(W, CEIL_H + 2), g = c.getContext('2d');
  const beam = g.createLinearGradient(0, 0, 0, 16);
  beam.addColorStop(0, rgb(pal.brick));
  beam.addColorStop(1, rgb(pal.mortar));
  g.fillStyle = beam; g.fillRect(0, 0, W, 16);
  g.fillStyle = 'rgba(255,255,255,0.12)';
  for (let x = 10; x < W; x += 28) { g.beginPath(); g.arc(x, 8, 2.2, 0, 7); g.fill(); }
  const n = Math.floor(W / 16);
  for (let i = 0; i <= n; i++) {
    const sx = i * 16;
    g.fillStyle = '#d6dbe6';
    g.beginPath(); g.moveTo(sx, 15); g.lineTo(sx + 8, CEIL_H); g.lineTo(sx + 8, 15); g.closePath(); g.fill();
    g.fillStyle = '#878da0';
    g.beginPath(); g.moveTo(sx + 8, 15); g.lineTo(sx + 8, CEIL_H); g.lineTo(sx + 16, 15); g.closePath(); g.fill();
    g.fillStyle = 'rgba(168,52,30,' + (0.5 + h01(i * 3.3) * 0.5).toFixed(2) + ')';
    g.beginPath(); g.moveTo(sx + 5.6, CEIL_H - 7); g.lineTo(sx + 8, CEIL_H); g.lineTo(sx + 10.4, CEIL_H - 7); g.closePath(); g.fill();
  }
  g.fillStyle = 'rgba(0,0,0,0.35)';
  g.fillRect(0, 14, W, 2);
  return c;
}
function buildDepthCaches(depth) {
  palC = palMix(depth);
  bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, rgb(palC.bgT));
  bgGrad.addColorStop(1, rgb(palC.bgB));
  wallTileL = buildWallTile(palC, false);
  wallTileR = buildWallTile(palC, true);
  backTile = buildBackTile(palC);
  ceilSpr = buildCeil(palC);
}

/* ---- 平台静态精灵: 每块平台首绘时烘焙一次 ---- */
const SPR_PAD = 10, SPR_TOP = 12;
function getPlatSpr(pl) {
  if (pl.spr) return pl.spr;
  const w = Math.round(pl.w), h = pl.h, seed = pl.floor * 1.618 + w * 0.31;
  const c = mkCanvas(w + SPR_PAD * 2, h + SPR_TOP + 8), g = c.getContext('2d');
  g.translate(SPR_PAD, SPR_TOP);
  if (pl.type === 'normal' || pl.type === 'crumble') {
    const pale = pl.type === 'crumble';
    const gg = g.createLinearGradient(0, 0, 0, h);
    gg.addColorStop(0, pale ? '#b3925c' : '#8f6f48');
    gg.addColorStop(1, pale ? '#7c5f3e' : '#664b2e');
    g.fillStyle = gg;
    g.fillRect(0, 0, w, h);
    g.fillStyle = 'rgba(0,0,0,0.2)';
    for (let cx = 18 + h01(seed) * 14; cx < w - 6; cx += 24 + h01(seed + cx) * 10)
      g.fillRect(cx, 1, 2, h - 2);
    g.fillStyle = 'rgba(255,235,200,0.25)';
    g.fillRect(0, 0, w, 2.5);
    g.fillStyle = 'rgba(0,0,0,0.28)';
    g.fillRect(0, h - 3, w, 3);
    /* 磨损缺口 */
    g.globalCompositeOperation = 'destination-out';
    for (let k = 0; k < w / 10; k++) {
      const nx = h01(seed + k * 9.7) * w, nw = 2.5 + h01(seed + k * 5.1) * 5;
      g.beginPath();
      g.moveTo(nx, h); g.lineTo(nx + nw, h); g.lineTo(nx + nw / 2, h - 2.5 - h01(seed + k) * 2.5);
      g.closePath(); g.fill();
    }
    g.beginPath(); g.moveTo(0, 0); g.lineTo(3.5, 0); g.lineTo(0, 4); g.closePath(); g.fill();
    g.beginPath(); g.moveTo(w, 0); g.lineTo(w - 3.5, 0); g.lineTo(w, 4); g.closePath(); g.fill();
    g.globalCompositeOperation = 'source-over';
    if (pale) {
      /* 蛛网裂纹 */
      const ccx = w * (0.3 + h01(seed) * 0.4), ccy = h * 0.5;
      g.strokeStyle = 'rgba(32,20,8,0.78)';
      g.lineWidth = 1.2;
      g.beginPath();
      for (let k = 0; k < 7; k++) {
        const ang = k / 7 * 6.283 + h01(seed + k) * 0.9;
        g.moveTo(ccx, ccy);
        const ex = ccx + Math.cos(ang) * (w * 0.22 + h01(seed + k * 3) * w * 0.26);
        const ey = clamp(ccy + Math.sin(ang) * h * 0.7, 0.5, h - 0.5);
        g.lineTo((ccx + ex) / 2 + (h01(seed + k * 7) - 0.5) * 7,
                 clamp((ccy + ey) / 2 + (h01(seed + k * 11) - 0.5) * 5, 0.5, h - 0.5));
        g.lineTo(clamp(ex, 0.5, w - 0.5), ey);
      }
      g.stroke();
      g.lineWidth = 0.8;
      g.beginPath(); g.ellipse(ccx, ccy, w * 0.14, h * 0.3, 0, 0, 7); g.stroke();
      g.beginPath(); g.ellipse(ccx, ccy, w * 0.27, h * 0.44, 0, 0, 7); g.stroke();
    } else {
      /* 苔点 */
      for (let k = 0; k < w / 7; k++) {
        const mx = h01(seed * 3 + k * 13.7) * w, r = h01(seed + k * 4.3);
        if (r < 0.45) continue;
        g.fillStyle = 'rgba(' + (80 + r * 50 | 0) + ',' + (130 + r * 50 | 0) + ',60,' + (0.25 + r * 0.3).toFixed(2) + ')';
        g.beginPath();
        g.ellipse(mx, r > 0.8 ? 1.6 : h - 2 - r * 3, 1.5 + r * 2.5, 1 + r * 1.5, 0, 0, 7);
        g.fill();
      }
    }
  } else if (pl.type === 'spike') {
    const mg = g.createLinearGradient(0, 7, 0, h);
    mg.addColorStop(0, '#4c4c5c'); mg.addColorStop(1, '#2a2a34');
    g.fillStyle = mg; g.fillRect(0, 7, w, h - 7);
    g.fillStyle = 'rgba(255,255,255,0.12)'; g.fillRect(0, 7, w, 1.6);
    g.fillStyle = '#62626f';
    for (let x = 6; x < w; x += 14) { g.beginPath(); g.arc(x, h - 3.5, 1.7, 0, 7); g.fill(); }
    const n = Math.floor(w / 12), step = w / n;
    for (let i = 0; i < n; i++) {
      const sx = i * step;
      g.fillStyle = '#d6dbe6';
      g.beginPath(); g.moveTo(sx, 8); g.lineTo(sx + step / 2, -8); g.lineTo(sx + step / 2, 8); g.closePath(); g.fill();
      g.fillStyle = '#878da0';
      g.beginPath(); g.moveTo(sx + step / 2, -8); g.lineTo(sx + step, 8); g.lineTo(sx + step / 2, 8); g.closePath(); g.fill();
      g.fillStyle = 'rgba(168,52,30,' + (0.5 + h01(seed + i) * 0.5).toFixed(2) + ')';
      g.beginPath(); g.moveTo(sx + step / 2, -8); g.lineTo(sx + step / 2 - 2.4, -1.5); g.lineTo(sx + step / 2 + 2.4, -1.5); g.closePath(); g.fill();
    }
  } else if (pl.type === 'beltL' || pl.type === 'beltR') {
    g.fillStyle = '#1d1d27';
    g.beginPath(); g.roundRect(-1.5, -1.5, w + 3, h + 3, 8); g.fill();
    const ig = g.createLinearGradient(0, 0, 0, h);
    ig.addColorStop(0, '#5b5b6d'); ig.addColorStop(1, '#34343f');
    g.fillStyle = ig;
    g.beginPath(); g.roundRect(0, 0, w, h, 7); g.fill();
    g.fillStyle = '#23232e';
    g.beginPath(); g.arc(8, h / 2, 5, 0, 7); g.fill();
    g.beginPath(); g.arc(w - 8, h / 2, 5, 0, 7); g.fill();
    g.fillStyle = '#6a6a7e';
    g.beginPath(); g.arc(8, h / 2, 1.8, 0, 7); g.fill();
    g.beginPath(); g.arc(w - 8, h / 2, 1.8, 0, 7); g.fill();
  } else if (pl.type === 'spring') {
    const bg2 = g.createLinearGradient(0, 8, 0, h);
    bg2.addColorStop(0, '#67423a'); bg2.addColorStop(1, '#3c2420');
    g.fillStyle = bg2; g.fillRect(0, 8, w, h - 8);
    g.fillStyle = 'rgba(255,255,255,0.1)'; g.fillRect(0, 8, w, 1.5);
    g.fillStyle = 'rgba(255,204,0,0.25)';
    for (let x = -6; x < w; x += 12) {
      g.beginPath(); g.moveTo(x, h); g.lineTo(x + 5, 9.5); g.lineTo(x + 9, 9.5); g.lineTo(x + 4, h); g.closePath(); g.fill();
    }
    g.fillStyle = '#8a5a4a';
    for (let x = 5; x < w; x += 12) { g.beginPath(); g.arc(x, h - 3, 1.5, 0, 7); g.fill(); }
  } else if (pl.type === 'flip') {
    const fg = g.createLinearGradient(0, 0, 0, h);
    fg.addColorStop(0, '#7283e2'); fg.addColorStop(0.5, '#5566cc'); fg.addColorStop(1, '#3f4a9e');
    g.fillStyle = fg;
    g.beginPath(); g.roundRect(0, 0, w, h, 3); g.fill();
    g.fillStyle = 'rgba(255,255,255,0.07)';
    for (let yy = 3; yy < h; yy += 3.5) g.fillRect(2, yy, w - 4, 1);
    g.fillStyle = 'rgba(255,255,255,0.3)'; g.fillRect(2, 0.5, w - 4, 1.8);
    g.strokeStyle = '#28306e'; g.lineWidth = 1.5;
    g.beginPath(); g.roundRect(0.8, 0.8, w - 1.6, h - 1.6, 3); g.stroke();
    g.fillStyle = '#aab0ff';
    g.beginPath(); g.arc(7, h / 2, 3.2, 0, 7); g.fill();
    g.beginPath(); g.arc(w - 7, h / 2, 3.2, 0, 7); g.fill();
    g.strokeStyle = '#3f4a9e'; g.lineWidth = 1;
    g.beginPath();
    g.moveTo(4.8, h / 2); g.lineTo(9.2, h / 2); g.moveTo(7, h / 2 - 2.2); g.lineTo(7, h / 2 + 2.2);
    g.moveTo(w - 9.2, h / 2); g.lineTo(w - 4.8, h / 2); g.moveTo(w - 7, h / 2 - 2.2); g.lineTo(w - 7, h / 2 + 2.2);
    g.stroke();
  }
  pl.spr = c;
  return c;
}

/* ---- 背墙深度装饰: 表土根须/蚯蚓洞 → 岩层矿石/水滴 → 熔岩裂缝 ---- */
function drawWallDecor(depth) {
  const soil = clamp(1 - (depth - 0.3) / 0.12, 0, 1);
  const rock = Math.min(clamp((depth - 0.24) / 0.12, 0, 1), clamp(1 - (depth - 0.62) / 0.12, 0, 1));
  const lava = clamp((depth - 0.62) / 0.12, 0, 1);
  const step = 74, off = camY * 0.5;
  ctx.lineCap = 'round';
  for (let i = Math.floor(off / step); i * step < off + H + step; i++) {
    const sy = i * step - off;
    const r = h01(i * 3.71), x = INNER_L + 26 + r * (INNER_R - INNER_L - 52);
    if (soil > 0.02) {
      ctx.globalAlpha = soil;
      if (r < 0.55) {
        ctx.strokeStyle = 'rgba(96,66,34,0.8)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x, sy);
        ctx.bezierCurveTo(x - 8, sy + 14, x + 10, sy + 22, x + 2, sy + 40);
        ctx.moveTo(x, sy + 10);
        ctx.bezierCurveTo(x + 12, sy + 16, x + 14, sy + 26, x + 18, sy + 34);
        ctx.moveTo(x, sy + 6);
        ctx.bezierCurveTo(x - 10, sy + 12, x - 14, sy + 20, x - 12, sy + 30);
        ctx.stroke();
      } else {
        ctx.fillStyle = 'rgba(12,7,3,0.85)';
        ctx.beginPath(); ctx.ellipse(x, sy, 7, 4.5, 0, 0, 7); ctx.fill();
        ctx.strokeStyle = 'rgba(140,100,60,0.5)';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.ellipse(x, sy - 1, 7.5, 4.8, 0, Math.PI * 1.05, Math.PI * 1.95); ctx.stroke();
      }
    }
    if (rock > 0.02) {
      if (r < 0.6) {
        const tw = 0.35 + 0.65 * Math.abs(Math.sin(gameT * 1.8 + i * 2.3));
        ctx.globalAlpha = rock * (0.3 + 0.6 * tw);
        ctx.fillStyle = r < 0.3 ? '#8fd8ff' : '#ffd97a';
        for (let k = 0; k < 3; k++) {
          const ox = (h01(i + k * 7.7) - 0.5) * 26, oy = (h01(i + k * 3.3) - 0.5) * 20;
          const s = 2 + h01(i * 5 + k) * 2.5;
          ctx.save(); ctx.translate(x + ox, sy + oy); ctx.rotate(0.785);
          ctx.fillRect(-s / 2, -s / 2, s, s);
          ctx.restore();
        }
      } else {
        const ph = (gameT * 0.55 + r * 7) % 1;
        ctx.globalAlpha = rock * 0.7;
        ctx.fillStyle = '#9fd0ff';
        ctx.fillRect(x - 1, sy + ph * ph * 56, 2, 6);
        ctx.globalAlpha = rock * 0.35;
        ctx.fillRect(x - 1, sy, 2, 3);
      }
    }
    if (lava > 0.02) {
      const pulse = 0.5 + 0.5 * Math.sin(gameT * 2.6 + i * 2.13);
      ctx.globalAlpha = lava * (0.35 + 0.5 * pulse);
      ctx.strokeStyle = '#ff5a18';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(x - 24, sy);
      ctx.lineTo(x - 10, sy + 6 + r * 6);
      ctx.lineTo(x + 4, sy + 2);
      ctx.lineTo(x + 16, sy + 12 + r * 8);
      ctx.lineTo(x + 26, sy + 10);
      ctx.stroke();
      ctx.globalAlpha = lava * (0.5 + 0.5 * pulse);
      ctx.strokeStyle = '#ffd060';
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
}

/* ---------------- 平台生成 ---------------- */
/* 类型: normal / spike / beltL / beltR / spring / crumble / flip */
function platDef(n) {
  const d = clamp(n / 100, 0, 1.3);
  const last1 = lastTypes[lastTypes.length - 1] || 'normal';
  const last2 = lastTypes[lastTypes.length - 2] || 'normal';
  const unsafe = t => (t === 'spike' || t === 'crumble' || t === 'flip');
  let w = {
    normal:  50 - 24 * Math.min(d, 1),
    spike:   n < 4  ? 0 : 6 + 17 * d,
    belt:    n < 6  ? 0 : 9 + 8 * d,
    spring:  n < 10 ? 0 : 7,
    crumble: n < 14 ? 0 : 6 + 10 * d,
    flip:    n < 20 ? 0 : 5 + 9 * d
  };
  /* 活路保证: 不连续两层尖刺; 不连续三层不可立足 */
  if (last1 === 'spike') w.spike = 0;
  if (unsafe(last1) && unsafe(last2)) { w.spike = 0; w.crumble = 0; w.flip = 0; }
  let total = 0; for (const k in w) total += w[k];
  let r = Math.random() * total, type = 'normal';
  for (const k in w) { r -= w[k]; if (r <= 0) { type = k; break; } }
  if (type === 'belt') type = Math.random() < 0.5 ? 'beltL' : 'beltR';
  return type;
}
function spawnRow() {
  const n = nextRowN++;
  const y = baseY + n * ROW;
  const pw = clamp(rnd(80, 126) - Math.min(22, n * 0.22), 62, 130);
  /* 横向可达性: 限制与上一平台中心的距离 */
  const reach = 195;
  const lo = Math.max(INNER_L + pw / 2 + 4, lastPlatX - reach);
  const hi = Math.min(INNER_R - pw / 2 - 4, lastPlatX + reach);
  const x = rnd(lo, hi);
  const type = n <= 3 ? 'normal' : platDef(n);
  lastTypes.push(type === 'beltL' || type === 'beltR' ? 'belt' : type);
  if (lastTypes.length > 4) lastTypes.shift();
  lastPlatX = x;
  plats.push({
    x: x - pw / 2, y, w: pw, h: 14, type, floor: n,
    solid: true, healed: false, hit: false,
    crumbleT: -1, flipT: -1, springT: 0, shakeX: 0
  });
}

/* ---------------- 重置/开始 ---------------- */
function reset() {
  camY = 0;
  baseY = H * 0.32;
  plats = []; parts = []; embers = []; lastTypes = [];
  nextRowN = 0; lastPlatX = W / 2;
  /* 第 0 层: 居中宽板 */
  plats.push({ x: W / 2 - 80, y: baseY, w: 160, h: 14, type: 'normal', floor: 0,
    solid: true, healed: true, hit: false, crumbleT: -1, flipT: -1, springT: 0, shakeX: 0 });
  nextRowN = 1; lastPlatX = W / 2; lastTypes.push('normal');
  while (baseY + nextRowN * ROW < camY + H + 260) spawnRow();
  player = {
    x: W / 2 - PW / 2, y: baseY - PH, vx: 0, vy: 0,
    hp: MAX_HP, inv: 0, onPlat: plats[0], face: 1,
    squash: 0, flipping: false, flipAng: 0, runT: 0, slideT: 0
  };
  layer = 0; gameT = 0; flashT = 0; bannerT = 0; bannerShown = false;
  shake = 0; deathType = ''; deathT = 0; hurtFlash = 0; healFlash = 0;
  milestoneN = 0; newRecord = false;
  torchSeed = Math.random() * 1000;
  /* 纯视觉状态复位 */
  flipTrail.length = 0; uiParts.length = 0; hpPrev = -1;
  mileT = 0; shockT = -1;
}
function scrollSpeed() {
  return 62 + Math.min(layer, 150) * 0.82;
}

/* ---------------- 输入 ---------------- */
const keys = { L: false, R: false };
let touchL = false, touchR = false;
window.addEventListener('keydown', e => {
  if (e.repeat) return;
  initAudio();
  const k = e.key;
  if (k === 'ArrowLeft' || k === 'a' || k === 'A') keys.L = true;
  if (k === 'ArrowRight' || k === 'd' || k === 'D') keys.R = true;
  if (k === 'm' || k === 'M') muted = !muted;
  if (k === 'Enter' || k === ' ') {
    if (state === ST.MENU) startGame();
    else if (state === ST.OVER) retry();
    e.preventDefault();
  }
  if (k.startsWith('Arrow')) e.preventDefault();
});
window.addEventListener('keyup', e => {
  const k = e.key;
  if (k === 'ArrowLeft' || k === 'a' || k === 'A') keys.L = false;
  if (k === 'ArrowRight' || k === 'd' || k === 'D') keys.R = false;
});
function readTouches(e) {
  touchL = touchR = false;
  for (let i = 0; i < e.touches.length; i++) {
    const t = e.touches[i];
    if (t.clientX < window.innerWidth / 2) touchL = true; else touchR = true;
  }
}
const tEvt = { passive: false };
document.addEventListener('touchstart', e => {
  if (e.target.closest('.overlay') || e.target.closest('#back')) return;
  initAudio(); readTouches(e); e.preventDefault();
}, tEvt);
document.addEventListener('touchmove', e => {
  if (e.target.closest('.overlay') || e.target.closest('#back')) return;
  readTouches(e); e.preventDefault();
}, tEvt);
document.addEventListener('touchend', e => {
  if (e.target.closest('.overlay') || e.target.closest('#back')) return;
  readTouches(e);
}, tEvt);

function refreshMenuBest() {

/* ---------------- 伤害/治疗 ---------------- */
function damage(n, src) {
  if (player.inv > 0 || state !== ST.PLAY) return;
  player.hp -= n;
  player.inv = 1.2;
  hurtFlash = 1;
  shake = Math.max(shake, 7);
  sfx.hurt();
  for (let i = 0; i < 10; i++) parts.push({
    x: player.x + PW / 2, y: player.y + PH / 2,
    vx: rnd(-160, 160), vy: rnd(-220, 60), life: rnd(0.3, 0.6), t: 0,
    size: rnd(2, 4), col: '#ff4444', grav: 900
  });
  if (src === 'ceil') parts.push({
    x: player.x + PW / 2, y: camY + CEIL_H + 4, vx: 0, vy: 0,
    life: 0.35, t: 0, size: 8, col: 'rgba(255,235,180,0.9)', grav: 0, ring: true
  });
  if (player.hp <= 0) {
    player.hp = 0;
    die(src === 'ceil' ? 'pinned' : 'spikehp');
  }
}
function heal(n) {
  if (player.hp >= MAX_HP) return;
  player.hp = Math.min(MAX_HP, player.hp + n);
  healFlash = 1;
  sfx.heal();
}
function die(type) {
  if (state !== ST.PLAY) return;
  state = ST.DYING;
  deathType = type; deathT = 0;
  player.onPlat = null;
  shake = 12;
  if (type === 'pinned') {
    sfx.pin();
    shockT = 0; shockX = player.x + PW / 2;
    for (let i = 0; i < 14; i++) parts.push({
      x: player.x + PW / 2, y: camY + CEIL_H, vx: rnd(-200, 200), vy: rnd(20, 260),
      life: rnd(0.3, 0.7), t: 0, size: rnd(1.5, 3.5),
      col: i % 3 ? '#ff4444' : '#ffd060', grav: 800
    });
  }
  sfx.dead();
  newRecord = layer > best;
  if (newRecord) { best = layer; localStorage.setItem(BEST_KEY, String(best)); }
}

/* ---------------- 更新 ---------------- */
function update(dt) {
  gameT += dt;
  shake = Math.max(0, shake - 30 * dt);
  hurtFlash = Math.max(0, hurtFlash - 3 * dt);
  healFlash = Math.max(0, healFlash - 2.5 * dt);
  flashT = Math.max(0, flashT - dt);
  if (bannerT > 0) bannerT -= dt;

  if (state === ST.DYING) {
    deathT += dt;
    if (deathType !== 'pinned') {
      player.vy += GRAV * dt;
      player.y += player.vy * dt;
      player.flipAng += 6 * dt;
    } else {
      player.y = camY + CEIL_H - 6;
    }
    camY += scrollSpeed() * 0.4 * dt;
    updateParts(dt);
    if (deathT > 1.35) showOver();
    return;
  }
  if (state !== ST.PLAY) { updateParts(dt); return; }

  const p = player;
  p.inv = Math.max(0, p.inv - dt);
  p.squash = Math.max(0, p.squash - 5 * dt);

  /* 滚动 */
  camY += scrollSpeed() * dt;

  /* 横向 */
  const mv = (keys.R || touchR ? 1 : 0) - (keys.L || touchL ? 1 : 0);
  if (mv !== 0) {
    p.vx += mv * MOVE_ACC * dt;
    p.face = mv;
    p.runT += dt * (p.onPlat ? 9 : 5);
  } else {
    const f = FRICTION * dt;
    if (p.vx > f) p.vx -= f; else if (p.vx < -f) p.vx += f; else p.vx = 0;
  }
  p.vx = clamp(p.vx, -MOVE_MAX, MOVE_MAX);
  p.x += p.vx * dt;

  /* 传送带 */
  if (p.onPlat && (p.onPlat.type === 'beltL' || p.onPlat.type === 'beltR')) {
    p.x += (p.onPlat.type === 'beltL' ? -BELT_SPD : BELT_SPD) * dt;
    p.slideT += dt;
  } else p.slideT = 0;

  /* 井壁 */
  if (p.x < INNER_L) { p.x = INNER_L; p.vx = Math.max(0, p.vx); }
  if (p.x + PW > INNER_R) { p.x = INNER_R - PW; p.vx = Math.min(0, p.vx); }

  /* 站台维持 */
  if (p.onPlat) {
    const pl = p.onPlat;
    if (!pl.solid || p.x + PW < pl.x + 2 || p.x > pl.x + pl.w - 2) {
      p.onPlat = null;
    } else {
      p.vy = 0; p.y = pl.y - PH;
    }
  }

  /* 下落 + 着陆 */
  if (!p.onPlat) {
    const prevFoot = p.y + PH;
    p.vy += GRAV * dt;
    p.y += p.vy * dt;
    if (p.flipping) p.flipAng += 11 * dt;
    if (p.vy >= 0) {
      const foot = p.y + PH;
      let landed = null;
      for (let i = 0; i < plats.length; i++) {
        const pl = plats[i];
        if (!pl.solid) continue;
        if (p.x + PW <= pl.x + 3 || p.x >= pl.x + pl.w - 3) continue;
        if (prevFoot <= pl.y + 2 && foot >= pl.y) {
          if (!landed || pl.y < landed.y) landed = pl;
        }
      }
      if (landed) land(landed);
    }
  }

  /* 天花板尖刺 */
  const ceil = camY + CEIL_H;
  if (p.y < ceil) {
    p.y = ceil;
    if (p.onPlat) p.onPlat = null;
    p.vy = Math.max(p.vy, 380);
    damage(2, 'ceil');
  }

  /* 层数计数 */
  const newLayer = Math.max(layer, Math.floor((p.y + PH - baseY) / ROW));
  if (newLayer > layer) {
    layer = newLayer;
    if (layer % 10 === 0 && layer > milestoneN) {
      milestoneN = layer;
      flashT = 0.9;
      if (layer === 100 && !bannerShown) {
        bannerShown = true; bannerT = 3.2; sfx.fanfare(); shake = Math.max(shake, 14);
      } else { sfx.milestone(); mileT = 1.5; mileN = layer; }
    }
  }

  /* 跌出底部 */
  if (p.y > camY + H + 24) die('fall');

  /* 平台逻辑 */
  for (let i = plats.length - 1; i >= 0; i--) {
    const pl = plats[i];
    pl.springT = Math.max(0, pl.springT - 4 * dt);
    if (pl.crumbleT >= 0) {
      pl.crumbleT += dt;
      pl.shakeX = Math.sin(pl.crumbleT * 60) * 2.5;
      if (pl.crumbleT >= 0.4 && pl.solid) {
        pl.solid = false;
        sfx.breakP();
        for (let j = 0; j < 14; j++) parts.push({
          x: pl.x + rnd(0, pl.w), y: pl.y + rnd(0, pl.h),
          vx: rnd(-110, 110), vy: rnd(-80, 170), life: rnd(0.4, 0.85), t: 0,
          size: rnd(2.5, 6.5), col: ['#b3925c', '#8a6a44', '#6e5230'][j % 3],
          grav: 1100, rect: true
        });
      }
    }
    if (pl.flipT >= 0) {
      pl.flipT += dt;
      if (pl.flipT > 0.1 && pl.flipT < 0.5) pl.solid = false;
      else if (pl.flipT >= 0.5) { pl.solid = true; pl.flipT = -1; }
    }
    if (pl.y < camY - 80) plats.splice(i, 1);
  }
  while (baseY + nextRowN * ROW < camY + H + 260) spawnRow();

  /* 深处余烬 */
  if (layer > 55 && Math.random() < dt * 6) {
    embers.push({ x: rnd(INNER_L, INNER_R), y: camY + H + 10,
      vx: rnd(-15, 15), vy: rnd(-70, -30), t: 0, life: rnd(1.5, 3) });
  }
  for (let i = embers.length - 1; i >= 0; i--) {
    const e = embers[i];
    e.t += dt; e.x += e.vx * dt; e.y += (e.vy - scrollSpeed() * 0.3) * dt;
    if (e.t > e.life || e.y < camY - 10) embers.splice(i, 1);
  }
  updateParts(dt);
}

function land(pl) {
  const p = player;
  p.y = pl.y - PH;
  const impact = p.vy;
  p.vy = 0;
  p.flipping = false; p.flipAng = 0;
  p.squash = clamp(impact / 900, 0.25, 1);

  if (pl.type === 'spring') {
    pl.springT = 1;
    p.vy = SPRING_VY;
    p.flipping = true;
    p.onPlat = null;
    sfx.spring();
    return;
  }
  p.onPlat = pl;
  sfx.land();
  /* 落地尘土 (随冲击力加量) */
  const dustN = 4 + Math.round(p.squash * 5);
  for (let i = 0; i < dustN; i++) parts.push({
    x: p.x + PW / 2 + rnd(-10, 10), y: pl.y,
    vx: rnd(-65, 65), vy: rnd(-45, -5), life: rnd(0.25, 0.5), t: 0,
    size: rnd(2, 4.5), col: 'rgba(200,190,170,0.5)', grav: 0
  });

  if (pl.type === 'spike') {
    damage(3, 'spike');
  } else if (pl.type === 'normal') {
    if (!pl.healed) { pl.healed = true; heal(1); }
  } else if (pl.type === 'crumble') {
    if (pl.crumbleT < 0) { pl.crumbleT = 0; sfx.crack(); }
  } else if (pl.type === 'flip') {
    if (pl.flipT < 0) { pl.flipT = 0; sfx.flip(); }
  }
}

function updateParts(dt) {
  for (let i = parts.length - 1; i >= 0; i--) {
    const q = parts[i];
    q.t += dt;
    q.vy += (q.grav || 0) * dt;
    q.x += q.vx * dt; q.y += q.vy * dt;
    if (q.t > q.life) parts.splice(i, 1);
  }
}

/* ---------------- 绘制 ---------------- */
function draw() {
  const depth = clamp(layer / 100, 0, 1);
  const bucket = Math.min(30, Math.round(depth * 30));
  if (bucket !== palBucket) { palBucket = bucket; buildDepthCaches(bucket / 30); }
  if (mileT > 0) mileT -= renderDt;
  ctx.save();
  /* 震屏 */
  if (shake > 0.3) ctx.translate(rnd(-shake, shake) * 0.6, rnd(-shake, shake) * 0.6);

  /* 背景渐变 (缓存) */
  ctx.fillStyle = bgGrad;
  ctx.fillRect(-10, -10, W + 20, H + 20);

  /* 背墙暗砖 (0.5 视差, 离屏瓦片) + 深度装饰 */
  const bOff = (camY * 0.5) % backTile.height;
  for (let y = -bOff; y < H; y += backTile.height) ctx.drawImage(backTile, INNER_L, y);
  drawWallDecor(depth);

  /* 熔岩底光 (缓存渐变, 仅调 alpha) */
  if (depth > 0.45) {
    const a = (depth - 0.45) / 0.55;
    ctx.globalAlpha = a * (0.8 + 0.2 * Math.sin(gameT * 3));
    ctx.drawImage(lavaGradC, 0, H - lavaGradC.height);
    ctx.globalAlpha = 1;
  }

  /* 余烬 */
  for (const e of embers) {
    const a = 1 - e.t / e.life;
    ctx.fillStyle = `rgba(255,${120 + Math.sin(e.t * 8) * 60 | 0},40,${0.7 * a})`;
    ctx.fillRect(e.x - 1.5, e.y - camY - 1.5, 3, 3);
  }

  /* 两侧井壁砖纹 (1.0 视差, 离屏瓦片) */
  const wOff = camY % wallTileL.height;
  for (let y = -wOff; y < H; y += wallTileL.height) {
    ctx.drawImage(wallTileL, 0, y);
    ctx.drawImage(wallTileR, INNER_R, y);
  }
  /* 壁内沿阴影 */
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(WALL, 0, 5, H);
  ctx.fillRect(INNER_R - 5, 0, 5, H);

  /* 火把 */
  drawTorches();

  /* 平台 */
  for (const pl of plats) drawPlat(pl);

  /* 粒子 */
  for (const q of parts) {
    const a = 1 - q.t / q.life;
    ctx.globalAlpha = a;
    if (q.ring) {
      ctx.strokeStyle = q.col;
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(q.x, q.y - camY, q.size + q.t * 220, 0, 7); ctx.stroke();
    } else if (q.rect) {
      ctx.fillStyle = q.col;
      ctx.fillRect(q.x - q.size / 2, q.y - camY - q.size / 2, q.size, q.size);
    } else {
      ctx.fillStyle = q.col;
      ctx.beginPath(); ctx.arc(q.x, q.y - camY, q.size, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  /* 玩家 */
  drawPlayer();

  /* 天花板尖刺 (离屏) */
  ctx.drawImage(ceilSpr, 0, 0);

  /* 被钉冲击波 */
  if (shockT >= 0) {
    shockT += renderDt;
    const tt = shockT / 0.55;
    if (tt >= 1) shockT = -1;
    else {
      ctx.globalAlpha = 1 - tt;
      ctx.lineWidth = 5 * (1 - tt) + 1;
      ctx.strokeStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(shockX, CEIL_H + 4, 8 + tt * 110, 0, 7); ctx.stroke();
      ctx.strokeStyle = '#ffcc66';
      ctx.beginPath(); ctx.arc(shockX, CEIL_H + 4, 4 + tt * 70, 0, 7); ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  /* 跌落死亡闪光 */
  if (state === ST.DYING && deathType === 'fall' && deathT < 0.35) {
    const a = 1 - deathT / 0.35;
    const fg = ctx.createLinearGradient(0, H - 130, 0, H);
    fg.addColorStop(0, 'rgba(255,255,255,0)');
    fg.addColorStop(1, `rgba(255,255,255,${0.85 * a})`);
    ctx.fillStyle = fg;
    ctx.fillRect(0, H - 130, W, 130);
  }

  /* 受击红屏 */
  if (hurtFlash > 0) {
    ctx.fillStyle = `rgba(255,30,30,${hurtFlash * 0.18})`;
    ctx.fillRect(0, 0, W, H);
  }

  /* 暗角 (越深越重) */
  ctx.globalAlpha = 0.35 + depth * 0.45;
  ctx.drawImage(vignetteC, 0, 0);
  ctx.globalAlpha = 1;

  ctx.restore();

  /* HUD（不受震屏影响） */
  if (state === ST.PLAY || state === ST.DYING) drawHUD();
  if (mileT > 0 && state === ST.PLAY) drawMilestone();
  if (bannerT > 0) drawBanner();
}

function drawTorches() {
  const spacing = 270;
  const start = Math.floor(camY / spacing);
  for (let i = start; i * spacing < camY + H + 60; i++) {
    const wy = i * spacing + 80;
    const sy = wy - camY;
    if (sy < -40 || sy > H + 40) continue;
    const leftSide = (i % 2 === 0);
    const tx = leftSide ? WALL - 6 : INNER_R + 6;
    const flick = Math.sin(gameT * 11 + i * 7.3 + torchSeed) * 0.5 + Math.sin(gameT * 23 + i * 3.1) * 0.3;
    /* 光晕 (预渲染贴图, 摇曳缩放) */
    const gr = 96 + flick * 9;
    ctx.globalAlpha = 0.9 + flick * 0.1;
    ctx.drawImage(torchGlow, tx - gr, sy - 12 - gr, gr * 2, gr * 2);
    ctx.globalAlpha = 1;
    /* 柄 */
    ctx.strokeStyle = '#4a3520';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(tx, sy + 8);
    ctx.lineTo(tx + (leftSide ? 4 : -4), sy - 6);
    ctx.stroke();
    /* 火苗 */
    const fx = tx + (leftSide ? 4 : -4);
    ctx.fillStyle = '#ff8820';
    ctx.beginPath();
    ctx.ellipse(fx, sy - 12 + flick, 4.5, 7.5 + flick * 1.5, 0, 0, 7);
    ctx.fill();
    ctx.fillStyle = '#ffd040';
    ctx.beginPath();
    ctx.ellipse(fx, sy - 10 + flick, 2.3, 4 + flick, 0, 0, 7);
    ctx.fill();
  }
}

function drawPlat(pl) {
  const sy = pl.y - camY;
  if (sy < -34 || sy > H + 34) return;
  const broken = !pl.solid && pl.type === 'crumble';
  if (broken) return;
  const x = pl.x + (pl.shakeX || 0);

  /* 翻转板: 动态变换 + 金属反光 */
  if (pl.type === 'flip') {
    const ang = pl.flipT >= 0 ? clamp(pl.flipT / 0.5, 0, 1) * Math.PI : 0;
    const sc = Math.abs(Math.cos(ang));
    ctx.save();
    ctx.translate(x + pl.w / 2, sy + pl.h / 2);
    ctx.scale(1, Math.max(sc, 0.08));
    const spr = getPlatSpr(pl);
    ctx.drawImage(spr, -pl.w / 2 - SPR_PAD, -pl.h / 2 - SPR_TOP);
    if (ang > Math.PI / 2) {
      /* 背面调暗 */
      ctx.fillStyle = 'rgba(10,12,40,0.45)';
      ctx.fillRect(-pl.w / 2, -pl.h / 2, pl.w, pl.h);
    }
    if (ang > 0 && ang < Math.PI) {
      /* 翻转金属反光扫过 */
      const sweep = ang / Math.PI;
      ctx.globalAlpha = Math.sin(ang) * 0.55;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(-pl.w / 2 + sweep * (pl.w - 16), -pl.h / 2, 16, pl.h);
      ctx.globalAlpha = 1;
    }
    ctx.restore();
    return;
  }

  const spr = getPlatSpr(pl);
  ctx.drawImage(spr, x - SPR_PAD, sy - SPR_TOP);

  if (pl.type === 'beltL' || pl.type === 'beltR') {
    const dir = pl.type === 'beltL' ? -1 : 1;
    /* 滚动履带纹 */
    ctx.save();
    ctx.beginPath(); ctx.rect(x + 14, sy + 2, pl.w - 28, pl.h - 4); ctx.clip();
    ctx.strokeStyle = 'rgba(20,20,30,0.8)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    const off = ((gameT * BELT_SPD * dir) % 9 + 9) % 9;
    for (let ax = x - 9 + off; ax < x + pl.w + 9; ax += 9) {
      ctx.moveTo(ax, sy + 2);
      ctx.lineTo(ax - 3 * dir, sy + pl.h - 2);
    }
    ctx.stroke();
    ctx.restore();
    /* 滚轮辐条 */
    const rAng = gameT * BELT_SPD / 5 * dir;
    ctx.strokeStyle = '#7c7c92';
    ctx.lineWidth = 1.4;
    for (const rx of [x + 8, x + pl.w - 8]) {
      ctx.save();
      ctx.translate(rx, sy + pl.h / 2);
      ctx.rotate(rAng);
      ctx.beginPath();
      ctx.moveTo(-4, 0); ctx.lineTo(4, 0);
      ctx.moveTo(0, -4); ctx.lineTo(0, 4);
      ctx.stroke();
      ctx.restore();
    }
    /* 方向箭头灯 (流水点亮) */
    const cxm = x + pl.w / 2;
    for (let k = -1; k <= 1; k++) {
      const ph = ((gameT * 2.4 - k * dir * 0.33) % 1 + 1) % 1;
      const lit = ph < 0.45 ? 1 : 0.25;
      ctx.globalAlpha = lit;
      ctx.fillStyle = '#ffcc00';
      const ax = cxm + k * 11 * dir;
      ctx.beginPath();
      ctx.moveTo(ax - 3 * dir, sy + 3.5);
      ctx.lineTo(ax + 3 * dir, sy + pl.h / 2);
      ctx.lineTo(ax - 3 * dir, sy + pl.h - 3.5);
      ctx.lineTo(ax - 1 * dir, sy + pl.h / 2);
      ctx.closePath(); ctx.fill();
    }
    ctx.globalAlpha = 1;
  } else if (pl.type === 'spring') {
    /* 机械弹簧: 压缩-拉伸形变 */
    const comp = pl.springT;
    const cx = x + pl.w / 2;
    const topY = sy + 1 + comp * 6;
    ctx.strokeStyle = '#d0d0da';
    ctx.lineWidth = 2.6;
    ctx.beginPath();
    const coils = 3, ch = (sy + 8 - topY - 2) / coils;
    for (let i = 0; i <= coils; i++) {
      const yy = topY + 3 + i * ch;
      if (i === 0) ctx.moveTo(cx - 11, yy);
      else ctx.lineTo(i % 2 ? cx + 11 : cx - 11, yy);
    }
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1;
    ctx.stroke();
    /* 顶板 */
    ctx.fillStyle = '#992f2f';
    ctx.fillRect(cx - 17, topY - 4, 34, 6);
    ctx.fillStyle = '#cc4444';
    ctx.fillRect(cx - 17, topY - 4, 34, 4);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(cx - 17, topY - 4, 34, 1.6);
    /* 弹起瞬间的速度线 */
    if (comp > 0.55) {
      ctx.globalAlpha = (comp - 0.55) * 1.6;
      ctx.strokeStyle = '#ffe9a0';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cx - 13, topY - 9); ctx.lineTo(cx - 15, topY - 16);
      ctx.moveTo(cx, topY - 10); ctx.lineTo(cx, topY - 19);
      ctx.moveTo(cx + 13, topY - 9); ctx.lineTo(cx + 15, topY - 16);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  } else if (pl.type === 'crumble' && pl.crumbleT >= 0) {
    /* 碎裂倒计时: 裂纹加深 + 簌簌落灰 */
    ctx.globalAlpha = Math.min(1, pl.crumbleT * 2.4) * 0.5;
    ctx.fillStyle = '#2a1a08';
    ctx.fillRect(x, sy + pl.h - 2, pl.w, 2);
    ctx.globalAlpha = 1;
    if (Math.random() < renderDt * 26) parts.push({
      x: x + rnd(4, pl.w - 4), y: pl.y + pl.h,
      vx: rnd(-12, 12), vy: rnd(10, 50), life: rnd(0.25, 0.5), t: 0,
      size: rnd(1.5, 3), col: '#9a7a4e', grav: 700, rect: true
    });
  }
}

function drawPlayer() {
  const p = player;
  const cx = p.x + PW / 2;
  const sy = p.y - camY;
  const onG = !!p.onPlat;
  const mv = (keys.R || touchR ? 1 : 0) - (keys.L || touchL ? 1 : 0);
  const dead = state === ST.DYING;
  const depth = clamp(layer / 100, 0, 1);

  /* 弹簧翻跟头旋转残影 */
  if (p.flipping && !dead) {
    flipTrail.push({ x: cx, y: sy, ang: p.flipAng * p.face, t: 0 });
    if (flipTrail.length > 7) flipTrail.shift();
  }
  for (let i = flipTrail.length - 1; i >= 0; i--) {
    const q = flipTrail[i];
    q.t += renderDt;
    if (q.t > 0.22) { flipTrail.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = (1 - q.t / 0.22) * 0.28;
    ctx.translate(q.x, q.y + PH / 2);
    ctx.rotate(q.ang);
    ctx.fillStyle = '#e8a13f';
    ctx.beginPath(); ctx.roundRect(-8, -15, 16, 28, 6); ctx.fill();
    ctx.restore();
  }

  if (state === ST.PLAY && p.inv > 0 && Math.floor(p.inv * 14) % 2 === 0) return; // 无敌闪烁

  /* 头灯光锥: 深处照亮前路 */
  if (!dead && !p.flipping && depth > 0.18) {
    const a = Math.min(0.85, (depth - 0.18) * 1.6) * (0.85 + 0.07 * Math.sin(gameT * 9));
    ctx.save();
    ctx.translate(cx + p.face * 6, sy + PH - 33);
    const tilt = onG ? 0.14 : 0.62;
    ctx.rotate(p.face === 1 ? tilt : Math.PI - tilt);
    if (p.face === -1) ctx.scale(1, -1);
    ctx.globalAlpha = a;
    ctx.globalCompositeOperation = 'lighter';
    ctx.drawImage(lampCone, 0, -65);
    ctx.restore();
  }

  ctx.save();
  ctx.translate(cx, sy + PH);

  if (dead && deathType === 'pinned') {
    /* 被钉住: 倒挂轻摆 */
    ctx.rotate(Math.sin(deathT * 6) * 0.12);
  } else if (p.flipping || (dead && deathType !== 'pinned')) {
    ctx.translate(0, -PH / 2);
    ctx.rotate(p.flipAng * p.face);
    ctx.translate(0, PH / 2);
  }
  /* 落地压缩(屈膝缓冲) */
  const sq = p.squash;
  ctx.scale(1 + sq * 0.22, 1 - sq * 0.22);
  const crouch = onG ? sq * 3 : 0;

  const skin = '#ffd9a0';
  const jacket = dead ? '#9a6428' : '#e8973a';
  const pants = '#4a3b2e';
  const strap = '#54391f';
  const falling = !onG && !p.flipping;
  const legSwing = onG && mv !== 0 ? Math.sin(p.runT * 2.2) : 0;
  const slide = p.slideT > 0 && mv === 0;

  ctx.lineCap = 'round';

  /* 背包 (在面向的反侧) + 卷毯 */
  const bpx = p.face === 1 ? -14 : 3;
  ctx.fillStyle = '#8a6a3a';
  ctx.beginPath(); ctx.roundRect(bpx - 1, -29 + crouch, 13, 5, 2.5); ctx.fill();
  ctx.fillStyle = '#6e4f2e';
  ctx.beginPath(); ctx.roundRect(bpx, -26 + crouch, 11, 14, 4); ctx.fill();
  ctx.fillStyle = strap;
  ctx.fillRect(bpx, -21.5 + crouch, 11, 2.5);
  ctx.fillStyle = '#a8854c';
  ctx.fillRect(bpx + 3.5, -26 + crouch, 4, 3); /* 包盖扣 */

  /* 腿 */
  ctx.strokeStyle = pants;
  ctx.lineWidth = 5;
  ctx.beginPath();
  if (falling) {
    ctx.moveTo(-2, -13); ctx.lineTo(-7, -4); ctx.lineTo(-9, 0);
    ctx.moveTo(2, -13); ctx.lineTo(7, -5); ctx.lineTo(8, 0);
  } else if (slide) {
    ctx.moveTo(-2, -13); ctx.lineTo(-8, 0);
    ctx.moveTo(2, -13); ctx.lineTo(9, 0);
  } else if (crouch > 0.6) {
    /* 屈膝缓冲: 膝盖外顶 */
    ctx.moveTo(-2, -12 + crouch); ctx.lineTo(-7, -6 + crouch * 0.5); ctx.lineTo(-6, 0);
    ctx.moveTo(2, -12 + crouch); ctx.lineTo(7, -6 + crouch * 0.5); ctx.lineTo(6, 0);
  } else {
    ctx.moveTo(-2, -13); ctx.lineTo(-3 + legSwing * 6, -6); ctx.lineTo(-4 + legSwing * 7, 0);
    ctx.moveTo(2, -13); ctx.lineTo(3 - legSwing * 6, -6); ctx.lineTo(4 - legSwing * 7, 0);
  }
  ctx.stroke();
  /* 靴口 */
  ctx.strokeStyle = '#2c2014';
  ctx.lineWidth = 5;
  ctx.beginPath();
  if (falling) { ctx.moveTo(-9, 0); ctx.lineTo(-9, -1); ctx.moveTo(8, 0); ctx.lineTo(8, -1); }
  else if (slide) { ctx.moveTo(-8, 0); ctx.lineTo(-8, -1); ctx.moveTo(9, 0); ctx.lineTo(9, -1); }
  else if (crouch > 0.6) { ctx.moveTo(-6, 0); ctx.lineTo(-6, -1); ctx.moveTo(6, 0); ctx.lineTo(6, -1); }
  else {
    ctx.moveTo(-4 + legSwing * 7, 0); ctx.lineTo(-4 + legSwing * 7, -1);
    ctx.moveTo(4 - legSwing * 7, 0); ctx.lineTo(4 - legSwing * 7, -1);
  }
  ctx.stroke();

  /* 身体 (探险夹克) */
  ctx.fillStyle = jacket;
  ctx.beginPath();
  ctx.roundRect(-7, -25 + crouch * 0.8, 14, 14 - crouch * 0.6, 4);
  ctx.fill();
  /* 腰带 + 扣 */
  ctx.fillStyle = strap;
  ctx.fillRect(-7, -14.5 + crouch * 0.4, 14, 2.6);
  ctx.fillStyle = '#ffcc00';
  ctx.fillRect(-1.5, -14.5 + crouch * 0.4, 3, 2.6);
  /* 斜挎带 */
  ctx.strokeStyle = strap;
  ctx.lineWidth = 2.4;
  ctx.beginPath();
  ctx.moveTo(-p.face * 5.5, -24 + crouch * 0.8);
  ctx.lineTo(p.face * 5.5, -15 + crouch * 0.5);
  ctx.stroke();

  /* 手臂 */
  ctx.strokeStyle = jacket;
  ctx.lineWidth = 4.5;
  ctx.beginPath();
  if (falling || p.flipping) {
    const wig = Math.sin(gameT * 16) * 2;
    ctx.moveTo(-6, -22); ctx.lineTo(-12, -30 + wig);
    ctx.moveTo(6, -22); ctx.lineTo(12, -30 - wig);
  } else if (crouch > 0.6) {
    ctx.moveTo(-6, -21 + crouch * 0.8); ctx.lineTo(-10, -16 + crouch * 0.5);
    ctx.moveTo(6, -21 + crouch * 0.8); ctx.lineTo(10, -16 + crouch * 0.5);
  } else if (mv !== 0) {
    ctx.moveTo(-6, -22); ctx.lineTo(-8 - legSwing * 4, -14);
    ctx.moveTo(6, -22); ctx.lineTo(8 + legSwing * 4, -14);
  } else {
    ctx.moveTo(-6, -22); ctx.lineTo(-8, -14);
    ctx.moveTo(6, -22); ctx.lineTo(8, -14);
  }
  ctx.stroke();

  /* 头 */
  const hy = -31 + crouch * 0.9;
  ctx.fillStyle = skin;
  ctx.beginPath();
  ctx.arc(0, hy, 6.5, 0, 7);
  ctx.fill();
  /* 安全帽 */
  ctx.fillStyle = dead ? '#b89a2e' : '#e8c33a';
  ctx.beginPath();
  ctx.arc(0, hy - 1.5, 7, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(-7.5, hy - 2.4, 15, 2.2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.arc(-2.5, hy - 4.5, 1.6, 0, 7);
  ctx.fill();
  /* 头灯 */
  const lx = p.face * 4.5;
  ctx.fillStyle = '#3a3a44';
  ctx.fillRect(lx - 2.2, hy - 6.8, 4.4, 3.6);
  ctx.fillStyle = depth > 0.18 && !dead ? '#fff4b8' : '#cfcaa2';
  ctx.fillRect(lx + p.face * 1.2 - 1.4, hy - 6.3, 2.8, 2.6);
  if (depth > 0.18 && !dead) {
    ctx.globalAlpha = 0.75 + 0.25 * Math.sin(gameT * 9);
    ctx.fillStyle = 'rgba(255,250,200,0.6)';
    ctx.beginPath(); ctx.arc(lx + p.face * 1.5, hy - 5, 3.4, 0, 7); ctx.fill();
    ctx.globalAlpha = 1;
  }
  /* 表情 */
  if (dead) {
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(-4, hy - 2); ctx.lineTo(-1, hy + 1); ctx.moveTo(-1, hy - 2); ctx.lineTo(-4, hy + 1);
    ctx.moveTo(1, hy - 2); ctx.lineTo(4, hy + 1); ctx.moveTo(4, hy - 2); ctx.lineTo(1, hy + 1);
    ctx.stroke();
  } else if (hurtFlash > 0.35) {
    /* 痛苦: >< + 咧嘴 */
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1.4;
    const ex = p.face * 1.8;
    ctx.beginPath();
    ctx.moveTo(ex - 3.4, hy - 2.4); ctx.lineTo(ex - 1.2, hy - 1); ctx.lineTo(ex - 3.4, hy + 0.4);
    ctx.moveTo(ex + 3.4, hy - 2.4); ctx.lineTo(ex + 1.2, hy - 1); ctx.lineTo(ex + 3.4, hy + 0.4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ex - 1.6, hy + 3.2); ctx.lineTo(ex + 1.6, hy + 2.6);
    ctx.stroke();
  } else {
    ctx.fillStyle = '#222';
    const ex = p.face * 2.2;
    ctx.fillRect(ex - 2.6, hy - 1.4, 1.8, 2.6);
    ctx.fillRect(ex + 1, hy - 1.4, 1.8, 2.6);
    if (falling) { /* 张嘴小 o */
      ctx.beginPath(); ctx.arc(ex - 0, hy + 3.4, 1.3, 0, 7); ctx.fill();
    }
  }
  /* 受击红闪 */
  if (hurtFlash > 0.4) {
    ctx.globalAlpha = (hurtFlash - 0.4) * 0.9;
    ctx.fillStyle = '#ff3333';
    ctx.beginPath();
    ctx.roundRect(-9, -40, 18, 40, 6);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

function drawHUD() {
  /* 层数大字 (缓存金色渐变) */
  if (!hudGrad) {
    hudGrad = ctx.createLinearGradient(0, -42, 0, 6);
    hudGrad.addColorStop(0, '#ffe98a');
    hudGrad.addColorStop(0.55, '#ffcc00');
    hudGrad.addColorStop(1, '#e09a00');
  }
  const flash = flashT > 0 ? Math.sin(flashT * 12) * 0.5 + 0.5 : 0;
  const scl = 1 + flash * 0.25;
  ctx.save();
  ctx.translate(W / 2, 78);
  ctx.scale(scl, scl);
  ctx.textAlign = 'center';
  ctx.font = '800 46px "PingFang SC","Microsoft YaHei",system-ui';
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillText(layer + '', 0, 3);
  ctx.fillStyle = flash > 0.3 ? '#ffee88' : hudGrad;
  ctx.fillText(layer + '', 0, 0);
  ctx.font = '600 16px "PingFang SC","Microsoft YaHei",system-ui';
  ctx.fillStyle = '#8888a0';
  ctx.fillText('层', 0, 20);
  if (flash > 0) {
    ctx.globalAlpha = flash * 0.8;
    ctx.strokeStyle = '#ffcc00';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, -14, 40 + (0.9 - flashT) * 70, 0, 7);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  ctx.restore();

  /* 血条 10 格（层数下方居中） */
  const cw = 13, chh = 15, gap = 3;
  const barW = MAX_HP * (cw + gap) - gap;
  const bx = (W - barW) / 2, by = 108;

  /* 血格碎裂: 检测掉血并喷碎片 */
  if (hpPrev < 0) hpPrev = player.hp;
  if (player.hp < hpPrev) {
    for (let i = Math.max(0, player.hp); i < hpPrev; i++) {
      const x = bx + i * (cw + gap);
      for (let k = 0; k < 6; k++) uiParts.push({
        x: x + rnd(0, cw), y: by + rnd(0, chh),
        vx: rnd(-70, 70), vy: rnd(-110, 20), t: 0, life: rnd(0.35, 0.6),
        size: rnd(2, 4.5), col: k % 3 ? '#ff5544' : '#ffaa88'
      });
    }
  }
  hpPrev = player.hp;

  for (let i = 0; i < MAX_HP; i++) {
    const x = bx + i * (cw + gap);
    const filled = i < player.hp;
    let col;
    if (filled) {
      col = player.hp <= 3 ? '#ff4444' : player.hp <= 6 ? '#ffaa33' : '#55cc55';
      if (player.hp <= 3 && Math.floor(gameT * 4) % 2 === 0) col = '#ff7766';
    }
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.beginPath(); ctx.roundRect(x - 1, by - 1, cw + 2, chh + 2, 3.5); ctx.fill();
    ctx.fillStyle = filled ? col : '#22222f';
    ctx.beginPath(); ctx.roundRect(x, by, cw, chh, 2.5); ctx.fill();
    if (filled) {
      ctx.fillStyle = 'rgba(255,255,255,0.32)';
      ctx.beginPath(); ctx.roundRect(x + 1, by + 1, cw - 2, 4, 2); ctx.fill();
    } else {
      /* 空格内的裂痕 */
      ctx.strokeStyle = 'rgba(255,255,255,0.07)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + 2, by + 2); ctx.lineTo(x + cw / 2, by + chh / 2); ctx.lineTo(x + 3, by + chh - 2);
      ctx.moveTo(x + cw / 2, by + chh / 2); ctx.lineTo(x + cw - 2, by + chh - 3);
      ctx.stroke();
    }
  }
  /* 血格碎片粒子 (UI 空间) */
  for (let i = uiParts.length - 1; i >= 0; i--) {
    const q = uiParts[i];
    q.t += renderDt;
    if (q.t > q.life) { uiParts.splice(i, 1); continue; }
    q.vy += 520 * renderDt;
    q.x += q.vx * renderDt; q.y += q.vy * renderDt;
    ctx.globalAlpha = 1 - q.t / q.life;
    ctx.fillStyle = q.col;
    ctx.fillRect(q.x - q.size / 2, q.y - q.size / 2, q.size, q.size);
  }
  ctx.globalAlpha = 1;

  if (healFlash > 0) {
    ctx.globalAlpha = healFlash * 0.6;
    ctx.strokeStyle = '#88ff88';
    ctx.lineWidth = 2;
    ctx.strokeRect(bx - 3, by - 3, barW + 6, chh + 6);
    ctx.globalAlpha = 1;
  }
  /* 最深纪录角标 */
  ctx.textAlign = 'right';
  ctx.font = '500 13px "PingFang SC","Microsoft YaHei",system-ui';
  ctx.fillStyle = 'rgba(136,136,160,0.85)';
  ctx.fillText('纪录 ' + Math.max(best, layer), INNER_R - 8, 62);
}

/* 每 10 层里程碑横幅: 金线扫光 */
function drawMilestone() {
  const t = 1.5 - mileT;
  let a = 1;
  if (t < 0.2) a = t / 0.2;
  if (mileT < 0.4) a = mileT / 0.4;
  const yy = H * 0.24;
  const spread = Math.min(1, t / 0.35);
  ctx.save();
  ctx.globalAlpha = a;
  /* 两侧金线展开 */
  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(W / 2 - 58 - spread * 90, yy);
  ctx.lineTo(W / 2 - 58, yy);
  ctx.moveTo(W / 2 + 58, yy);
  ctx.lineTo(W / 2 + 58 + spread * 90, yy);
  ctx.stroke();
  /* 菱形端点 */
  ctx.fillStyle = '#ffe98a';
  for (const sx of [W / 2 - 58 - spread * 90, W / 2 + 58 + spread * 90]) {
    ctx.save(); ctx.translate(sx, yy); ctx.rotate(0.785);
    ctx.fillRect(-2.6, -2.6, 5.2, 5.2);
    ctx.restore();
  }
  ctx.textAlign = 'center';
  ctx.font = '800 24px "PingFang SC","Microsoft YaHei",system-ui';
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillText('第 ' + mileN + ' 层', W / 2, yy + 8.5);
  ctx.fillStyle = '#ffe060';
  ctx.fillText('第 ' + mileN + ' 层', W / 2, yy + 7);
  /* 扫光 */
  const sw = (t * 2.2) % 1.4 - 0.2;
  ctx.globalAlpha = a * 0.5;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(W / 2 - 56 + sw * 112, yy - 14, 7, 24);
  ctx.restore();
}

function drawBanner() {
  const t = 3.2 - bannerT;
  let a = 1;
  if (t < 0.3) a = t / 0.3;
  if (bannerT < 0.5) a = bannerT / 0.5;
  const yy = H * 0.34;

  /* 金色粒子雨 (借用世界粒子, 持续前 2 秒) */
  if (bannerT > 1.2 && parts.length < 240) {
    for (let k = 0; k < 3; k++) parts.push({
      x: rnd(INNER_L, INNER_R), y: camY - 10,
      vx: rnd(-30, 30), vy: rnd(120, 280), t: 0, life: rnd(0.9, 1.6),
      size: rnd(2, 4.5), col: k % 2 ? '#ffcc00' : '#fff0a0', grav: 300, rect: true
    });
  }

  ctx.save();
  ctx.globalAlpha = a;
  /* 开场金光闪屏 */
  if (t < 0.35) {
    ctx.fillStyle = `rgba(255,235,160,${(1 - t / 0.35) * 0.5})`;
    ctx.fillRect(0, 0, W, H);
  }
  /* 光芒 (双层旋转, 更大场面) */
  ctx.save();
  ctx.translate(W / 2, yy);
  ctx.rotate(gameT * 0.5);
  ctx.fillStyle = 'rgba(255,204,0,0.12)';
  for (let i = 0; i < 8; i++) {
    ctx.rotate(Math.PI / 4);
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(-34, -260); ctx.lineTo(34, -260);
    ctx.closePath(); ctx.fill();
  }
  ctx.rotate(-gameT * 0.85);
  ctx.fillStyle = 'rgba(255,240,170,0.07)';
  for (let i = 0; i < 6; i++) {
    ctx.rotate(Math.PI / 3);
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(-50, -230); ctx.lineTo(50, -230);
    ctx.closePath(); ctx.fill();
  }
  /* 扩散金环 */
  const ring = (t * 1.4) % 1;
  ctx.globalAlpha = a * (1 - ring) * 0.7;
  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth = 3 * (1 - ring) + 1;
  ctx.beginPath(); ctx.arc(0, 0, 60 + ring * 200, 0, 7); ctx.stroke();
  ctx.globalAlpha = a;
  ctx.restore();
  ctx.fillStyle = 'rgba(20,20,31,0.9)';
  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.roundRect(W / 2 - 165, yy - 52, 330, 104, 14);
  ctx.fill(); ctx.stroke();
  ctx.textAlign = 'center';
  ctx.font = '800 40px "PingFang SC","Microsoft YaHei",system-ui';
  ctx.fillStyle = '#ffcc00';
  ctx.fillText('你是真男人！', W / 2, yy + 2);
  ctx.font = '500 15px "PingFang SC","Microsoft YaHei",system-ui';
  ctx.fillStyle = '#e8e8f0';
  ctx.fillText('已达 100 层 · 无尽模式继续', W / 2, yy + 32);
  ctx.restore();
}

/* 菜单背景演示: 缓慢滚动井道 */
function menuBgUpdate(dt) {
  camY += 40 * dt;
  while (baseY + nextRowN * ROW < camY + H + 260) spawnRow();
  for (let i = plats.length - 1; i >= 0; i--) if (plats[i].y < camY - 80) plats.splice(i, 1);
  updateParts(dt);
}

/* ---------------- 主循环 ---------------- */
reset();
player.y = 1e9; // 菜单时藏起玩家
let lastT = performance.now();
function frame(now) {
  let dt = (now - lastT) / 1000;
  lastT = now;
  if (dt > 0.05) dt = 0.05;
  renderDt = dt;
  if (state === ST.MENU || state === ST.OVER) menuBgUpdate(dt);
  else update(dt);
  gameT += (state === ST.MENU || state === ST.OVER) ? dt : 0;
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
