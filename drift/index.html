<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>指尖漂移 · AI4399</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a12;
  font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
canvas{position:fixed;inset:0;display:block}
.back{position:fixed;top:14px;left:16px;z-index:40;color:rgba(255,255,255,.5);text-decoration:none;
  font-size:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  padding:6px 13px;border-radius:999px;backdrop-filter:blur(4px);transition:color .2s}
.back:hover{color:#ffcc00}
#mute{position:fixed;top:14px;right:16px;z-index:40;color:rgba(255,255,255,.55);font-size:13px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  padding:6px 13px;border-radius:999px;cursor:pointer;font-family:inherit}
#hud{position:fixed;top:16px;left:0;right:0;text-align:center;z-index:10;pointer-events:none;color:#fff}
#score{font-size:44px;font-weight:800;color:#ffcc00;line-height:1;font-style:italic;
  text-shadow:0 2px 16px rgba(255,204,0,.4),0 1px 0 rgba(0,0,0,.6)}
#sub{margin-top:6px;font-size:13px;color:rgba(255,255,255,.7);letter-spacing:1px}
.coinIco{display:inline-block;width:11px;height:11px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#fff3b0,#ffcc00 45%,#c98c00);vertical-align:-1px;margin-right:4px}
#hint{position:fixed;left:0;right:0;bottom:16%;text-align:center;z-index:10;pointer-events:none;
  color:#fff;font-size:16px;text-shadow:0 1px 6px rgba(0,0,0,.8);animation:pulse 1.1s ease-in-out infinite}
#hint b{color:#ffcc00}
#prot{display:block;margin-top:6px;font-size:13px;color:rgba(255,255,255,.6)}
@keyframes pulse{0%,100%{opacity:.95}50%{opacity:.45}}
.ov{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 40%,rgba(10,10,18,.45),rgba(10,10,18,.88))}
.panel{background:rgba(17,17,29,.94);border:1px solid rgba(255,204,0,.22);border-radius:20px;
  padding:34px 42px 30px;text-align:center;max-width:min(88vw,430px);
  box-shadow:0 24px 70px rgba(0,0,0,.65),0 0 40px rgba(255,204,0,.05) inset}
h1{font-size:46px;color:#ffcc00;font-style:italic;letter-spacing:3px;font-weight:800;
  text-shadow:0 3px 0 rgba(140,90,0,.55),0 6px 24px rgba(255,204,0,.3)}
h2{font-size:30px;color:#ffcc00;font-style:italic;letter-spacing:2px;margin-bottom:6px}
.tag{margin-top:8px;color:rgba(255,255,255,.55);font-size:13px;letter-spacing:2px}
.how{margin:18px 0 4px;color:rgba(255,255,255,.82);font-size:14px;line-height:1.9;
  background:rgba(255,255,255,.05);border-radius:12px;padding:12px 16px}
.how b{color:#ffcc00}
.bestLine{margin-top:14px;color:rgba(255,255,255,.6);font-size:14px}
.bestLine b{color:#ffcc00;font-size:18px;margin-left:4px}
.btn{margin-top:20px;background:linear-gradient(180deg,#ffd83d,#ffbb00);color:#221a00;font-weight:800;
  font-size:18px;letter-spacing:4px;border:none;border-radius:999px;padding:14px 50px;cursor:pointer;
  font-family:inherit;box-shadow:0 6px 24px rgba(255,204,0,.35),0 2px 0 rgba(150,100,0,.8);transition:transform .08s}
.btn:active{transform:scale(.95)}
.stats{margin:16px 0 2px;text-align:left}
.stats .row{display:flex;justify-content:space-between;padding:7px 4px;font-size:15px;
  color:rgba(255,255,255,.75);border-bottom:1px dashed rgba(255,255,255,.1)}
.stats .row b{color:#fff;font-weight:700}
.stats .row.big b{color:#ffcc00;font-size:22px}
.nb{display:inline-block;margin-top:8px;background:#ffcc00;color:#221a00;font-weight:800;font-size:13px;
  padding:4px 14px;border-radius:999px;letter-spacing:2px;animation:pulse 1s infinite}
.hidden{display:none!important}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<a class="back" href="../">← AI4399</a>
<button id="mute">声音 开</button>

<div id="hud" class="hidden">
  <div id="score">0</div>
  <div id="sub"><span class="coinIco"></span><span id="coinN">0</span>　·　最佳 <span id="bestN">0</span></div>
</div>
<div id="hint" class="hidden">按住 = 向<b>左</b>转向　松开 = 回到<b>右</b>侧直行<span id="prot"></span></div>

<div id="menu" class="ov">
  <div class="panel">
    <h1>指尖漂移</h1>
    <div class="tag">单键漂移 · 高架窄道 · 深渊勿坠</div>
    <div class="how">按住（鼠标 / 触屏 / 空格）：车头向<b>左</b>偏转<br>
      松开：转回<b>右</b>侧方向直行<br>
      沿悬空弯道漂移前进，吃金币、躲路障<br>贴边过弯还有额外加分！</div>
    <div class="bestLine">历史最高<b id="menuBest">0</b></div>
    <button class="btn" id="btnStart">开始游戏</button>
  </div>
</div>

<div id="over" class="ov hidden">
  <div class="panel">
    <h2>坠入深渊</h2>
    <div id="newBest" class="nb hidden">新 纪 录 ！</div>
    <div class="stats">
      <div class="row big">本局得分<b id="ovScore">0</b></div>
      <div class="row">漂移距离<b id="ovDist">0 m</b></div>
      <div class="row">金币<b id="ovCoin">0</b></div>
      <div class="row">贴边过弯<b id="ovCC">0 次</b></div>
      <div class="row">历史最高<b id="ovBest">0</b></div>
    </div>
    <button class="btn" id="btnAgain">再来一局</button>
  </div>
</div>

<script>
'use strict';
/* ============================================================
   指尖漂移 — 单键等轴漂移 · AI4399
   ============================================================ */
const TAU=Math.PI*2;
const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
const rand=(a,b)=>a+Math.random()*(b-a);

/* ---------- 手感参数（核心调校区） ---------- */
const HALF_W   = 3.3;     // 路面半宽（世界单位）
const FALL_PAD = 0.5;     // 超出半宽多少才坠落（车身可压边）
const TURN_R   = 4.8;     // 漂移转弯半径 → 角速度 = v / TURN_R
const AV_EASE  = 10;      // 角速度趋近速率（越大越跟手）
const MAX_A    = Math.PI/4;        // 行进方向夹角限位 ±45°
const V0=15, V_GAIN=0.02, V_ADD=24;// 速度：15 + min(24, 距离*0.02)
const PROTECT  = 3;       // 开局保护秒数
const CC_PAD   = 1.25;    // 险过弯判定：|lat| > HALF_W - CC_PAD
/* ------------------------------------------- */

const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const $=id=>document.getElementById(id);
const hudEl=$('hud'),scoreEl=$('score'),coinEl=$('coinN'),bestEl=$('bestN'),
      hintEl=$('hint'),protEl=$('prot'),menuEl=$('menu'),overEl=$('over');
const KEY='ai4399-drift-best';
let best=parseInt(localStorage.getItem(KEY)||'0',10)||0;

let W=0,H=0,DPR=1,K=16,OY=0,fogGrad=null,abyssGrad=null;
function resize(){
  DPR=Math.min(2,window.devicePixelRatio||1);
  W=window.innerWidth; H=window.innerHeight;
  cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  K=clamp(Math.min(W/46,H/34),9.5,20);
  OY=H*0.54;
  fogGrad=ctx.createLinearGradient(0,0,0,H*0.52);
  fogGrad.addColorStop(0,'rgba(10,10,18,0.96)');
  fogGrad.addColorStop(0.55,'rgba(10,10,18,0.45)');
  fogGrad.addColorStop(1,'rgba(10,10,18,0)');
  abyssGrad=ctx.createLinearGradient(0,H*0.8,0,H);
  abyssGrad.addColorStop(0,'rgba(8,8,16,0)');
  abyssGrad.addColorStop(1,'rgba(8,8,16,0.72)');
}
window.addEventListener('resize',resize); resize();

/* ---------- 背景星点 / 雾团 ---------- */
const stars=[],mists=[];
for(let i=0;i<120;i++) stars.push({x:Math.random(),y:Math.random(),
  p:rand(0.04,0.18),r:rand(0.5,1.7),tw:rand(0.8,2.8),ph:Math.random()*TAU});
for(let i=0;i<6;i++) mists.push({x:Math.random(),y:rand(0.3,0.95),
  p:rand(0.08,0.2),r:rand(0.14,0.3),dr:rand(-6,6),ph:Math.random()*TAU});

/* ---------- 赛道 ---------- */
let path=[],corners=[],coins=[],obs=[];
let cornerId=0,genHs=1,nextCoinS=95,nextObsS=170;
const gen={x:0,z:0,head:Math.PI/4};

function lastS(){return path.length?path[path.length-1].s:0;}
function pushPt(x,z,corner){
  const l=path[path.length-1];
  const s=l?l.s+Math.hypot(x-l.x,z-l.z):0;
  path.push({x,z,s,corner:corner||0});
}
function addStraight(len){
  const step=2.2,n=Math.max(1,Math.round(len/step)),d=len/n;
  for(let i=0;i<n;i++){
    gen.x+=Math.sin(gen.head)*d; gen.z+=Math.cos(gen.head)*d;
    pushPt(gen.x,gen.z,0);
  }
}
function addCorner(dir){
  cornerId++;
  const steps=6,da=(Math.PI/4)*dir/steps,r=2.8,arc=r*Math.abs(da);
  let midS=0;
  for(let i=0;i<steps;i++){
    gen.head+=da;
    gen.x+=Math.sin(gen.head)*arc; gen.z+=Math.cos(gen.head)*arc;
    const isMid=(i===3);
    pushPt(gen.x,gen.z,isMid?cornerId:0);
    if(isMid) midS=path[path.length-1].s;
  }
  corners.push({s:midS,id:cornerId,done:false});
}
function genNext(){
  const diff=clamp(lastS()/850,0,1);
  let len;
  if(genHs===0) len=Math.random()<0.42?rand(2.6,4.4):rand(7.5,18-7*diff);
  else len=rand(9.5,24-9*diff);
  addStraight(len);
  const dir=genHs===0?(Math.random()<0.5?1:-1):-genHs;
  addCorner(dir); genHs+=dir;
}
function normAt(k){
  const a=path[Math.max(0,k-1)],b=path[Math.min(path.length-1,k+1)];
  let dx=b.x-a.x,dz=b.z-a.z; const m=Math.hypot(dx,dz)||1;
  return {x:-dz/m,z:dx/m,dx:dx/m,dz:dz/m}; // x,z = 左法线
}
function sampleAt(s){
  let lo=0,hi=path.length-1;
  while(lo<hi){const m=(lo+hi)>>1; if(path[m].s<s)lo=m+1; else hi=m;}
  return clamp(lo,1,path.length-2);
}
function nearCorner(s,m){
  for(const c of corners) if(Math.abs(c.s-s)<m) return true;
  return false;
}
function seedItems(){
  const end=lastS()-8;
  while(nextCoinS<end){
    const lat=rand(-2,2),n=3;
    for(let j=0;j<n;j++){
      const k=sampleAt(nextCoinS+j*2.4),p=path[k],nl=normAt(k);
      coins.push({x:p.x+nl.x*lat,z:p.z+nl.z*lat,s:p.s,ph:Math.random()*TAU});
    }
    nextCoinS+=rand(26,48);
  }
  while(nextObsS<end){
    if(nearCorner(nextObsS,7)){nextObsS+=9;continue;}
    const k=sampleAt(nextObsS),p=path[k],nl=normAt(k);
    const diff=clamp(p.s/900,0,1);
    obs.push({x:p.x,z:p.z,s:p.s,nx:nl.x,nz:nl.z,dx:nl.dx,dz:nl.dz,
      amp:HALF_W-1.35,om:rand(1.1,2)+diff*0.8,ph:Math.random()*TAU});
    nextObsS+=rand(75-25*diff,130-55*diff);
  }
}
function extendPath(){
  while(lastS()<car.s+230) genNext();
  seedItems();
  while(path.length>4&&path[2].s<car.s-85){
    path.shift(); carIdx=Math.max(0,carIdx-1);
  }
  if(corners.length>40||coins.length>60||obs.length>30){
    corners=corners.filter(c=>c.s>car.s-50);
    coins=coins.filter(c=>c.s>car.s-30);
    obs=obs.filter(o=>o.s>car.s-30);
  }
}

/* ---------- 游戏状态 ---------- */
let state='menu',hold=false,runT=0,gt=0,overGuard=0;
let bonus=0,coinN=0,ccN=0,shake=0;
let marks=[],smoke=[],texts=[],lastWheel={};
const car={x:0,z:0,a:0,av:0,v:V0,dist:0,s:0,lat:0,visYaw:0,
  h:0,hv:0,scale:1,alpha:1,spin:0,fallT:0};
const cam={x:0,z:0};
let carIdx=0;

function resetRun(){
  path=[];corners=[];coins=[];obs=[];marks=[];smoke=[];texts=[];lastWheel={};
  cornerId=0;genHs=1;nextCoinS=95;nextObsS=170;
  gen.x=0;gen.z=0;gen.head=Math.PI/4;
  pushPt(0,0,0); addStraight(90);
  car.x=Math.sin(Math.PI/4)*4; car.z=Math.cos(Math.PI/4)*4;
  car.a=Math.PI/4; car.av=0; car.v=V0; car.dist=0; car.s=4; car.lat=0;
  car.visYaw=Math.PI/4; car.h=0; car.hv=0; car.scale=1; car.alpha=1;
  car.spin=0; car.fallT=0;
  carIdx=0; runT=0; bonus=0; coinN=0; ccN=0; shake=0;
  cam.x=car.x+Math.sin(car.a)*10; cam.z=car.z+Math.cos(car.a)*10;
  extendPath();
}
function curScore(){return Math.floor(car.dist+bonus);}

function startGame(){
  resetRun(); state='play'; hold=false;
  menuEl.classList.add('hidden'); overEl.classList.add('hidden');
  hudEl.classList.remove('hidden'); hintEl.classList.remove('hidden');
  bestEl.textContent=best;
}
function gameOver(){
  state='over';
  const sc=curScore(); let nb=false;
  if(sc>best){best=sc;nb=true;try{localStorage.setItem(KEY,String(best));}catch(e){}}
  $('ovScore').textContent=sc;
  $('ovDist').textContent=Math.floor(car.dist)+' m';
  $('ovCoin').textContent=coinN;
  $('ovCC').textContent=ccN+' 次';
  $('ovBest').textContent=best;
  $('newBest').classList.toggle('hidden',!nb);
  overEl.classList.remove('hidden');
  hudEl.classList.add('hidden'); hintEl.classList.add('hidden');
  overGuard=gt+0.6;
}
function startFall(crash){
  if(state!=='play')return;
  state='fall'; car.fallT=0;
  car.hv=crash?4.5:-1.5;
  car.spin=(car.lat>0?-1:1)*rand(4,7)*(crash?1.4:1);
  shake=crash?10:6;
  sfxFall(crash);
}

/* ---------- 定位：车与折线路径 ---------- */
function locate(){
  const i0=Math.max(0,carIdx-4),i1=Math.min(path.length-2,carIdx+32);
  let bd=1e18,bi=carIdx,bt=0,bpx=car.x,bpz=car.z,bcr=0;
  for(let i=i0;i<=i1;i++){
    const a=path[i],b=path[i+1];
    const abx=b.x-a.x,abz=b.z-a.z,L2=abx*abx+abz*abz||1e-9;
    let t=((car.x-a.x)*abx+(car.z-a.z)*abz)/L2; t=clamp(t,0,1);
    const px=a.x+abx*t,pz=a.z+abz*t;
    const dx=car.x-px,dz=car.z-pz,d2=dx*dx+dz*dz;
    if(d2<bd){bd=d2;bi=i;bt=t;bpx=px;bpz=pz;bcr=abx*dz-abz*dx;}
  }
  carIdx=bi;
  const a=path[bi],b=path[bi+1];
  car.s=a.s+(b.s-a.s)*bt;
  const d=Math.sqrt(bd);
  car.lat=(bcr>=0?1:-1)*d;
  // 保护期：把车按回路面
  if(runT<PROTECT&&d>HALF_W-0.6){
    const f=(HALF_W-0.6)/d;
    car.x=bpx+(car.x-bpx)*f; car.z=bpz+(car.z-bpz)*f;
    car.lat=(bcr>=0?1:-1)*(HALF_W-0.6);
  }
}

/* ---------- 更新 ---------- */
function addText(x,z,txt,c){texts.push({x,z,txt,c,age:0});}

function update(dt){
  gt+=dt;
  if(state!=='play'&&state!=='fall')return;
  runT+=dt;

  if(state==='play'){
    car.v=V0+Math.min(V_ADD,car.dist*V_GAIN);
    const om=car.v/TURN_R;
    const target=hold?-om:om;
    car.av+=(target-car.av)*Math.min(1,dt*AV_EASE);
    car.a+=car.av*dt;
    if(car.a>MAX_A){car.a=MAX_A;if(car.av>0)car.av=0;}
    if(car.a<-MAX_A){car.a=-MAX_A;if(car.av<0)car.av=0;}
    car.x+=Math.sin(car.a)*car.v*dt;
    car.z+=Math.cos(car.a)*car.v*dt;
    car.dist+=car.v*dt;
    car.visYaw=car.a+clamp(car.av*0.22,-0.55,0.55);

    locate();
    extendPath();

    // 漂移痕迹 + 烟雾
    const drifting=Math.abs(car.av)>1.35;
    const bx=-Math.sin(car.visYaw),bz=-Math.cos(car.visYaw);
    const rx=Math.cos(car.visYaw),rz=-Math.sin(car.visYaw);
    if(drifting&&Math.abs(car.lat)<HALF_W+0.2){
      for(const side of [-1,1]){
        const wx=car.x+bx*1.05+rx*0.68*side,wz=car.z+bz*1.05+rz*0.68*side;
        const lw=lastWheel[side];
        if(lw)marks.push({px:lw.x,pz:lw.z,x:wx,z:wz,a:0.55});
        lastWheel[side]={x:wx,z:wz};
      }
      if(Math.random()<dt*22){
        smoke.push({x:car.x+bx*1.2+rand(-0.4,0.4),z:car.z+bz*1.2+rand(-0.4,0.4),
          vx:bx*2+rand(-1,1),vz:bz*2+rand(-1,1),r:0.25,life:0,max:rand(0.45,0.8)});
      }
    }else lastWheel={};
    if(marks.length>700)marks.splice(0,marks.length-700);

    // 险过弯
    for(const c of corners){
      if(!c.done&&car.s>c.s){
        c.done=true;
        if(Math.abs(car.lat)>HALF_W-CC_PAD){
          bonus+=60; ccN++;
          addText(car.x,car.z,'贴边过弯 +60','#ffcc00');
          sfxNear(); shake=Math.max(shake,4);
        }
      }
    }
    // 金币
    for(let i=coins.length-1;i>=0;i--){
      const c=coins[i],dx=car.x-c.x,dz=car.z-c.z;
      if(dx*dx+dz*dz<2.3){
        coins.splice(i,1); coinN++; bonus+=25;
        addText(c.x,c.z,'+25','#ffe27a'); sfxCoin();
        for(let j=0;j<6;j++)smoke.push({x:c.x,z:c.z,vx:rand(-3,3),vz:rand(-3,3),
          r:0.1,life:0,max:0.35,gold:true});
      }
    }
    // 路障
    for(const o of obs){
      const off=Math.sin(runT*o.om+o.ph)*o.amp;
      const ox=o.x+o.nx*off,oz=o.z+o.nz*off;
      const dx=car.x-ox,dz=car.z-oz;
      if(dx*dx+dz*dz<1.35){startFall(true);break;}
    }
    // 坠落判定
    if(state==='play'&&Math.abs(car.lat)>HALF_W+FALL_PAD&&runT>=PROTECT) startFall(false);

    // 摄像机看向前方
    const tx=car.x+Math.sin(car.a)*10,tz=car.z+Math.cos(car.a)*10;
    cam.x+=(tx-cam.x)*Math.min(1,dt*3.5);
    cam.z+=(tz-cam.z)*Math.min(1,dt*3.5);

    // 保护提示
    if(runT<PROTECT){
      protEl.textContent='（保护中 '+Math.ceil(PROTECT-runT)+'s，掉不下去）';
    }else hintEl.classList.add('hidden');
  }else{ // fall
    car.fallT+=dt;
    car.hv-=22*dt; car.h+=car.hv*dt;
    if(car.h>0&&car.fallT>0.35)car.h=Math.min(car.h,0);
    car.x+=Math.sin(car.a)*car.v*0.35*dt;
    car.z+=Math.cos(car.a)*car.v*0.35*dt;
    car.visYaw+=car.spin*dt;
    car.scale=Math.max(0.16,car.scale-dt*0.75);
    if(car.fallT>0.55)car.alpha=Math.max(0,1-(car.fallT-0.55)*1.5);
    if(car.fallT>1.35)gameOver();
  }

  // 粒子 / 飘字 / 痕迹衰减
  for(let i=smoke.length-1;i>=0;i--){
    const p=smoke[i]; p.life+=dt;
    p.x+=p.vx*dt; p.z+=p.vz*dt; p.r+=dt*(p.gold?0.6:2.2);
    if(p.life>p.max)smoke.splice(i,1);
  }
  for(let i=marks.length-1;i>=0;i--){
    marks[i].a-=dt*0.16;
    if(marks[i].a<=0)marks.splice(i,1);
  }
  for(let i=texts.length-1;i>=0;i--){
    texts[i].age+=dt;
    if(texts[i].age>1)texts.splice(i,1);
  }
  shake=Math.max(0,shake-dt*26);

  scoreEl.textContent=curScore();
  coinEl.textContent=coinN;
  if(curScore()>best)bestEl.textContent=curScore();
}

/* ---------- 渲染 ---------- */
let shX=0,shY=0;
function proj(x,z){return {x:(x-cam.x)*K+W/2+shX,y:-(z-cam.z)*K*0.5+OY+shY};}

function render(){
  shX=shake?rand(-shake,shake)*0.5:0;
  shY=shake?rand(-shake,shake)*0.5:0;
  ctx.fillStyle='#0a0a12'; ctx.fillRect(0,0,W,H);

  // 星点
  for(const st of stars){
    const sx=(((st.x*W-cam.x*K*st.p)%W)+W)%W;
    const sy=(((st.y*H+cam.z*K*0.5*st.p)%H)+H)%H;
    const a=0.18+0.4*(0.5+0.5*Math.sin(gt*st.tw+st.ph));
    ctx.fillStyle='rgba(190,200,255,'+a.toFixed(2)+')';
    ctx.fillRect(sx,sy,st.r,st.r);
  }
  // 雾团
  for(const m of mists){
    const r=m.r*Math.min(W,H)*1.4;
    const sx=(((m.x*W-cam.x*K*m.p+Math.sin(gt*0.1+m.ph)*m.dr*8)%(W+r*2))+(W+r*2))%(W+r*2)-r;
    const sy=(((m.y*H+cam.z*K*0.5*m.p)%(H+r*2))+(H+r*2))%(H+r*2)-r;
    const g=ctx.createRadialGradient(sx,sy,0,sx,sy,r);
    g.addColorStop(0,'rgba(58,52,110,0.10)');g.addColorStop(1,'rgba(58,52,110,0)');
    ctx.fillStyle=g; ctx.fillRect(sx-r,sy-r,r*2,r*2);
  }

  // 可见路段
  if(path.length>2){
    let a0=carIdx; while(a0>0&&path[a0].s>car.s-52)a0--;
    let a1=carIdx; while(a1<path.length-1&&path[a1].s<car.s+160)a1++;
    const n=a1-a0+1;
    const L=new Array(n),R=new Array(n),LI=new Array(n),RI=new Array(n),C=new Array(n);
    for(let k=0;k<n;k++){
      const i=a0+k,p=path[i],nl=normAt(i);
      C[k]=proj(p.x,p.z);
      L[k]=proj(p.x+nl.x*HALF_W,p.z+nl.z*HALF_W);
      R[k]=proj(p.x-nl.x*HALF_W,p.z-nl.z*HALF_W);
      LI[k]=proj(p.x+nl.x*(HALF_W-0.62),p.z+nl.z*(HALF_W-0.62));
      RI[k]=proj(p.x-nl.x*(HALF_W-0.62),p.z-nl.z*(HALF_W-0.62));
    }
    const T=K*1.35;
    // 支撑柱
    for(let k=1;k<n;k++){
      const i=a0+k;
      if(Math.floor(path[i].s/9)!==Math.floor(path[i-1].s/9)&&path[i].s<car.s+110){
        const c=C[k];
        const g=ctx.createLinearGradient(0,c.y+T,0,c.y+T+95);
        g.addColorStop(0,'rgba(48,48,76,0.55)');g.addColorStop(1,'rgba(48,48,76,0)');
        ctx.fillStyle=g; ctx.fillRect(c.x-K*0.27,c.y+T,K*0.54,95);
      }
    }
    // 底板
    ctx.beginPath();
    ctx.moveTo(L[0].x,L[0].y+T);
    for(let k=1;k<n;k++)ctx.lineTo(L[k].x,L[k].y+T);
    for(let k=n-1;k>=0;k--)ctx.lineTo(R[k].x,R[k].y+T);
    ctx.closePath(); ctx.fillStyle='#0d0d17'; ctx.fill();
    // 侧壁
    ctx.fillStyle='#171726';
    for(let k=0;k<n-1;k++){
      ctx.beginPath();
      ctx.moveTo(L[k].x,L[k].y);ctx.lineTo(L[k+1].x,L[k+1].y);
      ctx.lineTo(L[k+1].x,L[k+1].y+T);ctx.lineTo(L[k].x,L[k].y+T);
      ctx.closePath();ctx.fill();
    }
    ctx.fillStyle='#101019';
    for(let k=0;k<n-1;k++){
      ctx.beginPath();
      ctx.moveTo(R[k].x,R[k].y);ctx.lineTo(R[k+1].x,R[k+1].y);
      ctx.lineTo(R[k+1].x,R[k+1].y+T);ctx.lineTo(R[k].x,R[k].y+T);
      ctx.closePath();ctx.fill();
    }
    // 路面
    const top=new Path2D();
    top.moveTo(L[0].x,L[0].y);
    for(let k=1;k<n;k++)top.lineTo(L[k].x,L[k].y);
    for(let k=n-1;k>=0;k--)top.lineTo(R[k].x,R[k].y);
    top.closePath();
    ctx.fillStyle='#262635'; ctx.fill(top);
    // 中线虚线
    ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=K*0.1;
    ctx.beginPath();
    for(let k=0;k<n-1;k++){
      if((a0+k)%4<2){ctx.moveTo(C[k].x,C[k].y);ctx.lineTo(C[k+1].x,C[k+1].y);}
    }
    ctx.stroke();
    // 边缘装饰条（黄黑相间）
    for(let k=0;k<n-1;k++){
      const yel=Math.floor(path[a0+k].s/2.2)%2===0;
      ctx.fillStyle=yel?'rgba(255,204,0,0.8)':'#3c3c50';
      ctx.beginPath();
      ctx.moveTo(L[k].x,L[k].y);ctx.lineTo(L[k+1].x,L[k+1].y);
      ctx.lineTo(LI[k+1].x,LI[k+1].y);ctx.lineTo(LI[k].x,LI[k].y);
      ctx.closePath();ctx.fill();
      ctx.fillStyle=yel?'#3c3c50':'rgba(255,204,0,0.8)';
      ctx.beginPath();
      ctx.moveTo(R[k].x,R[k].y);ctx.lineTo(R[k+1].x,R[k+1].y);
      ctx.lineTo(RI[k+1].x,RI[k+1].y);ctx.lineTo(RI[k].x,RI[k].y);
      ctx.closePath();ctx.fill();
    }
    // 路面之上：痕迹 + 阴影（裁剪在路内）
    ctx.save(); ctx.clip(top);
    ctx.lineCap='round'; ctx.lineWidth=K*0.15;
    for(const mk of marks){
      const p1=proj(mk.px,mk.pz),p2=proj(mk.x,mk.z);
      ctx.strokeStyle='rgba(8,8,14,'+mk.a.toFixed(2)+')';
      ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
    }
    // 金币地影
    for(const c of coins){
      if(c.s<car.s-25||c.s>car.s+150)continue;
      const p=proj(c.x,c.z);
      ctx.fillStyle='rgba(0,0,0,0.25)';
      ctx.beginPath();ctx.ellipse(p.x,p.y,K*0.32,K*0.14,0,0,TAU);ctx.fill();
    }
    // 车影
    if(car.alpha>0){
      const sf=clamp(1+car.h*0.4,0,1)*car.scale;
      if(sf>0.05){
        const sp=proj(car.x,car.z);
        ctx.save();ctx.translate(sp.x,sp.y+K*0.1);ctx.scale(1,0.5);ctx.rotate(car.visYaw);
        ctx.fillStyle='rgba(0,0,0,'+(0.4*sf).toFixed(2)+')';
        ctx.beginPath();ctx.ellipse(0,0,K*0.82*sf,K*1.4*sf,0,0,TAU);ctx.fill();
        ctx.restore();
      }
    }
    ctx.restore();
  }

  // 烟雾
  for(const p of smoke){
    const sp=proj(p.x,p.z),f=1-p.life/p.max;
    ctx.fillStyle=p.gold?'rgba(255,220,90,'+(0.6*f).toFixed(2)+')'
                        :'rgba(205,205,225,'+(0.22*f).toFixed(2)+')';
    ctx.save();ctx.translate(sp.x,sp.y);ctx.scale(1,0.5);
    ctx.beginPath();ctx.arc(0,0,Math.max(0.5,p.r*K),0,TAU);ctx.fill();ctx.restore();
  }
  // 金币
  for(const c of coins){
    if(c.s<car.s-25||c.s>car.s+150)continue;
    const p=proj(c.x,c.z);
    const bob=Math.sin(gt*3+c.ph)*K*0.1;
    const spin=Math.abs(Math.cos(gt*3.4+c.ph));
    ctx.save();ctx.translate(p.x,p.y-K*0.55-bob);
    ctx.shadowColor='rgba(255,204,0,0.7)';ctx.shadowBlur=10;
    ctx.fillStyle='#ffcc00';
    ctx.beginPath();ctx.ellipse(0,0,Math.max(K*0.07,K*0.36*spin),K*0.36,0,0,TAU);ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#a87600';
    ctx.beginPath();ctx.ellipse(0,0,Math.max(K*0.03,K*0.2*spin),K*0.2,0,0,TAU);ctx.fill();
    ctx.fillStyle='#ffe98a';
    ctx.beginPath();ctx.ellipse(-K*0.08*spin,-K*0.1,Math.max(K*0.02,K*0.09*spin),K*0.08,0,0,TAU);ctx.fill();
    ctx.restore();
  }
  // 路障
  for(const o of obs){
    if(o.s<car.s-25||o.s>car.s+150)continue;
    const off=Math.sin(runT*o.om+o.ph)*o.amp;
    const cx=o.x+o.nx*off,cz=o.z+o.nz*off;
    const e1=proj(cx+o.nx*0.85,cz+o.nz*0.85),e2=proj(cx-o.nx*0.85,cz-o.nz*0.85);
    const hpx=K*0.62,mp=proj(cx,cz);
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath();ctx.ellipse(mp.x,mp.y+2,K*0.85,K*0.3,0,0,TAU);ctx.fill();
    ctx.fillStyle='#e6b400';
    ctx.beginPath();ctx.moveTo(e1.x,e1.y);ctx.lineTo(e2.x,e2.y);
    ctx.lineTo(e2.x,e2.y-hpx);ctx.lineTo(e1.x,e1.y-hpx);ctx.closePath();ctx.fill();
    ctx.fillStyle='#191920';
    for(let b=0;b<4;b++){
      const t0=b/4+0.06,t1=t0+0.12;
      const x0=e1.x+(e2.x-e1.x)*t0,y0=e1.y+(e2.y-e1.y)*t0;
      const x1=e1.x+(e2.x-e1.x)*t1,y1=e1.y+(e2.y-e1.y)*t1;
      const sl=(e2.x-e1.x)*0.06;
      ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);
      ctx.lineTo(x1+sl,y1-hpx);ctx.lineTo(x0+sl,y0-hpx);ctx.closePath();ctx.fill();
    }
    ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(e1.x,e1.y-hpx);ctx.lineTo(e2.x,e2.y-hpx);ctx.stroke();
  }
  // 车
  drawCar();
  // 飘字
  for(const t of texts){
    const p=proj(t.x,t.z);
    const a=t.age<0.7?1:1-(t.age-0.7)/0.3;
    ctx.font='italic 800 '+Math.round(K*1.05)+'px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign='center';
    ctx.lineWidth=4;ctx.strokeStyle='rgba(10,10,18,'+(a*0.9).toFixed(2)+')';
    ctx.globalAlpha=a;
    ctx.strokeText(t.txt,p.x,p.y-K*1.6-t.age*36);
    ctx.fillStyle=t.c;
    ctx.fillText(t.txt,p.x,p.y-K*1.6-t.age*36);
    ctx.globalAlpha=1;
  }
  // 远处迷雾 + 近处深渊渐隐
  ctx.fillStyle=fogGrad; ctx.fillRect(0,0,W,H*0.52);
  ctx.fillStyle=abyssGrad; ctx.fillRect(0,H*0.8,W,H*0.2);
}

function rr(x,y,w,h,r){
  ctx.beginPath();
  if(ctx.roundRect)ctx.roundRect(x,y,w,h,r);else ctx.rect(x,y,w,h);
  ctx.fill();
}
function drawCar(){
  if(car.alpha<=0)return;
  const p=proj(car.x,car.z);
  ctx.save();
  ctx.translate(p.x,p.y-car.h*K*0.5);
  ctx.globalAlpha=car.alpha;
  const sc=K/16*car.scale;
  ctx.scale(sc,sc*0.5);
  ctx.rotate(car.visYaw);
  ctx.fillStyle='#15151d';
  rr(-13,-17,5.5,10,2);rr(7.5,-17,5.5,10,2);rr(-13,7,5.5,10,2);rr(7.5,7,5.5,10,2);
  const g=ctx.createLinearGradient(-11,0,11,0);
  g.addColorStop(0,'#ff6a4a');g.addColorStop(0.5,'#e8392b');g.addColorStop(1,'#a81d1d');
  ctx.fillStyle=g; rr(-11,-21,22,42,9);
  ctx.fillStyle='rgba(255,255,255,0.15)'; rr(-8,-20,16,7,4);
  ctx.fillStyle='#141b29'; rr(-8.5,-9,17,19,5);
  ctx.fillStyle='#2c3c58'; rr(-7,-8,14,7,3);
  ctx.fillStyle='#701212'; rr(-13,15,26,4.5,2);
  ctx.fillStyle='#9c1f1f'; rr(-13,13.5,26,2.5,2);
  ctx.fillStyle='#ffe9a0'; ctx.fillRect(-8,-22,4,2.5); ctx.fillRect(4,-22,4,2.5);
  ctx.fillStyle='#ff5050'; ctx.fillRect(-10,19.8,5,2); ctx.fillRect(5,19.8,5,2);
  ctx.restore();
  ctx.globalAlpha=1;
}

/* ---------- 音效（WebAudio 合成） ---------- */
let AC=null,master=null,engO=null,engG=null,scrG=null,muted=false,audioReady=false;
function audioInit(){
  if(audioReady)return; audioReady=true;
  try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){AC=null;return;}
  master=AC.createGain();master.gain.value=muted?0:0.5;master.connect(AC.destination);
  engO=AC.createOscillator();engO.type='sawtooth';engO.frequency.value=70;
  const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=280;
  engG=AC.createGain();engG.gain.value=0;
  engO.connect(lp);lp.connect(engG);engG.connect(master);engO.start();
  const len=AC.sampleRate,buf=AC.createBuffer(1,len,AC.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
  const src=AC.createBufferSource();src.buffer=buf;src.loop=true;
  const bp=AC.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1050;bp.Q.value=4;
  scrG=AC.createGain();scrG.gain.value=0;
  src.connect(bp);bp.connect(scrG);scrG.connect(master);src.start();
}
function beep(type,f0,f1,dur,vol,delay){
  if(!AC)return;
  const t0=AC.currentTime+(delay||0);
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.setValueAtTime(f0,t0);
  if(f1)o.frequency.exponentialRampToValueAtTime(f1,t0+dur);
  g.gain.setValueAtTime(vol,t0);
  g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  o.connect(g);g.connect(master);o.start(t0);o.stop(t0+dur+0.03);
}
function sfxCoin(){beep('square',980,1480,0.1,0.1);beep('square',1480,1980,0.12,0.07,0.06);}
function sfxNear(){beep('triangle',660,1320,0.16,0.13);beep('triangle',990,1980,0.14,0.08,0.07);}
function sfxFall(crash){
  beep('sawtooth',crash?420:300,38,0.7,0.16);
  beep('square',crash?160:110,28,0.5,0.12,0.04);
}
function audioFrame(){
  if(!AC||!engG)return;
  const on=state==='play';
  engG.gain.value+=((on?0.045:0)-engG.gain.value)*0.12;
  engO.frequency.value=58+car.v*2.6;
  const dr=on?clamp((Math.abs(car.av)-1.1)/2.2,0,1):0;
  scrG.gain.value+=(dr*0.1-scrG.gain.value)*0.18;
}
$('mute').addEventListener('click',e=>{
  e.stopPropagation();
  muted=!muted;
  $('mute').textContent=muted?'声音 关':'声音 开';
  if(master)master.gain.value=muted?0:0.5;
});

/* ---------- 输入 ---------- */
function press(){
  audioInit();
  if(AC&&AC.state==='suspended')AC.resume();
  if(state==='menu')startGame();
  else if(state==='over'&&gt>overGuard)startGame();
  hold=true;
}
window.addEventListener('pointerdown',e=>{
  if(e.target.closest('#mute')||e.target.closest('.back'))return;
  press();
});
window.addEventListener('pointerup',()=>{hold=false;});
window.addEventListener('pointercancel',()=>{hold=false;});
window.addEventListener('blur',()=>{hold=false;});
window.addEventListener('keydown',e=>{
  if(e.code==='Space'){
    e.preventDefault();
    if(!e.repeat)press();else hold=true;
  }
});
window.addEventListener('keyup',e=>{if(e.code==='Space')hold=false;});
window.addEventListener('contextmenu',e=>e.preventDefault());
$('btnStart').addEventListener('click',()=>{if(state==='menu')startGame();});
$('btnAgain').addEventListener('click',()=>{if(state==='over')startGame();});

/* ---------- 主循环 ---------- */
$('menuBest').textContent=best;
bestEl.textContent=best;
resetRun();
let lastTs=0;
function loop(ts){
  const dt=Math.min(0.05,(ts-lastTs)/1000)||0.016;
  lastTs=ts;
  update(dt);
  audioFrame();
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
