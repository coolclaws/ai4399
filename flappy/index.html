<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>笨鸟先飞 · AI4399</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a12;
    color: #e8e8f0;
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  #back {
    position: fixed; top: 12px; left: 12px; z-index: 50;
    color: #e8e8f0; text-decoration: none;
    background: rgba(20,20,31,.6);
    border: 1px solid rgba(42,42,61,.8);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 14px;
    backdrop-filter: blur(4px);
    opacity: .75;
    transition: opacity .2s;
  }
  #back:hover { opacity: 1; }
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #wrap {
    position: relative;
    box-shadow: 0 0 0 1px #2a2a3d, 0 24px 64px rgba(0,0,0,.55);
    border-radius: 10px;
    overflow: hidden;
    background: #14141f;
  }
  canvas { display: block; }
  .overlay {
    position: absolute; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 38%, rgba(10,10,18,.30), rgba(10,10,18,.58));
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .panel {
    width: min(84%, 308px);
    background: linear-gradient(165deg, rgba(32,32,50,.88), rgba(15,15,26,.93));
    border: 1px solid rgba(255,255,255,.09);
    border-top-color: rgba(255,255,255,.18);
    border-radius: 20px;
    padding: 24px 22px 22px;
    text-align: center;
    -webkit-backdrop-filter: blur(14px) saturate(1.3);
    backdrop-filter: blur(14px) saturate(1.3);
    box-shadow:
      0 24px 60px rgba(0,0,0,.55),
      0 3px 10px rgba(0,0,0,.4),
      inset 0 1px 0 rgba(255,255,255,.06);
    transform: translateY(14px);
    transition: transform .3s cubic-bezier(.2,1.4,.4,1);
  }
  .overlay.show .panel { transform: translateY(0); }
  h1 {
    font-size: 33px; font-weight: 800; letter-spacing: 5px;
    margin-bottom: 5px;
    background: linear-gradient(180deg, #fff0a8 5%, #ffcc00 52%, #e8a800 95%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    color: #ffcc00;
    filter: drop-shadow(0 2px 1px rgba(0,0,0,.45));
  }
  .sub {
    font-size: 12px; letter-spacing: 3px; color: #9494ac;
    margin-bottom: 18px;
  }
  .howto {
    text-align: left; font-size: 13px; line-height: 2.0;
    color: #d8d8e6;
    background: rgba(255,255,255,.035);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    padding: 11px 15px;
    margin-bottom: 18px;
    box-shadow: inset 0 1px 4px rgba(0,0,0,.25);
  }
  .howto b { color: #ffcc00; font-weight: 600; }
  .btn {
    display: inline-block;
    background: linear-gradient(180deg, #ffe066, #ffcc00 55%, #efb400);
    color: #1a1400;
    border: none; border-radius: 12px;
    font-family: inherit;
    font-size: 17px; font-weight: 700; letter-spacing: 2px;
    padding: 12px 40px;
    cursor: pointer;
    box-shadow:
      0 4px 0 #a37e00,
      0 10px 22px rgba(255,204,0,.22),
      inset 0 1px 0 rgba(255,255,255,.5);
    transition: transform .08s, box-shadow .08s, filter .15s;
  }
  .btn:hover { filter: brightness(1.06); }
  .btn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #a37e00, 0 4px 10px rgba(255,204,0,.18), inset 0 1px 0 rgba(255,255,255,.5);
  }
  .bestline { font-size: 13px; color: #8888a0; margin-top: 15px; }
  .bestline span { color: #ffcc00; font-weight: 700; }
  h2 {
    font-size: 19px; font-weight: 700; letter-spacing: 5px;
    color: #f0f0f8; margin-bottom: 4px;
  }
  .h2bar {
    width: 36px; height: 3px; border-radius: 2px;
    background: linear-gradient(90deg, #ffcc00, #e8a800);
    margin: 0 auto 14px;
    opacity: .85;
  }
  .scorebox {
    display: flex; justify-content: center; gap: 10px; margin-bottom: 14px;
  }
  .scorebox .cell {
    flex: 1; max-width: 118px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 12px;
    padding: 9px 6px 7px;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.3);
  }
  .scorebox .cell .lab { font-size: 11px; letter-spacing: 2px; color: #8888a0; margin-bottom: 2px; }
  .scorebox .cell .val {
    font-size: 32px; font-weight: 800; color: #ffcc00; line-height: 1.15;
    text-shadow: 0 2px 6px rgba(255,204,0,.25);
  }
  .scorebox .cell .val.dim { color: #e8e8f0; text-shadow: none; }
  #newbest {
    display: none;
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    color: #1a1400;
    background: linear-gradient(180deg, #ffe066, #ffc400);
    border-radius: 99px; padding: 3px 12px;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(255,204,0,.4);
    animation: pulse 1s ease-in-out infinite;
  }
  #newbest.show { display: inline-block; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
  #medalbox { margin-bottom: 16px; }
  #medal {
    position: relative;
    width: 76px; height: 76px; border-radius: 50%;
    margin: 16px auto 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    border: 3px solid #2e2e46;
    background: radial-gradient(circle at 35% 28%, #242438, #15151f 78%);
    color: #4e4e6a;
    box-shadow:
      inset 0 2px 5px rgba(255,255,255,.06),
      inset 0 -5px 9px rgba(0,0,0,.45),
      0 5px 14px rgba(0,0,0,.45);
    text-shadow: 0 1px 0 rgba(255,255,255,.12), 0 -1px 1px rgba(0,0,0,.4);
  }
  /* 缎带（获奖时显示） */
  #medal::before {
    content: ''; display: none;
    position: absolute; left: 50%; top: -19px;
    width: 52px; height: 34px;
    transform: translateX(-50%);
    z-index: -1;
    background: linear-gradient(180deg, #ff6257 0%, #d92f44 70%, #b02035 100%);
    clip-path: polygon(0 0, 36% 0, 50% 42%, 64% 0, 100% 0, 74% 100%, 50% 64%, 26% 100%);
    filter: drop-shadow(0 2px 3px rgba(0,0,0,.45));
  }
  /* 金属高光弧（获奖时显示） */
  #medal::after {
    content: ''; display: none;
    position: absolute; inset: 5px;
    border-radius: 50%;
    background: linear-gradient(140deg, rgba(255,255,255,.55), rgba(255,255,255,.08) 42%, rgba(255,255,255,0) 55%);
    pointer-events: none;
  }
  #medal.bronze::before, #medal.silver::before, #medal.gold::before,
  #medal.bronze::after,  #medal.silver::after,  #medal.gold::after { display: block; }
  #medal.bronze {
    background: radial-gradient(circle at 35% 28%, #ffd9ae, #e8a26a 36%, #b06a32 72%, #8a4a1e);
    border-color: #d98f4f; color: #5a2d0c;
    box-shadow:
      inset 0 3px 6px rgba(255,255,255,.45),
      inset 0 -5px 10px rgba(90,45,12,.55),
      inset 0 0 0 5px rgba(255,244,230,.16),
      0 6px 16px rgba(176,106,50,.4);
  }
  #medal.silver {
    background: radial-gradient(circle at 35% 28%, #ffffff, #d8d8e8 36%, #9a9ab4 72%, #76768e);
    border-color: #cfcfe0; color: #43435a;
    box-shadow:
      inset 0 3px 6px rgba(255,255,255,.6),
      inset 0 -5px 10px rgba(70,70,95,.5),
      inset 0 0 0 5px rgba(255,255,255,.2),
      0 6px 16px rgba(154,154,180,.4);
  }
  #medal.gold {
    background: radial-gradient(circle at 35% 28%, #fff3b0, #ffd84d 36%, #d4a000 72%, #a87c00);
    border-color: #ffd84d; color: #6b4d00;
    box-shadow:
      inset 0 3px 6px rgba(255,255,255,.55),
      inset 0 -5px 10px rgba(120,85,0,.55),
      inset 0 0 0 5px rgba(255,250,220,.22),
      0 6px 18px rgba(255,204,0,.45);
    animation: medalglow 2.2s ease-in-out infinite;
  }
  @keyframes medalglow {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.12); }
  }
  #medalname { font-size: 12px; letter-spacing: 1px; color: #9a9ab2; }
  .hint { font-size: 12px; color: #77778e; margin-top: 13px; }
</style>
</head>
<body>
<a id="back" href="../">← AI4399</a>
<div id="stage">
  <div id="wrap">
    <canvas id="cv"></canvas>
    <div id="startOverlay" class="overlay">
      <div class="panel">
        <h1>笨鸟先飞</h1>
        <div class="sub">勤能补拙 · 飞得更远</div>
        <div class="howto">
          <b>点按屏幕</b> 或 <b>空格 / ↑</b> 拍动翅膀<br>
          穿过管道之间的缺口得 <b>1 分</b><br>
          撞到管道或落地即失败<br>
          奖牌：<b>10</b> 铜 · <b>25</b> 银 · <b>50</b> 金
        </div>
        <button class="btn" id="startBtn">开 始</button>
        <div class="bestline">历史最高：<span id="bestStart">0</span> 分</div>
      </div>
    </div>
    <div id="overOverlay" class="overlay">
      <div class="panel">
        <h2>本 局 结 束</h2>
        <div class="h2bar"></div>
        <div id="newbest">★ 新纪录 ★</div>
        <div class="scorebox">
          <div class="cell"><div class="lab">得分</div><div class="val" id="finalScore">0</div></div>
          <div class="cell"><div class="lab">最高分</div><div class="val dim" id="finalBest">0</div></div>
        </div>
        <div id="medalbox">
          <div id="medal">—</div>
          <div id="medalname">未获奖牌</div>
        </div>
        <button class="btn" id="restartBtn">再来一局</button>
        <div class="hint">点按任意处 / 空格 也可重开</div>
      </div>
    </div>
  </div>
</div>
<script>
'use strict';
(function () {
  /* ============ 常量与世界参数（手感核心） ============ */
  var W = 360, H = 640;            // 逻辑分辨率（竖屏 9:16）
  var GROUND_Y = 552;              // 地面顶部
  var GRAVITY = 1900;              // 重力 px/s^2
  var FLAP_VY = -430;              // 拍翅瞬时上抛速度
  var MAX_FALL = 640;              // 终端下落速度
  var SPEED = 138;                 // 世界恒定滚动速度
  var PIPE_W = 68;                 // 管道宽
  var PIPE_GAP_MAX = 168;          // 初始缺口（先宽）
  var PIPE_GAP_MIN = 122;          // 最窄缺口（后窄）
  var PIPE_SPACING = 218;          // 管道水平间距
  var BIRD_X = 98, BIRD_R = 13;    // 小鸟位置与碰撞半径
  var GAP_TOP_MARGIN = 56;         // 缺口中心距顶部最小
  var GAP_BOTTOM_MARGIN = 76;      // 缺口中心距地面最小
  var GAP_MAX_JUMP = 150;          // 相邻缺口中心最大落差（保证可飞）

  /* ============ 画布与缩放 ============ */
  var cv = document.getElementById('cv');
  var ctx = cv.getContext('2d');
  var wrap = document.getElementById('wrap');

  function resize() {
    var vw = window.innerWidth, vh = window.innerHeight;
    var pad = (vw > 520 && vh > 760) ? 32 : 0; // 桌面留边，移动端满屏
    var s = Math.min((vw - pad) / W, (vh - pad) / H);
    var cssW = Math.floor(W * s), cssH = Math.floor(H * s);
    var dpr = Math.min(window.devicePixelRatio || 1, 3);
    cv.style.width = cssW + 'px';
    cv.style.height = cssH + 'px';
    cv.width = Math.floor(cssW * dpr);
    cv.height = Math.floor(cssH * dpr);
    var k = cv.width / W;
    ctx.setTransform(k, 0, 0, k, 0, 0);
    wrap.style.borderRadius = (vw - cssW < 8) ? '0' : '10px';
  }
  window.addEventListener('resize', resize);
  resize();

  /* ============ 音效（WebAudio 合成） ============ */
  var actx = null;
  function audioCtx() {
    if (!actx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) actx = new AC();
    }
    if (actx && actx.state === 'suspended') actx.resume();
    return actx;
  }
  function tone(type, f0, f1, t0, dur, vol) {
    var ac = audioCtx(); if (!ac) return;
    var t = ac.currentTime + t0;
    var o = ac.createOscillator(), g = ac.createGain();
    o.type = type;
    o.frequency.setValueAtTime(f0, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(f1, 1), t + dur);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function noiseBurst(dur, vol, cutoff) {
    var ac = audioCtx(); if (!ac) return;
    var n = Math.floor(ac.sampleRate * dur);
    var buf = ac.createBuffer(1, n, ac.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
    var src = ac.createBufferSource(); src.buffer = buf;
    var lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = cutoff;
    var g = ac.createGain(); g.gain.value = vol;
    src.connect(lp); lp.connect(g); g.connect(ac.destination);
    src.start();
  }
  var sfx = {
    flap:  function () { tone('triangle', 520, 760, 0, 0.07, 0.22); },
    score: function () { tone('square', 988, 988, 0, 0.07, 0.14); tone('square', 1319, 1319, 0.07, 0.22, 0.14); },
    hit:   function () { noiseBurst(0.22, 0.5, 900); tone('square', 220, 110, 0, 0.15, 0.25); },
    die:   function () { tone('sawtooth', 520, 130, 0.22, 0.5, 0.2); }
  };

  /* ============ 游戏状态 ============ */
  var STATE = { READY: 0, PLAY: 1, DYING: 2, OVER: 3 };
  var state = STATE.READY;
  var firstRun = true;          // 首次显示完整说明面板
  var score = 0, best = 0;
  try { best = parseInt(localStorage.getItem('ai4399-flappy-best'), 10) || 0; } catch (e) {}

  var bird = { y: 0, vy: 0, rot: 0, wingT: 0, wingBoost: 0 };
  var pipes = [];               // {x, gapY, gap, scored}
  var lastGapY = H * 0.45;
  var flashA = 0;               // 死亡白闪
  var shakeT = 0;               // 撞击震屏
  var overAt = 0;               // 进入结算的时间戳（防误触重开）
  var groundOff = 0, cityOff = 0, cloudOff = 0, bushOff = 0;
  var readyT = 0;               // ready 态计时（悬浮动画）

  var startOverlay = document.getElementById('startOverlay');
  var overOverlay = document.getElementById('overOverlay');
  document.getElementById('bestStart').textContent = best;

  /* ============ 远景程序化生成 ============ */
  function mulberry(seed) {
    return function () {
      seed |= 0; seed = seed + 0x6D2B79F5 | 0;
      var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var buildings = [], cityW = 0;
  (function () {
    var rnd = mulberry(4399);
    while (cityW < W + 160) {
      var w = 26 + rnd() * 34, h = 50 + rnd() * 110;
      buildings.push({ x: cityW, w: w, h: h, win: rnd() > 0.4, ant: rnd() > 0.66 });
      cityW += w + 2 + rnd() * 8;
    }
  })();
  var CLOUD_FIELD = W + 160, FAR_FIELD = CLOUD_FIELD / 2;
  var cloudsNear = [], cloudsFar = [];
  (function () {
    var rnd = mulberry(1234);
    for (var i = 0; i < 6; i++) {
      cloudsNear.push({ x: rnd() * CLOUD_FIELD, y: 46 + rnd() * 160, s: 0.75 + rnd() * 0.65, v: i % 3 });
    }
    for (i = 0; i < 5; i++) {
      cloudsFar.push({ x: rnd() * FAR_FIELD, y: 26 + rnd() * 120, s: 0.32 + rnd() * 0.3, v: (i + 1) % 3 });
    }
  })();
  var bushes = [], bushW = 0;
  (function () {
    var rnd = mulberry(777);
    while (bushW < W + 120) {
      bushes.push({ x: bushW, r: 16 + rnd() * 18 });
      bushW += 18 + rnd() * 26;
    }
  })();

  /* ============ 离屏缓存（静态图形全部预渲染，每帧零渐变创建） ============ */
  function mkC(w, h, sc) {
    var c = document.createElement('canvas');
    c.width = Math.ceil(w * sc); c.height = Math.ceil(h * sc);
    var g = c.getContext('2d');
    g.scale(sc, sc);
    return { cv: c, g: g, w: w, h: h, sc: sc };
  }
  function drawStrip(o, dx, dy) { // 按逻辑尺寸贴图（裁掉 ceil 余量）
    ctx.drawImage(o.cv, 0, 0, o.w * o.sc, o.h * o.sc, dx, dy, o.w, o.h);
  }

  /* ---- 天空（昼/暮/夜/晨 四张，随分数交叉淡化） ---- */
  var skyTopColor = ['#48a8e8', '#3a4490', '#0a0f2c', '#4a5aa8'];
  function buildSky(stops, deco) {
    var o = mkC(W, GROUND_Y, 2), g = o.g;
    var gr = g.createLinearGradient(0, 0, 0, GROUND_Y);
    for (var i = 0; i < stops.length; i++) gr.addColorStop(stops[i][0], stops[i][1]);
    g.fillStyle = gr;
    g.fillRect(0, 0, W, GROUND_Y);
    if (deco) deco(g);
    return o;
  }
  function radialGlow(g, x, y, r0, r1, c) {
    var gr = g.createRadialGradient(x, y, r0, x, y, r1);
    gr.addColorStop(0, c); gr.addColorStop(1, 'rgba(255,255,255,0)');
    g.fillStyle = gr;
    g.beginPath(); g.arc(x, y, r1, 0, 7); g.fill();
  }
  var skySpr = [
    buildSky([[0, '#48a8e8'], [0.5, '#7fd0ec'], [0.82, '#b9ecf4'], [1, '#e0f7f4']], function (g) {
      radialGlow(g, 284, 92, 8, 72, 'rgba(255,250,215,0.65)');
      var sg = g.createRadialGradient(280, 88, 4, 284, 92, 24);
      sg.addColorStop(0, '#fffce8'); sg.addColorStop(0.8, '#ffefa8'); sg.addColorStop(1, '#ffe488');
      g.fillStyle = sg;
      g.beginPath(); g.arc(284, 92, 23, 0, 7); g.fill();
    }),
    buildSky([[0, '#3a4490'], [0.35, '#8c5a9c'], [0.62, '#e07a5a'], [0.82, '#f7b35e'], [1, '#ffe09a']], function (g) {
      radialGlow(g, 104, GROUND_Y - 126, 12, 130, 'rgba(255,160,80,0.5)');
      var sg = g.createRadialGradient(100, GROUND_Y - 130, 4, 104, GROUND_Y - 126, 26);
      sg.addColorStop(0, '#fff0c8'); sg.addColorStop(1, '#ffb86a');
      g.fillStyle = sg;
      g.beginPath(); g.arc(104, GROUND_Y - 126, 25, 0, 7); g.fill();
      g.fillStyle = 'rgba(255,190,120,0.16)';
      g.fillRect(0, GROUND_Y - 96, W, 5);
      g.fillRect(0, GROUND_Y - 72, W, 8);
      g.fillRect(0, GROUND_Y - 44, W, 12);
    }),
    buildSky([[0, '#0a0f2c'], [0.45, '#16204a'], [0.8, '#2a3a68'], [1, '#3c4e7e']], function (g) {
      var rnd = mulberry(2025);
      for (var i = 0; i < 56; i++) {
        var sx = rnd() * W, sy = rnd() * (GROUND_Y - 150), sr = 0.5 + rnd() * 0.9;
        g.fillStyle = 'rgba(235,240,255,' + (0.25 + rnd() * 0.6).toFixed(2) + ')';
        g.beginPath(); g.arc(sx, sy, sr, 0, 7); g.fill();
      }
      g.strokeStyle = 'rgba(255,255,255,0.75)'; g.lineWidth = 1;
      for (i = 0; i < 3; i++) {
        var cx = 60 + rnd() * 240, cy = 40 + rnd() * 200;
        g.beginPath();
        g.moveTo(cx - 4, cy); g.lineTo(cx + 4, cy);
        g.moveTo(cx, cy - 4); g.lineTo(cx, cy + 4);
        g.stroke();
      }
      radialGlow(g, 272, 96, 10, 56, 'rgba(215,225,255,0.4)');
      var mg = g.createRadialGradient(266, 90, 4, 272, 96, 20);
      mg.addColorStop(0, '#fbfaf0'); mg.addColorStop(1, '#dcdcd0');
      g.fillStyle = mg;
      g.beginPath(); g.arc(272, 96, 19, 0, 7); g.fill();
      g.fillStyle = 'rgba(150,158,185,0.4)';
      g.beginPath(); g.arc(266, 92, 4.2, 0, 7); g.fill();
      g.beginPath(); g.arc(277, 102, 3, 0, 7); g.fill();
      g.beginPath(); g.arc(274, 88, 2, 0, 7); g.fill();

    }
    feathersFx.length = w;
    w = 0;
    for (i = 0; i < floaters.length; i++) {
      p = floaters[i]; p.t += dt;
      if (p.t < p.life) { p.y -= 46 * dt; floaters[w++] = p; }
    }
    floaters.length = w;
    w = 0;
    for (i = 0; i < notes.length; i++) {
      p = notes[i]; p.t += dt;
      if (p.t < p.life) {
        if (p.t > 0) { p.x += p.vx * dt; p.y += p.vy * dt; }
        notes[w++] = p;
      }
    }
    notes.length = w;
  }

  /* ============ 流程控制 ============ */
  function resetRound() {
    score = 0;
    pipes = [];
    bird.y = H * 0.42; bird.vy = 0; bird.rot = 0;
    bird.wingT = 0; bird.wingBoost = 0;
    lastGapY = H * 0.45;
    flashA = 0; shakeT = 0; readyT = 0;
    state = STATE.READY;
    overOverlay.classList.remove('show');
    if (firstRun) startOverlay.classList.add('show');
  }
  function startPlay() {
    firstRun = false;
    startOverlay.classList.remove('show');
    state = STATE.PLAY;
    spawnPipe(W + 90);
    flap();
  }
  function currentGap() {
    var t = Math.min(score, 40) / 40;            // 40 分后达到最窄
    return PIPE_GAP_MAX - (PIPE_GAP_MAX - PIPE_GAP_MIN) * t;
  }
  function spawnPipe(x) {
    var gap = currentGap();
    var lo = Math.max(GAP_TOP_MARGIN + gap / 2, lastGapY - GAP_MAX_JUMP);
    var hi = Math.min(GROUND_Y - GAP_BOTTOM_MARGIN - gap / 2, lastGapY + GAP_MAX_JUMP);
    var gapY = lo + Math.random() * Math.max(hi - lo, 1);
    lastGapY = gapY;
    pipes.push({ x: x, gapY: gapY, gap: gap, scored: false });
  }
  function flap() {
    bird.vy = FLAP_VY;
    bird.wingBoost = 1;
    sfx.flap();
  }
  function die() {
    state = STATE.DYING;
    flashA = 1; shakeT = 0.3;
    bird.vy = Math.min(bird.vy, -160);   // 撞击小弹跳
    sfx.hit(); sfx.die();
    fxDeath();
  }
  function settle() {
    state = STATE.OVER;
    overAt = performance.now();
    if (score > best) {
      best = score;
      try { localStorage.setItem('ai4399-flappy-best', String(best)); } catch (e) {}
      document.getElementById('newbest').classList.add('show');
    } else {
      document.getElementById('newbest').classList.remove('show');
    }
    document.getElementById('finalScore').textContent = score;
    document.getElementById('finalBest').textContent = best;
    var medal = document.getElementById('medal');
    var mname = document.getElementById('medalname');
    medal.className = '';
    if (score >= 50)      { medal.classList.add('gold');   medal.textContent = '★'; mname.textContent = '金牌 · 一飞冲天'; }
    else if (score >= 25) { medal.classList.add('silver'); medal.textContent = '★'; mname.textContent = '银牌 · 轻车熟路'; }
    else if (score >= 10) { medal.classList.add('bronze'); medal.textContent = '★'; mname.textContent = '铜牌 · 初出茅庐'; }
    else                  { medal.textContent = '—';       mname.textContent = '未获奖牌（10 分起）'; }
    document.getElementById('bestStart').textContent = best;
    overOverlay.classList.add('show');
  }
  function tap() {
    audioCtx();
    if (state === STATE.READY) startPlay();
    else if (state === STATE.PLAY) flap();
    else if (state === STATE.OVER) {
      if (performance.now() - overAt > 450) resetRound();  // 防手抖误触
    }
  }

  /* ============ 输入 ============ */
  document.getElementById('startBtn').addEventListener('pointerdown', function (e) {
    e.stopPropagation(); audioCtx(); startPlay();
  });
  document.getElementById('restartBtn').addEventListener('pointerdown', function (e) {
    e.stopPropagation(); resetRound();
  });
  document.getElementById('back').addEventListener('pointerdown', function (e) { e.stopPropagation(); });
  document.getElementById('stage').addEventListener('pointerdown', function (e) {
    e.preventDefault(); tap();
  });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      if (!e.repeat) tap();
    }
  });
  document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });
  document.addEventListener('gesturestart', function (e) { e.preventDefault(); });

  /* ============ 更新 ============ */
  function update(dt) {
    var scroll = (state === STATE.READY || state === STATE.PLAY);
    if (scroll) {
      groundOff = (groundOff + SPEED * dt) % 26;
      bushOff = (bushOff + SPEED * 0.45 * dt) % bushW;
      cityOff = (cityOff + SPEED * 0.18 * dt) % cityW;
      cloudOff = (cloudOff + SPEED * 0.07 * dt) % (W + 160);
    }
    // 翅膀动画：ready/play 持续扇动，刚拍翅时加速
    var wingSpeed = (state === STATE.DYING || state === STATE.OVER) ? 0 : (9 + bird.wingBoost * 22);
    bird.wingT += wingSpeed * dt;
    bird.wingBoost = Math.max(0, bird.wingBoost - dt * 3);

    if (state === STATE.READY) {
      readyT += dt;
      bird.y = H * 0.42 + Math.sin(readyT * 3.4) * 7;
      bird.rot = Math.sin(readyT * 3.4 + 0.6) * 0.06;
      return;
    }
    if (state === STATE.OVER) return;

    // 物理
    bird.vy = Math.min(bird.vy + GRAVITY * dt, MAX_FALL);
    bird.y += bird.vy * dt;
    if (bird.y < -30) { bird.y = -30; bird.vy = Math.max(bird.vy, 0); }

    // 俯仰：上冲快速昂头，下落渐渐栽头
    var target;
    if (state === STATE.DYING) target = 1.5;
    else if (bird.vy < 0) target = -0.42;
    else target = Math.min(1.5, -0.42 + (bird.vy / MAX_FALL) * 2.4);
    var rate = (target < bird.rot) ? 14 : (state === STATE.DYING ? 9 : 5.2);
    bird.rot += (target - bird.rot) * Math.min(1, rate * dt);

    // 落地
    if (bird.y + BIRD_R >= GROUND_Y) {
      bird.y = GROUND_Y - BIRD_R;
      if (state === STATE.PLAY) { die(); return; } // die() 带小弹跳，二次落地再结算
      bird.vy = 0;
      fxLand();
      settle();
      return;
    }
    if (state === STATE.DYING) return;

    // 管道滚动与生成
    for (var i = 0; i < pipes.length; i++) pipes[i].x -= SPEED * dt;
    if (pipes.length && pipes[0].x + PIPE_W < -10) pipes.shift();
    if (!pipes.length || pipes[pipes.length - 1].x < W - (PIPE_SPACING - PIPE_W)) {
      spawnPipe(pipes.length ? pipes[pipes.length - 1].x + PIPE_SPACING : W + 90);
    }

    // 计分与碰撞
    for (var j = 0; j < pipes.length; j++) {
      var p = pipes[j];
      if (!p.scored && p.x + PIPE_W / 2 < BIRD_X) {
        p.scored = true; score++; sfx.score(); fxScore();
      }
      if (p.x > BIRD_X + BIRD_R + 4 || p.x + PIPE_W < BIRD_X - BIRD_R - 4) continue;
      var topH = p.gapY - p.gap / 2;
      var botY = p.gapY + p.gap / 2;
      if (circleRect(BIRD_X, bird.y, BIRD_R, p.x, 0, PIPE_W, topH) ||
          circleRect(BIRD_X, bird.y, BIRD_R, p.x, botY, PIPE_W, GROUND_Y - botY)) {
        die();
        break;
      }
    }
  }
  function circleRect(cx, cy, r, rx, ry, rw, rh) {
    var nx = Math.max(rx, Math.min(cx, rx + rw));
    var ny = Math.max(ry, Math.min(cy, ry + rh));
    var dx = cx - nx, dy = cy - ny;
    return dx * dx + dy * dy < r * r;
  }

  /* ============ 绘制 ============ */
  function draw(now) {
    ctx.save();
    if (shakeT > 0) {
      ctx.fillStyle = skyTopColor[Math.round(dayU) % 4];
      ctx.fillRect(0, 0, W, H); // 震屏时先垫底色，防边缘残影
      ctx.translate((Math.random() - 0.5) * shakeT * 22, (Math.random() - 0.5) * shakeT * 22);
    }
    drawSky();
    drawClouds();
    drawHills();
    drawCity();
    drawBushes();
    drawPipes();
    drawGround();
    drawTufts();
    drawBirdShadow();
    drawBird();
    drawWorldFx();
    ctx.restore();

    drawVeil();
    drawTextFx();

    // 分数
    if (state !== STATE.READY && !(state === STATE.OVER)) {
      drawScore(String(score));
    } else if (state === STATE.READY && !firstRun) {
      drawHint(now);
    }
    // 白闪
    if (flashA > 0) {
      ctx.fillStyle = 'rgba(255,255,255,' + flashA.toFixed(3) + ')';
      ctx.fillRect(0, 0, W, H);
    }
  }
  function drawSky() {
    var i = Math.floor(dayU) % 4, f = dayU - Math.floor(dayU);
    ctx.drawImage(skySpr[i].cv, 0, 0, W, GROUND_Y);
    if (f > 0.004) {
      ctx.globalAlpha = f;
      ctx.drawImage(skySpr[(i + 1) % 4].cv, 0, 0, W, GROUND_Y);
      ctx.globalAlpha = 1;
    }
  }
  function drawClouds() {
    var i, c, x, sw, sh, spr;
    ctx.globalAlpha = 0.6;                       // 远层云（半速视差）
    for (i = 0; i < cloudsFar.length; i++) {
      c = cloudsFar[i];
      x = ((c.x - cloudOff * 0.5) % FAR_FIELD + FAR_FIELD) % FAR_FIELD;
      spr = cloudSpr[c.v]; sw = 150 * c.s; sh = 80 * c.s;
      ctx.drawImage(spr.cv, x - 80, c.y, sw, sh);
      ctx.drawImage(spr.cv, x - 80 + FAR_FIELD, c.y, sw, sh);
    }
    ctx.globalAlpha = 1;                         // 近层云
    for (i = 0; i < cloudsNear.length; i++) {
      c = cloudsNear[i];
      x = ((c.x - cloudOff) % CLOUD_FIELD + CLOUD_FIELD) % CLOUD_FIELD - 80;
      spr = cloudSpr[c.v]; sw = 150 * c.s; sh = 80 * c.s;
      ctx.drawImage(spr.cv, x - sw / 2, c.y - sh / 2, sw, sh);
    }
  }
  function drawHills() {
    var off = (cityOff * 0.6) % hillW;
    for (var x = -off; x < W; x += hillW) {
      drawStrip(hillSpr, x, GROUND_Y - 18 - 64);
    }
  }
  function drawCity() {
    var baseY = GROUND_Y - 18;
    var nA = tri(dayU, 2);
    for (var rep = 0; rep < 2; rep++) {
      var off = rep * cityW - cityOff;
      if (off > W || off + cityW < 0) continue;
      drawStrip(cityDaySpr, off, baseY - 184);
      if (nA > 0.03) {
        ctx.globalAlpha = nA;
        drawStrip(cityNightSpr, off, baseY - 184);
        ctx.globalAlpha = 1;
      }
    }
  }
  function drawBushes() {
    for (var rep = 0; rep < 2; rep++) {
      var off = rep * bushW - bushOff;
      if (off > W || off + bushW < 0) continue;
      drawStrip(bushSpr, off, GROUND_Y - 16 - 28);
    }
  }
  function drawPipes() {
    for (var i = 0; i < pipes.length; i++) {
      var p = pipes[i];
      var topH = p.gapY - p.gap / 2;
      var botY = p.gapY + p.gap / 2;
      pipeRect(p.x, 0, topH, true);
      pipeRect(p.x, botY, GROUND_Y - botY, false);
    }
  }
  function pipeRect(x, y, h, isTop) {
    if (h <= 0) return;
    ctx.drawImage(pipeBodySpr.cv, x, y, PIPE_W, h);
    ctx.fillStyle = 'rgba(0,0,0,0.14)';          // 法兰投影
    if (isTop) {
      ctx.fillRect(x, y + h - PIPE_CAP_H - 5, PIPE_W, 5);
      ctx.drawImage(pipeCapSpr.cv, x - 5, y + h - PIPE_CAP_H, PIPE_W + 10, PIPE_CAP_H);
    } else {
      ctx.fillRect(x, y + PIPE_CAP_H, PIPE_W, 5);
      ctx.drawImage(pipeCapSpr.cv, x - 5, y, PIPE_W + 10, PIPE_CAP_H);
    }
  }
  function drawGround() {
    drawStrip(groundSpr, -groundOff, GROUND_Y - 24);
  }
  function drawTufts() {
    for (var i = 0; i < pipes.length; i++) {     // 管底植被点缀
      var p = pipes[i];
      if (p.x > W + 10 || p.x + PIPE_W < -10) continue;
      ctx.drawImage(tuftSpr.cv, p.x - 4, GROUND_Y - 26, 76, 24);
    }
  }
  function drawBirdShadow() {
    var d = GROUND_Y - bird.y;
    if (d > 260) return;
    var a = (1 - d / 260) * 0.22;
    var r = 10 + (1 - d / 260) * 6;
    ctx.fillStyle = 'rgba(40,80,30,' + a.toFixed(3) + ')';
    ctx.beginPath();
    ctx.ellipse(BIRD_X, GROUND_Y - 9, r, r * 0.26, 0, 0, 7);
    ctx.fill();
  }
  function drawBird() {
    var dead = (state === STATE.DYING || state === STATE.OVER);
    ctx.save();
    ctx.translate(BIRD_X, bird.y);
    ctx.rotate(bird.rot);
    // 身体（预渲染精灵）
    ctx.drawImage(birdBodySpr.cv, -34, -30, 68, 60);
    // 翅膀：三帧姿态 + 余量微转
    var s = Math.sin(bird.wingT);
    var wi = dead ? 2 : (s > 0.35 ? 0 : (s < -0.35 ? 2 : 1));
    var res = dead ? -0.18 : s * 0.2;
    ctx.save();
    ctx.translate(-4, 1);
    ctx.rotate(res);
    ctx.drawImage(wingSpr[wi].cv, -34, -16, 48, 42);
    ctx.restore();
    // 眼睛
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = '#8a5800';
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.ellipse(6, -6, 5.4, 5.9, 0.06, 0, 7);
    ctx.fill(); ctx.stroke();
    if (dead) {
      // 死亡 ×眼
      ctx.strokeStyle = '#444455';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(3.2, -8.6); ctx.lineTo(8.8, -3.2);
      ctx.moveTo(8.8, -8.6); ctx.lineTo(3.2, -3.2);
      ctx.stroke();
    } else if (blinkT < 0 && state !== STATE.DYING) {
      // 眨眼
      ctx.strokeStyle = '#8a5800';
      ctx.lineWidth = 1.8;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(2.6, -5.6); ctx.quadraticCurveTo(6, -3.8, 9.4, -5.6);
      ctx.stroke();
    } else {
      // 瞳孔随升降看向上下 + 双高光
      var look = Math.max(-1, Math.min(1, bird.vy / MAX_FALL));
      var py = -6 + look * 2.1;
      ctx.fillStyle = '#26263a';
      ctx.beginPath(); ctx.arc(7.4, py, 2.7, 0, 7); ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(6.6, py - 1, 1.05, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(8.2, py + 0.8, 0.55, 0, 7); ctx.fill();
    }
    // 嘴（拍翅/死亡时张开）
    var open = dead ? 2.4 : Math.max(0, bird.wingBoost - 0.45) * 3.2;
    if (open > 0.7) {
      ctx.fillStyle = '#9c2f10';
      ctx.beginPath();
      ctx.moveTo(10.5, 0.5 - open * 0.5);
      ctx.lineTo(17, 2);
      ctx.lineTo(10.5, 3.5 + open * 0.5);
      ctx.closePath(); ctx.fill();
    }
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = '#b34a12';
    ctx.fillStyle = '#ff8a3d';
    ctx.beginPath();
    ctx.moveTo(10, -1.5 - open * 0.3);
    ctx.lineTo(19, 0.5 - open);
    ctx.lineTo(10, 2 - open * 0.4);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#f2701f';
    ctx.beginPath();
    ctx.moveTo(10, 2.5 + open * 0.4);
    ctx.lineTo(17.5, 3.5 + open);
    ctx.lineTo(10, 5.5 + open * 0.3);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();
  }
  function drawWorldFx() {
    var i, p, a;
    for (i = 0; i < dust.length; i++) {
      p = dust[i]; a = 1 - p.t / p.life;
      ctx.fillStyle = 'rgba(214,196,140,' + (a * 0.8).toFixed(3) + ')';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * (1 + p.t * 1.6), 0, 7);
      ctx.fill();
    }
    for (i = 0; i < feathersFx.length; i++) {
      p = feathersFx[i]; a = 1 - p.t / p.life;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = 'rgba(255,211,77,' + (a * 0.95).toFixed(3) + ')';
      ctx.beginPath(); ctx.ellipse(0, 0, 5, 2.1, 0, 0, 7); ctx.fill();
      ctx.fillStyle = 'rgba(200,140,20,' + (a * 0.6).toFixed(3) + ')';
      ctx.fillRect(-4.5, -0.4, 9, 0.8);
      ctx.restore();
    }
  }
  function drawVeil() {
    // 昼夜色调薄纱（纯视觉）
    var nA = tri(dayU, 2);
    var wA = tri(dayU, 1) * 0.5 + tri(dayU, 3) * 0.3;
    if (wA > 0.01) {
      ctx.fillStyle = 'rgba(255,140,70,' + (wA * 0.18).toFixed(3) + ')';
      ctx.fillRect(0, 0, W, H);
    }
    if (nA > 0.01) {
      ctx.fillStyle = 'rgba(10,16,52,' + (nA * 0.34).toFixed(3) + ')';
      ctx.fillRect(0, 0, W, H);
    }
  }
  function drawTextFx() {
    var i, p, a;
    if (floaters.length) {
      ctx.font = '800 21px "PingFang SC","Microsoft YaHei",system-ui,sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.lineWidth = 4;
      ctx.lineJoin = 'round';
      for (i = 0; i < floaters.length; i++) {
        p = floaters[i]; a = 1 - p.t / p.life;
        ctx.strokeStyle = 'rgba(80,50,0,' + (a * 0.85).toFixed(3) + ')';
        ctx.fillStyle = 'rgba(255,216,77,' + a.toFixed(3) + ')';
        ctx.strokeText('+1', p.x, p.y);
        ctx.fillText('+1', p.x, p.y);
      }
    }
    if (notes.length) {
      ctx.font = '15px "PingFang SC","Microsoft YaHei",system-ui,sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (i = 0; i < notes.length; i++) {
        p = notes[i];
        if (p.t < 0) continue;
        a = 1 - p.t / p.life;
        ctx.fillStyle = 'rgba(255,255,255,' + (a * 0.95).toFixed(3) + ')';
        ctx.fillText(p.g, p.x, p.y);
      }
    }
  }
  function drawScore(s) {
    var cx = W / 2, cy = 70;
    ctx.save();
    if (scorePop > 0) {
      var k = 1 + scorePop * 0.22;
      ctx.translate(cx, cy);
      ctx.scale(k, k);
      ctx.translate(-cx, -cy);
    }
    ctx.font = '800 44px "PingFang SC","Microsoft YaHei",system-ui,sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.lineWidth = 6;
    ctx.lineJoin = 'round';
    ctx.strokeStyle = 'rgba(40,40,60,0.85)';
    ctx.strokeText(s, cx, 48);
    ctx.fillStyle = '#ffffff';
    ctx.fillText(s, cx, 48);
    ctx.restore();
  }
  function drawHint(now) {
    var a = 0.65 + Math.sin(now / 280) * 0.3;
    ctx.font = '600 19px "PingFang SC","Microsoft YaHei",system-ui,sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineWidth = 5;
    ctx.lineJoin = 'round';
    ctx.strokeStyle = 'rgba(40,40,60,' + (a * 0.9).toFixed(3) + ')';
    ctx.fillStyle = 'rgba(255,255,255,' + a.toFixed(3) + ')';
    ctx.strokeText('点按 / 空格 起飞', W / 2, H * 0.3);
    ctx.fillText('点按 / 空格 起飞', W / 2, H * 0.3);
    // 上指小箭头
    var ay = H * 0.3 + 36 + Math.sin(now / 200) * 4;
    ctx.strokeStyle = 'rgba(40,40,60,0.8)';
    ctx.fillStyle = '#ffffff';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(W / 2, ay - 10);
    ctx.lineTo(W / 2 - 9, ay + 4);
    ctx.lineTo(W / 2 - 3.5, ay + 4);
    ctx.lineTo(W / 2 - 3.5, ay + 13);
    ctx.lineTo(W / 2 + 3.5, ay + 13);
    ctx.lineTo(W / 2 + 3.5, ay + 4);
    ctx.lineTo(W / 2 + 9, ay + 4);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  }

  /* ============ 主循环 ============ */
  var last = performance.now();
  function frame(now) {
    var dt = Math.min((now - last) / 1000, 1 / 30); // 切后台回来不跳帧
    last = now;
    flashA = Math.max(0, flashA - dt * 2.6);
    shakeT = Math.max(0, shakeT - dt);
    update(dt);
    updateFx(dt);
    draw(now);
    requestAnimationFrame(frame);
  }
  resetRound();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
