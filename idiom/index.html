<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>成语方阵 · AI4399</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  background: #0a0a12;
  color: #e8e8f0;
  font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 12px 40px;
  overflow-x: hidden;
}
a.back {
  position: fixed;
  top: 10px; left: 12px;
  color: #8888a0;
  background: rgba(20, 20, 31, .6);
  border: 1px solid #2a2a3d;
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 13px;
  text-decoration: none;
  opacity: .8;
  z-index: 50;
  backdrop-filter: blur(4px);
}
a.back:hover { color: #ffcc00; opacity: 1; }

header { text-align: center; margin-top: 40px; }
h1 {
  font-size: 28px;
  letter-spacing: 8px;
  margin-left: 8px;
  background: linear-gradient(135deg, #ffcc00, #ff9a3d);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle { color: #8888a0; font-size: 13px; margin-top: 6px; }

.tabs {
  display: flex;
  gap: 8px;
  margin: 14px auto 4px;
  justify-content: center;
  align-items: center;
}
.tabs button {
  font-family: inherit;
  font-size: 14px;
  padding: 7px 16px;
  border-radius: 20px;
  border: 1px solid #2a2a3d;
  background: #14141f;
  color: #8888a0;
  cursor: pointer;
  transition: all .2s;
}
.tabs button.active {
  background: #2a2417;
  border-color: #ffcc00;
  color: #ffcc00;
}
.tabs button:hover { border-color: #ffcc00; }
#statsBtn, #helpBtn { padding: 7px 12px; }

.legend {
  display: flex;
  gap: 14px;
  justify-content: center;
  margin: 10px 0 2px;
  font-size: 12px;
  color: #8888a0;
}
.legend i {
  display: inline-block;
  width: 11px; height: 11px;
  border-radius: 3px;
  margin-right: 4px;
  vertical-align: -1px;
}
.legend .g { background: #4caf6d; }
.legend .y { background: #d9a92f; }
.legend .x { background: #3a3a4d; }

main { width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; }

#board {
  display: grid;
  grid-template-rows: repeat(6, auto);
  gap: 8px;
  margin: 16px 0 14px;
}
.row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.row.shake { animation: shake .45s; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-7px); }
  40%, 80% { transform: translateX(7px); }
}
.tile {
  width: min(17.5vw, 68px);
  height: min(17.5vw, 68px);
  perspective: 600px;
}
.tile-inner {
  position: relative;
  width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform .5s;
}
.tile.flip .tile-inner { transform: rotateX(180deg); }
.face {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: min(8vw, 32px);
  font-weight: 600;
  border-radius: 10px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}
.face.front {
  background: #14141f;
  border: 2px solid #2a2a3d;
}
.tile.typed .face.front {
  border-color: #55556e;
  animation: pop .12s;
}
@keyframes pop {
  0% { transform: scale(.85); }
  60% { transform: scale(1.06); }
  100% { transform: scale(1); }
}
.face.back {
  transform: rotateX(180deg);
  color: #fff;
}
.back.correct { background: linear-gradient(160deg, #4caf6d, #35935a); box-shadow: 0 2px 10px rgba(76,175,109,.35); }
.back.present { background: linear-gradient(160deg, #d9a92f, #bd8d1c); box-shadow: 0 2px 10px rgba(217,169,47,.35); }
.back.absent  { background: #3a3a4d; color: #b8b8c8; }
.tile.dance { animation: dance .55s ease both; }
@keyframes dance {
  0%, 100% { transform: translateY(0); }
  40% { transform: translateY(-18px); }
  65% { transform: translateY(4px); }
}

.input-row {
  display: flex;
  gap: 8px;
  width: 100%;
  max-width: 330px;
}
#guessInput {
  flex: 1;
  min-width: 0;
  font-family: inherit;
  font-size: 18px;
  letter-spacing: 6px;
  text-align: center;
  padding: 11px 8px;
  border-radius: 10px;
  border: 1px solid #2a2a3d;
  background: #14141f;
  color: #e8e8f0;
  outline: none;
  transition: border-color .2s;
}
#guessInput:focus { border-color: #ffcc00; }
#guessInput::placeholder { color: #55556e; letter-spacing: 2px; font-size: 14px; }
#guessInput:disabled { opacity: .45; }
#submitBtn {
  font-family: inherit;
  font-size: 16px;
  font-weight: 600;
  padding: 0 22px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #ffcc00, #ffb300);
  color: #1a1400;
  cursor: pointer;
  transition: transform .12s, filter .2s;
}
#submitBtn:hover { filter: brightness(1.1); }
#submitBtn:active { transform: scale(.95); }
#submitBtn:disabled { opacity: .4; cursor: default; }

#toast {
  position: fixed;
  top: 64px;
  left: 50%;
  transform: translateX(-50%) translateY(-8px);
  background: #e8e8f0;
  color: #14141f;
  font-size: 14px;
  font-weight: 600;
  padding: 9px 18px;
  border-radius: 10px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s, transform .25s;
  z-index: 90;
  max-width: 86vw;
  text-align: center;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

#letters {
  width: 100%;
  margin-top: 20px;
  background: #14141f;
  border: 1px solid #2a2a3d;
  border-radius: 14px;
  padding: 12px 14px 14px;
}
#letters h3 {
  font-size: 13px;
  color: #8888a0;
  font-weight: 500;
  margin-bottom: 8px;
  text-align: center;
}
.letter-group { display: flex; align-items: flex-start; gap: 8px; margin-top: 8px; }
.letter-group .tag {
  flex-shrink: 0;
  font-size: 12px;
  padding: 3px 8px;
  border-radius: 6px;
  margin-top: 2px;
}
.tag.g { background: rgba(76,175,109,.18); color: #6fd693; }
.tag.y { background: rgba(217,169,47,.18); color: #ecc35a; }
.tag.x { background: rgba(90,90,115,.25); color: #8888a0; }
.letter-group .chars { display: flex; flex-wrap: wrap; gap: 6px; }
.char-chip {
  width: 30px; height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 7px;
  font-size: 16px;
  font-weight: 600;
}
.char-chip.correct { background: #4caf6d; color: #fff; }
.char-chip.present { background: #d9a92f; color: #fff; }
.char-chip.absent { background: #3a3a4d; color: #8888a0; }
.letter-group .none { color: #55556e; font-size: 13px; margin-top: 6px; }

/* 弹窗 */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(5, 5, 10, .72);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
  padding: 16px;
}
#overlay.show { opacity: 1; pointer-events: auto; }
.modal {
  background: #14141f;
  border: 1px solid #2a2a3d;
  border-radius: 18px;
  padding: 24px 22px;
  width: 100%;
  max-width: 360px;
  max-height: 86vh;
  overflow-y: auto;
  text-align: center;
  transform: translateY(14px) scale(.97);
  transition: transform .25s;
}
#overlay.show .modal { transform: translateY(0) scale(1); }
.modal h2 { font-size: 21px; margin-bottom: 6px; }
.modal h2.win { color: #6fd693; }
.modal h2.lose { color: #ff7a7a; }
.modal .answer-box {
  background: #0a0a12;
  border: 1px solid #2a2a3d;
  border-radius: 12px;
  padding: 14px;
  margin: 14px 0;
}
.modal .answer-word {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 10px;
  margin-left: 10px;
  color: #ffcc00;
}
.modal .answer-def {
  font-size: 13px;
  color: #8888a0;
  margin-top: 8px;
  line-height: 1.6;
  text-align: left;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin: 14px 0;
}
.stat-cell { background: #0a0a12; border-radius: 10px; padding: 10px 4px; }
.stat-cell b { display: block; font-size: 22px; color: #ffcc00; }
.stat-cell span { font-size: 11px; color: #8888a0; }
.modal .btns { display: flex; gap: 10px; margin-top: 14px; }
.modal .btns button {
  flex: 1;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  padding: 11px 0;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: filter .15s, transform .12s;
}
.modal .btns button:active { transform: scale(.96); }
.btn-share { background: linear-gradient(135deg, #4caf6d, #35935a); color: #fff; }
.btn-again { background: linear-gradient(135deg, #ffcc00, #ffb300); color: #1a1400; }
.btn-plain { background: #2a2a3d; color: #e8e8f0; }
.modal .btns button:hover { filter: brightness(1.12); }
.countdown { font-size: 13px; color: #8888a0; margin-top: 12px; }
.countdown b { color: #e8e8f0; font-variant-numeric: tabular-nums; }
.modal .close-x {
  position: sticky;
  float: right;
  top: 0;
  background: none;
  border: none;
  color: #55556e;
  font-size: 20px;
  cursor: pointer;
  line-height: 1;
  padding: 2px 6px;
}
.modal .close-x:hover { color: #e8e8f0; }
.help-list { text-align: left; font-size: 14px; line-height: 1.9; color: #b8b8c8; margin-top: 10px; }
.help-list .demo {
  display: inline-block;
  width: 26px; height: 26px;
  line-height: 26px;
  text-align: center;
  border-radius: 6px;
  color: #fff;
  font-weight: 600;
  margin-right: 4px;
  vertical-align: -6px;
}

#confettiCanvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 80;
}
.daily-done-tip {
  margin-top: 10px;
  font-size: 13px;
  color: #8888a0;
}
.daily-done-tip button {
  background: none;
  border: none;
  color: #ffcc00;
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  text-decoration: underline;
}
@media (max-height: 740px) {
  header { margin-top: 34px; }
  h1 { font-size: 23px; }
  #board { gap: 6px; margin: 10px 0 10px; }
  .row { gap: 6px; }
  .tile { width: min(15.5vw, 56px); height: min(15.5vw, 56px); }
  .face { font-size: min(7.5vw, 27px); }
}
</style>
</head>
<body>
<a class="back" href="../">← AI4399</a>
<canvas id="confettiCanvas"></canvas>

<header>
  <h1>成语方阵</h1>
  <p class="subtitle">六次机会，猜出隐藏的四字成语</p>
  <div class="tabs">
    <button id="tabDaily" class="active">每日一题</button>
    <button id="tabEndless">无限模式</button>
    <button id="statsBtn" title="统计">📊</button>
    <button id="helpBtn" title="玩法说明">❓</button>
  </div>
  <div class="legend">
    <span><i class="g"></i>位置正确</span>
    <span><i class="y"></i>位置不对</span>
    <span><i class="x"></i>不在成语中</span>
  </div>
</header>

<main>
  <div id="board"></div>
  <div class="input-row">
    <input id="guessInput" type="text" autocomplete="off" placeholder="输入四字成语" aria-label="输入四字成语">
    <button id="submitBtn">提交</button>
  </div>
  <div class="daily-done-tip" id="dailyDoneTip" hidden>
    今日挑战已完成，<button id="viewResultBtn">查看战绩</button> 或切换到无限模式继续玩
  </div>
  <section id="letters">
    <h3>已猜过的字</h3>
    <div class="letter-group"><span class="tag g">正确</span><div class="chars" id="charsCorrect"><span class="none">—</span></div></div>
    <div class="letter-group"><span class="tag y">存在</span><div class="chars" id="charsPresent"><span class="none">—</span></div></div>
    <div class="letter-group"><span class="tag x">排除</span><div class="chars" id="charsAbsent"><span class="none">—</span></div></div>
  </section>
</main>

<div id="toast"></div>
<div id="overlay"><div class="modal" id="modalBox"></div></div>

<script>
"use strict";
/* ============ 题库：[成语, 释义] ============ */
const IDIOMS = [
["画蛇添足","比喻做了多余的事，反而弄巧成拙。"],
["守株待兔","比喻死守狭隘经验，妄想不劳而获。"],
["亡羊补牢","比喻出了问题以后及时设法补救，还不算晚。"],
["井底之蛙","比喻见识狭窄、眼界短浅的人。"],
["对牛弹琴","比喻对不懂道理的人讲道理，白费口舌。"],
["狐假虎威","比喻倚仗别人的势力来欺压、吓唬人。"],
["画龙点睛","比喻在关键处用上精辟的语句，使内容更加生动传神。"],
["刻舟求剑","比喻拘泥成法、固执不知变通。"],
["掩耳盗铃","比喻自己欺骗自己。"],
["自相矛盾","比喻自己的言行前后互相抵触。"],
["滥竽充数","比喻没有真才实学的人混在行家里面充数。"],
["买椟还珠","比喻没有眼光，取舍不当。"],
["杞人忧天","比喻不必要的或缺乏根据的忧虑。"],
["愚公移山","比喻做事有顽强的毅力，不怕困难。"],
["精卫填海","比喻意志坚决，不畏艰难。"],
["叶公好龙","比喻表面上爱好某事物，实际上并非真正爱好。"],
["塞翁失马","比喻坏事在一定条件下可以变为好事。"],
["惊弓之鸟","比喻受过惊吓、遇到一点动静就特别害怕的人。"],
["胸有成竹","比喻做事之前心里已有完整的打算和把握。"],
["百发百中","形容射箭或射击非常准；也比喻做事有充分把握。"],
["四面楚歌","形容四面受敌、孤立无援的困境。"],
["背水一战","比喻处于绝境之中，为求出路而决一死战。"],
["破釜沉舟","比喻下定决心，不顾一切地干到底。"],
["卧薪尝胆","形容人刻苦自励，发愤图强。"],
["纸上谈兵","比喻空谈理论，不能解决实际问题。"],
["负荆请罪","表示主动向人认错赔罪。"],
["完璧归赵","比喻把原物完好无损地归还本人。"],
["毛遂自荐","比喻自告奋勇，自己推荐自己担任工作。"],
["指鹿为马","比喻故意颠倒黑白，混淆是非。"],
["三顾茅庐","比喻真心诚意、一再邀请有才能的人。"],
["望梅止渴","比喻愿望无法实现，只能用空想来安慰自己。"],
["乐不思蜀","比喻在新环境中玩乐而忘了返回，乐而忘本。"],
["一鸣惊人","比喻平时没有突出表现，一下子做出惊人的成绩。"],
["东山再起","比喻失势之后重新恢复地位。"],
["东施效颦","比喻盲目模仿别人，结果适得其反。"],
["邯郸学步","比喻模仿别人不到家，反而把自己原有的本领也丢了。"],
["南辕北辙","比喻行动和目的正好相反。"],
["缘木求鱼","比喻方向或办法不对，不可能达到目的。"],
["盲人摸象","比喻对事物只凭片面了解就乱加猜测，以偏概全。"],
["九牛一毛","比喻极大数量中微不足道的一点。"],
["沧海一粟","比喻非常渺小，微不足道。"],
["千载难逢","形容机会极其难得。"],
["机不可失","好的时机不可放过，失掉了不会再来。"],
["画饼充饥","比喻用空想来安慰自己，无补于实际。"],
["雪上加霜","比喻接连遭受灾难，损害愈加严重。"],
["火上浇油","比喻使人更加愤怒，或使事态更加严重。"],
["过河拆桥","比喻达到目的之后，就把曾经帮助过自己的人一脚踢开。"],
["顺水推舟","比喻顺应趋势说话办事。"],
["雪中送炭","比喻在别人急需的时候给予帮助。"],
["锦上添花","比喻使美好的事物更加美好。"],
["落井下石","比喻乘人危难之时加以陷害。"],
["趁火打劫","比喻趁人危难之际捞取好处。"],
["声东击西","用假象迷惑对方，使其产生错觉，而攻击其不备之处。"],
["调虎离山","比喻设法使对方离开原来的有利位置，以便乘机行事。"],
["抛砖引玉","谦辞，比喻用自己粗浅的意见引出别人的高见。"],
["金蝉脱壳","比喻用计脱身溜走，使对方不能及时发觉。"],
["瞒天过海","比喻用伪装的手段作掩护，暗中行动。"],
["笑里藏刀","比喻外表和气而内心阴险狠毒。"],
["口蜜腹剑","形容人嘴甜心毒，阴险狡诈。"],
["口是心非","嘴里说的与心里想的不一致。"],
["言不由衷","说的话不是发自内心，心口不一。"],
["表里如一","形容言行和思想完全一致。"],
["名副其实","名声或名称与实际相符合。"],
["实事求是","按照事物的实际情况，客观地处理问题。"],
["脚踏实地","形容做事踏实认真，不浮夸。"],
["好高骛远","不切实际地追求过高过远的目标。"],
["急功近利","急于求成，贪图眼前的成效和利益。"],
["拔苗助长","比喻违反事物的发展规律，急于求成，反而坏事。"],
["循序渐进","按照一定的步骤、顺序逐渐深入或提高。"],
["按部就班","按照一定的条理和程序办事。"],
["墨守成规","形容因循守旧，不肯改进。"],
["千变万化","形容变化极多。"],
["瞬息万变","形容在极短的时间内变化快而多。"],
["日新月异","形容发展变化快，不断出现新事物、新气象。"],
["推陈出新","去掉旧事物的糟粕，吸取精华，创造出新的来。"],
["标新立异","提出新奇的主张，表示与众不同。"],
["独树一帜","比喻自成一家，独具风格。"],
["别具一格","另有一种独特的风格。"],
["独一无二","没有相同的，没有可以相比的。"],
["举世无双","全世界找不到第二个，形容极其罕见。"],
["空前绝后","从前没有过，今后也不会再有，形容独一无二。"],
["史无前例","历史上从来没有过的事例。"],
["司空见惯","形容经常看到，不足为奇。"],
["屡见不鲜","经常见到，并不新奇。"],
["习以为常","经常做某件事，成了习惯。"],
["不足为奇","不值得奇怪，指事物或现象很平常。"],
["大惊小怪","形容对不足为奇的事情过分惊讶。"],
["大同小异","大体相同，略有差异。"],
["千篇一律","形容文章、事物公式化，毫无变化。"],

/* ============ 工具 ============ */
const $ = (id) => document.getElementById(id);
const STORE_PREFIX = "ai4399-idiom-";
const ROWS = 6, COLS = 4;

function store(key, val) {
  try {
    if (val === undefined) {
      const raw = localStorage.getItem(STORE_PREFIX + key);
      return raw ? JSON.parse(raw) : null;
    }
    localStorage.setItem(STORE_PREFIX + key, JSON.stringify(val));
  } catch (e) { return null; }
}

function todayStr() {
  const d = new Date();
  const p = (n) => String(n).padStart(2, "0");
  return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate());
}

function hashStr(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

function dailyIndex(dateStr) {
  return hashStr("idiom-" + dateStr) % IDIOMS.length;
}

/* ============ 音效（WebAudio 合成） ============ */
let audioCtx = null;
function playTone(freq, dur, type, vol, when) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    const t = audioCtx.currentTime + (when || 0);
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || "sine";
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(vol || 0.12, t + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + dur + 0.05);
  } catch (e) { /* 音效失败静默忽略 */ }
}
const sfx = {
  flip: () => playTone(660, 0.08, "triangle", 0.06),
  good: () => playTone(880, 0.12, "triangle", 0.08),
  win: () => { [523, 659, 784, 1047].forEach((f, i) => playTone(f, 0.22, "triangle", 0.1, i * 0.12)); },
  lose: () => { playTone(220, 0.3, "sawtooth", 0.05); playTone(165, 0.4, "sawtooth", 0.05, 0.18); }
};

/* ============ 游戏状态 ============ */
const state = {
  mode: "daily",            // daily | endless
  answer: "",
  def: "",
  guesses: [],              // ["成语字符", ...]
  results: [],              // [["correct",...], ...]
  finished: false,
  win: false,
  revealing: false,
  charMap: {}               // 字 -> correct|present|absent
};
let endlessCache = null;    // 切换模式时保留无限模式进度
let countdownTimer = null;

/* ============ 评分（Wordle 标准重复字规则） ============ */
function scoreGuess(guess, answer) {
  const res = new Array(COLS).fill("absent");
  const remain = {};
  for (let i = 0; i < COLS; i++) {
    if (guess[i] === answer[i]) res[i] = "correct";
    else remain[answer[i]] = (remain[answer[i]] || 0) + 1;
  }
  for (let i = 0; i < COLS; i++) {
    if (res[i] !== "correct" && remain[guess[i]] > 0) {
      res[i] = "present";
      remain[guess[i]]--;
    }
  }
  return res;
}

/* ============ 棋盘渲染 ============ */
function buildBoard() {
  const board = $("board");
  board.innerHTML = "";
  for (let r = 0; r < ROWS; r++) {
    const row = document.createElement("div");
    row.className = "row";
    row.dataset.row = r;
    for (let c = 0; c < COLS; c++) {
      const tile = document.createElement("div");
      tile.className = "tile";
      tile.innerHTML = '<div class="tile-inner"><div class="face front"></div><div class="face back"></div></div>';
      row.appendChild(tile);
    }
    board.appendChild(row);
  }
}

function tileAt(r, c) {
  return $("board").children[r].children[c];
}

function paintRowInstant(r, guess, result) {
  for (let c = 0; c < COLS; c++) {
    const tile = tileAt(r, c);
    tile.querySelector(".front").textContent = guess[c];
    const back = tile.querySelector(".back");
    back.textContent = guess[c];
    back.classList.add(result[c]);
    tile.querySelector(".tile-inner").style.transition = "none";
    tile.classList.add("flip");
  }
}

function revealRow(r, guess, result, onDone) {
  state.revealing = true;
  for (let c = 0; c < COLS; c++) {
    const tile = tileAt(r, c);
    const back = tile.querySelector(".back");
    back.textContent = guess[c];
    back.classList.add(result[c]);
    setTimeout(() => {
      tile.classList.add("flip");
      sfx.flip();
    }, c * 320);
  }
  setTimeout(() => {
    state.revealing = false;
    onDone();
  }, (COLS - 1) * 320 + 560);
}

function mirrorInput() {
  if (state.finished) return;
  const r = state.guesses.length;
  if (r >= ROWS) return;
  const chars = Array.from($("guessInput").value.replace(/\s/g, "")).slice(0, COLS);
  for (let c = 0; c < COLS; c++) {
    const tile = tileAt(r, c);
    const front = tile.querySelector(".front");
    const ch = chars[c] || "";
    if (front.textContent !== ch) {
      front.textContent = ch;
      tile.classList.toggle("typed", !!ch);
      if (ch) {
        tile.classList.remove("typed");
        void tile.offsetWidth;
        tile.classList.add("typed");
      }
    }
  }
}

/* ============ 已猜字汇总 ============ */
const RANK = { absent: 0, present: 1, correct: 2 };
function updateCharMap(guess, result) {
  for (let i = 0; i < COLS; i++) {
    const ch = guess[i], st = result[i];
    if (!(ch in state.charMap) || RANK[st] > RANK[state.charMap[ch]]) {
      state.charMap[ch] = st;
    }
  }
}
function renderLetters() {
  const groups = { correct: [], present: [], absent: [] };
  Object.keys(state.charMap).forEach((ch) => groups[state.charMap[ch]].push(ch));
  const fill = (id, list, cls) => {
    const el = $(id);
    el.innerHTML = list.length
      ? list.map((ch) => '<span class="char-chip ' + cls + '">' + ch + "</span>").join("")
      : '<span class="none">—</span>';
  };
  fill("charsCorrect", groups.correct, "correct");
  fill("charsPresent", groups.present, "present");
  fill("charsAbsent", groups.absent, "absent");
}

/* ============ 提示与统计 ============ */
let toastTimer = null;
function toast(msg, ms) {
  const el = $("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), ms || 1800);
}

function getStats() {
  return store("stats") || { played: 0, won: 0, streak: 0, maxStreak: 0 };
}
function recordResult(win) {
  const s = getStats();
  s.played++;
  if (win) {
    s.won++;
    s.streak++;
    s.maxStreak = Math.max(s.maxStreak, s.streak);
  } else {
    s.streak = 0;
  }
  store("stats", s);
}

/* ============ 撒花 ============ */
function confetti() {
  const canvas = $("confettiCanvas");
  const ctx = canvas.getContext("2d");
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  const colors = ["#ffcc00", "#4caf6d", "#d9a92f", "#ff7a7a", "#7ab8ff", "#e8e8f0"];
  const parts = [];
  for (let i = 0; i < 130; i++) {
    parts.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * canvas.height * 0.4,
      w: 6 + Math.random() * 6,
      h: 8 + Math.random() * 8,
      vy: 2.2 + Math.random() * 3,
      vx: -1.5 + Math.random() * 3,
      rot: Math.random() * Math.PI,
      vr: -0.12 + Math.random() * 0.24,
      color: colors[i % colors.length]
    });
  }
  const t0 = performance.now();
  function frame(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of parts) {
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vr;
      if (p.y < canvas.height + 30) alive = true;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    }
    if (alive && t - t0 < 4200) requestAnimationFrame(frame);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  requestAnimationFrame(frame);
}

function doShare() {
  const text = shareText();
  const done = () => toast("战绩已复制到剪贴板 📋");
  const fail = () => toast("复制失败，请手动截图分享");
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text) ? done() : fail());
  } else {
    fallbackCopy(text) ? done() : fail();
  }
}
function fallbackCopy(text) {
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  } catch (e) { return false; }
}

function startCountdown() {
  const tick = () => {
    const el = $("cdText");
    if (!el) return;
    const now = new Date();
    const next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
    let ms = next - now;
    const h = Math.floor(ms / 3600000); ms %= 3600000;
    const m = Math.floor(ms / 60000); ms %= 60000;
    const s = Math.floor(ms / 1000);
    const p = (n) => String(n).padStart(2, "0");
    el.textContent = p(h) + ":" + p(m) + ":" + p(s);
  };
  tick();
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(tick, 1000);
}

/* ============ 游戏流程 ============ */
function resetUIState() {
  state.guesses = [];
  state.results = [];
  state.finished = false;
  state.win = false;
  state.charMap = {};
  buildBoard();
  renderLetters();
  $("guessInput").value = "";
  setInputEnabled(true);
  $("dailyDoneTip").hidden = true;
}

function setInputEnabled(on) {
  $("guessInput").disabled = !on;
  $("submitBtn").disabled = !on;
}

function saveDaily() {
  if (state.mode !== "daily") return;
  store("daily", {
    date: todayStr(),
    guesses: state.guesses,
    finished: state.finished,
    win: state.win
  });
}

function loadDaily() {
  resetUIState();
  const idx = dailyIndex(todayStr());
  state.answer = IDIOMS[idx][0];
  state.def = IDIOMS[idx][1];
  const saved = store("daily");
  if (saved && saved.date === todayStr() && Array.isArray(saved.guesses)) {
    saved.guesses.forEach((g, r) => {
      if (typeof g !== "string" || Array.from(g).length !== COLS) return;
      const res = scoreGuess(Array.from(g), Array.from(state.answer));
      state.guesses.push(g);
      state.results.push(res);
      paintRowInstant(r, Array.from(g), res);
      updateCharMap(Array.from(g), res);
    });
    renderLetters();
    state.finished = !!saved.finished;
    state.win = !!saved.win;
    if (state.finished) {
      setInputEnabled(false);
      $("dailyDoneTip").hidden = false;
      showResultModal();
    }
  }
}

function newEndless() {
  resetUIState();
  const idx = Math.floor(Math.random() * IDIOMS.length);
  state.answer = IDIOMS[idx][0];
  state.def = IDIOMS[idx][1];
  endlessCache = null;
  $("guessInput").focus();
}

function switchMode(mode) {
  if (state.revealing) return;
  if (state.mode === mode) return;
  // 缓存无限模式进度
  if (state.mode === "endless") {
    endlessCache = {
      answer: state.answer, def: state.def,
      guesses: state.guesses.slice(), results: state.results.map((r) => r.slice()),
      finished: state.finished, win: state.win, charMap: Object.assign({}, state.charMap)
    };
  }
  state.mode = mode;
  $("tabDaily").classList.toggle("active", mode === "daily");
  $("tabEndless").classList.toggle("active", mode === "endless");
  closeModal();
  if (mode === "daily") {
    loadDaily();
  } else if (endlessCache) {
    resetUIState();
    state.answer = endlessCache.answer;
    state.def = endlessCache.def;
    endlessCache.guesses.forEach((g, r) => {
      state.guesses.push(g);
      state.results.push(endlessCache.results[r]);
      paintRowInstant(r, Array.from(g), endlessCache.results[r]);
    });
    state.charMap = endlessCache.charMap;
    state.finished = endlessCache.finished;
    state.win = endlessCache.win;
    renderLetters();
    if (state.finished) setInputEnabled(false);
  } else {
    newEndless();
  }
}

function submitGuess() {
  if (state.finished || state.revealing) return;
  const raw = $("guessInput").value.replace(/\s/g, "");
  const chars = Array.from(raw);
  if (chars.length !== COLS || !/^[一-鿿]{4}$/.test(raw)) {
    toast("请输入恰好四个汉字");
    const row = $("board").children[state.guesses.length];
    if (row) {
      row.classList.remove("shake");
      void row.offsetWidth;
      row.classList.add("shake");
    }
    return;
  }
  const r = state.guesses.length;
  const answerChars = Array.from(state.answer);
  const result = scoreGuess(chars, answerChars);
  state.guesses.push(raw);
  state.results.push(result);
  $("guessInput").value = "";
  $("guessInput").focus();

  revealRow(r, chars, result, () => {
    updateCharMap(chars, result);
    renderLetters();
    const win = result.every((s) => s === "correct");
    if (win || state.guesses.length >= ROWS) {
      state.finished = true;
      state.win = win;
      recordResult(win);
      saveDaily();
      setInputEnabled(false);
      $("guessInput").value = "";
      // 清理结束后下一行可能残留的预览字
      if (state.guesses.length < ROWS) {
        for (let c = 0; c < COLS; c++) {
          const t = tileAt(state.guesses.length, c);
          t.querySelector(".front").textContent = "";
          t.classList.remove("typed");
        }
      }
      if (win) {
        sfx.win();
        for (let c = 0; c < COLS; c++) {
          const tile = tileAt(r, c);
          setTimeout(() => tile.classList.add("dance"), c * 110);
        }
        confetti();
        setTimeout(showResultModal, 1100);
      } else {
        sfx.lose();
        setTimeout(showResultModal, 500);
      }
      if (state.mode === "daily") $("dailyDoneTip").hidden = false;
    } else {
      saveDaily();
      if (result.some((s) => s === "correct" || s === "present")) sfx.good();
    }
  });
}

/* ============ 事件绑定 ============ */
$("submitBtn").addEventListener("click", submitGuess);
$("guessInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.isComposing) submitGuess();
});
$("guessInput").addEventListener("input", mirrorInput);
$("tabDaily").addEventListener("click", () => switchMode("daily"));
$("tabEndless").addEventListener("click", () => switchMode("endless"));
$("statsBtn").addEventListener("click", showStatsModal);
$("helpBtn").addEventListener("click", showHelpModal);
$("viewResultBtn").addEventListener("click", showResultModal);
window.addEventListener("resize", () => {
  const c = $("confettiCanvas");
  c.width = innerWidth;
  c.height = innerHeight;
});
// 弹窗按钮通过 inline onclick 调用，挂到全局
window.closeModal = closeModal;
window.doShare = doShare;
window.newEndless = newEndless;

/* ============ 启动 ============ */
(function init() {
  buildBoard();
  loadDaily();
  if (!store("seen-help")) {
    showHelpModal();
    store("seen-help", 1);
  }
})();
</script>
</body>
