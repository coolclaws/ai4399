<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI4399 · AI 小游戏厅</title>
<meta name="description" content="一个由 AI 编写的小游戏合集，打开就能玩。">
<style>
  :root {
    --bg: #07070d;
    --panel: rgba(255,255,255,.025);
    --panel-border: rgba(255,255,255,.07);
    --text: #ecedf4;
    --dim: #9094ab;
    --faint: #5a5e75;
    --accent: #ffd34d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---- 背景氛围层 ---- */
  .fx { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
  .fx::before {
    content: "";
    position: absolute; inset: -20%;
    background:
      radial-gradient(42% 38% at 18% 8%,  rgba(124, 77, 255, .16), transparent 70%),
      radial-gradient(36% 32% at 85% 12%, rgba(255, 122, 61, .12), transparent 70%),
      radial-gradient(50% 44% at 50% 105%, rgba(38, 198, 218, .08), transparent 70%);
    animation: drift 26s ease-in-out infinite alternate;
  }
  @keyframes drift {
    from { transform: translate3d(-2%, -1%, 0) scale(1); }
    to   { transform: translate3d(2%, 2%, 0) scale(1.06); }
  }
  .fx::after {
    content: "";
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: radial-gradient(70% 60% at 50% 30%, #000 0%, transparent 100%);
  }

  .wrap { max-width: 1120px; margin: 0 auto; padding: 0 28px 96px; }

  /* ---- 头部 ---- */
  header { text-align: center; padding: 84px 0 12px; }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; letter-spacing: 3px; color: var(--dim);
    border: 1px solid var(--panel-border);
    background: var(--panel);
    padding: 7px 16px; border-radius: 99px;
    backdrop-filter: blur(6px);
  }
  .badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #5cf2a6;
    box-shadow: 0 0 8px #5cf2a6;
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: .35; } }

  h1 {
    margin-top: 26px;
    font-size: clamp(56px, 9vw, 92px);
    font-weight: 900;
    letter-spacing: 2px;
    line-height: 1.05;
    background: linear-gradient(110deg, #fff 10%, #ffd34d 38%, #ff7a3d 58%, #c44bff 85%);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shimmer 7s ease-in-out infinite alternate;
  }
  @keyframes shimmer { from { background-position: 0% 0; } to { background-position: 100% 0; } }

  .tagline { margin-top: 18px; color: var(--dim); font-size: 17px; letter-spacing: 1.5px; }
  .tagline b { color: var(--text); font-weight: 600; }

  .stats {
    margin-top: 36px;
    display: inline-flex; flex-wrap: wrap; justify-content: center;
    border: 1px solid var(--panel-border);
    background: var(--panel);
    border-radius: 16px;
    backdrop-filter: blur(6px);
  }
  .stat { padding: 15px 30px; text-align: center; }
  .stat + .stat { border-left: 1px solid var(--panel-border); }
  .stat .num { font-size: 21px; font-weight: 800; color: var(--text); letter-spacing: .5px; }
  .stat .lbl { margin-top: 4px; font-size: 11.5px; color: var(--faint); letter-spacing: 2px; }

  /* ---- 筛选 ---- */
  .filters {
    margin: 54px 0 28px;
    display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
  }
  .chip {
    font-size: 13px; color: var(--dim);
    border: 1px solid var(--panel-border);
    background: var(--panel);
    padding: 7px 18px; border-radius: 99px;
    cursor: pointer; user-select: none;
    transition: all .18s ease;
  }
  .chip:hover { color: var(--text); border-color: rgba(255,255,255,.2); }
  .chip.on {
    color: #14110a; background: var(--accent); border-color: var(--accent);
    font-weight: 700;
    box-shadow: 0 4px 18px rgba(255, 211, 77, .25);
  }

  /* ---- 卡片 ---- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 22px;
  }
  .card {
    --glow: #ffd34d;
    position: relative;
    display: flex; flex-direction: column;
    text-decoration: none; color: inherit;
    background: linear-gradient(180deg, #101019, rgba(255,255,255,.015));
    border: 1px solid var(--panel-border);
    border-radius: 20px;
    overflow: hidden;
    transition: transform .22s ease, border-color .22s ease, box-shadow .22s ease;
    opacity: 0;
    animation: rise .55s cubic-bezier(.2,.7,.3,1) forwards;
    animation-delay: calc(var(--i) * 70ms);
  }
  @keyframes rise { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: none; } }
  .card:hover {
    transform: translateY(-6px);
    border-color: color-mix(in srgb, var(--glow) 55%, transparent);
    box-shadow:
      0 18px 44px -16px color-mix(in srgb, var(--glow) 38%, transparent),
      0 2px 0 rgba(255,255,255,.06) inset;
  }
  .card.hide { display: none; }

  .cover {
    position: relative;
    aspect-ratio: 16 / 10;
    overflow: hidden;
    background: #0c0c15;
  }
  .cover .art {
    position: absolute; inset: 0;
    width: 100%; height: 100%; display: block;
    transform: scale(1.05);
    transform-origin: 50% 40%;
    transition: transform .65s cubic-bezier(.2,.7,.3,1), filter .65s ease;
  }
  .card:hover .cover .art { transform: scale(1.12) translateY(-3px); filter: saturate(1.18) brightness(1.05); }
  .cover::after {
    content: "";
    position: absolute; left: 0; right: 0; bottom: -1px; height: 46%;
    background: linear-gradient(180deg, transparent, rgba(16,16,25,.55) 58%, #101019);
    pointer-events: none;
  }
  .cover .num {
    position: absolute; top: 13px; left: 16px;
    font-size: 11.5px; font-weight: 700; letter-spacing: 2.5px;
    color: rgba(255,255,255,.55);
    text-shadow: 0 1px 10px rgba(0,0,0,.8);
    padding: 3px 9px; border-radius: 99px;
    background: rgba(8,8,14,.42);
    border: 1px solid rgba(255,255,255,.1);
    backdrop-filter: blur(3px);
    z-index: 2;
  }
  .cover .shine {
    position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(105deg, transparent 38%, rgba(255,255,255,.13) 50%, transparent 62%);
    transform: translateX(-130%);
    pointer-events: none;
  }
  .card:hover .cover .shine { transition: transform .75s ease; transform: translateX(130%); }

  .card-body { display: flex; flex-direction: column; flex: 1; padding: 18px 22px 20px; }
  .title-row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .card h2 { font-size: 21px; font-weight: 800; letter-spacing: .5px; }
  .card .en { color: var(--faint); font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; }
  .card p { color: var(--dim); font-size: 13.5px; margin-top: 9px; line-height: 1.75; flex: 1; }
  .meta {
    margin-top: 15px; padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,.06);
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .tags { display: flex; gap: 7px; flex-wrap: wrap; }
  .tag {
    font-size: 11px; padding: 3.5px 11px; border-radius: 99px;
    border: 1px solid var(--panel-border); color: var(--faint);
    background: rgba(255,255,255,.025);
    letter-spacing: .5px;
  }
  .play {
    flex-shrink: 0;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 700; letter-spacing: .5px;
    color: var(--glow);
  }
  .play svg { transition: transform .2s ease; }
  .card:hover .play svg { transform: translateX(4px); }

  /* ---- 占位卡 ---- */
  .soon {
    border: 1px dashed rgba(255,255,255,.14);
    border-radius: 20px;
    min-height: 380px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    color: var(--faint); font-size: 14px; letter-spacing: 1px;
    opacity: 0; animation: rise .55s cubic-bezier(.2,.7,.3,1) forwards;
    animation-delay: calc(var(--i) * 70ms);
  }
  .soon .spark { font-size: 34px; animation: pulse 2.4s ease-in-out infinite; }

  footer { text-align: center; margin-top: 84px; color: var(--faint); font-size: 13px; line-height: 2.1; }
  footer a { color: var(--dim); text-decoration: none; border-bottom: 1px solid rgba(255,255,255,.15); }
  footer a:hover { color: var(--text); }

  @media (max-width: 640px) {
    header { padding-top: 56px; }
    .stat { padding: 11px 18px; }
    .wrap { padding: 0 18px 72px; }
    .grid { grid-template-columns: 1fr; }
  }
  @media (prefers-reduced-motion: reduce) {
    .fx::before, h1, .badge .dot, .soon .spark { animation: none; }
    .card, .soon { animation-duration: .01s; }
    .cover .art, .card:hover .cover .art { transform: none; transition: none; }
  }
</style>
</head>

</div>

const grid = document.getElementById("games");
const esc = s => s.replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// 统一封面外壳：每张封面共享同一套底色 / 主色氛围光 / 底部渐晕语法
function coverSVG(g) {
  const p = "cv-" + g.dir, c = g.glow;
  return `<svg class="art" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><defs>` +
    `<radialGradient id="${p}-halo"><stop offset="0" stop-color="${c}" stop-opacity=".5"/><stop offset="1" stop-color="${c}" stop-opacity="0"/></radialGradient>` +
    `<radialGradient id="${p}-amb" cx="50%" cy="28%" r="85%"><stop offset="0" stop-color="${c}" stop-opacity=".2"/><stop offset=".6" stop-color="${c}" stop-opacity=".05"/><stop offset="1" stop-color="${c}" stop-opacity="0"/></radialGradient>` +
    `<linearGradient id="${p}-vig" x1="0" y1="0" x2="0" y2="1"><stop offset=".48" stop-color="#0e0e17" stop-opacity="0"/><stop offset=".8" stop-color="#0e0e17" stop-opacity=".5"/><stop offset="1" stop-color="#101019" stop-opacity=".95"/></linearGradient>` +
    `</defs><rect width="320" height="200" fill="#0c0c15"/>` +
    g.cover +
    `<rect width="320" height="200" fill="url(#${p}-amb)" style="mix-blend-mode:screen"/>` +
    `<rect width="320" height="200" fill="url(#${p}-vig)"/></svg>`;
}

function render(filter) {
  grid.innerHTML = GAMES.map((g, i) => `
    <a class="card" style="--glow:${g.glow};--i:${i}" href="./${g.dir}/"
       data-tags="${esc(g.tags.join(","))}">
      <div class="cover">
        ${coverSVG(g)}
        <span class="num">NO.${String(i + 1).padStart(2, "0")}</span>
        <div class="shine"></div>
      </div>
      <div class="card-body">
        <div class="title-row"><h2>${esc(g.title)}</h2><span class="en">${esc(g.en)}</span></div>
        <p>${esc(g.desc)}</p>
        <div class="meta">
          <div class="tags">${g.tags.map(t => `<span class="tag">${esc(t)}</span>`).join("")}</div>
          <span class="play">进入游戏
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </span>
        </div>
      </div>
    </a>
  `).join("") + `
    <div class="soon" style="--i:${GAMES.length}">
      <span class="spark">✨</span>
      <span>更多游戏制作中</span>
    </div>`;

  if (filter && filter !== "全部") {
    grid.querySelectorAll(".card").forEach(c => {
      c.classList.toggle("hide", !c.dataset.tags.split(",").includes(filter));
    });
  }
}

// 统计条
const allTags = [...new Set(GAMES.flatMap(g => g.tags))];
document.getElementById("stats").innerHTML = [
  [GAMES.length, "款游戏"],
  ["100%", "AI 编写"],
  ["0", "广告"],
  ["∞", "免费畅玩"]
].map(([n, l]) => `<div class="stat"><div class="num">${n}</div><div class="lbl">${l}</div></div>`).join("");

// 筛选 chips
const filters = document.getElementById("filters");
filters.innerHTML = ["全部", ...allTags].map((t, i) =>
  `<span class="chip${i === 0 ? " on" : ""}" data-t="${esc(t)}">${esc(t)}</span>`).join("");
filters.addEventListener("click", e => {
  const chip = e.target.closest(".chip");
  if (!chip) return;
  filters.querySelectorAll(".chip").forEach(c => c.classList.toggle("on", c === chip));
  render(chip.dataset.t);
});

render();
</script>
