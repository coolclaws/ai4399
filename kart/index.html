<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>疾风卡丁 GP</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #000; height: 100%;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    user-select: none; -webkit-user-select: none; }
  #c { display: block; width: 100vw; height: 100vh; }
  #hud { position: fixed; inset: 0; pointer-events: none; }
  #divider { position: absolute; left: 0; right: 0; top: 50%; height: 3px; margin-top: -1.5px;
    background: linear-gradient(90deg, #000, #fff3, #000); }
  .panel { position: absolute; left: 0; right: 0; height: 50%; }
  #hud1 { top: 0; } #hud2 { top: 50%; }
  .tag { position: absolute; top: 10px; left: 14px; display: flex; gap: 10px; align-items: center; }
  .pname { font-weight: 800; font-size: 15px; padding: 2px 10px; border-radius: 12px; color: #fff;
    text-shadow: 0 1px 2px #0008; }
  #hud1 .pname { background: #d92b2bcc; } #hud2 .pname { background: #1fa33bcc; }
  .lap, .rank { color: #fff; font-weight: 700; font-size: 15px; text-shadow: 0 1px 3px #000; }
  .rank b { font-size: 22px; }
  .itemslot { position: absolute; top: 8px; right: 14px; width: 52px; height: 52px; border-radius: 12px;
    background: #0006; border: 2px solid #ffffff55; display: flex; align-items: center;
    justify-content: center; font-size: 30px; }
  .spd { position: absolute; bottom: 10px; right: 14px; color: #fff; font-weight: 800; font-size: 18px;
    text-shadow: 0 1px 3px #000; font-variant-numeric: tabular-nums; opacity: .9; }
  .boostbar { position: absolute; bottom: 14px; left: 14px; width: 110px; height: 8px; border-radius: 4px;
    background: #0008; overflow: hidden; }
  .boostbar i { display: block; height: 100%; width: 0%; background: #4cd5ff; border-radius: 4px;
    transition: width .05s linear; }
  #minimap { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 150px; height: 150px; opacity: .92; }
  #center { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px; padding-bottom: 26vh; }
  #bigtext { font-size: 110px; font-weight: 900; color: #fff; text-shadow: 0 4px 0 #0007, 0 0 40px #ffd54a88;
    letter-spacing: 6px; display: none; }
  #result { display: none; background: #000a; border: 2px solid #fff4; border-radius: 18px;
    padding: 26px 44px; text-align: center; color: #fff; backdrop-filter: blur(6px); }
  #result h1 { margin: 0 0 14px; font-size: 34px; }
  #result .row { font-size: 18px; margin: 6px 0; font-variant-numeric: tabular-nums; }
  #result .hint { margin-top: 16px; font-size: 14px; opacity: .75; }
  #help { position: fixed; bottom: 6px; left: 50%; transform: translateX(-50%); color: #fffc;
    font-size: 12px; text-shadow: 0 1px 2px #000; background: #0005; padding: 3px 12px;
    border-radius: 10px; white-space: nowrap; }
  .wrong { position: absolute; top: 70px; left: 0; right: 0; text-align: center; color: #ff5252;
    font-weight: 900; font-size: 22px; text-shadow: 0 1px 3px #000; display: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="panel" id="hud1">
    <div class="tag"><span class="pname">P1 红队</span><span class="lap">圈 1/3</span><span class="rank"><b>1</b>st</span></div>
    <div class="itemslot">—</div><div class="spd">0 km/h</div>
    <div class="boostbar"><i></i></div><div class="wrong">↺ 方向反了！</div>
  </div>
  <div class="panel" id="hud2">
    <div class="tag"><span class="pname">P2 绿队</span><span class="lap">圈 1/3</span><span class="rank"><b>2</b>nd</span></div>
    <div class="itemslot">—</div><div class="spd">0 km/h</div>
    <div class="boostbar"><i></i></div><div class="wrong">↺ 方向反了！</div>
  </div>
  <div id="divider"></div>
  <canvas id="minimap" width="300" height="300"></canvas>
  <div id="center"><div id="bigtext"></div>
    <div id="result"><h1></h1><div class="row" id="r1"></div><div class="row" id="r2"></div>
      <div class="hint">按 R 重新开始</div></div>
  </div>
  <div id="help">P1：WASD 驾驶 · 左Shift 漂移 · E 道具　｜　P2：方向键 驾驶 · 右Shift 或 / 漂移 · 回车 或 . 道具　｜　R 重开</div>
</div>
<script type="importmap">{ "imports": { "three": "./three.module.js" } }</script>
<script type="module">
import * as THREE from 'three';

/* ========== 基础 ========== */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
renderer.setScissorTest(true);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8ec9ef);
scene.fog = new THREE.Fog(0x8ec9ef, 120, 520);
scene.add(new THREE.HemisphereLight(0xcfe6ff, 0x6f9b52, 1.0));
const sun = new THREE.DirectionalLight(0xfff1cf, 1.7);
sun.position.set(90, 140, 60);
scene.add(sun);

/* ========== 画布纹理工具 ========== */
function makeTex(size, draw, repX = 1, repY = 1) {
  const cv = document.createElement('canvas'); cv.width = cv.height = size;
  draw(cv.getContext('2d'), size);
  const t = new THREE.CanvasTexture(cv);
  t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(repX, repY);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
const grassTex = makeTex(256, (g, s) => {
  g.fillStyle = '#6fa84e'; g.fillRect(0, 0, s, s);
  for (let i = 0; i < 1400; i++) {
    g.fillStyle = Math.random() < .5 ? '#65a046' : '#7ab35a';
    g.fillRect(Math.random() * s, Math.random() * s, 2.2, 2.2);
  }
}, 90, 90);
const roadTex = makeTex(256, (g, s) => {
  g.fillStyle = '#54565c'; g.fillRect(0, 0, s, s);
  for (let i = 0; i < 900; i++) {
    g.fillStyle = `rgba(${100 + Math.random() * 60 | 0},${100 + Math.random() * 60 | 0},${110 + Math.random() * 60 | 0},.25)`;
    g.fillRect(Math.random() * s, Math.random() * s, 2, 2);
  }
  g.fillStyle = '#e8e8e0';                       // 中线虚线（沿 x 方向 = 赛道行进方向）
  for (let x = 0; x < s; x += 64) g.fillRect(x, s / 2 - 2, 34, 4);
}, 1, 1);
const curbTex = makeTex(64, (g, s) => {
  g.fillStyle = '#d8332a'; g.fillRect(0, 0, s, s);
  g.fillStyle = '#f2f0e8'; g.fillRect(0, 0, s / 2, s);
}, 1, 1);
const checkerTex = makeTex(128, (g, s) => {
  const n = 8, c = s / n;
  for (let i = 0; i < n; i++) for (let j = 0; j < n; j++) {
    g.fillStyle = (i + j) % 2 ? '#111' : '#eee'; g.fillRect(i * c, j * c, c, c);
  }
}, 1, 1);
const blobTex = makeTex(128, (g, s) => {
  const r = g.createRadialGradient(s/2, s/2, 4, s/2, s/2, s/2);
  r.addColorStop(0, 'rgba(0,0,0,.55)'); r.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = r; g.fillRect(0, 0, s, s);
});

/* ========== 赛道 ========== */
// 径向函数生成控制点：半径恒为正 → 保证闭环不自交
const CTRL = [];
const M = 18;
for (let k = 0; k < M; k++) {
  const a = k / M * Math.PI * 2;
  const r = 100 + 30 * Math.sin(2 * a + 1.3) + 16 * Math.sin(3 * a - 0.8) + 7 * Math.sin(5 * a + 2.0);
  CTRL.push(new THREE.Vector3(Math.cos(a) * r * 1.3, 0, Math.sin(a) * r));
}
const curve = new THREE.CatmullRomCurve3(CTRL, true, 'centripetal');
const N = 1000;                  // 采样数
const HALF = 7;                  // 路面半宽
const LIMIT = 12.5;              // 草地围栏（硬边界）
const S = [];                    // 采样点 {x,z,tx,tz,nx,nz}
for (let i = 0; i < N; i++) {
  const p = curve.getPointAt(i / N), t = curve.getTangentAt(i / N);
  S.push({ x: p.x, z: p.z, tx: t.x, tz: t.z, nx: t.z, nz: -t.x });
}
const TRACK_LEN = curve.getLength();

function buildStrip(off1, off2, mat, y) {  // 沿样条铺条带
  const pos = [], uv = [], idx = [];
  for (let i = 0; i <= N; i++) {
    const s = S[i % N], u = i * TRACK_LEN / N / 9;
    pos.push(s.x + s.nx * off1, y, s.z + s.nz * off1, s.x + s.nx * off2, y, s.z + s.nz * off2);
    uv.push(u, 0, u, 1);
    if (i < N) { const a = i * 2; idx.push(a, a + 2, a + 1, a + 1, a + 2, a + 3); }   // 逆时针绕序 → 法线朝上
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
  geo.setIndex(idx); geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);
  return mesh;
}
buildStrip(-HALF, HALF, new THREE.MeshLambertMaterial({ map: roadTex }), 0.02);
const curbMat = new THREE.MeshLambertMaterial({ map: curbTex });
buildStrip(-HALF - 1.1, -HALF, curbMat, 0.03);
buildStrip(HALF, HALF + 1.1, curbMat, 0.03);

const ground = new THREE.Mesh(new THREE.PlaneGeometry(1600, 1600),
  new THREE.MeshLambertMaterial({ map: grassTex }));
ground.rotation.x = -Math.PI / 2; ground.position.y = -0.05;
scene.add(ground);

// 起点拱门（在样点 0 处）
{
  const s0 = S[0];
  const pillarG = new THREE.CylinderGeometry(0.5, 0.5, 9, 10);
  const pillarM = new THREE.MeshLambertMaterial({ color: 0xdddddd });
  for (const side of [-1, 1]) {
    const p = new THREE.Mesh(pillarG, pillarM);
    p.position.set(s0.x + s0.nx * (HALF + 1.6) * side, 4.5, s0.z + s0.nz * (HALF + 1.6) * side);
    scene.add(p);
  }
  const banner = new THREE.Mesh(new THREE.BoxGeometry((HALF + 1.6) * 2, 1.6, 0.4),
    new THREE.MeshLambertMaterial({ map: checkerTex }));
  banner.position.set(s0.x, 8.6, s0.z);
  banner.rotation.y = Math.atan2(s0.nx, s0.nz) + Math.PI / 2;
  scene.add(banner);
  // 地面起跑线
  const line = new THREE.Mesh(new THREE.PlaneGeometry(HALF * 2, 2.4),
    new THREE.MeshBasicMaterial({ map: checkerTex.clone() }));
  line.material.map.repeat.set(6, 2); line.material.map.needsUpdate = true;
  line.rotation.x = -Math.PI / 2;
  line.rotation.z = -Math.atan2(s0.tx, s0.tz);
  line.position.set(s0.x, 0.04, s0.z);
  scene.add(line);
}

// 树（实例化），避开赛道
{
  const spots = [];
  let guard = 0;
  while (spots.length < 110 && guard++ < 4000) {
    const x = (Math.random() - .5) * 620, z = (Math.random() - .5) * 520;
    let ok = true;
    for (let i = 0; i < N; i += 6) {
      const dx = x - S[i].x, dz = z - S[i].z;
      if (dx * dx + dz * dz < 18 * 18) { ok = false; break; }
    }
    if (ok) spots.push([x, z, 0.7 + Math.random() * 0.8]);
  }
  const trunk = new THREE.InstancedMesh(new THREE.CylinderGeometry(0.45, 0.6, 3.2, 7),
    new THREE.MeshLambertMaterial({ color: 0x7a5436 }), spots.length);
  const leaf = new THREE.InstancedMesh(new THREE.ConeGeometry(2.6, 6.5, 8),
    new THREE.MeshLambertMaterial({ color: 0x3e7d3a }), spots.length);
  const m4 = new THREE.Matrix4();
  spots.forEach(([x, z, sc], i) => {
    m4.makeScale(sc, sc, sc).setPosition(x, 1.6 * sc, z); trunk.setMatrixAt(i, m4);
    m4.makeScale(sc, sc, sc).setPosition(x, (3.2 + 2.6) * sc, z); leaf.setMatrixAt(i, m4);
  });
  scene.add(trunk, leaf);
}
// 远山与云
{
  const mMat = new THREE.MeshLambertMaterial({ color: 0x9fb4c8 });
  for (let i = 0; i < 9; i++) {
    const a = i / 9 * Math.PI * 2 + 0.4;
    const m = new THREE.Mesh(new THREE.ConeGeometry(60 + Math.random() * 50, 90 + Math.random() * 70, 5), mMat);
    m.position.set(Math.cos(a) * 560, 18, Math.sin(a) * 560);
    scene.add(m);
  }
  const cMat = new THREE.MeshBasicMaterial({ color: 0xffffff, fog: false });
  for (let i = 0; i < 7; i++) {
    const c = new THREE.Mesh(new THREE.SphereGeometry(14, 8, 6), cMat);
    c.scale.set(1.8, 0.5, 1);
    c.position.set((Math.random() - .5) * 700, 100 + Math.random() * 50, (Math.random() - .5) * 700);
    scene.add(c);
  }
}

/* ========== 卡丁车 ========== */
function buildKart(color, capColor) {
  const g = new THREE.Group();
  const bodyM = new THREE.MeshLambertMaterial({ color });
  const dark = new THREE.MeshLambertMaterial({ color: 0x23252b });
  const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.5, 2.6), bodyM);
  body.position.y = 0.55; g.add(body);
  const nose = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.34, 0.9), bodyM);
  nose.position.set(0, 0.5, 1.55); g.add(nose);
  const bumper = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.3, 0.3), dark);
  bumper.position.set(0, 0.45, -1.4); g.add(bumper);
  // 车手
  const skin = new THREE.MeshLambertMaterial({ color: 0xf0c69b });
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.42, 12, 10), skin);
  head.position.set(0, 1.35, -0.35); g.add(head);
  const cap = new THREE.Mesh(new THREE.SphereGeometry(0.45, 12, 8, 0, Math.PI * 2, 0, Math.PI / 2),
    new THREE.MeshLambertMaterial({ color: capColor }));
  cap.position.copy(head.position).y += 0.06; g.add(cap);
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.6, 0.5),
    new THREE.MeshLambertMaterial({ color: 0x2855b8 }));
  torso.position.set(0, 0.95, -0.4); g.add(torso);
  // 轮子
  const wheelG = new THREE.CylinderGeometry(0.38, 0.38, 0.32, 12);
  wheelG.rotateZ(Math.PI / 2);
  const wheels = [];
  for (const [x, z, front] of [[-0.85, 0.95, 1], [0.85, 0.95, 1], [-0.85, -0.95, 0], [0.85, -0.95, 0]]) {
    const pivot = new THREE.Group(); pivot.position.set(x, 0.38, z);
    const w = new THREE.Mesh(wheelG, dark);
    pivot.add(w); pivot.userData.front = front; g.add(pivot); wheels.push(pivot);
  }
  // 漂移火花（后轮两侧）+ 加速尾焰
  const sparkM = new THREE.MeshBasicMaterial({ color: 0x4cd5ff, transparent: true, opacity: 0.9,
    blending: THREE.AdditiveBlending, depthWrite: false });
  const sparks = [];
  for (const x of [-0.95, 0.95]) {
    const sp = new THREE.Mesh(new THREE.SphereGeometry(0.22, 6, 5), sparkM.clone());
    sp.position.set(x, 0.25, -1.25); sp.visible = false; g.add(sp); sparks.push(sp);
  }
  const flame = new THREE.Mesh(new THREE.ConeGeometry(0.3, 1.4, 8),
    new THREE.MeshBasicMaterial({ color: 0xffa030, transparent: true, opacity: 0.85,
      blending: THREE.AdditiveBlending, depthWrite: false }));
  flame.rotation.x = -Math.PI / 2; flame.position.set(0, 0.55, -2.2);
  flame.visible = false; g.add(flame);
  // 假阴影
  const shadow = new THREE.Mesh(new THREE.PlaneGeometry(2.6, 3.4),
    new THREE.MeshBasicMaterial({ map: blobTex, transparent: true, depthWrite: false }));
  shadow.rotation.x = -Math.PI / 2; shadow.position.y = 0.06; g.add(shadow);
  scene.add(g);
  return { g, body, wheels, sparks, flame };
}

const MAXSPD = 34, OFFROAD_SPD = 14, BOOST_SPD = 47;
function nearestSample(k) {        // 在上次样点附近搜索最近样点（环形）
  let best = k.si, bd = Infinity;
  for (let d = -20; d <= 45; d++) {
    const i = (k.si + d + N) % N;
    const dx = k.x - S[i].x, dz = k.z - S[i].z, dist = dx * dx + dz * dz;
    if (dist < bd) { bd = dist; best = i; }
  }
  return best;
}
function makePlayer(idx, name, color, capColor) {
  return {
    idx, name, color,
    mesh: buildKart(color, capColor),
    x: 0, z: 0, heading: 0, speed: 0, slide: 0, steerVis: 0,
    si: 0, lap: 0, halfPassed: false, progress: 0, totalProg: 0,
    drifting: false, driftDir: 0, charge: 0, hopT: 0,
    boostT: 0, spinT: 0, item: null, rouletteT: 0,
    finished: false, finishTime: 0, shellCool: 0, wrongWayT: 0,
  };
}
const P1 = makePlayer(0, 'P1 红队', 0xd92b2b, 0xc01f1f);
const P2 = makePlayer(1, 'P2 绿队', 0x1fa33b, 0x14842c);
const players = [P1, P2];

function resetRace() {
  for (const k of players) {
    const si0 = (N - 10 - k.idx * 6 + N) % N;     // 错开两排
    const s = S[si0], lane = k.idx === 0 ? 1 : -1;
    k.x = s.x + s.nx * 2.8 * lane; k.z = s.z + s.nz * 2.8 * lane;
    k.heading = Math.atan2(s.tx, s.tz);
    k.speed = 0; k.slide = 0; k.si = si0; k.lap = 0; k.halfPassed = false;
    k.drifting = false; k.charge = 0; k.boostT = 0; k.spinT = 0;
    k.item = null; k.rouletteT = 0; k.finished = false; k.finishTime = 0; k.wrongWayT = 0;
    k.mesh.g.rotation.set(0, k.heading, 0);
  }
  for (const b of bananas) scene.remove(b.m); bananas.length = 0;
  for (const sh of shells) scene.remove(sh.m); shells.length = 0;
  for (const ib of itemBoxes) { ib.t = 0; ib.m.visible = true; }
  raceTime = 0; state = 'count'; countT = 3.8;
  resultEl.style.display = 'none';
}

/* ========== 道具 ========== */
const itemBoxes = [];
{
  const geo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
  for (const frac of [0.16, 0.40, 0.64, 0.86]) {
    for (const off of [-4.4, 0, 4.4]) {
      const i = Math.floor(frac * N), s = S[i];
      const m = new THREE.Mesh(geo, new THREE.MeshNormalMaterial({ transparent: true, opacity: 0.88 }));
      m.position.set(s.x + s.nx * off, 1.3, s.z + s.nz * off);
      scene.add(m);
      itemBoxes.push({ m, t: 0 });
    }
  }
}
const bananas = [], shells = [];
function buildBanana() {
  const g = new THREE.Group();
  const m = new THREE.MeshLambertMaterial({ color: 0xf5d62a });
  for (let i = 0; i < 4; i++) {
    const seg = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 6), m);
    const a = i / 3 * Math.PI * 0.8 - 0.3;
    seg.position.set(0, 0.3 + Math.sin(a) * 0.45, (i - 1.5) * 0.32);
    g.add(seg);
  }
  scene.add(g); return g;
}
function buildShell() {
  const g = new THREE.Group();
  const sh = new THREE.Mesh(new THREE.SphereGeometry(0.55, 10, 8),
    new THREE.MeshLambertMaterial({ color: 0x2cab3f }));
  sh.scale.y = 0.7; sh.position.y = 0.5; g.add(sh);
  const rim = new THREE.Mesh(new THREE.CylinderGeometry(0.62, 0.62, 0.18, 12),
    new THREE.MeshLambertMaterial({ color: 0xf2efe0 }));
  rim.position.y = 0.3; g.add(rim);
  scene.add(g); return g;
}
const ITEM_EMOJI = { mushroom: '🍄', banana: '🍌', shell: '🐢' };
function rollItem(k) {           // 落后的人更容易拿蘑菇
  const behind = k.totalProg <= players[1 - k.idx].totalProg;
  const r = Math.random();
  if (behind) return r < .5 ? 'mushroom' : r < .78 ? 'shell' : 'banana';
  return r < .42 ? 'banana' : r < .75 ? 'shell' : 'mushroom';
}
function useItem(k) {
  if (!k.item) return;
  const item = k.item; k.item = null;
  const f = { x: Math.sin(k.heading), z: Math.cos(k.heading) };
  if (item === 'mushroom') { k.boostT = Math.max(k.boostT, 1.5); sfx.boost(); }
  else if (item === 'banana') {
    const m = buildBanana();
    m.position.set(k.x - f.x * 3.2, 0, k.z - f.z * 3.2);
    bananas.push({ m, x: m.position.x, z: m.position.z, owner: k, immuneT: 1 });
    sfx.blip(180);
  } else if (item === 'shell') {
    const m = buildShell();
    m.position.set(k.x + f.x * 2.5, 0, k.z + f.z * 2.5);
    shells.push({ m, x: m.position.x, z: m.position.z, dx: f.x, dz: f.z,
      si: k.si, life: 5, owner: k, immuneT: 0.5 });
    sfx.blip(620);
  }
}
function spinOut(k) {
  if (k.spinT > 0 || k.finished) return;
  k.spinT = 1.2; k.speed *= 0.25; k.drifting = false; k.charge = 0;
  sfx.hit();
}

/* ========== 输入 ========== */
const keys = {};
addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  if (!keys[e.code]) {
    if (e.code === 'KeyE') useReq[0] = true;
    if (e.code === 'Enter' || e.code === 'Period') useReq[1] = true;
    if (e.code === 'KeyR') resetRace();
  }
  keys[e.code] = true;
  sfx.ensure();
});
addEventListener('keyup', e => keys[e.code] = false);
const useReq = [false, false];
function readInput(k) {
  if (k.idx === 0) return {
    throttle: keys.KeyW, brake: keys.KeyS,
    steer: (keys.KeyA ? 1 : 0) - (keys.KeyD ? 1 : 0),
    drift: keys.ShiftLeft,
  };
  return {
    throttle: keys.ArrowUp, brake: keys.ArrowDown,
    steer: (keys.ArrowLeft ? 1 : 0) - (keys.ArrowRight ? 1 : 0),
    drift: keys.ShiftRight || keys.Slash,
  };
}

/* ========== 音效（WebAudio 合成）========== */
const sfx = {
  ctx: null, engines: [],
  ensure() {
    if (this.ctx) { this.ctx.resume?.(); return; }
    try {
      this.ctx = new AudioContext();
      const master = this.ctx.createGain(); master.gain.value = 0.5;
      master.connect(this.ctx.destination); this.master = master;
      for (let i = 0; i < 2; i++) {
        const o = this.ctx.createOscillator(), g = this.ctx.createGain(), f = this.ctx.createBiquadFilter();
        o.type = 'sawtooth'; f.type = 'lowpass'; f.frequency.value = 500;
        g.gain.value = 0;
        o.connect(f).connect(g).connect(master); o.start();
        this.engines.push({ o, g });
      }
    } catch (e) { /* 无音频环境 */ }
  },
  engine(i, speed) {
    if (!this.ctx) return;
    const e = this.engines[i];
    e.o.frequency.value = 55 + Math.abs(speed) * 4.5 + i * 6;
    e.g.gain.value = Math.min(0.05, 0.012 + Math.abs(speed) * 0.001);
  },
  beep(freq, dur = 0.12, vol = 0.25, type = 'square') {
    if (!this.ctx) return;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
    o.connect(g).connect(this.master); o.start(); o.stop(this.ctx.currentTime + dur);
  },
  blip(f) { this.beep(f, 0.1, 0.2, 'triangle'); },
  boost() { if (!this.ctx) return;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(180, this.ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(900, this.ctx.currentTime + 0.35);
    g.gain.setValueAtTime(0.22, this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.4);
    o.connect(g).connect(this.master); o.start(); o.stop(this.ctx.currentTime + 0.45);
  },
  hit() { if (!this.ctx) return;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(420, this.ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(70, this.ctx.currentTime + 0.4);
    g.gain.setValueAtTime(0.28, this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.45);
    o.connect(g).connect(this.master); o.start(); o.stop(this.ctx.currentTime + 0.5);
  },
};

/* ========== 物理更新 ========== */
function updateKart(k, dt) {
  const inp = (state === 'race' && k.spinT <= 0 && !k.finished) ? readInput(k)
    : { throttle: false, brake: false, steer: 0, drift: false };
  if (state === 'race' && !k.finished && useReq[k.idx] && k.spinT <= 0) useItem(k);
  useReq[k.idx] = false;

  // 离路检测
  const s = S[k.si];
  const lat = (k.x - s.x) * s.nx + (k.z - s.z) * s.nz;
  const offroad = Math.abs(lat) > HALF + 0.6;

  // 速度
  const boosting = k.boostT > 0;
  let maxCur = boosting ? BOOST_SPD : (offroad ? OFFROAD_SPD : MAXSPD);
  if (boosting) { k.boostT -= dt; k.speed = Math.min(BOOST_SPD, k.speed + 65 * dt); }
  if (inp.throttle) {
    if (k.speed < maxCur) k.speed += 26 * dt * Math.max(0.25, 1 - k.speed / maxCur);
  } else if (inp.brake) {
    k.speed -= (k.speed > 0 ? 45 : 14) * dt;
    k.speed = Math.max(k.speed, -9);
  } else {
    k.speed *= Math.exp(-0.9 * dt);
    if (Math.abs(k.speed) < 0.05) k.speed = 0;
  }
  if (!boosting && k.speed > maxCur) k.speed = Math.max(maxCur, k.speed - 30 * dt);
  if (k.spinT > 0) { k.spinT -= dt; k.speed *= Math.exp(-1.6 * dt); }

  // 漂移
  if (k.drifting) {
    if (!inp.drift || Math.abs(k.speed) < 10) {        // 释放 → 迷你涡轮
      if (k.charge >= 2.2) { k.boostT = Math.max(k.boostT, 1.4); sfx.boost(); }
      else if (k.charge >= 1.1) { k.boostT = Math.max(k.boostT, 0.8); sfx.boost(); }
      k.drifting = false; k.charge = 0;
    } else {
      k.charge += dt * (1 + 0.4 * Math.abs(inp.steer));
    }
  } else if (inp.drift && inp.steer !== 0 && k.speed > 16 && k.spinT <= 0) {
    k.drifting = true; k.driftDir = Math.sign(inp.steer); k.charge = 0; k.hopT = 0.22;
    sfx.blip(300);
  }
  if (k.hopT > 0) k.hopT -= dt;

  // 转向
  let effSteer = inp.steer;
  if (k.drifting) effSteer = k.driftDir * (1.15 + 0.55 * inp.steer * k.driftDir);
  const turnRate = (2.3 - 1.15 * Math.min(1, Math.abs(k.speed) / MAXSPD)) * (k.drifting ? 1.25 : 1);
  k.heading += effSteer * turnRate * THREE.MathUtils.clamp(k.speed / 8, -1, 1) * dt;

  // 侧滑角（漂移时车身朝内、速度方向偏外）
  const slideTarget = k.drifting ? -k.driftDir * 0.32 : 0;
  k.slide += (slideTarget - k.slide) * (1 - Math.exp(-6 * dt));
  const mh = k.heading + k.slide;
  k.x += Math.sin(mh) * k.speed * dt;
  k.z += Math.cos(mh) * k.speed * dt;

  // 进度 / 圈数
  const prevSi = k.si;
  k.si = nearestSample(k);
  if (k.si > N * 0.45 && k.si < N * 0.6) k.halfPassed = true;
  if (prevSi > N * 0.9 && k.si < N * 0.1 && k.halfPassed) {
    k.lap++; k.halfPassed = false;
    if (k.lap >= 3 && !k.finished) {
      k.finished = true; k.finishTime = raceTime;
      sfx.beep(880, .15); sfx.beep(1175, .3);
    } else sfx.blip(880);
  }
  if (prevSi < N * 0.1 && k.si > N * 0.9) k.lap--;     // 倒退过线
  k.progress = k.si / N;
  k.totalProg = k.lap + k.progress;
  // 逆行提示
  const fdot = Math.sin(k.heading) * S[k.si].tx + Math.cos(k.heading) * S[k.si].tz;
  k.wrongWayT = (fdot < -0.3 && Math.abs(k.speed) > 4) ? k.wrongWayT + dt : 0;

  // 边界（草地围栏）
  const s2 = S[k.si];
  let lat2 = (k.x - s2.x) * s2.nx + (k.z - s2.z) * s2.nz;
  if (Math.abs(lat2) > LIMIT) {
    const cl = Math.sign(lat2) * LIMIT;
    k.x = s2.x + s2.nx * cl; k.z = s2.z + s2.nz * cl;
    k.speed *= Math.exp(-3.5 * dt);
  }

  // 车-车碰撞
  const other = players[1 - k.idx];
  {
    const dx = k.x - other.x, dz = k.z - other.z, d2 = dx * dx + dz * dz;
    if (d2 > 0.0001 && d2 < 2.3 * 2.3) {
      const d = Math.sqrt(d2), push = (2.3 - d) / 2 + 0.02;
      k.x += dx / d * push; k.z += dz / d * push;
      other.x -= dx / d * push; other.z -= dz / d * push;
    }
  }

  // 道具箱拾取
  if (state === 'race' && !k.item && k.rouletteT <= 0 && !k.finished) {
    for (const ib of itemBoxes) {
      if (ib.t > 0) continue;
      const dx = k.x - ib.m.position.x, dz = k.z - ib.m.position.z;
      if (dx * dx + dz * dz < 2.2 * 2.2) {
        ib.t = 3; ib.m.visible = false;
        k.rouletteT = 0.8; sfx.blip(740);
        break;
      }
    }
  }
  if (k.rouletteT > 0) {
    k.rouletteT -= dt;
    if (k.rouletteT <= 0) k.item = rollItem(k);
  }

  // 香蕉 / 龟壳碰撞
  for (let i = bananas.length - 1; i >= 0; i--) {
    const b = bananas[i];
    if (b.owner === k && b.immuneT > 0) continue;
    const dx = k.x - b.x, dz = k.z - b.z;
    if (dx * dx + dz * dz < 1.7 * 1.7) { spinOut(k); scene.remove(b.m); bananas.splice(i, 1); }
  }
  for (let i = shells.length - 1; i >= 0; i--) {
    const sh = shells[i];
    if (sh.owner === k && sh.immuneT > 0) continue;
    const dx = k.x - sh.x, dz = k.z - sh.z;
    if (dx * dx + dz * dz < 1.6 * 1.6) { spinOut(k); scene.remove(sh.m); shells.splice(i, 1); }
  }

  // —— 视觉同步 ——
  const m = k.mesh;
  m.g.position.set(k.x, k.hopT > 0 ? Math.sin((0.22 - k.hopT) / 0.22 * Math.PI) * 0.45 : 0, k.z);
  const spinVis = k.spinT > 0 ? (1.2 - k.spinT) / 1.2 * Math.PI * 4 : 0;
  m.g.rotation.y = k.heading + k.slide * 1.6 + spinVis;
  k.steerVis += (inp.steer - k.steerVis) * (1 - Math.exp(-10 * dt));
  m.body.rotation.z = (k.drifting ? k.driftDir * 0.13 : 0) + k.steerVis * 0.05;
  for (const w of m.wheels) {
    w.children[0].rotation.x += k.speed * dt / 0.38;
    if (w.userData.front) w.rotation.y = k.steerVis * 0.45;
  }
  for (const sp of m.sparks) {
    sp.visible = k.drifting;
    if (k.drifting) {
      sp.material.color.set(k.charge >= 2.2 ? 0xffa030 : k.charge >= 1.1 ? 0x4cd5ff : 0xbbbbbb);
      sp.scale.setScalar(0.7 + Math.random() * 0.8);
    }
  }
  m.flame.visible = k.boostT > 0;
  if (m.flame.visible) m.flame.scale.set(1, 0.7 + Math.random() * 0.7, 1);
}

function updateWorld(dt) {
  // 道具箱旋转 / 重生
  for (const ib of itemBoxes) {
    ib.m.rotation.x += dt * 1.3; ib.m.rotation.y += dt * 1.9;
    if (ib.t > 0) { ib.t -= dt; if (ib.t <= 0) ib.m.visible = true; }
  }
  for (const b of bananas) if (b.immuneT > 0) b.immuneT -= dt;
  // 龟壳飞行 + 撞墙反弹
  for (let i = shells.length - 1; i >= 0; i--) {
    const sh = shells[i];
    sh.life -= dt; if (sh.immuneT > 0) sh.immuneT -= dt;
    if (sh.life <= 0) { scene.remove(sh.m); shells.splice(i, 1); continue; }
    sh.x += sh.dx * 52 * dt; sh.z += sh.dz * 52 * dt;
    let best = sh.si, bd = Infinity;
    for (let d = -25; d <= 35; d++) {
      const j = (sh.si + d + N) % N;
      const dx = sh.x - S[j].x, dz = sh.z - S[j].z, dist = dx * dx + dz * dz;
      if (dist < bd) { bd = dist; best = j; }
    }
    sh.si = best;
    const s = S[best];
    const lat = (sh.x - s.x) * s.nx + (sh.z - s.z) * s.nz;
    if (Math.abs(lat) > LIMIT - 0.5) {           // 沿路缘反弹
      const dot = sh.dx * s.nx + sh.dz * s.nz;
      sh.dx -= 2 * dot * s.nx; sh.dz -= 2 * dot * s.nz;
      const cl = Math.sign(lat) * (LIMIT - 0.5);
      sh.x = s.x + s.nx * cl; sh.z = s.z + s.nz * cl;
    }
    sh.m.position.set(sh.x, 0, sh.z);
    sh.m.rotation.y += dt * 10;
  }
}

/* ========== 摄像机 / 分屏 ========== */
const cams = [new THREE.PerspectiveCamera(62, 2, 0.1, 900), new THREE.PerspectiveCamera(62, 2, 0.1, 900)];
function updateCam(cam, k, dt) {
  const f = { x: Math.sin(k.heading), z: Math.cos(k.heading) };
  const want = new THREE.Vector3(k.x - f.x * 9.5, 4.6, k.z - f.z * 9.5);
  const a = 1 - Math.exp(-7 * dt);
  cam.position.lerp(want, a);
  cam.position.y = 4.6;
  cam.lookAt(k.x + f.x * 5, 1.4, k.z + f.z * 5);
  const fovWant = 62 + (k.boostT > 0 ? 12 : 0) + Math.max(0, k.speed - MAXSPD) * 0.3;
  if (Math.abs(cam.fov - fovWant) > 0.2) { cam.fov += (fovWant - cam.fov) * a; cam.updateProjectionMatrix(); }
}
function resize() {
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h, false);
  for (const c of cams) { c.aspect = w / (h / 2); c.updateProjectionMatrix(); }
}
addEventListener('resize', resize); resize();

/* ========== HUD / 小地图 ========== */
const panels = [document.getElementById('hud1'), document.getElementById('hud2')];
const bigEl = document.getElementById('bigtext');
const resultEl = document.getElementById('result');
const mini = document.getElementById('minimap').getContext('2d');
const ORD = ['1st', '2nd'];
const ROULETTE = ['🍄', '🍌', '🐢'];
let miniPts = null;
function drawMini() {
  if (!miniPts) {
    let minX = 1e9, maxX = -1e9, minZ = 1e9, maxZ = -1e9;
    for (const s of S) { minX = Math.min(minX, s.x); maxX = Math.max(maxX, s.x);
      minZ = Math.min(minZ, s.z); maxZ = Math.max(maxZ, s.z); }
    const sc = 260 / Math.max(maxX - minX, maxZ - minZ);
    miniPts = { sc, ox: -(minX + maxX) / 2, oz: -(minZ + maxZ) / 2 };
  }
  const { sc, ox, oz } = miniPts;
  const px = (x, z) => [150 + (x + ox) * sc, 150 + (z + oz) * sc];
  mini.clearRect(0, 0, 300, 300);
  mini.strokeStyle = '#000a'; mini.lineWidth = 16; mini.lineCap = 'round';
  mini.beginPath();
  for (let i = 0; i <= N; i += 8) {
    const [a, b] = px(S[i % N].x, S[i % N].z);
    i === 0 ? mini.moveTo(a, b) : mini.lineTo(a, b);
  }
  mini.closePath(); mini.stroke();
  mini.strokeStyle = '#fffc'; mini.lineWidth = 9; mini.stroke();
  const [sx, sy] = px(S[0].x, S[0].z);
  mini.fillStyle = '#222'; mini.fillRect(sx - 5, sy - 5, 10, 10);
  for (const k of players) {
    const [a, b] = px(k.x, k.z);
    mini.beginPath(); mini.arc(a, b, 9, 0, 7);
    mini.fillStyle = k.idx === 0 ? '#ff4040' : '#2ee04e'; mini.fill();
    mini.strokeStyle = '#fff'; mini.lineWidth = 2.5; mini.stroke();
  }
}
function fmtTime(t) {
  const m = Math.floor(t / 60), s = Math.floor(t % 60), ms = Math.floor(t % 1 * 100);
  return `${m}:${String(s).padStart(2, '0')}.${String(ms).padStart(2, '0')}`;
}
function updateHUD() {
  const lead = P1.totalProg >= P2.totalProg ? P1 : P2;
  for (const k of players) {
    const p = panels[k.idx];
    p.querySelector('.lap').textContent = `圈 ${Math.min(k.lap + 1, 3)}/3`;
    const rank = k.finished
      ? (k.finishTime <= players[1 - k.idx].finishTime || !players[1 - k.idx].finished ? 0 : 1)
      : (k === lead ? 0 : 1);
    p.querySelector('.rank').innerHTML = `<b>${rank + 1}</b>${rank === 0 ? 'st' : 'nd'}`;
    p.querySelector('.itemslot').textContent =
      k.rouletteT > 0 ? ROULETTE[Math.floor(performance.now() / 80) % 3]
      : k.item ? ITEM_EMOJI[k.item] : '—';
    p.querySelector('.spd').textContent = `${Math.round(Math.abs(k.speed) * 3.4)} km/h`;
    const bar = p.querySelector('.boostbar i');
    bar.style.width = `${Math.min(1, k.charge / 2.2) * 100}%`;
    bar.style.background = k.charge >= 2.2 ? '#ffa030' : '#4cd5ff';
    p.querySelector('.wrong').style.display = k.wrongWayT > 0.8 ? 'block' : 'none';
  }
}
function showResult() {
  const w = (P1.finishTime <= P2.finishTime ? P1 : P2);
  resultEl.querySelector('h1').textContent = `🏁 ${w.name} 获胜！`;
  resultEl.querySelector('h1').style.color = w.idx === 0 ? '#ff6b6b' : '#5ce07a';
  document.getElementById('r1').textContent = `P1 红队　${P1.finished ? fmtTime(P1.finishTime) : '未完赛'}`;
  document.getElementById('r2').textContent = `P2 绿队　${P2.finished ? fmtTime(P2.finishTime) : '未完赛'}`;
  resultEl.style.display = 'block';
}

/* ========== 主循环 ========== */
let state = 'count', countT = 3.8, raceTime = 0, overT = 0;
let last = performance.now();
function frame(now) {
  requestAnimationFrame(frame);
  const dt = Math.min((now - last) / 1000, 1 / 30);
  last = now;
  tick(dt);
}
function tick(dt) {
  if (state === 'count') {
    const prev = Math.ceil(countT);
    countT -= dt;
    const cur = Math.ceil(countT);
    if (cur !== prev && cur > 0 && cur <= 3) { bigEl.style.display = 'block'; bigEl.textContent = cur; sfx.beep(440, .18); }
    if (countT <= 0) {
      state = 'race'; bigEl.textContent = 'GO!'; sfx.beep(880, .4);
      setTimeout(() => bigEl.style.display = 'none', 800);
    }
  } else if (state === 'race') {
    raceTime += dt;
    if (players.every(k => k.finished) ||
        (players.some(k => k.finished) && (overT += dt) > 12)) {
      state = 'over'; showResult();
    }
  }

  for (const k of players) updateKart(k, dt);
  updateWorld(dt);
  for (let i = 0; i < 2; i++) {
    updateCam(cams[i], players[i], dt);
    sfx.engine(i, players[i].speed);
  }

  // 分屏渲染：上 P1 下 P2
  const w = renderer.domElement.width, h = renderer.domElement.height;
  renderer.setViewport(0, h / 2, w, h / 2); renderer.setScissor(0, h / 2, w, h / 2);
  renderer.render(scene, cams[0]);
  renderer.setViewport(0, 0, w, h / 2); renderer.setScissor(0, 0, w, h / 2);
  renderer.render(scene, cams[1]);

  updateHUD(); drawMini();
}
resetRace();
overT = 0;
requestAnimationFrame(frame);

// 暴露给冒烟测试：step(dt) 同步推进一帧模拟（预览环境 rAF 会被节流）
window.__game = { players, get state() { return state; }, reset: resetRace,
  shells, bananas, itemBoxes, step: dt => tick(dt), track: { S, N, HALF, LIMIT }, cams };
</script>
</body>
</html>
