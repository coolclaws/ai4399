<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>果蔬连连看 · AI4399</title>
<style>
:root{
  --bg:#0a0a12; --panel:#14141f; --border:#2a2a3d; --text:#e8e8f0;
  --muted:#8888a0; --accent:#ffcc00;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--bg);
  background-image:radial-gradient(ellipse 60% 40% at 20% 0%,rgba(80,200,120,.08),transparent),
                   radial-gradient(ellipse 50% 40% at 85% 100%,rgba(255,204,0,.06),transparent),
                   radial-gradient(ellipse 40% 30% at 60% 30%,rgba(255,140,80,.03),transparent);
  color:var(--text);
  font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;overflow:hidden;user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
}
/* 飘落叶子氛围 */
.leaf{
  position:fixed;top:-50px;z-index:0;pointer-events:none;
  opacity:0;will-change:transform;
  animation:leaffall linear infinite;
}
@keyframes leaffall{
  0%{transform:translate3d(0,-6vh,0) rotate(0deg);opacity:0;}
  8%{opacity:.16;}
  30%{transform:translate3d(26px,28vh,0) rotate(110deg);}
  55%{transform:translate3d(-14px,56vh,0) rotate(200deg);opacity:.14;}
  80%{transform:translate3d(22px,84vh,0) rotate(290deg);opacity:.1;}
  100%{transform:translate3d(-6px,108vh,0) rotate(360deg);opacity:0;}
}
/* 高连击屏幕边缘柔光 */
#edgeGlow{
  position:fixed;inset:0;z-index:90;pointer-events:none;opacity:0;transition:opacity .5s;
  box-shadow:inset 0 0 90px 18px rgba(255,150,40,.30), inset 0 0 36px rgba(255,204,0,.20);
}
#edgeGlow.on{opacity:1;animation:edgepulse 1s ease-in-out infinite;}
@keyframes edgepulse{0%,100%{opacity:1;}50%{opacity:.4;}}
a.back{
  position:fixed;top:10px;left:12px;z-index:50;
  color:var(--muted);text-decoration:none;font-size:13px;
  background:rgba(20,20,31,.6);border:1px solid var(--border);
  padding:4px 10px;border-radius:14px;opacity:.75;transition:opacity .2s;
}
a.back:hover{opacity:1;color:var(--accent);}
#wrap{display:flex;flex-direction:column;align-items:center;gap:8px;padding:8px;position:relative;z-index:2;}
/* ---------- HUD ---------- */
#hud{width:100%;display:flex;flex-direction:column;gap:6px;}
.hrow{display:flex;align-items:center;gap:10px;font-size:14px;flex-wrap:wrap;}
.badge{
  background:linear-gradient(180deg,#1d1d2e,#14141f);border:1px solid var(--border);
  border-radius:8px;padding:3px 10px;color:var(--accent);font-weight:600;white-space:nowrap;
}
.mode{color:var(--muted);font-size:12px;white-space:nowrap;}
.spacer{flex:1;}
.stat{color:var(--muted);font-size:13px;white-space:nowrap;}
.stat b{color:var(--text);font-size:15px;font-variant-numeric:tabular-nums;}
#timebar{
  position:relative;width:100%;height:16px;
  background:linear-gradient(180deg,#0c0c14,#15151f);
  border:1px solid var(--border);border-radius:9px;overflow:hidden;
  box-shadow:inset 0 2px 4px rgba(0,0,0,.6);
}
#timefill{
  height:100%;width:100%;border-radius:8px;
  background:linear-gradient(180deg,#8aeb9a 0%,#3ddc84 50%,#2bb86a 100%);
  transition:background .4s;
  box-shadow:inset 0 2px 2px rgba(255,255,255,.4), inset 0 -2px 3px rgba(0,90,40,.5), 0 0 8px rgba(61,220,132,.3);
}
#timefill.low{background:linear-gradient(90deg,#ff4d4d,#ff8c42);animation:lowpulse .6s infinite alternate;}
@keyframes lowpulse{from{filter:brightness(.85);}to{filter:brightness(1.25);}}
#timetext{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#0a0a12;font-weight:700;mix-blend-mode:normal;
  text-shadow:0 0 3px rgba(255,255,255,.5);
}
/* ---------- 棋盘 ---------- */
#boardWrap{position:relative;}
#board{
  position:relative;
  background:
    radial-gradient(ellipse 90% 60% at 50% -15%, rgba(255,228,170,.08), transparent 70%),
    repeating-linear-gradient(90deg, transparent 0 84px, rgba(0,0,0,.25) 84px 86px),
    repeating-linear-gradient(0deg, rgba(255,255,255,.018) 0 2px, rgba(0,0,0,.025) 2px 6px),
    linear-gradient(180deg,#3c2b1a 0%,#332414 55%,#281c0f 100%);
  border:2px solid #4e3a21;
  border-radius:14px;
  box-shadow:
    0 12px 44px rgba(0,0,0,.6),
    inset 0 0 80px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(255,225,160,.10),
    inset 0 -2px 6px rgba(0,0,0,.4);
}
#fx{position:absolute;inset:0;pointer-events:none;z-index:20;}
.tile{
  position:absolute;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(circle at 50% 64%, rgba(var(--fc,255,204,0),.34), rgba(var(--fc,255,204,0),.05) 74%),
    linear-gradient(168deg,#fdf6e4 0%,#f3e4c5 52%,#e4cda4 100%);
  border:1px solid rgba(126,93,46,.55);border-radius:20%;
  cursor:pointer;z-index:2;
  transition:left .22s ease,top .22s ease,transform .15s ease,opacity .2s,box-shadow .15s,border-color .15s;
  box-shadow:
    inset 0 2px 2px rgba(255,255,255,.78),
    inset 0 -3px 5px rgba(150,100,42,.28),
    0 3px 7px rgba(0,0,0,.45);
  line-height:1;
  text-shadow:0 1px 1px rgba(80,40,0,.18);
}
.tile:hover{
  border-color:#caa45e;transform:translateY(-3px);
  box-shadow:
    inset 0 2px 2px rgba(255,255,255,.82),
    inset 0 -3px 5px rgba(150,100,42,.24),
    0 8px 16px rgba(0,0,0,.5);
}
.tile.sel{
  border-color:var(--accent);transform:scale(1.13) translateY(-2px);z-index:6;
  background:
    radial-gradient(circle at 50% 64%, rgba(var(--fc,255,204,0),.44), rgba(var(--fc,255,204,0),.10) 74%),
    linear-gradient(168deg,#fff8dd 0%,#f8e8b8 52%,#edd28f 100%);
  animation:selbreath 1.1s ease-in-out infinite;
}
@keyframes selbreath{
  0%,100%{box-shadow:0 0 0 2px rgba(255,204,0,.6),0 0 12px rgba(255,204,0,.45),0 5px 12px rgba(0,0,0,.5),inset 0 2px 2px rgba(255,255,255,.8);}
  50%{box-shadow:0 0 0 3px rgba(255,216,60,.95),0 0 26px rgba(255,216,60,.85),0 7px 16px rgba(0,0,0,.55),inset 0 2px 2px rgba(255,255,255,.8);}
}
.tile.hint{animation:hintp .55s ease-in-out infinite alternate;border-color:#3ddc84;z-index:5;}
@keyframes hintp{
from{box-shadow:0 0 4px rgba(61,220,132,.35),inset 0 2px 2px rgba(255,255,255,.78),0 3px 7px rgba(0,0,0,.45);transform:scale(1);}
to{box-shadow:0 0 0 2px rgba(61,220,132,.8),0 0 20px rgba(61,220,132,.95),inset 0 2px 2px rgba(255,255,255,.78);transform:scale(1.1);}}
.tile.shake{animation:shake .3s ease;}
@keyframes shake{
  0%,100%{transform:translateX(0) scale(1.12);}
  20%{transform:translateX(-5px) scale(1.12);}40%{transform:translateX(5px) scale(1.12);}
  60%{transform:translateX(-4px) scale(1.12);}80%{transform:translateX(4px) scale(1.12);}
}
.tile.dead{animation:pop .3s ease forwards;pointer-events:none;z-index:8;}
@keyframes pop{
  0%{transform:scale(1.15) rotate(0deg);opacity:1;}
  55%{transform:scale(1.42) rotate(7deg);opacity:.92;}
  100%{transform:scale(.15) rotate(-14deg);opacity:0;}
}
.tile.born{animation:born .35s cubic-bezier(.34,1.56,.64,1) backwards;}
@keyframes born{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
.tile.swirl{transform:scale(0) rotate(180deg)!important;opacity:0;}
/* 掉落道具 */
.drop{
  position:absolute;z-index:25;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 35% 28%,#fff6cf,#ffd84f 48%,#e8a818 100%);
  border:2px solid rgba(255,242,180,.9);
  border-radius:50%;cursor:pointer;font-weight:700;color:#5a3c00;
  box-shadow:0 0 18px rgba(255,204,0,.7),0 4px 9px rgba(0,0,0,.45),inset 0 -3px 5px rgba(160,90,0,.4);
  animation:dropIn .4s cubic-bezier(.34,1.56,.64,1), dropFloat 1.2s .4s ease-in-out infinite alternate;
}
@keyframes dropIn{from{transform:scale(0);}to{transform:scale(1);}}
@keyframes dropFloat{from{transform:translateY(-3px) scale(1);}to{transform:translateY(3px) scale(1.06);}}
.drop.fade{opacity:0;transition:opacity .4s;}
/* 浮动得分 */
.float{
  position:absolute;z-index:30;pointer-events:none;font-weight:800;
  color:var(--accent);text-shadow:0 0 8px rgba(255,204,0,.8),0 2px 3px rgba(0,0,0,.8);
  animation:floatUp .85s ease-out forwards;white-space:nowrap;
}
.float.green{color:#3ddc84;text-shadow:0 0 8px rgba(61,220,132,.8);}
@keyframes floatUp{
  0%{transform:translate(-50%,0) scale(.6);opacity:0;}
  18%{transform:translate(-50%,-8px) scale(1.15);opacity:1;}
  100%{transform:translate(-50%,-46px) scale(1);opacity:0;}
}
/* 连击 */
#comboZone{width:100%;display:flex;align-items:center;gap:10px;min-height:22px;}
#combobar{
  flex:1;height:12px;background:linear-gradient(180deg,#0c0c14,#15151f);
  border:1px solid #34293f;border-radius:7px;overflow:hidden;
  opacity:.35;transition:opacity .3s;
  box-shadow:inset 0 2px 4px rgba(0,0,0,.65), inset 0 -1px 0 rgba(255,255,255,.05);
}
#combobar.on{opacity:1;}
#combofill{
  height:100%;width:0;border-radius:6px;
  background:linear-gradient(90deg,#ff8c42 0%,#ffb347 30%,#ffe066 50%,#ffb347 70%,#ff8c42 100%);
  background-size:200% 100%;
  box-shadow:0 0 10px rgba(255,160,60,.55),
    inset 0 2px 2px rgba(255,255,255,.5),
    inset 0 -2px 3px rgba(170,70,0,.55);
}
#combobar.on #combofill{animation:juiceflow 1.1s linear infinite;}
@keyframes juiceflow{from{background-position:0 0;}to{background-position:-200% 0;}}
#comboText{
  font-size:14px;font-weight:800;color:var(--accent);min-width:86px;text-align:right;
  text-shadow:0 0 10px rgba(255,204,0,.5);opacity:.25;transition:opacity .3s;
}
#comboText.on{opacity:1;}
#comboText.pop{animation:cpop .25s ease;}
@keyframes cpop{50%{transform:scale(1.35);}}
/* 道具栏 */
#items{display:flex;gap:10px;width:100%;justify-content:center;}
#items button{
  font-family:inherit;font-size:14px;font-weight:600;color:var(--text);
  display:inline-flex;align-items:center;gap:7px;
  background:linear-gradient(180deg,#23233a,#15151f);
  border:1px solid #34344c;border-radius:12px;
  padding:7px 16px;cursor:pointer;
  transition:border-color .15s,transform .1s,box-shadow .15s;
  box-shadow:0 3px 8px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.06);
}
#items button .ico{
  width:26px;height:26px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;font-size:14px;
  background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.28),rgba(255,204,0,.14) 62%,rgba(255,204,0,.04));
  box-shadow:inset 0 0 0 1px rgba(255,204,0,.3), 0 0 8px rgba(255,204,0,.12);
}
#items button b{color:var(--accent);}
#items button:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 5px 14px rgba(255,204,0,.18), inset 0 1px 0 rgba(255,255,255,.07);}
#items button:active{transform:scale(.95);}
#items button:disabled{opacity:.35;cursor:default;border-color:var(--border);transform:none;box-shadow:0 3px 8px rgba(0,0,0,.35);}
/* ---------- 遮罩界面 ---------- */
.overlay{
  position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:rgba(10,10,18,.82);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.panel{
  position:relative;overflow:hidden;
  background:linear-gradient(180deg,#1a1a29,#121220);
  border:1px solid #36364f;border-radius:18px;
  padding:30px 36px;text-align:center;max-width:90vw;width:380px;
  box-shadow:0 16px 60px rgba(0,0,0,.7), 0 0 50px rgba(255,204,0,.05), inset 0 1px 0 rgba(255,255,255,.06);
  animation:panelIn .3s cubic-bezier(.34,1.56,.64,1);
}
.panel::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,#ff6b8a,#ffb347,#ffe066,#a6e35d,#5dd9c1,#c79bff);
  opacity:.85;
}
@keyframes panelIn{from{transform:scale(.8);opacity:0;}to{transform:scale(1);opacity:1;}}
.panel h1{font-size:26px;margin-bottom:6px;color:var(--accent);letter-spacing:2px;}
.panel h2{font-size:22px;margin-bottom:10px;color:var(--accent);}
.panel .emo{font-size:34px;margin-bottom:8px;letter-spacing:4px;}
.panel p{color:var(--muted);font-size:13px;line-height:1.8;margin-bottom:14px;}
.panel .nums{
  display:flex;justify-content:center;gap:22px;margin:14px 0 18px;
}
.panel .nums div{font-size:12px;color:var(--muted);}
.panel .nums b{display:block;font-size:24px;color:var(--text);margin-top:2px;font-variant-numeric:tabular-nums;}
.panel .nums b.gold{color:var(--accent);}
.bigbtn{
  font-family:inherit;font-size:17px;font-weight:700;color:#0a0a12;
  background:linear-gradient(180deg,#ffe066,var(--accent));
  border:none;border-radius:12px;padding:12px 40px;cursor:pointer;
  box-shadow:0 4px 14px rgba(255,204,0,.35);transition:transform .1s,box-shadow .15s;
}
.bigbtn:hover{box-shadow:0 6px 20px rgba(255,204,0,.5);}
.bigbtn:active{transform:scale(.95);}
.newbest{color:#3ddc84;font-size:13px;font-weight:700;margin-bottom:8px;animation:cpop .5s ease 2;}
/* toast */
#toast{
  position:fixed;top:18%;left:50%;transform:translateX(-50%);z-index:120;
  background:rgba(20,20,31,.95);border:1px solid var(--accent);color:var(--accent);
  padding:10px 24px;border-radius:24px;font-size:15px;font-weight:600;
  pointer-events:none;opacity:0;transition:opacity .25s,transform .25s;
  box-shadow:0 4px 20px rgba(0,0,0,.6);white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(6px);}
.hidden{display:none!important;}
</style>
</head>
<body>
<a class="back" href="../">← AI4399</a>

<div id="wrap">
  <div id="hud">
    <div class="hrow">
      <span class="badge" id="hudLevel">第 1 关</span>
      <span class="mode" id="hudMode">模式：静止</span>
      <span class="spacer"></span>
      <span class="stat">分数 <b id="hudScore">0</b></span>
      <span class="stat">最高 <b id="hudBest">0</b></span>
    </div>
    <div id="timebar"><div id="timefill"></div><span id="timetext">120s</span></div>
  </div>

  <div id="boardWrap">
    <div id="board"><canvas id="fx"></canvas></div>
  </div>

  <div id="comboZone">
    <div id="combobar"><div id="combofill"></div></div>
    <span id="comboText">连击 ×1</span>
  </div>

  <div id="items">
    <button id="btnHint"><span class="ico">💡</span>提示 ×<b>3</b></button>
    <button id="btnShuffle"><span class="ico">🔀</span>洗牌 ×<b>2</b></button>
  </div>
</div>

<div class="overlay" id="ovStart">
  <div class="panel">
    <div class="emo">🍎🍇🥕🌽🍉</div>
    <h1>果蔬连连看</h1>
    <p>
      点选两个相同的果蔬，若它们之间能用<br>
      <b style="color:var(--text)">不超过两次转弯</b>的线路相连，即可消除。<br>
      5 秒内连续消除可累积连击倍率！<br>
      每关倒计时递减，布局位移模式轮换，<br>
      消除时留意掉落的 ⏱ 加时道具。
    </p>
    <div class="nums">
      <div>历史最高<b class="gold" id="startBest">0</b></div>
    </div>
    <button class="bigbtn" id="btnStart">开始游戏</button>
  </div>
</div>

<div class="overlay hidden" id="ovClear">
  <div class="panel">
    <div class="emo">🎉</div>
    <h2 id="clearTitle">第 1 关 通过！</h2>
    <div class="nums">
      <div>时间奖励<b class="gold" id="clearBonus">+0</b></div>
      <div>当前分数<b id="clearScore">0</b></div>
    </div>
    <p id="clearNext">下一关：模式「下落塌缩」，倒计时 110 秒</p>
    <button class="bigbtn" id="btnNext">下一关 →</button>
  </div>
</div>

<div class="overlay hidden" id="ovOver">
  <div class="panel">
    <div class="emo">⏰</div>
    <h2>时间到！</h2>
    <div class="newbest hidden" id="newBest">🏆 新纪录！</div>
    <div class="nums">
      <div>到达关卡<b id="overLevel">1</b></div>
      <div>最终得分<b class="gold" id="overScore">0</b></div>
      <div>历史最高<b id="overBest">0</b></div>
    </div>
    <button class="bigbtn" id="btnRetry">再来一局</button>
  </div>
</div>

<div id="edgeGlow"></div>
<div id="toast"></div>

<script>
"use strict";
/* ================= 常量与状态 ================= */
var COLS = 14, ROWS = 8;          // 内部棋盘
var GW = COLS + 2, GH = ROWS + 2; // 含外圈空白
var TYPES = ['🍎','🍇','🍉','🍊','🍋','🍌','🍒','🍓','🥝','🍑',
             '🍍','🥭','🍆','🥕','🌽','🥦','🍅','🥒','🫑','🍐'];
/* 每种果蔬的身份主色（r,g,b），用于卡牌底光与果汁飞溅 */
var FRUIT_RGB = {
  '🍎':'255,86,74',  '🍇':'168,108,228','🍉':'255,99,118', '🍊':'255,148,46',
  '🍋':'255,222,56', '🍌':'255,212,82', '🍒':'226,38,84',  '🍓':'255,72,104',
  '🥝':'148,198,58', '🍑':'255,168,138','🍍':'248,198,68', '🥭':'255,178,58',
  '🍆':'146,82,196', '🥕':'255,128,42', '🌽':'255,208,72', '🥦':'92,178,82',
  '🍅':'255,78,58',  '🥒':'108,188,92', '🫑':'88,198,92',  '🍐':'178,216,92'
};
function fruitRGB(v){ return FRUIT_RGB[v] || '255,204,0'; }
function setTileFace(t){
  t.el.textContent = t.val;
  t.el.style.setProperty('--fc', fruitRGB(t.val));
}
var MODE_NAMES = ['静止','下落塌缩','向左聚拢','向中挤压'];
var BEST_KEY = 'ai4399-link-best';
var COMBO_WINDOW = 5000;

var $ = function(id){ return document.getElementById(id); };
var board = $('board'), boardWrap = $('boardWrap'), fxCanvas = $('fx'), ctx = fxCanvas.getContext('2d');

var grid = [];        // grid[r][c] = tile 对象 或 null
var tiles = [];       // 存活方块
var state = 'menu';   // menu | playing | clear | over
var level = 1, mode = 0, score = 0, best = 0;
var timeLeft = 120, levelTime = 120;
var selected = null;
var hintLeft = 3, shuffleLeft = 2;
var combo = 0, comboExpire = 0;
var remaining = 0;
var cell = 44, pad = 22;
var effects = [];     // canvas 特效
var tileSeq = 0;
var busyShuffle = false;

try{ best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10) || 0; }catch(e){ best = 0; }
$('hudBest').textContent = best;
$('startBest').textContent = best;

/* ================= 音效（WebAudio 合成） ================= */
var AC = null;
function ac(){
  try{
    if(!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
    if(AC.state === 'suspended') AC.resume();
    return AC;
  }catch(e){ return null; }
}
function beep(freq, dur, type, vol, slideTo, delay){
  var a = ac(); if(!a) return;
  try{
    var t0 = a.currentTime + (delay || 0);
    var o = a.createOscillator(), g = a.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, t0);
    if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol || 0.12, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(a.destination);
    o.start(t0); o.stop(t0 + dur + 0.05);
  }catch(e){}
}
function sSelect(){ beep(700, 0.07, 'triangle', 0.08); }
function sMatch(c){
  var f = 480 * Math.pow(1.08, Math.min(c, 12));
  beep(f, 0.1, 'triangle', 0.14);
  beep(f * 1.5, 0.14, 'triangle', 0.12, 0, 0.06);
  beep(f * 2, 0.2, 'sine', 0.07, 0, 0.1);
}
function sFail(){ beep(180, 0.16, 'sawtooth', 0.09, 90); }
function sShuffle(){ for(var i = 0; i < 5; i++) beep(300 + Math.random() * 500, 0.06, 'square', 0.05, 0, i * 0.04); }
function sClear(){ var n = [523, 659, 784, 1047]; for(var i = 0; i < 4; i++) beep(n[i], 0.22, 'triangle', 0.13, 0, i * 0.11); }
function sOver(){ var n = [440, 349, 294, 220]; for(var i = 0; i < 4; i++) beep(n[i], 0.3, 'sawtooth', 0.08, 0, i * 0.16); }

/* ================= 布局尺寸 ================= */
function layout(){
  var availW = Math.min(window.innerWidth - 16, 780);
  var availH = window.innerHeight - 200;
  var byW = Math.floor(availW / (COLS + 1));
  var byH = Math.floor(availH / (ROWS + 1));
  cell = Math.max(20, Math.min(byW, byH, 54));
  pad = Math.round(cell * 0.5);
  var W = COLS * cell + pad * 2, H = ROWS * cell + pad * 2;
  board.style.width = W + 'px';
  board.style.height = H + 'px';
  $('hud').style.width = W + 'px';
  $('comboZone').style.width = W + 'px';
  $('items').style.width = W + 'px';
  var dpr = window.devicePixelRatio || 1;
  fxCanvas.width = W * dpr; fxCanvas.height = H * dpr;
  fxCanvas.style.width = W + 'px'; fxCanvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  for(var i = 0; i < tiles.length; i++) placeTile(tiles[i]);
}
function px(c){ // 列中心 x（含外圈，外圈贴边）
  var x = pad + (c - 1) * cell + cell / 2;
  var W = COLS * cell + pad * 2;
  return Math.max(4, Math.min(W - 4, x));
}
function py(r){
  var y = pad + (r - 1) * cell + cell / 2;
  var H = ROWS * cell + pad * 2;
  return Math.max(4, Math.min(H - 4, y));
}
function placeTile(t){
  var s = t.el.style;
  s.width = (cell - 4) + 'px';
  s.height = (cell - 4) + 'px';
  s.left = (pad + (t.c - 1) * cell + 2) + 'px';
  s.top = (pad + (t.r - 1) * cell + 2) + 'px';
  s.fontSize = Math.round(cell * 0.58) + 'px';
}

/* ================= 棋盘生成 ================= */
function emptyGrid(){
  grid = [];
  for(var r = 0; r < GH; r++){
    grid.push([]);
    for(var c = 0; c < GW; c++) grid[r].push(null);
  }
}
function buildBoard(){
  emptyGrid();
  for(var i = 0; i < tiles.length; i++) if(tiles[i].el.parentNode) tiles[i].el.remove();
  tiles = [];
  board.querySelectorAll('.drop,.float').forEach(function(d){ d.remove(); });
  var vals = [];
  var pairs = COLS * ROWS / 2;
  for(var p = 0; p < pairs; p++){ var v = TYPES[p % TYPES.length]; vals.push(v, v); }
  shuffleArr(vals);
  var k = 0;
  for(var r = 1; r <= ROWS; r++){
    for(var c = 1; c <= COLS; c++){
      var t = { id: ++tileSeq, val: vals[k++], r: r, c: c, el: document.createElement('div') };
      t.el.className = 'tile born';
      setTileFace(t);
      t.el.style.animationDelay = (((r - 1) * COLS + c) * 6) + 'ms';
      t.el._tile = t;
      board.appendChild(t.el);
      grid[r][c] = t;
      tiles.push(t);
    }
  }
  remaining = tiles.length;
  layout();
  // 保证开局有解
  var guard = 0;
  while(!findAnyMove() && guard++ < 200) permuteValues();
  setTimeout(function(){
    for(var i = 0; i < tiles.length; i++){ tiles[i].el.classList.remove('born'); tiles[i].el.style.animationDelay = ''; }
  }, 1200);
}
function shuffleArr(a){
  for(var i = a.length - 1; i > 0; i--){
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
}
function permuteValues(){
  var vs = tiles.map(function(t){ return t.val; });
  shuffleArr(vs);
  for(var i = 0; i < tiles.length; i++){ tiles[i].val = vs[i]; setTileFace(tiles[i]); }
}

/* ================= 连通判定（≤2 转折） ================= */
function isEmpty(r, c){ return !grid[r][c]; }
function rowClear(r, c1, c2){
  var a = Math.min(c1, c2) + 1, b = Math.max(c1, c2) - 1;
  for(var c = a; c <= b; c++) if(grid[r][c]) return false;
  return true;
}
function colClear(c, r1, r2){
  var a = Math.min(r1, r2) + 1, b = Math.max(r1, r2) - 1;
  for(var r = a; r <= b; r++) if(grid[r][c]) return false;
  return true;
}
function findPath(t1, t2){
  var r1 = t1.r, c1 = t1.c, r2 = t2.r, c2 = t2.c;
  // 直连
  if(r1 === r2 && rowClear(r1, c1, c2)) return [[r1, c1], [r2, c2]];
  if(c1 === c2 && colClear(c1, r1, r2)) return [[r1, c1], [r2, c2]];
  // 一折
  if(isEmpty(r1, c2) && rowClear(r1, c1, c2) && colClear(c2, r1, r2))
    return [[r1, c1], [r1, c2], [r2, c2]];
  if(isEmpty(r2, c1) && colClear(c1, r1, r2) && rowClear(r2, c1, c2))
    return [[r1, c1], [r2, c1], [r2, c2]];
  // 二折：竖直桥（含外圈 c=0 / c=COLS+1）
  var bestP = null, bestLen = Infinity, len;
  for(var c = 0; c < GW; c++){
    if(c === c1 || c === c2) continue;
    if(isEmpty(r1, c) && isEmpty(r2, c) &&
       rowClear(r1, c1, c) && colClear(c, r1, r2) && rowClear(r2, c, c2)){
      len = Math.abs(c - c1) + Math.abs(c - c2) + Math.abs(r1 - r2);
      if(len < bestLen){ bestLen = len; bestP = [[r1, c1], [r1, c], [r2, c], [r2, c2]]; }
    }
  }
  // 二折：水平桥（含外圈 r=0 / r=ROWS+1）
  for(var r = 0; r < GH; r++){
    if(r === r1 || r === r2) continue;
    if(isEmpty(r, c1) && isEmpty(r, c2) &&
       colClear(c1, r1, r) && rowClear(r, c1, c2) && colClear(c2, r, r2)){
      len = Math.abs(r - r1) + Math.abs(r - r2) + Math.abs(c1 - c2);
      if(len < bestLen){ bestLen = len; bestP = [[r1, c1], [r, c1], [r, c2], [r2, c2]]; }
    }
  }
  return bestP;
}
function findAnyMove(){
  var byVal = {};
  for(var i = 0; i < tiles.length; i++){
    var t = tiles[i];
    (byVal[t.val] = byVal[t.val] || []).push(t);
  }
  for(var v in byVal){
    var arr = byVal[v];
    for(var a = 0; a < arr.length; a++)
      for(var b = a + 1; b < arr.length; b++)
        if(findPath(arr[a], arr[b])) return [arr[a], arr[b]];
  }
  return null;
}

/* ================= 选择与消除 ================= */
board.addEventListener('click', function(e){
  if(state !== 'playing') return;
  var dropEl = e.target.closest ? e.target.closest('.drop') : null;
  if(dropEl){ pickupDrop(dropEl); return; }
  var el = e.target.closest ? e.target.closest('.tile') : null;
  if(!el || !el._tile || el.classList.contains('dead')) return;
  var t = el._tile;
  if(selected === t){ deselect(); sSelect(); return; }
  if(!selected){ select(t); sSelect(); return; }
  if(selected.val !== t.val){ deselect(); select(t); sSelect(); return; }
  tryMatch(selected, t);
});
function select(t){ selected = t; t.el.classList.add('sel'); }
function deselect(){ if(selected){ selected.el.classList.remove('sel'); selected = null; } }

function tryMatch(t1, t2){
  var path = findPath(t1, t2);
  if(!path){
    sFail();
    t2.el.classList.add('sel');
    t1.el.classList.add('shake'); t2.el.classList.add('shake');
    setTimeout(function(){
      t1.el.classList.remove('shake', 'sel');
      t2.el.classList.remove('shake', 'sel');
    }, 320);
    selected = null;
    return;
  }
  deselect();
  // 连击计算
  var now = performance.now();
  if(now < comboExpire) combo++; else combo = 1;
  comboExpire = now + COMBO_WINDOW;
  var mult = 1 + (combo - 1) * 0.25;
  var gain = Math.round((20 + (level - 1) * 4) * mult);
  score += gain;
  updateHUD();
  sMatch(combo);
  if(combo > 1){
    var ct = $('comboText');
    ct.classList.remove('pop'); void ct.offsetWidth; ct.classList.add('pop');
  }
  // 从棋盘移除
  grid[t1.r][t1.c] = null; grid[t2.r][t2.c] = null;
  tiles = tiles.filter(function(x){ return x !== t1 && x !== t2; });
  remaining -= 2;
  // 特效
  addLineEffect(path, fruitRGB(t1.val));
  burst(t1); burst(t2);
  killTile(t1); killTile(t2);
  var mx = (px(t1.c) + px(t2.c)) / 2, my = (py(t1.r) + py(t2.r)) / 2;
  var FRUITY = ['#ffd34d', '#ff9d4d', '#ff6b8a', '#a6e35d', '#5dd9c1', '#c79bff'];
  floatText('+' + gain + (combo > 1 ? '  ×' + combo : ''), mx, my, false,
            combo > 1 ? FRUITY[combo % FRUITY.length] : null);
  // 加时道具掉落
  if(Math.random() < 0.12) spawnDrop(Math.random() < 0.5 ? t1 : t2);
  if(remaining === 0){ setTimeout(levelClear, 420); return; }
  setTimeout(function(){
    if(state !== 'playing') return;
    applyGravity();
    setTimeout(checkDeadlock, 260);
  }, 180);
}
function killTile(t){
  t.el.classList.remove('sel', 'hint');
  t.el.classList.add('dead');
  setTimeout(function(){ if(t.el.parentNode) t.el.remove(); }, 340);
}
function floatText(txt, x, y, green, colorCss){
  var f = document.createElement('div');
  f.className = 'float' + (green ? ' green' : '');
  f.textContent = txt;
  if(colorCss){
    f.style.color = colorCss;
    f.style.textShadow = '0 0 10px ' + colorCss + ',0 2px 3px rgba(0,0,0,.8)';
  }

  f.style.fontSize = Math.max(14, Math.round(cell * 0.42)) + 'px';
  board.appendChild(f);
  setTimeout(function(){ f.remove(); }, 900);
}

/* ================= 位移模式 ================= */
function moveTo(t, r, c){
  grid[t.r][t.c] = null;
  t.r = r; t.c = c;
  grid[r][c] = t;
  placeTile(t);
}
function applyGravity(){
  var r, c, write;
  if(mode === 1){            // 向下塌缩
    for(c = 1; c <= COLS; c++){
      write = ROWS;
      for(r = ROWS; r >= 1; r--){
        if(grid[r][c]){ if(r !== write) moveTo(grid[r][c], write, c); write--; }
      }
    }
  } else if(mode === 2){     // 向左聚拢
    for(r = 1; r <= ROWS; r++){
      write = 1;
      for(c = 1; c <= COLS; c++){
        if(grid[r][c]){ if(c !== write) moveTo(grid[r][c], r, write); write++; }
      }
    }
  } else if(mode === 3){     // 向中间挤压（左半向右靠，右半向左靠）
    var mid = COLS / 2; // 7
    for(r = 1; r <= ROWS; r++){
      write = mid;
      for(c = mid; c >= 1; c--){
        if(grid[r][c]){ if(c !== write) moveTo(grid[r][c], r, write); write--; }
      }
      write = mid + 1;
      for(c = mid + 1; c <= COLS; c++){
        if(grid[r][c]){ if(c !== write) moveTo(grid[r][c], r, write); write++; }
      }
    }
  }
}

/* ================= 死局与洗牌 ================= */
function checkDeadlock(){
  if(state !== 'playing' || remaining === 0 || busyShuffle) return;
  if(!findAnyMove()){
    toast('无可消，自动洗牌');
    doShuffle(true);
  }
}
function doShuffle(free){
  if(busyShuffle || state !== 'playing' || remaining === 0) return;
  if(!free){
    if(shuffleLeft <= 0) return;
    shuffleLeft--;
    updateItems();
  }
  busyShuffle = true;
  deselect();
  clearHints();
  sShuffle();
  // 卡牌翻飞特效
  var fxW = fxCanvas.clientWidth, fxH = fxCanvas.clientHeight, fxNow = performance.now();
  for(var fi = 0; fi < 10; fi++){
    effects.push({ kind: 'card',
      x: fxW / 2 + (Math.random() - 0.5) * fxW * 0.3,
      y: fxH / 2 + (Math.random() - 0.5) * fxH * 0.3,
      vx: (Math.random() - 0.5) * 7, vy: (Math.random() - 0.5) * 5,
      rot: Math.random() * Math.PI, vr: (Math.random() - 0.5) * 0.35,
      t0: fxNow, life: 600 + Math.random() * 250 });
  }
  var i;
  for(i = 0; i < tiles.length; i++) tiles[i].el.classList.add('swirl');
  setTimeout(function(){
    var guard = 0;
    do{ permuteValues(); }while(!findAnyMove() && ++guard < 200);
    if(!findAnyMove()) forceSolvable();
    for(var j = 0; j < tiles.length; j++) tiles[j].el.classList.remove('swirl');
    busyShuffle = false;
  }, 260);
}
function forceSolvable(){
  // 找一对可连通的位置，把它们的值配成一对（保持各值偶数个）
  for(var a = 0; a < tiles.length; a++){
    for(var b = a + 1; b < tiles.length; b++){
      var p = tiles[a], q = tiles[b];
      if(findPath(p, q)){
        if(p.val === q.val) return;
        for(var k = 0; k < tiles.length; k++){
          var t = tiles[k];
          if(t !== p && t !== q && t.val === p.val){
            t.val = q.val; setTileFace(t);
            q.val = p.val; setTileFace(q);
            return;
          }
        }
      }
    }
  }
}

/* ================= Canvas 特效 ================= */
function addLineEffect(path, col){
  var pts = path.map(function(p){ return [px(p[1]), py(p[0])]; });
  var total = 0, segs = [];
  for(var i = 0; i < pts.length - 1; i++){
    var L = Math.abs(pts[i + 1][0] - pts[i][0]) + Math.abs(pts[i + 1][1] - pts[i][1]);
    segs.push(L); total += L;
  }
  effects.push({ kind: 'line', pts: pts, segs: segs, total: Math.max(total, 1), col: col || '255,204,0', t0: performance.now() });
}
function burst(t){
  var x = px(t.c), y = py(t.r);
  var col = fruitRGB(t.val);
  var nowT = performance.now();
  effects.push({ kind: 'ring', x: x, y: y, col: col, t0: nowT, life: 380, r0: cell * 0.2, r1: cell * 0.95 });
  for(var i = 0; i < 16; i++){
    var ang = Math.random() * Math.PI * 2;
    var sp = (0.5 + Math.random() * 2.4) * cell / 16;
    effects.push({
      kind: 'juice', x: x, y: y,
      vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp - 0.9,
      size: (1.6 + Math.random() * 3.4) * (cell / 44),
      col: col,
      t0: nowT, life: 480 + Math.random() * 340
    });
  }
}
function strokePoly(poly){
  ctx.beginPath();
  ctx.moveTo(poly[0][0], poly[0][1]);
  for(var i = 1; i < poly.length; i++) ctx.lineTo(poly[i][0], poly[i][1]);
  ctx.stroke();
}
function easeOutQ(k){ return 1 - (1 - k) * (1 - k); }
function drawGlow(x, y, rad, a){
  var g = ctx.createRadialGradient(x, y, 0, x, y, rad);
  g.addColorStop(0, 'rgba(255,240,170,' + (0.5 * a).toFixed(3) + ')');
  g.addColorStop(0.55, 'rgba(255,214,80,' + (0.22 * a).toFixed(3) + ')');
  g.addColorStop(1, 'rgba(255,214,80,0)');
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}
function renderFx(now){
  var W = fxCanvas.clientWidth, H = fxCanvas.clientHeight;
  ctx.clearRect(0, 0, W, H);
  var alive = [], spawned = [];
  for(var i = 0; i < effects.length; i++){
    var e = effects[i], age = now - e.t0, k, j;
    if(e.kind === 'line'){
      var DRAW = 250, FADE = 220;
      if(age > DRAW + FADE) continue;
      var prog = Math.min(1, age / DRAW);
      var alpha = age <= DRAW ? 1 : 1 - (age - DRAW) / FADE;
      // 已绘制折线 + 流光头部位置
      var remain = e.total * prog;
      var hx = e.pts[0][0], hy = e.pts[0][1];
      var poly = [[hx, hy]];
      for(var s = 0; s < e.segs.length && remain > 0; s++){
        var p0 = e.pts[s], p1 = e.pts[s + 1], L = e.segs[s];
        if(remain >= L){ hx = p1[0]; hy = p1[1]; poly.push([hx, hy]); remain -= L; }
        else{
          var f = remain / L;
          hx = p0[0] + (p1[0] - p0[0]) * f; hy = p0[1] + (p1[1] - p0[1]) * f;
          poly.push([hx, hy]); remain = 0;
        }
      }
      var lp0 = e.pts[0], lp1 = e.pts[e.pts.length - 1];
      var grad = ctx.createLinearGradient(lp0[0], lp0[1], lp1[0], lp1[1]);
      grad.addColorStop(0, 'rgba(' + e.col + ',0.55)');
      grad.addColorStop(0.6, 'rgba(' + e.col + ',0.95)');
      grad.addColorStop(1, 'rgba(255,224,102,1)');
      ctx.save();
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.strokeStyle = grad;
      // 外层柔光带
      ctx.globalAlpha = alpha * 0.3;
      ctx.lineWidth = Math.max(7, cell * 0.26);
      strokePoly(poly);
      // 内芯亮线
      ctx.globalAlpha = alpha;
      ctx.lineWidth = Math.max(2.5, cell * 0.09);
      ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 12;
      strokePoly(poly);
      ctx.restore();
      // 头部光点 + 沿途星尘
      if(age <= DRAW){
        ctx.save();
        ctx.fillStyle = '#fff8d0';
        ctx.shadowColor = '#ffe066'; ctx.shadowBlur = 16;
        ctx.beginPath(); ctx.arc(hx, hy, Math.max(3, cell * 0.13), 0, Math.PI * 2); ctx.fill();
        ctx.restore();
        for(j = 0; j < 2; j++){
          spawned.push({ kind: 'dust',
            x: hx + (Math.random() - 0.5) * 6, y: hy + (Math.random() - 0.5) * 6,
            vx: (Math.random() - 0.5) * 0.9, vy: (Math.random() - 0.5) * 0.9 - 0.2,
            size: 0.8 + Math.random() * 1.6,
            col: Math.random() < 0.5 ? '255,224,102' : e.col,
            t0: now, life: 320 + Math.random() * 280 });
        }
      }
      alive.push(e);
    } else if(e.kind === 'dust'){
      if(age > e.life) continue;
      k = 1 - age / e.life;
      e.x += e.vx; e.y += e.vy;
      ctx.globalAlpha = k * 0.9;
      ctx.fillStyle = 'rgba(' + e.col + ',1)';
      ctx.beginPath(); ctx.arc(e.x, e.y, e.size * k + 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
      alive.push(e);
    } else if(e.kind === 'juice'){
      if(age > e.life) continue;
      k = 1 - age / e.life;
      e.x += e.vx; e.y += e.vy; e.vy += 0.08; e.vx *= 0.985;
      ctx.globalAlpha = Math.min(1, k * 1.4);
      ctx.fillStyle = 'rgba(' + e.col + ',1)';
      ctx.beginPath(); ctx.arc(e.x, e.y, Math.max(0.4, e.size * (0.5 + k * 0.6)), 0, Math.PI * 2); ctx.fill();
      if(k > 0.5){ // 液滴高光
        ctx.globalAlpha = (k - 0.5) * 1.2;
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.beginPath(); ctx.arc(e.x - e.size * 0.25, e.y - e.size * 0.25, Math.max(0.3, e.size * 0.22), 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      alive.push(e);
    } else if(e.kind === 'ring'){
      if(age > e.life) continue;
      k = age / e.life;
      ctx.save();
      ctx.globalAlpha = (1 - k) * 0.8;
      ctx.strokeStyle = 'rgba(' + e.col + ',1)';
      ctx.lineWidth = Math.max(1.5, cell * 0.07 * (1 - k) + 0.5);
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r0 + (e.r1 - e.r0) * easeOutQ(k), 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
      alive.push(e);
    } else if(e.kind === 'glowspot'){
      if(age > e.life) continue;
      var ain = Math.min(1, age / 200), aout = Math.min(1, (e.life - age) / 400);
      var ga = Math.min(ain, aout) * (0.75 + 0.25 * Math.sin(age / 130));
      drawGlow(e.x, e.y, e.rad, ga);
      drawGlow(e.x2, e.y2, e.rad, ga);
      alive.push(e);
    } else if(e.kind === 'card'){
      if(age > e.life) continue;
      k = 1 - age / e.life;
      e.x += e.vx; e.y += e.vy; e.vx *= 0.96; e.vy *= 0.96; e.rot += e.vr;
      ctx.save();
      ctx.translate(e.x, e.y); ctx.rotate(e.rot);
      ctx.globalAlpha = k * 0.9;
      var cw = cell * 0.52, chh = cell * 0.66;
      ctx.fillStyle = '#f7ecd2';
      ctx.strokeStyle = 'rgba(255,204,0,0.7)'; ctx.lineWidth = 1.5;
      if(ctx.roundRect){
        ctx.beginPath(); ctx.roundRect(-cw / 2, -chh / 2, cw, chh, 4);
        ctx.fill(); ctx.stroke();
      } else {
        ctx.fillRect(-cw / 2, -chh / 2, cw, chh);
        ctx.strokeRect(-cw / 2, -chh / 2, cw, chh);
      }
      ctx.restore();
      alive.push(e);
    } else if(e.kind === 'conf'){
      if(age > e.life) continue;
      k = 1 - age / e.life;
      e.x += e.vx + Math.sin(now / 300 + e.ph) * 0.5; e.y += e.vy; e.rot += e.vr;
      ctx.save();
      ctx.translate(e.x, e.y); ctx.rotate(e.rot);
      ctx.globalAlpha = Math.min(1, k * 1.6);
      ctx.fillStyle = e.col;
      ctx.fillRect(-e.w / 2, -e.h / 2, e.w, e.h * (0.4 + 0.6 * Math.abs(Math.sin(age / 130 + e.ph))));
      ctx.restore();
      alive.push(e);
    } else { // 兼容旧 spark
      if(age > e.life) continue;
      k = 1 - age / e.life;
      e.x += e.vx; e.y += e.vy; e.vy += 0.06;
      ctx.globalAlpha = k;
      ctx.fillStyle = 'hsl(' + e.hue + ',95%,65%)';
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size * k + 0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      alive.push(e);
    }
  }
  effects = spawned.length ? alive.concat(spawned) : alive;
}

/* ================= HUD / 计时 / 连击条 ================= */
function updateHUD(){
  $('hudLevel').textContent = '第 ' + level + ' 关';
  $('hudMode').textContent = '模式：' + MODE_NAMES[mode];
  $('hudScore').textContent = score;
  if(score > best){
    best = score;
    $('hudBest').textContent = best;
  }
}
var lastTs = 0, lastTickSec = -1;
function loop(ts){
  var dt = lastTs ? Math.min((ts - lastTs) / 1000, 0.05) : 0;
  lastTs = ts;
  if(state === 'playing'){
    timeLeft -= dt;
    if(timeLeft <= 0){ timeLeft = 0; gameOver(); }
    var frac = Math.max(0, timeLeft / levelTime);
    $('timefill').style.width = (frac * 100) + '%';
    $('timetext').textContent = Math.ceil(timeLeft) + 's';
    $('timefill').classList.toggle('low', timeLeft <= 15);
    if(timeLeft <= 10 && timeLeft > 0){
      var sec = Math.ceil(timeLeft);
      if(sec !== lastTickSec){ lastTickSec = sec; sTick(); }
    }
    // 连击条
    var now = performance.now();
    var cLeft = comboExpire - now;
    if(cLeft > 0 && combo > 0){
      $('combobar').classList.add('on');
      $('comboText').classList.add('on');
      $('combofill').style.width = (cLeft / COMBO_WINDOW * 100) + '%';
      $('comboText').textContent = '连击 ×' + combo + '（' + (1 + (combo - 1) * 0.25).toFixed(2) + '倍）';
      $('edgeGlow').classList.toggle('on', combo >= 4);
    } else {
      if(combo > 0){ combo = 0; }
      $('combobar').classList.remove('on');
      $('comboText').classList.remove('on');
      $('combofill').style.width = '0%';
      $('comboText').textContent = '连击 ×1';
      $('edgeGlow').classList.remove('on');
    }
  }
  renderFx(ts);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ================= 游戏流程 ================= */
function startGame(){
  score = 0; level = 1; hintLeft = 3; shuffleLeft = 2;
  combo = 0; comboExpire = 0;
  startLevel();
}
function startLevel(){
  mode = (level - 1) % 4;
  levelTime = Math.max(60, 120 - (level - 1) * 10);
  timeLeft = levelTime;
  combo = 0; comboExpire = 0;
  selected = null;
  effects = [];
  busyShuffle = false;
  buildBoard();
  updateHUD();
  updateItems();
  $('ovStart').classList.add('hidden');
  $('ovClear').classList.add('hidden');
  $('ovOver').classList.add('hidden');
  $('edgeGlow').classList.remove('on');
  state = 'playing';
}
function levelClear(){
  if(state !== 'playing') return;
  state = 'clear';
  deselect(); clearHints();
  $('edgeGlow').classList.remove('on');
  // 彩带庆祝
  var cw = fxCanvas.clientWidth, cnow = performance.now();
  var PAL = ['#ff6b8a', '#ffb347', '#ffe066', '#a6e35d', '#5dd9c1', '#c79bff', '#ff8c42'];
  for(var ci = 0; ci < 90; ci++){
    effects.push({ kind: 'conf',
      x: Math.random() * cw, y: -10 - Math.random() * 70,
      vx: (Math.random() - 0.5) * 1.6, vy: 1.2 + Math.random() * 2.4,
      rot: Math.random() * Math.PI, vr: (Math.random() - 0.5) * 0.3,
      ph: Math.random() * Math.PI * 2,
      w: 3 + Math.random() * 5, h: 6 + Math.random() * 6,
      col: PAL[ci % PAL.length],
      t0: cnow + Math.random() * 400, life: 1500 + Math.random() * 900 });
  }
  var bonus = Math.ceil(timeLeft) * 5;
  score += bonus;
  updateHUD();
  saveBest();
  sClear();
  $('clearTitle').textContent = '第 ' + level + ' 关 通过！';
  $('clearBonus').textContent = '+' + bonus;
  $('clearScore').textContent = score;
  var nm = level % 4, nt = Math.max(60, 120 - level * 10);
  $('clearNext').textContent = '下一关：模式「' + MODE_NAMES[nm] + '」，倒计时 ' + nt + ' 秒';
  setTimeout(function(){ $('ovClear').classList.remove('hidden'); }, 500);
}
function gameOver(){
  if(state !== 'playing') return;
  state = 'over';
  deselect(); clearHints();
  $('edgeGlow').classList.remove('on');
  sOver();
  var isNew = saveBest();
  $('overLevel').textContent = level;
  $('overScore').textContent = score;
  $('overBest').textContent = best;
  $('newBest').classList.toggle('hidden', !isNew);
  setTimeout(function(){ $('ovOver').classList.remove('hidden'); }, 400);
}
function saveBest(){
  var isNew = false;
  try{
    var old = parseInt(localStorage.getItem(BEST_KEY) || '0', 10) || 0;
    if(score > old){ localStorage.setItem(BEST_KEY, String(score)); isNew = true; }
  }catch(e){}
  if(score > best) best = score;
  $('hudBest').textContent = best;
  $('startBest').textContent = best;
  return isNew;
}
function toast(msg){
  var t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tm);
  t._tm = setTimeout(function(){ t.classList.remove('show'); }, 1700);
}

$('btnStart').addEventListener('click', function(){ ac(); startGame(); });
$('btnRetry').addEventListener('click', function(){ startGame(); });
$('btnNext').addEventListener('click', function(){ level++; startLevel(); });
window.addEventListener('resize', layout);

/* 背景飘落叶子氛围（纯装饰） */
(function(){
  var EMO = ['🍃', '🍂', '🍃', '✨', '🍃', '🍂', '✨', '🍃'];
  for(var i = 0; i < 10; i++){
    var s = document.createElement('span');
    s.className = 'leaf';
    s.textContent = EMO[i % EMO.length];
    s.style.left = (Math.random() * 100) + 'vw';
    s.style.fontSize = (10 + Math.random() * 14) + 'px';
    s.style.animationDuration = (10 + Math.random() * 12) + 's';
    s.style.animationDelay = (-Math.random() * 22) + 's';
    document.body.appendChild(s);
  }
})();

layout();
