<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>黄金矿工 · AI4399</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{background:#0a0a12;color:#e8e8f0;font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
display:flex;align-items:center;justify-content:center;touch-action:none;user-select:none;-webkit-user-select:none}
#back{position:fixed;top:10px;left:12px;z-index:50;color:#e8e8f0;background:rgba(20,20,31,.55);
border:1px solid rgba(42,42,61,.8);border-radius:8px;padding:4px 12px;font-size:14px;text-decoration:none;opacity:.75}
#back:hover{opacity:1;color:#ffcc00}
#wrap{position:relative}
canvas{display:block;touch-action:none;border-radius:10px;box-shadow:0 0 40px rgba(0,0,0,.6)}
.scr{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;
background:rgba(10,10,18,.78);border-radius:10px;backdrop-filter:blur(2px)}
.panel{background:#14141f;border:1px solid #2a2a3d;border-radius:14px;padding:22px 26px;text-align:center;
max-width:min(92%,560px);max-height:94%;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.panel h1{color:#ffcc00;font-size:30px;letter-spacing:6px;margin-bottom:4px;text-shadow:0 0 18px rgba(255,204,0,.35)}
.panel h2{color:#ffcc00;font-size:22px;margin-bottom:8px}
.sub{color:#8888a0;font-size:13px;margin-bottom:14px}
.rules{text-align:left;font-size:13.5px;line-height:1.85;color:#e8e8f0;background:#0a0a12;
border:1px solid #2a2a3d;border-radius:10px;padding:12px 16px;margin-bottom:14px}
.rules b{color:#ffcc00;font-weight:600}
.best{color:#8888a0;font-size:13px;margin-bottom:14px}
.best em{color:#ffcc00;font-style:normal;font-weight:600}
button.big{background:linear-gradient(180deg,#ffcc00,#e0a800);color:#1a1200;border:0;border-radius:10px;
padding:12px 44px;font-size:18px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:3px;
box-shadow:0 4px 14px rgba(255,204,0,.3)}
button.big:active{transform:translateY(2px)}
#shopGoods{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:12px 0 16px;text-align:left}
@media (max-width:560px){#shopGoods{grid-template-columns:1fr}}
.good{display:flex;gap:10px;align-items:center;background:#0a0a12;border:1px solid #2a2a3d;border-radius:10px;padding:8px 10px}
.good canvas{border-radius:6px;flex:0 0 auto;box-shadow:none}
.good .gi{flex:1;min-width:0}
.good .gn{font-size:14px;font-weight:600}
.good .gd{font-size:11px;color:#8888a0;line-height:1.4;margin-top:2px}
.good button{background:#2a2a3d;color:#ffcc00;border:1px solid #3d3d57;border-radius:8px;padding:6px 10px;
font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
.good button:disabled{opacity:.38;cursor:default;color:#8888a0}
.good.bought button{color:#7fd97f;border-color:#2f4d2f}
/* 木质商店柜台 */
#shopScr .panel{background:linear-gradient(180deg,#4b3015,#2e1c0c 70%,#241408);border:2px solid #6b4a26;
box-shadow:0 8px 32px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,200,120,.18),inset 0 0 70px rgba(0,0,0,.4)}
#shopScr h2{color:#ffd24a;text-shadow:0 1px 0 #000,0 0 16px rgba(255,180,60,.25)}
#shopScr .sub{color:#c9a05a}
#shopScr .good{background:linear-gradient(180deg,#3a2410,#241608);border:1px solid #5e3e1d;
box-shadow:inset 0 1px 0 rgba(255,200,120,.08)}
#shopScr .good .gd{color:#a8895e}
#shopScr .good button{background:linear-gradient(180deg,#6b4a26,#4b3015);color:#ffd24a;border:1px solid #8a6432}
#shopScr .good button:disabled{color:#7a6648}
#shopScr .good.bought{border-color:#3f6b2f;box-shadow:inset 0 0 14px rgba(90,200,90,.14)}
#shopScr .good.bought button{background:#1d2e16;color:#7fd97f;border-color:#3f6b2f}
.own{color:#7fd97f;font-size:11px;font-weight:400;margin-left:5px}
.stat{font-size:15px;line-height:2;margin-bottom:14px}
.stat em{color:#ffcc00;font-style:normal;font-weight:700;font-size:20px}
#banner{position:absolute;left:0;right:0;top:34%;text-align:center;z-index:9;pointer-events:none;
opacity:0;transition:opacity .35s}
#banner .b1{font-size:34px;font-weight:700;color:#ffcc00;letter-spacing:8px;text-shadow:0 2px 14px rgba(0,0,0,.8)}
#banner .b2{font-size:18px;color:#e8e8f0;margin-top:6px;text-shadow:0 2px 8px rgba(0,0,0,.8)}
.hide{display:none!important}
</style>
</head>
<body>
<a id="back" href="../">← AI4399</a>
<div id="wrap">
<canvas id="cv"></canvas>
<div id="banner"><div class="b1"></div><div class="b2"></div></div>

<div id="startScr" class="scr"><div class="panel">
<h1>黄金矿工</h1>
<div class="sub">AI4399 · 经典摆钩抓金块</div>
<div class="rules">
<b>玩法</b>：钩子在矿工下方自动左右摆动，按 <b>↓ / 空格</b> 或 <b>点按屏幕</b> 沿当前角度放钩。
勾住物品后收回换钱——<b>物品越重收得越慢</b>，大金块要慢慢拖，小钻石嗖一下就回来。<br>
<b>目标</b>：每关 60 秒，开局给出目标金额，达标过关，未达标游戏结束。<br>
<b>物品</b>：金块 100/250/500 · 钻石 600 · 石头 20 · 老鼠 50（叼钻石 650）· 神秘袋随机 · TNT 桶勾到会爆炸！<br>
<b>道具</b>：关间商店购买，仅下一关生效；收钩中按 <b>1</b> 或点按按钮引爆炸药丢掉钩中重物。
</div>
<div class="best" id="bestLine"></div>
<button class="big" id="startBtn">开始挖矿</button>
</div></div>

<div id="shopScr" class="scr hide"><div class="panel">
<h2 id="shopTitle">矿工商店</h2>
<div class="sub" id="shopSub"></div>
<div id="shopGoods"></div>
<button class="big" id="nextBtn">下一关 ▶</button>
</div></div>

<div id="overScr" class="scr hide"><div class="panel">
<h2 id="overTitle">游戏结束</h2>
<div class="stat" id="overStat"></div>
<div class="best" id="overBest"></div>
<button class="big" id="againBtn">再来一次</button>
</div></div>
</div>

<script>
'use strict';
/* ============ 基础 ============ */
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=960,H=600,GY=112;            // 逻辑尺寸 / 地表线
const PX=W/2,PY=GY+8;                // 钩子轴心
let scale=1,dpr=1;
function resize(){
  const aw=innerWidth-10,ah=innerHeight-10;
  scale=Math.min(aw/W,ah/H);
  dpr=Math.min(devicePixelRatio||1,2);
  cv.width=Math.round(W*scale*dpr);cv.height=Math.round(H*scale*dpr);
  cv.style.width=(W*scale)+'px';cv.style.height=(H*scale)+'px';
}
addEventListener('resize',resize);resize();
const R=(a,b)=>a+Math.random()*(b-a);
const RI=(a,b)=>Math.floor(R(a,b+1));
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const TAU=Math.PI*2;

/* ============ 离屏精灵（预渲染，主循环零渐变创建） ============ */
const SS=2; // 精灵超采样
function mkC(w,h,fn){
  const c=document.createElement('canvas');
  c.width=Math.ceil(w*SS);c.height=Math.ceil(h*SS);
  c.lw=w;c.lh=h;
  const x=c.getContext('2d');x.scale(SS,SS);
  fn(x,w,h);
  return c;
}
function star4(c,x,y,r,rot){ // 四角星闪光（fillStyle 由调用方设置）
  c.save();c.translate(x,y);c.rotate(rot||0);
  c.beginPath();
  for(let i=0;i<8;i++){
    const a=i/8*TAU-Math.PI/2,rr=i%2?r*.32:r;
    i?c.lineTo(Math.cos(a)*rr,Math.sin(a)*rr):c.moveTo(Math.cos(a)*rr,Math.sin(a)*rr);
  }
  c.closePath();c.fill();c.restore();
}
const LAMP={x:PX+96,y:GY-46}; // 油灯位置
/* —— 背景全图（天空+矿层剖面+草皮+矿车+油灯），一次生成 —— */
const bgC=mkC(W,H,c=>{
  // 黄昏天空
  let g=c.createLinearGradient(0,0,0,GY);
  g.addColorStop(0,'#241936');g.addColorStop(.45,'#6e3530');g.addColorStop(.82,'#b35f2e');g.addColorStop(1,'#d98c3c');
  c.fillStyle=g;c.fillRect(0,0,W,GY);
  c.fillStyle='#ffeed2';
  for(let i=0;i<16;i++){c.globalAlpha=R(.15,.55);c.fillRect(R(0,W),R(4,36),1.6,1.6);}
  c.globalAlpha=1;
  // 落日光晕
  g=c.createRadialGradient(W-310,GY-20,5,W-310,GY-20,86);
  g.addColorStop(0,'rgba(255,225,140,.85)');g.addColorStop(.45,'rgba(255,180,90,.28)');g.addColorStop(1,'rgba(255,180,90,0)');
  c.fillStyle=g;c.beginPath();c.arc(W-310,GY-20,86,0,TAU);c.fill();
  c.fillStyle='#ffd878';c.beginPath();c.arc(W-310,GY-20,26,Math.PI,0);c.fill();
  // 远山两层
  c.fillStyle='rgba(82,38,56,.45)';
  c.beginPath();c.moveTo(0,GY);
  c.lineTo(50,GY-30);c.lineTo(140,GY-10);c.lineTo(250,GY-48);c.lineTo(360,GY-14);
  c.lineTo(470,GY-36);c.lineTo(580,GY-6);c.lineTo(W,GY-26);c.lineTo(W,GY);c.closePath();c.fill();
  c.fillStyle='rgba(52,24,36,.7)';
  c.beginPath();c.moveTo(0,GY);
  c.lineTo(80,GY-22);c.lineTo(180,GY-4);c.lineTo(300,GY-30);c.lineTo(430,GY-2);
  c.lineTo(560,GY-18);c.lineTo(700,GY-2);c.lineTo(820,GY-20);c.lineTo(W,GY-4);c.lineTo(W,GY);c.closePath();c.fill();
  // 地下基底：表土→岩层→深岩
  g=c.createLinearGradient(0,GY,0,H);
  g.addColorStop(0,'#86592a');g.addColorStop(.26,'#64401a');g.addColorStop(.6,'#3e2511');g.addColorStop(1,'#190d07');
  c.fillStyle=g;c.fillRect(0,GY,W,H-GY);
  // 地质分层（波浪带 + 亮边）
  const strata=(y,amp,fill,hl)=>{
    const wav=()=>{
      c.beginPath();c.moveTo(0,y);
      for(let x=0;x<=W;x+=60)c.quadraticCurveTo(x+30,y+Math.sin(x*.045+y*.7)*amp,x+60,y);
    };
    wav();c.lineTo(W,H);c.lineTo(0,H);c.closePath();
    c.fillStyle=fill;c.fill();
    if(hl){c.strokeStyle=hl;c.lineWidth=2;wav();c.stroke();}
  };
  strata(GY+64,6,'rgba(46,26,10,.25)','rgba(255,200,140,.10)');
  strata(GY+190,9,'rgba(28,15,7,.28)','rgba(255,190,130,.07)');
  strata(GY+330,10,'rgba(14,7,4,.32)','rgba(255,180,120,.05)');
  // 岩块纹理点缀
  for(let i=0;i<30;i++){
    const x=R(16,W-16),y=R(GY+72,H-16),r=R(5,15),sd=R(0,9);
    c.fillStyle='rgba(0,0,0,.14)';
    c.beginPath();
    for(let k=0;k<6;k++){
      const a=k/6*TAU,rr=r*(.7+.3*Math.abs(Math.sin(sd+k*2.1)));
      const px=x+Math.cos(a)*rr,py=y+Math.sin(a)*rr*.8;
      k?c.lineTo(px,py):c.moveTo(px,py);
    }
    c.closePath();c.fill();
    c.fillStyle='rgba(255,205,150,.06)';
    c.beginPath();c.ellipse(x-r*.25,y-r*.45,r*.5,r*.2,0,0,TAU);c.fill();
  }
  // 暗部洞穴剪影
  for(let i=0;i<4;i++){
    const x=R(70,W-70),y=R(GY+260,H-36),rw=R(36,68),rh=rw*R(.42,.6);
    c.fillStyle='rgba(8,4,9,.5)';
    c.beginPath();c.moveTo(x-rw,y);
    c.quadraticCurveTo(x-rw,y-rh*1.9,x,y-rh*1.9);
    c.quadraticCurveTo(x+rw,y-rh*1.9,x+rw,y);
    c.closePath();c.fill();
    c.fillStyle='rgba(255,190,120,.05)';
    c.fillRect(x-rw*.6,y-2,rw*1.2,2);
  }
  // 草皮边
  c.fillStyle='#4a6b26';c.fillRect(0,GY-2,W,6);
  c.fillStyle='#6b8f3a';c.fillRect(0,GY-5,W,4);
  c.fillStyle='#79a843';
  for(let x=0;x<W;x+=11){c.beginPath();c.arc(x+R(-2,2),GY-4,R(2,3.6),Math.PI,0);c.fill();}
  c.fillStyle='#86b34c';
  for(let x=6;x<W;x+=26){
    c.fillRect(x,GY-10,1.8,6);c.fillRect(x+4,GY-9,1.8,5);c.fillRect(x+8,GY-8,1.6,4);
  }
  for(let i=0;i<7;i++){
    c.fillStyle=['#ffd24a','#ff8a7a','#cfe7ff'][i%3];
    c.beginPath();c.arc(R(20,W-20),GY-9,1.8,0,TAU);c.fill();
  }
  // 矿车（场景道具）
  const cx=PX-128,cy=GY-2;
  c.fillStyle='#3a2a16';c.fillRect(cx-34,cy,68,3);
  c.fillStyle='#2a1c0e';
  for(let i=-3;i<=3;i++)c.fillRect(cx+i*10-3,cy+2,6,3);
  c.fillStyle='#6e3f22';
  c.beginPath();c.moveTo(cx-26,cy-30);c.lineTo(cx+26,cy-30);c.lineTo(cx+19,cy-6);c.lineTo(cx-19,cy-6);c.closePath();c.fill();
  c.strokeStyle='#4a2a14';c.lineWidth=1.5;
  c.beginPath();c.moveTo(cx-23,cy-22);c.lineTo(cx+23,cy-22);c.moveTo(cx-21,cy-14);c.lineTo(cx+21,cy-14);c.stroke();
  c.strokeStyle='#8a8a96';c.lineWidth=3;
  c.beginPath();c.moveTo(cx-27,cy-30);c.lineTo(cx+27,cy-30);c.stroke();
  c.fillStyle='#f5b600';
  c.beginPath();c.arc(cx-9,cy-32,7,0,TAU);c.arc(cx+5,cy-33,8,0,TAU);c.arc(cx+14,cy-31,5,0,TAU);c.fill();
  c.fillStyle='#ffe680';
  c.beginPath();c.arc(cx-11,cy-34,2.5,0,TAU);c.fill();
  c.beginPath();c.arc(cx+3,cy-36,3,0,TAU);c.fill();
  c.fillStyle='#2e2e34';
  c.beginPath();c.arc(cx-13,cy-2,6,0,TAU);c.fill();
  c.beginPath();c.arc(cx+13,cy-2,6,0,TAU);c.fill();
  c.fillStyle='#8a8a96';
  c.beginPath();c.arc(cx-13,cy-2,2.2,0,TAU);c.fill();
  c.beginPath();c.arc(cx+13,cy-2,2.2,0,TAU);c.fill();
  // 油灯柱 + 灯笼
  c.strokeStyle='#5a3a1a';c.lineWidth=5;
  c.beginPath();c.moveTo(LAMP.x+14,GY);c.lineTo(LAMP.x+14,LAMP.y-12);c.lineTo(LAMP.x+2,LAMP.y-12);c.stroke();
  c.strokeStyle='#3c2a14';c.lineWidth=2;
  c.beginPath();c.moveTo(LAMP.x+2,LAMP.y-12);c.lineTo(LAMP.x,LAMP.y-6);c.stroke();
  c.fillStyle='#3c2a14';c.fillRect(LAMP.x-5,LAMP.y-7,10,2.5);
  c.fillStyle='#ffd878';
  c.beginPath();c.moveTo(LAMP.x-4,LAMP.y-5);c.lineTo(LAMP.x+4,LAMP.y-5);c.lineTo(LAMP.x+6,LAMP.y+6);c.lineTo(LAMP.x-6,LAMP.y+6);c.closePath();c.fill();
  c.fillStyle='#fff4cc';
  c.beginPath();c.arc(LAMP.x,LAMP.y+1,2.6,0,TAU);c.fill();
  c.strokeStyle='#7a5a2a';c.lineWidth=1.5;
  c.beginPath();c.moveTo(LAMP.x-4,LAMP.y-5);c.lineTo(LAMP.x+4,LAMP.y-5);c.lineTo(LAMP.x+6,LAMP.y+6);c.lineTo(LAMP.x-6,LAMP.y+6);c.closePath();c.stroke();
  c.fillStyle='#3c2a14';c.fillRect(LAMP.x-3,LAMP.y+6,6,2);
});
/* —— 小精灵：灯晕 / 金币 / 火球 / 烟环 —— */
const glowC=mkC(64,64,c=>{
  const g=c.createRadialGradient(32,32,2,32,32,30);
  g.addColorStop(0,'rgba(255,220,130,.55)');g.addColorStop(.5,'rgba(255,190,90,.18)');g.addColorStop(1,'rgba(255,190,90,0)');
  c.fillStyle=g;c.fillRect(0,0,64,64);
});
const coinC=mkC(16,16,c=>{
  c.fillStyle='#c98a00';c.beginPath();c.arc(8,8.6,7,0,TAU);c.fill();
  c.fillStyle='#f5b600';c.beginPath();c.arc(8,7.4,6.6,0,TAU);c.fill();
  c.strokeStyle='#ffe27a';c.lineWidth=1.4;c.beginPath();c.arc(8,7.4,4.6,0,TAU);c.stroke();
  c.fillStyle='#ffe680';c.beginPath();c.ellipse(5.8,5.4,2,1.1,-.6,0,TAU);c.fill();
});
const fireC=mkC(96,96,c=>{
  const g=c.createRadialGradient(48,48,2,48,48,46);
  g.addColorStop(0,'rgba(255,255,235,1)');g.addColorStop(.25,'rgba(255,225,120,.95)');
  g.addColorStop(.55,'rgba(255,140,40,.7)');g.addColorStop(.8,'rgba(200,60,20,.3)');g.addColorStop(1,'rgba(160,40,10,0)');
  c.fillStyle=g;c.fillRect(0,0,96,96);
});
const ringC=mkC(96,96,c=>{
  for(let i=0;i<3;i++){
    c.strokeStyle='rgba(170,160,150,'+(.34-i*.1)+')';
    c.lineWidth=7-i*2;
    c.beginPath();c.arc(48,48,40-i*3,0,TAU);c.stroke();
  }
});
/* —— 矿工：三种表情头像 + 躯干 —— */
function paintHead(c,exp){
  c.fillStyle='#f0c098';
  c.beginPath();c.arc(-9,4,2.6,0,TAU);c.fill();
  c.beginPath();c.arc(9,4,2.6,0,TAU);c.fill();
  c.beginPath();c.arc(0,3,9.5,0,TAU);c.fill();
  if(exp==='happy'){
    c.fillStyle='rgba(255,120,90,.4)';
    c.beginPath();c.arc(-5.5,5,2.4,0,TAU);c.fill();
    c.beginPath();c.arc(5.5,5,2.4,0,TAU);c.fill();
  }
  // 大白胡子
  c.fillStyle='#eceadf';
  c.beginPath();
  c.moveTo(-8,5);
  c.quadraticCurveTo(-10,12,-5,13.5);
  c.quadraticCurveTo(0,15.5,5,13.5);
  c.quadraticCurveTo(10,12,8,5);
  c.quadraticCurveTo(4,8.5,0,8.2);
  c.quadraticCurveTo(-4,8.5,-8,5);
  c.closePath();c.fill();
  if(exp==='happy'){
    c.fillStyle='#7a3324';
    c.beginPath();c.arc(0,9.6,2.6,0,Math.PI);c.closePath();c.fill();
  }else if(exp==='strain'){
    c.strokeStyle='#9a8c80';c.lineWidth=1.4;
    c.beginPath();c.moveTo(-2.6,10);c.lineTo(2.6,10);c.stroke();
  }
  // 鼻子
  c.fillStyle='#e8a070';
  c.beginPath();c.arc(0,6,2.8,0,TAU);c.fill();
  c.fillStyle='rgba(255,255,255,.45)';
  c.beginPath();c.arc(-.9,5.2,1,0,TAU);c.fill();
  // 眼睛
  if(exp==='strain'){
    c.strokeStyle='#5a3a22';c.lineWidth=1.6;c.lineCap='round';
    c.beginPath();c.moveTo(-6,1.4);c.lineTo(-2.4,2.4);c.moveTo(6,1.4);c.lineTo(2.4,2.4);c.stroke();
    c.beginPath();c.moveTo(-6.4,-1.4);c.lineTo(-2.2,-.2);c.moveTo(6.4,-1.4);c.lineTo(2.2,-.2);c.stroke();
  }else if(exp==='happy'){
    c.strokeStyle='#4a2e1a';c.lineWidth=1.8;c.lineCap='round';
    c.beginPath();c.arc(-4,2.6,2.2,Math.PI*1.12,Math.PI*1.88);c.stroke();

/* ============ 音效（WebAudio 合成） ============ */
let AC=null;
function ac(){
  if(!AC){const C=window.AudioContext||window.webkitAudioContext;if(C)AC=new C();}
  if(AC&&AC.state==='suspended')AC.resume();
  return AC;
}
function tone(f0,f1,d,type,g0,when){
  const a=ac();if(!a)return;
  const t=a.currentTime+(when||0);
  const o=a.createOscillator(),g=a.createGain();
  o.type=type||'sine';
  o.frequency.setValueAtTime(f0,t);
  o.frequency.exponentialRampToValueAtTime(Math.max(f1,1),t+d);
  g.gain.setValueAtTime(g0,t);
  g.gain.exponentialRampToValueAtTime(.0008,t+d);
  o.connect(g).connect(a.destination);
  o.start(t);o.stop(t+d+.02);
}
function boomSnd(big){
  const a=ac();if(!a)return;
  const d=big?.7:.4,t=a.currentTime;
  const n=a.createBufferSource(),buf=a.createBuffer(1,a.sampleRate*d,a.sampleRate);
  const ch=buf.getChannelData(0);
  for(let i=0;i<ch.length;i++)ch[i]=(Math.random()*2-1)*Math.pow(1-i/ch.length,2);
  n.buffer=buf;
  const f=a.createBiquadFilter();f.type='lowpass';
  f.frequency.setValueAtTime(big?900:1400,t);
  f.frequency.exponentialRampToValueAtTime(120,t+d);
  const g=a.createGain();g.gain.setValueAtTime(big?.55:.35,t);
  g.gain.exponentialRampToValueAtTime(.001,t+d);
  n.connect(f).connect(g).connect(a.destination);n.start(t);
  tone(big?80:110,40,d*.8,'sine',big?.5:.3);
}
const sfx={
  launch(){tone(700,180,.22,'triangle',.16);},
  grab(){tone(900,500,.07,'square',.12);tone(1400,900,.09,'square',.08,.05);},

    const n=v>=500?4:v>=200?3:2;
    for(let i=0;i<n;i++)tone(880+i*220,880+i*220,.1,'triangle',.14,i*.07);
  },
  bag(){tone(500,800,.12,'triangle',.13);tone(800,1200,.12,'triangle',.13,.1);},
  boom(b){boomSnd(b);},
  tick(){tone(1100,1100,.05,'square',.07);},
  clear(){[523,659,784,1047].forEach((f,i)=>tone(f,f,.16,'triangle',.16,i*.12));},
  fail(){[440,370,311,233].forEach((f,i)=>tone(f,f*.92,.25,'sawtooth',.1,i*.18));},
  buy(){tone(660,990,.1,'triangle',.14);},

/* ============ 物品生成 ============ */
function mkItem(type,lv){
  const it={type,x:0,y:0,r:10,w:1,dir:1,t:R(0,9),vx:0,x0:0,rg:0,alive:true,grabbed:false,seed:Math.random()*9};
  switch(type){
    case 'g1':it.r=12;it.w=3;break;
    case 'g2':it.r=21;it.w=5.5;break;
    case 'g3':it.r=32;it.w=9;break;
    case 'rock1':it.r=16;it.w=7;break;
    case 'rock2':it.r=24;it.w=10;break;
    case 'dia':it.r=lv>=4?6.5:8.5;it.w=.9;break;
    case 'bag':it.r=17;it.w=3.5;break;
    case 'mouse':it.r=11;it.w=1.4;it.vx=R(45,75);it.rg=R(60,130);break;
    case 'dmouse':it.r=12;it.w=1.8;it.vx=R(55,85);it.rg=R(60,130);break;
    case 'tnt':it.r=17;it.w=5;break;
  }
  attachSpr(it); // 纯视觉：预渲染该物品的离屏精灵
  return it;
}
const YBAND={g1:[.12,.55],g2:[.3,.8],g3:[.5,.97],rock1:[.1,.9],rock2:[.2,.95],
  dia:[.55,.97],bag:[.3,.9],mouse:[.15,.85],dmouse:[.3,.9],tnt:[.25,.9]};
function genLevel(lv){
  const list=[];
  const add=(t,n)=>{for(let i=0;i<n;i++)list.push(mkItem(t,lv));};
  add('g3',lv>=4?2:1);
  add('g2',2+Math.floor(lv/3));
  add('g1',3+Math.floor(lv/4));
  add('rock1',Math.min(2+Math.floor(lv/2),5));
  add('rock2',Math.min(1+Math.floor(lv/2),4));
  add('dia',lv<=3?2:1);
  add('bag',1+(lv>=4?1:0));
  add('mouse',1+(lv>=2?1:0));
  if(lv>=3)add('dmouse',1);
  if(lv>=2)add('tnt',Math.min(1+Math.floor((lv-2)/2),3));
  // 摆放（避免重叠）
  const Y0=GY+62,Y1=H-32;
  for(const it of list){
    const band=YBAND[it.type];
    let ok=false;
    for(let k=0;k<60&&!ok;k++){
      const mv=it.rg||0;
      it.x=R(35+it.r+mv,W-35-it.r-mv);
      it.y=Y0+(band[0]+R(0,band[1]-band[0]))*(Y1-Y0);
      ok=true;
      for(const o of list){
        if(o===it||!o.x)continue;
        const dx=it.x-o.x,dy=it.y-o.y,md=it.r+o.r+20+(it.rg||0)*.5+(o.rg||0)*.5;
        if(dx*dx+dy*dy<md*md){ok=false;break;}
      }
    }
    it.x0=it.x;
  }
  // 地底装饰
  G.pebbles=[];
  for(let i=0;i<46;i++)G.pebbles.push({x:R(10,W-10),y:R(GY+30,H-10),r:R(1.5,4.5),a:R(.05,.16)});
  G.clouds=[];
  for(let i=0;i<3;i++)G.clouds.push({x:R(0,W),y:R(14,52),s:R(.7,1.3),v:R(4,9)});
  return list;
}

function tipPos(){

}
function popup(x,y,txt,col,size){G.popups.push({x,y,txt,col:col||'#ffcc00',size:size||19,t:0});}
function explodeFx(x,y,big){
  G.shake=Math.min(G.shake+(big?15:8),18);
  sfx.boom(big);
  // 火球 + 烟环（预渲染精灵缩放）
  G.fx.push({type:'fire',x,y,t:0,life:big?.5:.35,big});
  G.fx.push({type:'ring',x,y,t:0,life:big?.75:.5,big});
  for(let i=0;i<(big?8:4);i++)G.parts.push({x:x+R(-10,10),y:y+R(-10,10),
    vx:R(-30,30),vy:R(-75,-20),r:R(4,big?10:7),t:0,life:R(.7,1.3),col:'rgba(96,88,84,.55)'});
  const n=big?42:24;
  for(let i=0;i<n;i++){
    const a=R(0,TAU),sp=R(40,big?340:200);
    G.parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-R(20,90),
      r:R(2,big?7:5),t:0,life:R(.4,.9),col:Math.random()<.55?'#ff9933':(Math.random()<.5?'#ffdd44':'#777')});
  }
}
function tntBoom(it){
  it.alive=false;
  explodeFx(it.x,it.y,true);
  const RAD=118;
  for(const o of G.items){
    if(!o.alive||o===it||o.grabbed)continue;
    const dx=o.x-it.x,dy=o.y-it.y;
    if(dx*dx+dy*dy<RAD*RAD){
      if(o.type==='tnt'){G.booms.push({it:o,t:.18});}
      else{
        o.alive=false;
        for(let i=0;i<6;i++)G.parts.push({x:o.x,y:o.y,vx:R(-90,90),vy:R(-120,30),
          r:R(2,4),t:0,life:.5,col:'#998866'});
      }
    }
  }
}
function grab(it){
  const h=G.hook;
  it.grabbed=true;h.carry=it;h.state='retract';
  const tp0=tipPos();
  it.x=tp0.x+Math.sin(h.ang)*it.r*.7;
  it.y=tp0.y+Math.cos(h.ang)*it.r*.7;

function update(dt){

  for(let i=G.parts.length-1;i>=0;i--){
    const p=G.parts[i];p.t+=dt;
    if(p.t>p.life){G.parts.splice(i,1);continue;}
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=300*dt;
  }
  for(let i=G.popups.length-1;i>=0;i--){
    const p=G.popups[i];p.t+=dt;p.y-=34*dt;
    if(p.t>1.4)G.popups.splice(i,1);
  }
  for(let i=G.fx.length-1;i>=0;i--){
    const f=G.fx[i];f.t+=dt;
    if(f.t>f.life)G.fx.splice(i,1);
  }
  for(let i=G.coins.length-1;i>=0;i--){
    const cn=G.coins[i];cn.t+=dt;
    cn.vy+=260*dt;cn.y+=cn.vy*dt;cn.x+=cn.vx*dt;
    if(cn.y>H+18)G.coins.splice(i,1);
  }
  G.shake=Math.max(0,G.shake-dt*26);
  G.joy=Math.max(0,G.joy-dt);
  {
    const h=G.hook;
    const ot=h.carry?.32:(h.state==='extend'?1:.8); // 爪张合动画
    h.openK+=(ot-h.openK)*Math.min(1,dt*12);
  }
  const md=G.money-G.moneyShown; // 金钱滚动
  G.moneyShown=Math.abs(md)<.6?G.money:G.moneyShown+md*Math.min(1,dt*6);
  if(G.scr!=='play')return;
  /* —— 以下游戏逻辑保持不变 —— */
  const h=G.hook;
  // 计时
  if(G.time>0){
    G.time=Math.max(0,G.time-dt);
    const s=Math.ceil(G.time);
    if(s!==G.lastSec){G.lastSec=s;if(s<=10&&s>0)sfx.tick();}
  }
  // 老鼠移动
  for(const it of G.items){
    if(!it.alive||it.grabbed)continue;
    it.t+=dt;
    if(it.type==='mouse'||it.type==='dmouse'){
      it.x+=it.vx*it.dir*dt;
      if(it.x>it.x0+it.rg){it.x=it.x0+it.rg;it.dir=-1;}
      if(it.x<it.x0-it.rg){it.x=it.x0-it.rg;it.dir=1;}
    }
  }
  // 延迟连爆
  for(let i=G.booms.length-1;i>=0;i--){
    const b=G.booms[i];b.t-=dt;
    if(b.t<=0){G.booms.splice(i,1);if(b.it.alive)tntBoom(b.it);}
  }
  // 钩子
  if(h.state==='swing'){
    h.ph+=dt*h.swSpd;
    h.ang=Math.sin(h.ph)*h.maxA;
    h.len=26;
    if(G.time<=0)endLevel();
  }else if(h.state==='extend'){
    h.len+=460*dt;
    const tp=tipPos();
    // 碰物品
    const px2=tp.x+Math.sin(h.ang)*8,py2=tp.y+Math.cos(h.ang)*8;
    for(const it of G.items){
      if(!it.alive||it.grabbed)continue;
      const dx=px2-it.x,dy=py2-it.y,rr=it.r+7;
      if(dx*dx+dy*dy<rr*rr){
        if(it.type==='tnt'){tntBoom(it);h.state='retract';h.carry=null;h.retSpd=640;}
        else grab(it);
        break;
      }
    }
    if(h.state==='extend'&&(tp.x<8||tp.x>W-8||tp.y>H-6)){
      h.state='retract';h.retSpd=620;sfx.empty();
    }
  }else if(h.state==='retract'){
    h.len-=h.retSpd*dt;
    G.crank+=h.retSpd*dt*.045;
    if(h.carry){
      const tp=tipPos();
      h.carry.x=tp.x+Math.sin(h.ang)*h.carry.r*.7;
      h.carry.y=tp.y+Math.cos(h.ang)*h.carry.r*.7;
    }
    if(h.len<=26){h.len=26;if(h.carry)cashIn();else h.state='swing';}
  }
}

function nuggetPath(c,r,seed){
  c.beginPath();
  const n=8;
  for(let i=0;i<n;i++){
    const a=i/n*TAU+seed;
    const rr=r*(.78+.26*Math.abs(Math.sin(seed*7+i*2.7)));
    const x=Math.cos(a)*rr,y=Math.sin(a)*rr*.82;
    i?c.lineTo(x,y):c.moveTo(x,y);
  }
  c.closePath();
}

  c.fillStyle='rgba(255,255,255,.28)';

  c.fillStyle='rgba(120,70,0,.3)';
  c.beginPath();c.moveTo(r*.1,r*.15);c.lineTo(r*.75,-r*.1);c.lineTo(r*.85,r*.45);c.lineTo(r*.2,r*.6);c.closePath();c.fill();

function paintRock(c,r,seed){
  const g=c.createRadialGradient(-r*.3,-r*.45,r*.1,0,0,r*1.15);

}

function bagPath(c,r){

  c.quadraticCurveTo(0,r*1.25,r*.85,r*.6);
  c.quadraticCurveTo(r*1.15,-r*.1,r*.35,-r*.8);
  c.closePath();
}

function attachSpr(it){
  const r=it.r;let pad;
  const wrap=(p,fn)=>mkC(p*2,p*2,c=>{c.translate(p,p);fn(c);});
  switch(it.type){
    case 'g1':case 'g2':case 'g3':
      pad=r*1.4+4;it.spr=wrap(pad,c=>paintGold(c,r,it.seed));break;
    case 'rock1':case 'rock2':
      pad=r*1.4+4;it.spr=wrap(pad,c=>paintRock(c,r,it.seed));break;
    case 'dia':
      pad=r*1.6+4;it.spr=wrap(pad,c=>paintDia(c,r));break;
    case 'bag':
      pad=r*1.5+5;it.spr=wrap(pad,c=>paintBag(c,r));break;
    case 'mouse':case 'dmouse':
      pad=r*1.6+4;it.spr=wrap(pad,c=>paintMouse(c,r));break;
    case 'tnt':
      pad=r*1.7+5;it.spr=wrap(pad,c=>paintTnt(c,r));break;
  }
  it.pad=pad;
}

function diaFlash(c,x,y,r,seed){ // 彩虹折射闪
  const ph=(G.t*1.2+seed)%2.2;
  if(ph>=.5)return;
  const k=Math.sin(ph/.5*Math.PI);
  c.save();c.translate(x,y);c.globalAlpha=k;
  const cols=['#ff8a8a','#8aff9e','#8ad2ff'];
  for(let i=0;i<3;i++){
    c.strokeStyle=cols[i];c.lineWidth=1.4;
    const a=-2.2+i*.22;
    c.beginPath();
    c.moveTo(Math.cos(a)*r*.35,-r*.25+Math.sin(a)*r*.35);
    c.lineTo(Math.cos(a)*r*1.5,-r*.25+Math.sin(a)*r*1.5);
    c.stroke();
  }
  c.fillStyle='rgba(255,255,255,'+k+')';
  star4(c,-r*.35,-r*.5,r*.55*k+1,.3);
  c.restore();
}
function drawItem(c,it){
  const p=it.pad,r=it.r;

      if(ph<.45){
        const k=Math.sin(ph/.45*Math.PI);
        c.fillStyle='rgba(255,255,215,'+(.95*k)+')';
        star4(c,it.x+r*.42,it.y-r*.32,r*.5*k+1,it.seed);
        if(r>18)star4(c,it.x-r*.4,it.y+r*.25,r*.28*k+.5,1+it.seed);
      }
      break;}
    case 'rock1':case 'rock2':
      c.drawImage(it.spr,it.x-p,it.y-p,p*2,p*2);break;
    case 'dia':
      c.drawImage(it.spr,it.x-p,it.y-p,p*2,p*2);
      diaFlash(c,it.x,it.y,r,it.seed);break;
    case 'bag':{
      c.save();c.translate(it.x,it.y);
      c.rotate(Math.sin(it.t*2.6)*.05); // 布袋轻晃
      c.drawImage(it.spr,-p,-p,p*2,p*2);
      c.save();c.rotate(Math.sin(it.t*3.2)*.2);
      c.fillStyle='#ffe9b0';c.font='bold '+Math.round(r*1.05)+'px "PingFang SC",sans-serif';
      c.textAlign='center';c.textBaseline='middle';
      c.fillText('?',0,r*.15);
      c.restore();c.restore();break;}
    case 'mouse':case 'dmouse':{
      c.save();c.translate(it.x,it.y);c.scale(it.dir,1);
      const run=it.grabbed?0:Math.sin(it.t*16);
      // 尾巴
      c.strokeStyle='#b08aa0';c.lineWidth=1.8;
      c.beginPath();c.moveTo(-r*.95,0);
      c.quadraticCurveTo(-r*1.8,-r*.4+run*r*.12,-r*2.1,r*.3);c.stroke();
      // 跑动小腿
      c.strokeStyle='#74747e';c.lineWidth=2.2;c.lineCap='round';
      c.beginPath();
      c.moveTo(-r*.45,r*.55);c.lineTo(-r*.45+run*r*.22,r*.95);
      c.moveTo(r*.3,r*.55);c.lineTo(r*.3-run*r*.22,r*.95);
      c.stroke();c.lineCap='butt';
      c.drawImage(it.spr,-p,-p,p*2,p*2);
      // 胡须
      const wf=Math.sin(it.t*9)*r*.05;
      c.strokeStyle='rgba(225,225,235,.75)';c.lineWidth=1;
      for(let i=-1;i<=1;i++){
        c.beginPath();c.moveTo(r*.92,-r*.04);
        c.quadraticCurveTo(r*1.35,i*r*.2+wf,r*1.6,i*r*.34+wf);c.stroke();
      }
      if(it.type==='dmouse'){
        drawDiaMini(c,r*1.15,r*.45,r*.5);
        diaFlash(c,r*1.15,r*.45,r*.55,it.seed);
      }
      c.restore();break;}
    case 'tnt':{
      c.drawImage(it.spr,it.x-p,it.y-p,p*2,p*2);
      // 引线 + 火花
      const fx=it.x+r*.5,fy=it.y-r*1.45;
      c.strokeStyle='#caa260';c.lineWidth=2;
      c.beginPath();c.moveTo(it.x,it.y-r*1.05);
      c.quadraticCurveTo(it.x+r*.3,it.y-r*1.5,fx,fy);c.stroke();
      const k=.5+.5*Math.sin(it.t*9);
      c.fillStyle='rgba(255,230,120,'+(.6+.4*k)+')';
      star4(c,fx,fy,3+k*2.5,it.t*4);
      c.fillStyle='rgba(255,160,60,'+(.5+.4*k)+')';
      c.beginPath();c.arc(fx,fy,1.6+k,0,TAU);c.fill();
      break;}
  }
}
function drawMiner(c){
  const h=G.hook;
  const pulling=h.state==='retract'&&h.carry;
  const heavy=pulling&&h.retSpd<200;
  const jerk=heavy?Math.sin(G.t*14)*1.6:0;
  const lean=heavy?-.34+Math.sin(G.t*14)*.05:(pulling?-.13:0);
  const idle=h.state==='swing';
  const bob=idle?Math.sin(G.t*2.2)*.9:0; // 悠闲呼吸
  // 井架（双层木描边+横梁）
  c.strokeStyle='#3c2a14';c.lineWidth=7;
  c.beginPath();c.moveTo(PX-22,GY);c.lineTo(PX,PY-26);c.lineTo(PX+22,GY);c.stroke();
  c.strokeStyle='#6a4a26';c.lineWidth=4.5;
  c.beginPath();c.moveTo(PX-22,GY);c.lineTo(PX,PY-26);c.lineTo(PX+22,GY);c.stroke();
  c.strokeStyle='#5a3a1c';c.lineWidth=3;
  c.beginPath();c.moveTo(PX-13,GY-11);c.lineTo(PX+13,GY-11);c.stroke();
  // 滑轮
  c.fillStyle='#3c2a14';c.beginPath();c.arc(PX,PY-22,8,0,TAU);c.fill();
  c.fillStyle='#c9a05a';c.beginPath();c.arc(PX,PY-22,5,0,TAU);c.fill();
  c.fillStyle='#8a6a3a';c.beginPath();c.arc(PX,PY-22,2,0,TAU);c.fill();
  const wr=(h.state==='swing')?0:G.crank;
  c.strokeStyle='#3c2a14';c.lineWidth=1.6;
  c.beginPath();
  c.moveTo(PX+Math.cos(wr)*5,PY-22+Math.sin(wr)*5);
  c.lineTo(PX-Math.cos(wr)*5,PY-22-Math.sin(wr)*5);
  c.stroke();
  // 矿工（站在井架右侧）
  const joy=G.joy>0&&!pulling;
  const hop=joy?-Math.abs(Math.sin(G.joy*9))*3:0;
  c.save();
  c.translate(PX+44,GY+jerk*.4+hop+bob*.4);
  c.rotate(lean);
  // 腿（用力时弓步蹬地）
  c.strokeStyle='#3a4a8a';c.lineWidth=6;c.lineCap='round';
  c.beginPath();
  if(heavy){
    c.moveTo(-2,-22);c.lineTo(-13,-10);c.lineTo(-15,0);
    c.moveTo(2,-22);c.lineTo(8,-9);c.lineTo(10,0);
  }else{
    c.moveTo(-2,-22);c.lineTo(-7,0);
    c.moveTo(2,-22);c.lineTo(8,0);
  }
  c.stroke();c.lineCap='butt';
  // 靴
  c.fillStyle='#2a2a30';
  c.beginPath();
  c.roundRect(heavy?-21:-13,-4,11,5,2);c.roundRect(heavy?5:3,-4,11,5,2);
  c.fill();
  // 躯干（格子衫+背带裤，预渲染）
  c.drawImage(torsoC,-15,-48,30,32);
  // 头（表情切换：悠闲 / 用力 / 开心）
  const exp=heavy?'strain':(joy?'happy':'idle');
  c.drawImage(headC[exp],-17,-77+bob*.4,34,34);
  // 手臂 → 摇柄
  const crk=(h.state==='retract')?G.crank*1.2:(h.state==='extend'?-G.t*6:0);
  const hx=-24,hy=-36;
  const grip={x:hx+Math.cos(crk)*7,y:hy+Math.sin(crk)*7};
  const relax=idle&&!h.carry;
  c.strokeStyle='#b05030';c.lineWidth=5.5;c.lineCap='round';
  c.beginPath();
  if(relax){ // 悠闲：左手搭摇柄，右手叉腰
    c.moveTo(-6,-42);c.lineTo(grip.x,grip.y);
    c.moveTo(6,-40);c.quadraticCurveTo(15,-36,11,-27);
  }else{
    c.moveTo(-6,-42);c.lineTo(grip.x,grip.y);
    c.moveTo(6,-40);c.lineTo(grip.x+3,grip.y+2);
  }
  c.stroke();c.lineCap='butt';
  // 绞盘鼓
  c.fillStyle='#3c2a14';c.beginPath();c.arc(hx,hy,7.5,0,TAU);c.fill();
  c.fillStyle='#6a4a26';c.beginPath();c.arc(hx,hy,6,0,TAU);c.fill();
  c.strokeStyle='#caa260';c.lineWidth=1.2;
  c.beginPath();c.arc(hx,hy,4.4,0,TAU);c.stroke();
  c.beginPath();c.arc(hx,hy,2.4,0,TAU);c.stroke();
  // 摇柄
  c.strokeStyle='#8a8a96';c.lineWidth=3;
  c.beginPath();c.moveTo(hx,hy);c.lineTo(grip.x,grip.y);c.stroke();
  // 手套
  c.fillStyle='#dd8833';
  c.beginPath();c.arc(grip.x,grip.y,3.4,0,TAU);c.fill();
  if(relax){c.beginPath();c.arc(11,-27,3.2,0,TAU);c.fill();}
  else{c.beginPath();c.arc(grip.x+3,grip.y+2,3.4,0,TAU);c.fill();}
  // 用力汗滴
  if(heavy&&Math.sin(G.t*5)>.2){
    c.fillStyle='rgba(140,200,255,.85)';
    c.beginPath();c.arc(12,-66,2.2,0,TAU);c.fill();
    c.beginPath();c.arc(-14,-62,1.7,0,TAU);c.fill();
  }
  // 开心小星星
  if(joy){
    c.fillStyle='rgba(255,230,120,'+Math.min(1,G.joy)+')';
    star4(c,-16,-72,4,G.t*3);
    star4(c,16,-76,3,-G.t*2.5);
  }
  c.restore();
}
function drawHook(c){
  const h=G.hook,tp=tipPos();
  const heavy=h.carry&&h.state==='retract'&&h.retSpd<200;
  const jit=heavy?Math.sin(G.t*55)*1.4:0; // 重物紧绷抖动
  let bend=0; // 绳索微弯
  if(h.state==='swing')bend=Math.cos(h.ph)*2.5;
  else if(h.state==='extend')bend=2.2;
  else if(!heavy)bend=1;
  const dx=tp.x-PX,dy=tp.y-PY,dl=Math.hypot(dx,dy)||1;
  const nx=-dy/dl,ny=dx/dl;
  const mx=(PX+tp.x)/2+nx*(bend+jit),my=(PY+tp.y)/2+ny*(bend+jit);
  c.strokeStyle=heavy?'#4a3826':'#33281a';c.lineWidth=h.carry?3.2:2.4;
  c.beginPath();c.moveTo(PX,PY-14);c.lineTo(PX,PY);
  c.quadraticCurveTo(mx,my,tp.x,tp.y);c.stroke();
  c.strokeStyle='rgba(255,215,150,.28)';c.lineWidth=1;
  c.beginPath();c.moveTo(PX,PY);c.quadraticCurveTo(mx,my,tp.x,tp.y);c.stroke();
  // 金属钩爪（张合动画 openK）
  c.save();c.translate(tp.x+nx*jit*.5,tp.y);c.rotate(-h.ang);
  const open=h.openK;
  c.lineCap='round';
  for(const s of[-1,1]){
    c.strokeStyle='#6e6e7e';c.lineWidth=4.6;
    c.beginPath();c.moveTo(0,4);
    c.quadraticCurveTo(s*12*open+s*3,11,s*10*open+s*2,19);
    c.lineTo(s*10*open+s*2-s*4.4,17.6);
    c.stroke();
    c.strokeStyle='#d8d8e6';c.lineWidth=1.6;
    c.beginPath();c.moveTo(0,3.4);
    c.quadraticCurveTo(s*12*open+s*2.4,10.4,s*10*open+s*1.6,18);
    c.stroke();
  }
  c.strokeStyle='#6e6e7e';c.lineWidth=4;
  c.beginPath();c.moveTo(0,4);c.lineTo(0,15);c.stroke();
  c.strokeStyle='#d8d8e6';c.lineWidth=1.4;
  c.beginPath();c.moveTo(.8,4);c.lineTo(.8,14);c.stroke();
  // 轴心铆钉
  c.fillStyle='#8a8a98';c.beginPath();c.arc(0,2,5.2,0,TAU);c.fill();
  c.fillStyle='#caccda';c.beginPath();c.arc(-1.4,.8,2.6,0,TAU);c.fill();
  c.fillStyle='#55555f';c.beginPath();c.arc(1.6,3.4,1.6,0,TAU);c.fill();
  c.lineCap='butt';
  c.restore();
  // 钩中物画在最上层
  if(h.carry)drawItem(c,h.carry);
}
function drawHUD(c){
  c.save();
  c.textBaseline='middle';
  // 左：金钱（滚动）+ 目标进度条
  c.fillStyle='rgba(20,20,31,.74)';
  c.beginPath();c.roundRect(10,10,224,70,10);c.fill();
  c.strokeStyle='rgba(130,95,45,.8)';c.lineWidth=1;c.stroke();
  c.textAlign='left';
  const ms=Math.round(G.moneyShown);
  c.fillStyle='#ffcc00';
  c.font='bold 20px "PingFang SC","Microsoft YaHei",sans-serif';
  c.fillText('$ '+ms,24,28);
  if(ms!==G.money){ // 滚动中尾随小光点
    const tw=c.measureText('$ '+ms).width;
    c.fillStyle='rgba(255,235,150,.9)';
    star4(c,30+tw,26,4,G.t*6);
  }
  const pw=196,px=24,py=44;
  c.fillStyle='rgba(0,0,0,.5)';
  c.beginPath();c.roundRect(px,py,pw,9,4.5);c.fill();
  const frac=clamp(G.moneyShown/G.target,0,1);
  if(frac>0){
    c.fillStyle=G.met?'#7fd97f':'#ffcc00';
    c.beginPath();c.roundRect(px,py,Math.max(6,pw*frac),9,4.5);c.fill();
    c.fillStyle='rgba(255,255,255,.3)';
    c.beginPath();c.roundRect(px+1,py+1,Math.max(4,pw*frac-2),3.5,2);c.fill();
  }
  c.strokeStyle='rgba(255,255,255,.18)';
  c.beginPath();c.roundRect(px,py,pw,9,4.5);c.stroke();
  c.font='12px "PingFang SC","Microsoft YaHei",sans-serif';
  c.fillStyle=G.met?'#7fd97f':'#8888a0';
  c.fillText(G.met?'目标 $'+G.target+' ✓ 已达成':'目标 $'+G.target,px,66);
  // 右：时间（最后 10 秒红色脉动）/关卡
  const s=Math.ceil(G.time),urgent=s<=10&&s>0;
  const pulse=urgent?.5+.5*Math.sin(G.t*9):0;
  c.fillStyle='rgba(20,20,31,.74)';
  c.beginPath();c.roundRect(W-172,10,162,70,10);c.fill();
  c.strokeStyle=urgent?'rgba(255,'+Math.round(95-55*pulse)+',60,'+(.5+.5*pulse)+')':'rgba(130,95,45,.8)';
  c.lineWidth=urgent?2:1;c.stroke();
  c.font='bold '+Math.round(urgent?19+3*pulse:19)+'px "PingFang SC","Microsoft YaHei",sans-serif';
  c.fillStyle=urgent?(pulse>.5?'#ff5544':'#ffaa99'):'#e8e8f0';
  c.fillText('时间  '+s+' 秒',W-156,32);
  c.font='13px "PingFang SC","Microsoft YaHei",sans-serif';
  c.fillStyle='#8888a0';
  c.fillText('第 '+G.lv+' 关',W-156,60);
  // 道具栏（右上第二行，预渲染图标）
  const inv=G.inv,icons=[];
  if(inv.dyn>0)icons.push(['dyn','×'+inv.dyn]);
  for(const k of['glove','clover','book','polish'])if(inv[k])icons.push([k,'']);
  if(icons.length){
    const bw=icons.length*40+12;
    c.fillStyle='rgba(20,20,31,.74)';
    c.beginPath();c.roundRect(W-10-bw,86,bw,44,10);c.fill();
    c.strokeStyle='rgba(130,95,45,.8)';c.lineWidth=1;c.stroke();
    icons.forEach((ic,i)=>{
      const x=W-10-bw+8+i*40;
      c.drawImage(iconSpr(ic[0]),x,93,30,30);
      if(ic[1]){
        c.fillStyle='#ffcc00';c.font='bold 11px sans-serif';c.textAlign='left';
        c.fillText(ic[1],x+21,123);
      }
    });
  }
  // 炸药按钮（触屏，位置不变）
  const h=G.hook;
  if(h.state==='retract'&&h.carry&&G.inv.dyn>0){
    const b=dynBtn,bk=.5+.5*Math.sin(G.t*6);
    c.fillStyle='rgba(190,45,25,.9)';
    c.beginPath();c.roundRect(b.x,b.y,b.w,b.h,12);c.fill();
    c.fillStyle='rgba(255,255,255,.12)';
    c.beginPath();c.roundRect(b.x,b.y,b.w,b.h*.5,12);c.fill();
    c.strokeStyle='rgba(255,140,100,'+(.5+.5*bk)+')';c.lineWidth=2;
    c.beginPath();c.roundRect(b.x,b.y,b.w,b.h,12);c.stroke();
    c.drawImage(iconSpr('dyn'),b.x+8,b.y+11,32,32);
    c.fillStyle='#fff';c.textAlign='center';
    c.font='bold 17px "PingFang SC","Microsoft YaHei",sans-serif';
    c.fillText('炸药 [1]',b.x+b.w/2+14,b.y+b.h/2);
  }
  c.restore();
}
function draw(){
  ctx.setTransform(scale*dpr,0,0,scale*dpr,0,0);
  // 震屏
  if(G.shake>0){
    ctx.translate(R(-G.shake,G.shake)*.5,R(-G.shake,G.shake)*.5);
  }
  // 背景全图（预渲染：天空+矿层剖面+草皮+矿车+油灯）
  ctx.drawImage(bgC,0,0,W,H);
  // 云
  ctx.fillStyle='rgba(255,230,200,.16)';
  for(const cl of G.clouds){
    ctx.beginPath();
    ctx.ellipse(cl.x,cl.y,34*cl.s,9*cl.s,0,0,TAU);
    ctx.ellipse(cl.x+20*cl.s,cl.y+4,22*cl.s,7*cl.s,0,0,TAU);
    ctx.fill();
  }
  // 矿层光斑点缀
  for(const p of G.pebbles){
    ctx.fillStyle='rgba(255,220,170,'+p.a+')';
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);ctx.fill();
  }
  // 油灯光晕（闪烁）
  const fl=clamp(.5+.16*Math.sin(G.t*7.3)+.09*Math.sin(G.t*13.1),0,1);
  ctx.globalAlpha=fl;
  ctx.drawImage(glowC,LAMP.x-36,LAMP.y-34,72,72);
  ctx.globalAlpha=1;
  // 物品
  for(const it of G.items)if(it.alive&&!it.grabbed)drawItem(ctx,it);
  // 爆炸烟环 + 火球
  for(const f of G.fx){
    const k=f.t/f.life;
    if(f.type==='ring'){
      const r=(f.big?22:14)+k*(f.big?115:62);
      ctx.globalAlpha=(1-k)*.6;
      ctx.drawImage(ringC,f.x-r,f.y-r,r*2,r*2);
    }else{
      const r=(f.big?26:15)+k*(f.big?92:50);
      ctx.globalAlpha=(1-k)*(1-k);
      ctx.globalCompositeOperation='lighter';
      ctx.drawImage(fireC,f.x-r,f.y-r,r*2,r*2);
      ctx.globalCompositeOperation='source-over';
    }
  }
  ctx.globalAlpha=1;
  // 钩子+矿工
  drawHook(ctx);
  drawMiner(ctx);
  // 粒子
  for(const p of G.parts){
    ctx.globalAlpha=1-p.t/p.life;
    ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);ctx.fill();
  }
  ctx.globalAlpha=1;
  // 金币雨
  for(const cn of G.coins){
    const w=Math.abs(Math.sin(cn.ph+cn.t*cn.sp))*13+2;
    ctx.drawImage(coinC,cn.x-w/2,cn.y-7,w,14);
  }
  // 弹字（按价值分级大小/颜色 + 弹出缩放）
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(const p of G.popups){
    ctx.globalAlpha=clamp(1.4-p.t,0,1);
    const fs=Math.round(p.size*(.5+.5*Math.min(1,p.t*6)));
    ctx.font='bold '+fs+'px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.lineWidth=4;ctx.strokeStyle='rgba(0,0,0,.6)';
    ctx.strokeText(p.txt,p.x,p.y);
    ctx.fillStyle=p.col;
    ctx.fillText(p.txt,p.x,p.y);
  }
  ctx.globalAlpha=1;
  if(G.scr==='play')drawHUD(ctx);
}

/* ============ 主循环 ============ */
let last=0;
function loop(ts){
  const dt=clamp((ts-last)/1000,0,.05);
  last=ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
// roundRect 兼容
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    this.moveTo(x+r,y);this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);this.closePath();
    return this;
  };
}
G.items=genLevel(1); // 开始界面背景也有矿层
requestAnimationFrame(loop);
</script>
