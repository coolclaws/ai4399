<style>

.panel{position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;background:rgba(10,10,18,.55);backdrop-filter:blur(3px)}

h1{font-size:40px;color:#ffcc00;letter-spacing:8px;margin-bottom:6px;text-shadow:0 0 26px rgba(255,204,0,.35);font-weight:800}

<script>
(()=>{
'use strict';
/* ================= 工具 ================= */
const TAU=Math.PI*2, PI=Math.PI;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const rand=(a,b)=>a+Math.random()*(b-a);
const wrapA=a=>((a+PI)%TAU+TAU)%TAU-PI;
const $=id=>document.getElementById(id);

const cv=$('cv'), ctx=cv.getContext('2d');
let W=innerWidth,H=innerHeight,DPR=1;
function resize(){
  DPR=Math.min(devicePixelRatio||1,2);
  W=innerWidth;H=innerHeight;
  cv.width=Math.round(W*DPR);cv.height=Math.round(H*DPR);
  cv.style.width=W+'px';cv.style.height=H+'px';
}
addEventListener('resize',resize);resize();

/* ================= 常量 ================= */
const PXM=40;            // 1 米 = 40px
const DT=1/240;          // 物理子步长
const G=2300;            // 重力 px/s^2
const R=16;              // 车轮半径
const HEADR=10;          // 头部碰撞半径
const MAXV=1250;         // 驱动最高速 px/s
const DRIVE=1600;        // 油门加速度
const REVA=900, REVMAX=380; // 倒车
const ALPHA=22, OMAX=9.5;   // 空中角加速度 / 角速度上限 rad
const WHEELIE=4.2;       // 地面油门抬头力矩
const REST=0.04;         // 车轮弹性
const STEP=6;            // 地形采样间距

/* ================= 音频 ================= */
let AC=null,master=null,engO1=null,engO2=null,engF=null,engG=null,rpmS=0,thudT=0;
function initAudio(){
  if(AC)return;
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    master=AC.createGain();master.gain.value=.8;master.connect(AC.destination);
    engO1=AC.createOscillator();engO1.type='sawtooth';
    engO2=AC.createOscillator();engO2.type='square';
    engF=AC.createBiquadFilter();engF.type='lowpass';engF.Q.value=2;
    engG=AC.createGain();engG.gain.value=0;
    engO1.connect(engF);engO2.connect(engF);engF.connect(engG);engG.connect(master);
    engO1.start();engO2.start();
  }catch(e){AC=null;}
}
function engine(on,rpm,dt){
  if(!AC)return;
  rpmS+=(rpm-rpmS)*Math.min(1,dt*7);
  const t=AC.currentTime,f=42+rpmS*180;
  engO1.frequency.setTargetAtTime(f,t,.04);
  engO2.frequency.setTargetAtTime(f*.5,t,.04);
  engF.frequency.setTargetAtTime(230+rpmS*1500,t,.05);
  engG.gain.setTargetAtTime(on?.04+rpmS*.045:0,t,on?.06:.18);
}
function tone(f0,f1,dur,type,vol,when){
  if(!AC)return;
  const t=AC.currentTime+(when||0);
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.setValueAtTime(f0,t);
  if(f1!==f0)o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.connect(g);g.connect(master);o.start(t);o.stop(t+dur+.05);
}
function noiseHit(dur,vol,fc){
  if(!AC)return;
  const n=Math.floor(AC.sampleRate*dur),buf=AC.createBuffer(1,n,AC.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
  const s=AC.createBufferSource();s.buffer=buf;
  const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=fc;
  const g=AC.createGain();g.gain.value=vol;
  s.connect(f);f.connect(g);g.connect(master);s.start();
}
function sndCrash(){noiseHit(.4,.4,900);tone(110,28,.45,'triangle',.4,0);}
function sndTrick(n){
  const fs=[660,880,1108,1318];
  for(let i=0;i<Math.min(n+1,4);i++)tone(fs[i],fs[i],.1,'square',.1,i*.07);
}
function sndThud(v){
  const now=performance.now();
  if(now-thudT<160)return;thudT=now;
  noiseHit(.07,clamp(v,.05,.25),700);
}

/* ================= 地形 ================= */
let hs=[],firstX=0,gy=0;
const genX=()=>firstX+(hs.length-1)*STEP;
function pushSeg(dx,dy,mode){
  const n=Math.max(1,Math.round(dx/STEP));
  for(let i=1;i<=n;i++){
    const t=i/n,f=mode==='lin'?t:(1-Math.cos(PI*t))/2;
    hs.push(gy+dy*f);
  }
  gy+=dy;
}
function genFeature(){
  const m=genX()/PXM;
  if(m<100){ // 开局教学：平缓起伏
    const amp=clamp((m+35)/100,0,1)*26;
    pushSeg(rand(170,250),rand(-amp,amp)-gy*.05,'cos');
    return;
  }
  const t=clamp((m-100)/700,0,1); // 难度 0..1
  const r=Math.random(), bias=-gy*.04;
  if(r<.5||m<150){ // 连绵山丘
    const n=2+Math.floor(rand(0,4));
    for(let i=0;i<n;i++){
      const amp=34+200*t;
      pushSeg(rand(130,280),clamp(rand(-amp,amp)+bias,-330,330),'cos');
    }
  }else if(r<.62){ // 落差陡坡
    pushSeg(rand(140,200),bias,'cos');
    pushSeg(34,rand(160,260)+200*t,'lin');
    pushSeg(rand(180,240),rand(10,50),'cos');
  }else if(r<.85){ // 跳台 + 沟壑
    const h=120+170*t;
    pushSeg(rand(160,210),bias,'cos');
    pushSeg(185+70*t,-h,'lin');           // 直线上坡跳台
    pushSeg(22,h+170,'lin');              // 台尾陡崖
    pushSeg(150+330*t,50,'cos');          // 沟底
    pushSeg(110,-(h+115),'lin');          // 着陆坡
    pushSeg(rand(190,260),rand(40,90),'cos');
  }else{ // 断崖深沟
    pushSeg(rand(150,200),bias,'cos');
    pushSeg(16,420,'lin');
    pushSeg(110+250*t,0,'cos');
    pushSeg(16,-420+55,'lin');
    pushSeg(rand(190,260),rand(20,60),'cos');
  }
}
function ensureTerrain(toX){let n=0;while(genX()<toX&&n<400){genFeature();n++;}}
function pruneTerrain(keepFrom){
  const cut=Math.floor((keepFrom-firstX)/STEP);
  if(cut>400){hs.splice(0,cut);firstX+=cut*STEP;}
}
function groundY(x){
  const f=(x-firstX)/STEP,i=Math.floor(f);
  if(i<0)return hs[0];
  if(i>=hs.length-1)return hs[hs.length-1];
  return hs[i]+(hs[i+1]-hs[i])*(f-i);
}
function hitTerrain(px,py,r){
  let i0=Math.floor((px-r-firstX)/STEP),i1=Math.ceil((px+r-firstX)/STEP);
  i0=Math.max(0,i0);i1=Math.min(hs.length-1,i1);
  let bd=0,bnx=0,bny=-1,hit=false;
  for(let i=i0;i<i1;i++){
    const ax=firstX+i*STEP,ay=hs[i],by=hs[i+1];
    const aby=by-ay,len2=STEP*STEP+aby*aby;
    let tt=((px-ax)*STEP+(py-ay)*aby)/len2;
    tt=tt<0?0:tt>1?1:tt;
    const cx=ax+STEP*tt,cy=ay+aby*tt;
    const dx=px-cx,dy=py-cy,d=Math.hypot(dx,dy);
    const il=1/Math.sqrt(len2),nux=aby*il,nuy=-STEP*il; // 朝上的法线
    const s=dx*nux+dy*nuy; // 有符号深度
    let depth,nx,ny;
    if(s>=0){
      if(d>=r)continue;
      depth=r-d;
      if(d>1e-4){nx=dx/d;ny=dy/d;}else{nx=nux;ny=nuy;}
    }else{ // 圆心陷入地下
      depth=r-s;nx=nux;ny=nuy;
    }
    if(!hit||depth>bd){hit=true;bd=depth;bnx=nx;bny=ny;}
  }
  return hit?{nx:bnx,ny:bny,d:bd}:null;
}

/* ================= 输入 ================= */
const keys={};
let tL=false,tR=false;
const isTouch=('ontouchstart'in window)||navigator.maxTouchPoints>0;
if(isTouch)document.body.classList.add('touch');
addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault();
  keys[e.code]=true;
  initAudio();if(AC&&AC.state==='suspended')AC.resume();
  if((e.code==='Space'||e.code==='Enter'||e.code==='KeyR')&&!e.repeat){
    if(state==='menu')startGame();
    else if(state==='over'&&performance.now()-overAt>500)startGame();
  }
});
addEventListener('keyup',e=>{keys[e.code]=false;});
function bindZone(el,set){
  const on=e=>{e.preventDefault();set(true);el.classList.add('on');initAudio();if(AC&&AC.state==='suspended')AC.resume();};
  const off=e=>{e.preventDefault();set(false);el.classList.remove('on');};
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',on);
  el.addEventListener('mouseup',off);el.addEventListener('mouseleave',off);
}
bindZone($('zoneL'),v=>tL=v);
bindZone($('zoneR'),v=>tR=v);
const inThr=()=>!!(keys.ArrowUp||keys.KeyW||keys.Space||tR);
const inBrk=()=>!!(keys.ArrowDown||keys.KeyS||tL);
const inBack=()=>!!(keys.ArrowLeft||keys.KeyA||tL);
const inFwd=()=>!!(keys.ArrowRight||keys.KeyD||tR);

/* ================= 摩托刚体（verlet 三质点） ================= */
function makePt(x,y,im){return{x,y,px:x,py:y,im};}
let bike=null;
const WB=76,BH=46; // 轴距 / 车身质点高
function makeBike(x){
  const ry=groundY(x-WB/2)-R,fy=groundY(x+WB/2)-R;
  const rw=makePt(x-WB/2,ry,1),fw=makePt(x+WB/2,fy,1);
  const bd=makePt(x,Math.min(ry,fy)-BH,.5);
  const len=(a,b)=>Math.hypot(b.x-a.x,b.y-a.y);
  return{
    rw,fw,bd,
    links:[
      {a:rw,b:fw,len:len(rw,fw),st:.95},  // 轴距：刚性
      {a:rw,b:bd,len:len(rw,bd),st:.28},  // 悬挂：弹性
      {a:fw,b:bd,len:len(fw,bd),st:.28},
    ],
    spin:0,angle:Math.atan2(fy-ry,WB),omega:0,
    air:0,airRot:0,cR:null,cF:null,maxX:x,leanVis:0,lastVt:0,
  };
}
function solveLink(L){
  const a=L.a,b=L.b;
  let dx=b.x-a.x,dy=b.y-a.y;
  const d=Math.hypot(dx,dy)||1e-6,diff=(d-L.len)/d*L.st;
  const w=a.im+b.im,wa=a.im/w,wb=b.im/w;
  a.x+=dx*diff*wa;a.y+=dy*diff*wa;
  b.x-=dx*diff*wb;b.y-=dy*diff*wb;
}
function bodySide(b){ // 防止车身质点翻过轮轴线（三角反折）
  const mx=(b.rw.x+b.fw.x)/2,my=(b.rw.y+b.fw.y)/2;
  let ux=b.fw.x-b.rw.x,uy=b.fw.y-b.rw.y;
  const l=Math.hypot(ux,uy)||1;ux/=l;uy/=l;
  const upx=uy,upy=-ux;
  const s=(b.bd.x-mx)*upx+(b.bd.y-my)*upy;
  if(s<20){const c=(20-s)*.6;b.bd.x+=upx*c;b.bd.y+=upy*c;}
}
function rotateBike(b,da){
  const pts=[b.rw,b.fw,b.bd];
  let cx=0,cy=0,tm=0;
  for(const p of pts){const m=1/p.im;cx+=p.x*m;cy+=p.y*m;tm+=m;}
  cx/=tm;cy/=tm;
  const s=Math.sin(da),c=Math.cos(da);
  for(const p of pts){
    const dx=p.x-cx,dy=p.y-cy;
    p.x=cx+dx*c-dy*s;p.y=cy+dx*s+dy*c;
  }
}
function contactPass(p,fric,rest){
  const h=hitTerrain(p.x,p.y,R);
  if(!h)return null;
  p.x+=h.nx*h.d;p.y+=h.ny*h.d;p.px+=h.nx*h.d;p.py+=h.ny*h.d;
  const tx=-h.ny,ty=h.nx;
  let vx=p.x-p.px,vy=p.y-p.py;
  let vn=vx*h.nx+vy*h.ny,vt=vx*tx+vy*ty;
  const impact=vn<0?-vn:0;
  if(vn<0)vn=-vn*rest;
  vt*=fric;
  p.px=p.x-(h.nx*vn+tx*vt);
  p.py=p.y-(h.ny*vn+ty*vt);
  return{nx:h.nx,ny:h.ny,impact};
}
function riderPose(b){
  let ux=b.fw.x-b.rw.x,uy=b.fw.y-b.rw.y;
  const l=Math.hypot(ux,uy)||1;ux/=l;uy/=l;
  const px=uy,py=-ux;
  const mx=(b.rw.x+b.fw.x)/2,my=(b.rw.y+b.fw.y)/2;
  const at=(a,u)=>({x:mx+ux*a+px*u,y:my+uy*a+py*u});
  const ln=b.leanVis;
  const hip=at(-9+ln*3,30),chest=at(-2+ln*7,52);
  const head={x:chest.x+ux*(4+ln*5)+px*15,y:chest.y+uy*(4+ln*5)+py*15};
  return{hip,chest,head,hand:at(21,41),foot:at(2,12),knee:at(15,21),ux,uy,px,py,mx,my,at};
}

/* ================= 布娃娃 / 头盔 ================= */
let rag=null,helmet=null;
function buildRagdoll(){
  const p=riderPose(bike);
  const vx=bike.bd.x-bike.bd.px,vy=bike.bd.y-bike.bd.py;
  const mk=(pt,kx,ky)=>{
    const o=makePt(pt.x,pt.y,1);
    o.px-=vx+kx;o.py-=vy+ky;return o;
  };
  const head=mk(p.head,rand(-1,1),rand(0,1.5));
  const chest=mk(p.chest,0,0),hip=mk(p.hip,0,0);
  const hand=mk(p.hand,rand(-1,1),0),foot=mk(p.foot,0,0);
  rag={
    pts:[head,chest,hip,hand,foot],
    links:[
      {a:head,b:chest,len:15,st:.9},
      {a:chest,b:hip,len:26,st:.9},
      {a:chest,b:hand,len:24,st:.7},
      {a:hip,b:foot,len:30,st:.7},
      {a:head,b:hip,len:38,st:.25},
    ],
    head,chest,hip,hand,foot,
  };
  helmet={x:p.head.x,y:p.head.y,px:p.head.x-vx*.7-rand(1,3),py:p.head.y-vy*.7+rand(2,4),rot:0,vr:rand(-.2,.2)};
}
function stepRagdoll(dt){
  if(!rag)return;
  for(const p of rag.pts){
    const vx=(p.x-p.px)*.999,vy=(p.y-p.py)*.999;
    p.px=p.x;p.py=p.y;p.x+=vx;p.y+=vy+G*dt*dt;
  }
  for(let k=0;k<3;k++)for(const L of rag.links)solveLink(L);
  for(const p of rag.pts){
    const h=hitTerrain(p.x,p.y,5);
    if(h){
      p.x+=h.nx*h.d;p.y+=h.ny*h.d;p.px+=h.nx*h.d;p.py+=h.ny*h.d;
      const tx=-h.ny,ty=h.nx;
      let vx=p.x-p.px,vy=p.y-p.py;
      let vn=vx*h.nx+vy*h.ny,vt=(vx*tx+vy*ty)*.9;
      if(vn<0)vn=-vn*.15;
      p.px=p.x-(h.nx*vn+tx*vt);p.py=p.y-(h.ny*vn+ty*vt);
    }
  }
  if(helmet){
    const h=helmet,vx=(h.x-h.px)*.999,vy=(h.y-h.py)*.999;
    h.px=h.x;h.py=h.y;h.x+=vx;h.y+=vy+G*dt*dt;h.rot+=h.vr;
    const c=hitTerrain(h.x,h.y,9);
    if(c){
      h.x+=c.nx*c.d;h.y+=c.ny*c.d;h.px+=c.nx*c.d;h.py+=c.ny*c.d;
      const tx=-c.ny,ty=c.nx;
      let wx=h.x-h.px,wy=h.y-h.py;
      let vn=wx*c.nx+wy*c.ny,vt=(wx*tx+wy*ty)*.97;
      if(vn<0)vn=-vn*.45;h.vr*=.92;
      h.px=h.x-(c.nx*vn+tx*vt);h.py=h.y-(c.ny*vn+ty*vt);
    }
  }
}

/* ================= 粒子 / 飘字 ================= */
/* col: 0 尘土 | 1 火花 | 2 落地尘环 | 3 排气微烟 */
const parts=[],pops=[],ghosts=[];
let ghostCD=0;
function addDust(x,y,vx,vy,n,col){
  for(let i=0;i<n;i++){
    if(parts.length>320)parts.shift();
    parts.push({x,y,vx:vx+rand(-60,60),vy:vy+rand(-70,10),life:0,max:rand(.5,1.1),r:rand(2.5,6),col:col||0});
  }
}
function addRing(x,y,big){
  if(parts.length>320)parts.shift();
  parts.push({x,y,vx:0,vy:0,life:0,max:.55,r:big?13:8,col:2});
}
function addSmoke(x,y,vx,vy){
  if(parts.length>320)parts.shift();
  parts.push({x,y,vx:vx+rand(-14,14),vy:vy+rand(-10,6),life:0,max:rand(.45,.9),r:rand(1.8,3.2),col:3});
}
function stepParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.life+=dt;
    if(p.life>p.max){parts.splice(i,1);continue;}
    if(p.col===2)continue; // 尘环原地扩散
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vx*=Math.exp(-1.8*dt);
    p.vy=p.vy*Math.exp(-1.8*dt)+(p.col===1?900:p.col===3?-36:160)*dt;
  }
  for(let i=ghosts.length-1;i>=0;i--){
    ghosts[i].a+=dt;
    if(ghosts[i].a>.38)ghosts.splice(i,1);
  }
  for(let i=pops.length-1;i>=0;i--){
    const o=pops[i];o.age+=dt;o.y-=34*dt;
    if(o.age>1.6)pops.splice(i,1);
  }
}
function addPop(x,y,txt,col,size){pops.push({x,y,txt,col,size:size||22,age:0});}

/* ================= 摩托物理步进 ================= */
function stepBike(dt){
  const b=bike;
  const play=state==='play';
  const thr=play&&inThr(),brk=play&&inBrk();
  // 积分
  for(const p of [b.rw,b.fw,b.bd]){
    let vx=(p.x-p.px)*.9996,vy=(p.y-p.py)*.9996;
    const sp=Math.hypot(vx,vy),cap=6500*dt;
    if(sp>cap){vx*=cap/sp;vy*=cap/sp;}
    p.px=p.x;p.py=p.y;
    p.x+=vx;p.y+=vy+G*dt*dt;
  }
  const airborne=b.air>.07;
  // 空中配重翻转
  if(play&&airborne){
    let dir=0;
    if(inBack())dir-=1;
    if(inFwd())dir+=1;
    if(dir<0&&b.omega>-OMAX)rotateBike(b,-ALPHA*dt*dt);
    else if(dir>0&&b.omega<OMAX)rotateBike(b,ALPHA*dt*dt);
  }
  // 地面油门抬头
  if(thr&&b.cR&&!airborne)rotateBike(b,-WHEELIE*dt*dt);
  // 约束 + 无摩擦投影碰撞
  for(let k=0;k<5;k++){
    for(const L of b.links)solveLink(L);
    bodySide(b);
    for(const w of [b.rw,b.fw]){
      // 半径略减：留余量给最终接触检测（摩擦/驱动），否则接触永远测不到
      const h=hitTerrain(w.x,w.y,R-.6);
      if(h){w.x+=h.nx*h.d;w.y+=h.ny*h.d;w.px+=h.nx*h.d;w.py+=h.ny*h.d;}
    }
  }
  // 最终接触（摩擦 + 微弹）：刹车强摩擦只在前向行驶时生效，倒车用滚动摩擦
  const fr=(brk&&b.lastVt>80*dt)?.962:.9995;
  b.cR=contactPass(b.rw,fr,REST);
  b.cF=contactPass(b.fw,fr,REST);
  // 驱动 / 倒车
  if(play&&b.cR){
    const n=b.cR,tx=-n.ny,ty=n.nx;
    let vx=b.rw.x-b.rw.px,vy=b.rw.y-b.rw.py;
    let vt=vx*tx+vy*ty;
    const vn=vx*n.nx+vy*n.ny;
    if(thr&&vt<MAXV*dt)vt=Math.min(MAXV*dt,vt+DRIVE*dt*dt);
    if(brk&&!thr&&vt<=80*dt)vt=Math.max(-REVMAX*dt,vt-REVA*dt*dt);
    b.lastVt=vt;
    b.rw.px=b.rw.x-(tx*vt+n.nx*vn);
    b.rw.py=b.rw.y-(ty*vt+n.ny*vn);
    b.spin+=vt/R;
    // 尘土
    if(thr&&Math.random()<dt*55&&Math.abs(vt)>30*dt)
      addDust(b.rw.x-n.nx*R*.9,b.rw.y-n.ny*R*.9,-tx*Math.abs(vt)/dt*.25,-40,1);
  }else if(thr){
    b.spin+=26*dt; // 空中给油空转
  }
  // 落地冲击反馈
  for(const c of [b.cR,b.cF]){
    if(c&&c.impact>380*dt){
      const w=b.cR===c?b.rw:b.fw;
      addDust(w.x,w.y+R*.6,0,-60,Math.min(10,c.impact/dt/120),0);
      if(c.impact>650*dt)addRing(w.x,w.y+R*.5,c.impact>1000*dt); // 落地尘环
      sndThud(c.impact/dt/2200);
    }
  }
  // 姿态角 / 空翻统计
  const a=Math.atan2(b.fw.y-b.rw.y,b.fw.x-b.rw.x);
  const da=wrapA(a-b.angle);
  b.omega=da/dt;b.angle=a;
  const contact=!!(b.cR||b.cF);
  if(contact){
    if(b.air>.25&&play){
      // 落地姿态判定
      const n=b.cR||b.cF;
      const upx=Math.sin(a),upy=-Math.cos(a);
      const updot=upx*n.nx+upy*n.ny;
      if(updot<-.2){
        doCrash('落地姿态失衡');
      }else{
        const deg=Math.abs(b.airRot)*180/PI;
        const flips=Math.floor((deg+28)/360);
        if(flips>=1){
          combo++;flipsTotal+=flips;
          const base=flips===1?500:flips===2?1600:flips*flips*400;
          const gain=Math.round(base*(1+(combo-1)*.5)/10)*10;
          trickScore+=gain;
          const dirTxt=b.airRot<0?'后空翻':'前空翻';
          const name=(flips>=3?flips+' 周':flips===2?'双重':'')+dirTxt;
          trickMsg=name+'！+'+gain+(combo>1?'（连击 ×'+combo+'）':'');
          trickMsgT=2.4;
          addPop((b.rw.x+b.fw.x)/2,b.bd.y-46,name+'！+'+gain,'#ffcc00',24);
          sndTrick(flips);
        }
      }
    }
    b.air=0;b.airRot=0;
  }else{
    b.air+=dt;b.airRot+=da;
    // 空翻残影采样（纯视觉）
    if(b.air>.15&&Math.abs(b.omega)>4){
      ghostCD-=dt;
      if(ghostCD<=0){
        ghostCD=.03;
        ghosts.push({rx:b.rw.x,ry:b.rw.y,fx:b.fw.x,fy:b.fw.y,a:0});
        if(ghosts.length>16)ghosts.shift();
      }
    }
  }
  // 头部 / 躯干触地判定
  if(play){
    const pose=riderPose(b);
    // 排气微烟（纯视觉）
    if(thr&&Math.random()<dt*24){
      const ex=pose.at(-34,19);
      addSmoke(ex.x,ex.y,-pose.ux*55,-pose.uy*55-26);
    }
    const hh=hitTerrain(pose.head.x,pose.head.y,HEADR);
    if(hh&&hh.d>1.2){doCrash('骑手头部着地');}
    else{
      const ch=hitTerrain(pose.chest.x,pose.chest.y,7);
      if(ch&&ch.d>5)doCrash('骑手摔落');
    }
  }
  // 视觉前后倾
  if(play){
    const tgt=(thr?.3:0)+(inFwd()?.6:0)-(brk?.35:0)-(inBack()?.6:0);
    b.leanVis+=(clamp(tgt,-1,1)-b.leanVis)*Math.min(1,dt*10);
  }
  // 里程
  const mx=(b.rw.x+b.fw.x)/2;
  if(mx>b.maxX)b.maxX=mx;
  meters=Math.max(meters,b.maxX/PXM);
  // 受困检测：给油却动不了
  if(play){
    const spd=Math.hypot(b.bd.x-b.bd.px,b.bd.y-b.bd.py)/dt;
    if((thr||brk)&&spd<26)stuckT+=dt;else stuckT=Math.max(0,stuckT-dt*2);
    if(stuckT>3.5)endRun('本局结束','摩托被困，动弹不得');
    // 防软锁：跌出地形范围（如长距离倒车回已修剪区域）
    if(b.bd.y-groundY(mx)>1800)endRun('本局结束','坠入了虚空');
  }
}

function physStep(dt){
  if(!bike)return;
  ensureTerrain(camX+W/zoom+900);
  stepBike(dt);
  stepRagdoll(dt);
  stepParts(dt);
}

/* ================= 摄像机 ================= */
function stepCam(dt){
  if(!bike)return;
  const b=bike;
  const follow=rag?rag.chest:{x:(b.rw.x+b.fw.x)/2,y:b.bd.y,};
  const vx=rag?0:(b.bd.x-b.bd.px)/DT;
  const sp=Math.abs(vx);
  const tz=baseZoom()*clamp(1.04-sp/MAXV*.38,.6,1.04);
  zoom+=(tz-zoom)*Math.min(1,dt*2.2);
  const tx=follow.x+clamp(vx*.3,-260,260);
  const gAhead=groundY(follow.x+180);
  const ty=Math.min(follow.y,gAhead)-30;
  const k=1-Math.exp(-4.5*dt);
  camX+=(tx-camX)*k;
  camY+=(ty-camY)*(1-Math.exp(-3*dt));
  shake*=Math.exp(-6*dt);
}

/* ================= 渲染：缓存与预渲染 ================= */
const SS=2; // 离屏精灵超采样
function mkCanvas(w,h){const c=document.createElement('canvas');c.width=w;c.height=h;return c;}
// —— 屏幕级渐变缓存（仅尺寸变化时重建）——
let gradKey='',G_sky=null,G_crash=null,G_vig=null,G_rec=null,G_hz1=null,G_hz2=null;
let G_terr=null,terrQY=1e9,rockPat=null;
function ensureGrads(){
  const k=W+'x'+H;

  G_sky=ctx.createLinearGradient(0,0,0,H);

  G_sky.addColorStop(.9,'#e8964c');G_sky.addColorStop(1,'#f2b35c');
  G_crash=ctx.createRadialGradient(W/2,H/2,H*.3,W/2,H/2,H*.85);
  G_crash.addColorStop(0,'rgba(255,40,30,0)');G_crash.addColorStop(1,'rgba(255,40,30,.22)');
  G_vig=ctx.createRadialGradient(W/2,H/2,H*.36,W/2,H/2,H*.95);
  G_vig.addColorStop(0,'rgba(8,4,16,0)');G_vig.addColorStop(1,'rgba(8,4,16,.5)');
  G_rec=ctx.createLinearGradient(0,H*.42-90,0,H*.42+90);
  G_rec.addColorStop(0,'rgba(255,200,90,0)');G_rec.addColorStop(.5,'rgba(255,210,110,.3)');G_rec.addColorStop(1,'rgba(255,200,90,0)');
  G_hz1=ctx.createLinearGradient(0,H*.36,0,H*.6);
  G_hz1.addColorStop(0,'rgba(236,150,90,0)');G_hz1.addColorStop(.5,'rgba(236,150,90,.13)');G_hz1.addColorStop(1,'rgba(236,150,90,0)');
  G_hz2=ctx.createLinearGradient(0,H*.45,0,H*.7);
  G_hz2.addColorStop(0,'rgba(214,120,80,0)');G_hz2.addColorStop(.5,'rgba(214,120,80,.1)');G_hz2.addColorStop(1,'rgba(214,120,80,0)');
}
// —— 太阳光晕精灵 ——
const sunSpr=(()=>{
  const s=420,c=mkCanvas(s,s),g=c.getContext('2d');
  const r=g.createRadialGradient(s/2,s/2,8,s/2,s/2,s/2);
  r.addColorStop(0,'rgba(255,240,205,.95)');
  r.addColorStop(.09,'rgba(255,214,140,.85)');
  r.addColorStop(.18,'rgba(255,166,95,.38)');
  r.addColorStop(.42,'rgba(255,120,70,.13)');
  r.addColorStop(1,'rgba(255,110,60,0)');
  g.fillStyle=r;g.fillRect(0,0,s,s);
  g.fillStyle='rgba(255,200,120,.55)';
  g.beginPath();g.arc(s/2,s/2,37,0,TAU);g.fill();
  g.fillStyle='#ffe8b6';

// —— 岩层纹理 pattern（无缝平铺）——
function makeRockPattern(){
  const c=mkCanvas(128,128),g=c.getContext('2d');
  for(let i=0;i<150;i++){
    g.fillStyle=i%3?'rgba(0,0,0,'+(0.06+Math.random()*.12).toFixed(3)+')'
                   :'rgba(255,200,150,'+(0.03+Math.random()*.05).toFixed(3)+')';
    g.beginPath();g.arc(Math.random()*128,Math.random()*128,.6+Math.random()*2.2,0,TAU);g.fill();
  }
  g.strokeStyle='rgba(0,0,0,.1)';g.lineWidth=3;
  for(let k=0;k<4;k++){
    const y0=16+k*32;
    g.beginPath();
    for(let x=0;x<=128;x+=8){
      const y=y0+Math.sin(x*.0982+k*1.7)*4;
      x?g.lineTo(x,y):g.moveTo(x,y);
    }
    g.stroke();
  }
  return ctx.createPattern(c,'repeat');
}

/* ================= 背景：黄昏荒野 ================= */
function ridge(x,f1,f2,f3){return Math.sin(x*f1)*1+Math.sin(x*f2+1.7)*.55+Math.sin(x*f3+.4)*.3;}
function drawBirds(t){
  const cyc=(t*.001)%37;
  if(cyc>15)return; // 偶尔掠过的鸟群
  const pr=cyc/15;
  const fx=-140+(W+280)*pr,fy=H*(.16+.05*Math.sin(pr*5));
  ctx.strokeStyle='rgba(26,14,34,.85)';ctx.lineWidth=1.8;ctx.lineCap='round';
  for(let i=0;i<7;i++){
    const bx=fx-Math.abs(i-3)*26-i*6,by=fy+Math.abs(i-3)*13+(i%2)*4;
    const fl=Math.sin(t*.014+i*1.9)*3.4;
    ctx.beginPath();
    ctx.moveTo(bx-5.5,by-fl);
    ctx.quadraticCurveTo(bx,by+1.5,bx+5.5,by-fl);
    ctx.stroke();
  }
}
function drawBG(t){
  // 黄昏大渐变（缓存）
  ctx.fillStyle=G_sky;ctx.fillRect(0,0,W,H);
  // 高空残星
  ctx.fillStyle='#fff';
  for(let i=0;i<36;i++){
    const sx=((i*173.31+i*i*7.7-camX*.05)%W+W)%W;
    const sy=(i*97.73)%(H*.3);
    const tw=.25+.45*Math.abs(Math.sin(t*.0006*(1+i%5)+i));
    ctx.globalAlpha=tw*.3*(1-sy/(H*.3)*.6);
    ctx.fillRect(sx,sy,i%7===0?2:1,i%7===0?2:1);
  }
  ctx.globalAlpha=1;
  // 落日（预渲染光晕）
  ctx.drawImage(sunSpr,W*.66-210,H*.4-210,420,420);
  // 多层远山 + 暮霭雾色衰减
  drawRidge(.06,H*.455,56,'#6b3a58',.0011,.0027,.006);
  ctx.fillStyle=G_hz1;ctx.fillRect(0,H*.36,W,H*.24);
  drawRidge(.14,H*.535,84,'#46244c',.0009,.0023,.0051);
  ctx.fillStyle=G_hz2;ctx.fillRect(0,H*.45,W,H*.25);
  drawRidge(.26,H*.625,112,'#2a1638',.0008,.0021,.0047);
  // 飘云：低层暖色受光 / 高层冷色
  for(let i=0;i<7;i++){
    const warm=i%2===0;
    ctx.fillStyle=warm?'rgba(255,172,112,.085)':'rgba(150,118,190,.075)';
    const cx=(((i*487.7+131)-camX*(.1+(i%3)*.04)-t*.004)%(W+560)+(W+560))%(W+560)-280;
    const cy=H*(warm?.3:.09)+((i*73)%120);
    for(let j=0;j<3;j++){
      ctx.beginPath();
      ctx.ellipse(cx+j*40-40,cy+(j===1?-8:4),50-j*9,13,0,0,TAU);
      ctx.fill();
    }
  }
  drawBirds(t);
}
function drawRidge(par,base,amp,col,f1,f2,f3){
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.moveTo(0,H);
  const off=camX*par,yoff=(camY)*par*.25;
  for(let sx=0;sx<=W;sx+=14){
    const y=base+yoff+ridge(sx+off,f1,f2,f3)*amp;
    ctx.lineTo(sx,y);
  }
  ctx.lineTo(W,H);ctx.closePath();ctx.fill();
}
function drawTerrain(ox,oy){
  const wl=camX-ox/zoom-30,wr=camX+(W-ox)/zoom+30;
  let i0=Math.floor((wl-firstX)/STEP),i1=Math.ceil((wr-firstX)/STEP);
  i0=Math.max(0,i0);i1=Math.min(hs.length-1,i1);
  if(i1<=i0)return;
  const bot=camY+(H-oy)/zoom+80;
  // 填充渐变：按相机高度分段缓存，避免每帧重建
  const qy=Math.round(camY/120)*120;
  if(qy!==terrQY){
    terrQY=qy;
    G_terr=ctx.createLinearGradient(0,qy-260,0,qy+620);
    G_terr.addColorStop(0,'#7c4a30');   // 受光表土
    G_terr.addColorStop(.22,'#5e3424'); // 土层
    G_terr.addColorStop(.5,'#3c2230');  // 土岩过渡
    G_terr.addColorStop(.78,'#221331'); // 深处岩层
    G_terr.addColorStop(1,'#130c1c');
  }
  ctx.beginPath();
  ctx.moveTo(firstX+i0*STEP,bot);
  for(let i=i0;i<=i1;i++)ctx.lineTo(firstX+i*STEP,hs[i]);
  ctx.lineTo(firstX+i1*STEP,bot);
  ctx.closePath();
  ctx.fillStyle=G_terr;ctx.fill();
  // 岩层纹理：同一路径二次填充（pattern 锚定世界原点，随相机自然滚动）
  if(!rockPat)rockPat=makeRockPattern();
  ctx.globalAlpha=.5;ctx.fillStyle=rockPat;ctx.fill();
  ctx.globalAlpha=1;
  ctx.lineJoin='round';ctx.lineCap='round';
  // 表面下方的暖色土壤带
  ctx.beginPath();
  for(let i=i0;i<=i1;i++){
    const x=firstX+i*STEP;
    i===i0?ctx.moveTo(x,hs[i]+7):ctx.lineTo(x,hs[i]+7);
  }
  ctx.strokeStyle='rgba(140,84,46,.55)';ctx.lineWidth=11;ctx.stroke();
  // 草皮边缘（略高于表面）
  ctx.beginPath();
  for(let i=i0;i<=i1;i++){
    const x=firstX+i*STEP;
    i===i0?ctx.moveTo(x,hs[i]-2.2):ctx.lineTo(x,hs[i]-2.2);
  }
  ctx.strokeStyle='rgba(90,101,38,.9)';ctx.lineWidth=3;ctx.stroke();
  // 表面主线：暖光外晕 + 土棱
  ctx.beginPath();
  for(let i=i0;i<=i1;i++){
    const x=firstX+i*STEP;
    i===i0?ctx.moveTo(x,hs[i]):ctx.lineTo(x,hs[i]);
  }
  ctx.strokeStyle='rgba(255,150,60,.13)';ctx.lineWidth=10;ctx.stroke();
  ctx.strokeStyle='#c98a30';ctx.lineWidth=3;ctx.stroke();
  // 向阳坡受光亮边（太阳在画面右侧）
  ctx.beginPath();
  let open=false;
  for(let i=i0;i<i1;i++){
    const dy=hs[i+1]-hs[i];
    if(dy>1.2){
      const x=firstX+i*STEP;
      if(!open){ctx.moveTo(x,hs[i]-.5);open=true;}
      ctx.lineTo(x+STEP,hs[i+1]-.5);
    }else open=false;
  }
  ctx.strokeStyle='rgba(255,214,130,.5)';ctx.lineWidth=2;ctx.stroke();
  // 深处碎石（确定性散布）
  ctx.fillStyle='rgba(34,20,28,.5)';
  ctx.beginPath();
  for(let i=i0;i<=i1;i+=3){
    const s=Math.sin(i*12.9898)*43758.5453,h1=s-Math.floor(s);
    if(h1<.4){
      const x=firstX+i*STEP+h1*8,y=hs[i]+12+h1*60,r2=1.5+h1*4;
      ctx.moveTo(x+r2,y);ctx.arc(x,y,r2,0,TAU);
    }
  }
  ctx.fill();
  // 表面浅色砾石点缀
  ctx.fillStyle='rgba(226,178,116,.4)';
  ctx.beginPath();
  for(let i=i0;i<=i1;i+=4){
    const s=Math.sin(i*37.719)*24634.63,h1=s-Math.floor(s);
    if(h1<.3){
      const x=firstX+i*STEP+h1*10,y=hs[i]+2.5,r2=1.1+h1*2;
      ctx.moveTo(x+r2,y);ctx.arc(x,y,r2,0,TAU);
    }
  }
  ctx.fill();
  // 缓坡草叶
  ctx.strokeStyle='rgba(96,110,44,.8)';ctx.lineWidth=1.5;
  ctx.beginPath();
  for(let i=i0;i<i1;i+=2){
    if(Math.abs(hs[i+1]-hs[i])>3)continue; // 陡坡不长草
    const s=Math.sin(i*78.233)*9631.7,h1=s-Math.floor(s);
    if(h1<.32){
      const x=firstX+i*STEP+h1*6,y=hs[i]+1;
      const hgt=4+h1*8,sw=(h1-.16)*8;
      ctx.moveTo(x,y);
      ctx.quadraticCurveTo(x+sw,y-hgt*.6,x+sw*1.8,y-hgt);
    }
  }
  ctx.stroke();
  // 陡坡 / 跳台边缘磨损刻痕
  ctx.strokeStyle='rgba(16,8,14,.45)';ctx.lineWidth=2;
  ctx.beginPath();
  for(let i=i0;i<i1;i+=2){
    if(Math.abs(hs[i+1]-hs[i])<4.2)continue;
    const s=Math.sin(i*51.37)*11713.9,h1=s-Math.floor(s);
    if(h1>.55)continue;
    const x=firstX+i*STEP,y=hs[i];
    ctx.moveTo(x+1,y+2);ctx.lineTo(x+5,y+7+h1*5);
  }
  ctx.stroke();
}
/* ===== 车轮精灵：辐条 + 胎纹，高速叠加旋转模糊环 ===== */
const wheelSpr=(()=>{
  const s=(R+5)*2*SS,c=mkCanvas(s,s),g=c.getContext('2d');
  g.translate(s/2,s/2);g.scale(SS,SS);
  g.fillStyle='#1a1a22';
  g.beginPath();g.arc(0,0,R,0,TAU);g.fill();
  // 胎纹块
  g.strokeStyle='#06060a';g.lineWidth=3;
  for(let i=0;i<10;i++){
    const a=i*TAU/10;
    g.beginPath();
    g.moveTo(Math.cos(a)*(R-3.5),Math.sin(a)*(R-3.5));
    g.lineTo(Math.cos(a)*(R+.5),Math.sin(a)*(R+.5));
    g.stroke();
  }
  // 胎侧 / 轮辋
  g.strokeStyle='#34343f';g.lineWidth=2.5;
  g.beginPath();g.arc(0,0,R-4.5,0,TAU);g.stroke();
  g.strokeStyle='#b9b9c8';g.lineWidth=1.8;
  g.beginPath();g.arc(0,0,R-6.5,0,TAU);g.stroke();
  // 交叉辐条
  g.strokeStyle='#9a9aac';g.lineWidth=1.3;
  for(let i=0;i<7;i++){
    const a=i*TAU/7;
    g.beginPath();g.moveTo(Math.cos(a)*2.5,Math.sin(a)*2.5);g.lineTo(Math.cos(a+.5)*(R-7),Math.sin(a+.5)*(R-7));g.stroke();
    g.beginPath();g.moveTo(Math.cos(a)*2.5,Math.sin(a)*2.5);g.lineTo(Math.cos(a-.5)*(R-7),Math.sin(a-.5)*(R-7));g.stroke();
  }
  // 轮毂
  g.fillStyle='#d8d8e6';g.beginPath();g.arc(0,0,3.6,0,TAU);g.fill();
  g.fillStyle='#5a5a6a';g.beginPath();g.arc(0,0,1.8,0,TAU);g.fill();
  return c;
})();
const wheelBlur=(()=>{ // 高转速下的辐条拖影环

})();

  // 车把 + 握把 + 头灯

  g.fillStyle='rgba(255,210,130,.35)';g.beginPath();g.arc(28,-29,4.6,0,TAU);g.fill();
  g.fillStyle='#ffe9b0';g.beginPath();g.arc(28,-29,2.4,0,TAU);g.fill();

function drawWheel(p,spin,spd){
  const s=(R+5)*2;
  ctx.save();
  ctx.translate(p.x,p.y);ctx.rotate(spin);
  ctx.drawImage(wheelSpr,-s/2,-s/2,s,s);
  ctx.restore();
  if(spd>16){ // 转速旋转模糊
    ctx.globalAlpha=Math.min(.75,(spd-16)/26);
    ctx.drawImage(wheelBlur,p.x-s/2,p.y-s/2,s,s);
    ctx.globalAlpha=1;
  }
}
function limb(a,b,w,col){
  ctx.strokeStyle=col;ctx.lineWidth=w;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
}
function torsoQuad(a,b,wa,wb,col){ // 有体积的躯干
  let dx=b.x-a.x,dy=b.y-a.y;
  const l=Math.hypot(dx,dy)||1,nx=-dy/l,ny=dx/l;
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.moveTo(a.x+nx*wa,a.y+ny*wa);
  ctx.lineTo(b.x+nx*wb,b.y+ny*wb);
  ctx.lineTo(b.x-nx*wb,b.y-ny*wb);
  ctx.lineTo(a.x-nx*wa,a.y-ny*wa);
  ctx.closePath();ctx.fill();
}
function drawHelmetAt(x,y,rot){
  ctx.save();ctx.translate(x,y);ctx.rotate(rot);
  ctx.drawImage(helmetSpr,-15,-15,30,30);
  ctx.restore();
}
function drawGhosts(){ // 空翻旋转残影
  for(const g of ghosts){

    if(a<=0)continue;
    ctx.strokeStyle='rgba(255,200,80,'+(a*.32).toFixed(3)+')';
    ctx.lineWidth=3.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(g.rx,g.ry);ctx.lineTo(g.fx,g.fy);ctx.stroke();
  }
}
function drawRider(p){
  // 腿：骑行裤分色 + 靴
  limb(p.hip,p.knee,6,'#27304a');

  ctx.fillStyle='#12161f';
  ctx.beginPath();ctx.arc(p.foot.x,p.foot.y,3.4,0,TAU);ctx.fill();
  // 躯干：骑行服主色 + 背部亮条
  torsoQuad(p.hip,p.chest,5.5,7,'#b8432a');
  limb({x:lerp(p.hip.x,p.chest.x,.18),y:lerp(p.hip.y,p.chest.y,.18)},
       {x:lerp(p.hip.x,p.chest.x,.88),y:lerp(p.hip.y,p.chest.y,.88)},2.8,'#e8dcc8');

function drawBike(){
  const b=bike,p=riderPose(b);
  const ang=Math.atan2(b.fw.y-b.rw.y,b.fw.x-b.rw.x);
  const spd=Math.abs(b.rw.x-b.rw.px)/DT/R; // 近似轮角速度 rad/s
  drawGhosts();
  drawWheel(b.rw,b.spin,spd);
  drawWheel(b.fw,b.spin,spd);
  // 车体：预渲染精灵按姿态角旋转
  ctx.save();
  ctx.translate(p.mx,p.my);ctx.rotate(ang);
  ctx.drawImage(bodySpr,-60,-58,120,72);
  ctx.restore();
  // 动态后减震：连到物理车身质点，随悬挂压缩伸缩
  const s1=p.at(-26,8);
  const s2={x:lerp(p.at(-8,26).x,b.bd.x,.45),y:lerp(p.at(-8,26).y,b.bd.y,.45)};
  limb(s1,s2,3.5,'#caa53f');
  limb(s1,s2,1.4,'#f5dd8a');
  // 空中旋转弧线提示
  if(state==='play'&&b.air>.15&&Math.abs(b.omega)>4){
    const dir=b.omega>0?1:-1;
    const s0=dir>0?ang-2.3:ang+.5,e0=dir>0?ang-.5:ang+2.3;

function drawParts(){
  for(const p of parts){
    const a=1-p.life/p.max;
    if(p.col===1){ // 火花
      ctx.fillStyle='rgba(255,190,60,'+(a*.9).toFixed(3)+')';
      ctx.fillRect(p.x-1.5,p.y-1.5,3,3);
    }else if(p.col===2){ // 落地冲击尘环
      const k=p.life/p.max,r=p.r+k*85;
      ctx.strokeStyle='rgba(214,178,122,'+((1-k)*.5).toFixed(3)+')';
      ctx.lineWidth=3*(1-k)+1;
      ctx.beginPath();ctx.ellipse(p.x,p.y,r,r*.3,0,0,TAU);ctx.stroke();
    }else if(p.col===3){ // 排气微烟
      ctx.fillStyle='rgba(150,142,160,'+(a*.22).toFixed(3)+')';
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*(1+p.life*2.4),0,TAU);ctx.fill();
    }else{ // 土黄尘土，腾起放大消散
      ctx.fillStyle='rgba(206,166,108,'+(a*.45).toFixed(3)+')';
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*(1+p.life*1.8),0,TAU);ctx.fill();
    }
  }
}
function drawPops(){
  for(const o of pops){

    ctx.fillStyle=o.col;ctx.fillText(o.txt,0,0);

      ctx.fillStyle='rgba(255,250,220,.45)';

let lastDistTxt='',lastScoreTxt='',lastTrickTxt='';

  if(dTxt!==lastDistTxt){$('dist').textContent=dTxt;lastDistTxt=dTxt;}
  const sTxt=String(dm+trickScore);
  if(sTxt!==lastScoreTxt){$('scoreV').textContent=sTxt;lastScoreTxt=sTxt;}
  let t='';
  if(state==='play'&&bike){
    if(bike.air>.18&&Math.abs(bike.airRot)>.7)
      t='空中旋转 '+Math.round(Math.abs(bike.airRot)*180/PI)+'°';
    else if(trickMsgT>0)t=trickMsg;
    else if(combo>1)t='连击 ×'+combo;
  }
  if(t!==lastTrickTxt){$('trick').textContent=t;lastTrickTxt=t;}
}
function drawForeground(){ // 前景草丛 / 仙人掌 / 岩石掠影
  const span=W+760;
  for(let i=0;i<7;i++){
    const h1=((i*97+13)%89)/89;
    const sx=(((i*617.3+101)-camX*zoom*1.5)%span+span)%span-380;
    if(sx<-120||sx>W+120)continue;
    const s=(.7+h1*.7)*Math.min(1,zoom+.4);
    ctx.save();
    ctx.translate(sx,H+4);ctx.scale(s,s);
    ctx.fillStyle='rgba(16,9,22,.92)';
    ctx.strokeStyle='rgba(16,9,22,.92)';
    if(i%3===0){ // 仙人掌
      ctx.beginPath();
      ctx.moveTo(-5,2);ctx.lineTo(-5,-66);ctx.arc(0,-66,5,PI,0);ctx.lineTo(5,2);
      ctx.closePath();ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-13,-28);ctx.lineTo(-13,-46);ctx.arc(-9.5,-46,3.5,PI,0);ctx.lineTo(-6,-28);
      ctx.closePath();ctx.fill();
      ctx.fillRect(-13,-32,9,6);
      ctx.beginPath();
      ctx.moveTo(13,-18);ctx.lineTo(13,-38);ctx.arc(9.5,-38,3.5,0,PI,true);ctx.lineTo(6,-18);
      ctx.closePath();ctx.fill();
      ctx.fillRect(4,-22,9,6);
      ctx.strokeStyle='rgba(255,150,80,.22)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(5,-2);ctx.lineTo(5,-64);ctx.stroke(); // 向阳轮廓光
    }else if(i%3===1){ // 草丛
      ctx.lineWidth=3.5;ctx.lineCap='round';
      for(let b=0;b<5;b++){
        const a2=(b-2)*.28;
        ctx.beginPath();ctx.moveTo(0,2);
        ctx.quadraticCurveTo(a2*18,-22,a2*34,-40-(b%2)*10);
        ctx.stroke();
      }
    }else{ // 岩石
      ctx.beginPath();ctx.ellipse(0,2,26,16,0,PI,TAU);ctx.fill();
      ctx.strokeStyle='rgba(255,150,80,.18)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.ellipse(0,2,24,14,0,-PI*.4,-PI*.08);ctx.stroke();
    }
    ctx.restore();
  }
}
function render(t){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ensureGrads();
  drawBG(t);
  if(!bike)return;
  const ox=W*.42,oy=H*.55;
  const shx=shake>.4?rand(-shake,shake):0,shy=shake>.4?rand(-shake,shake):0;
  ctx.save();
  ctx.translate(ox+shx,oy+shy);
  ctx.scale(zoom,zoom);
  ctx.translate(-camX,-camY);
  drawTerrain(ox,oy);
  drawParts();
  drawBike();
  drawRagdoll();
  drawPops();
  ctx.restore();
  drawForeground();
  // 破纪录：地平线闪光
  if(recFlash>0){
    const a=Math.min(1,recFlash);
    ctx.globalAlpha=a*.7;
    ctx.fillStyle=G_rec;ctx.fillRect(0,H*.42-90,W,180);
    ctx.globalAlpha=a*.9;
    ctx.fillStyle='rgba(255,232,150,.85)';ctx.fillRect(0,H*.42-1,W,2);
    ctx.globalAlpha=1;
  }
  // 坠毁慢镜头：色偏 + 暗角 + 红晕（均为缓存渐变）
  if(state==='crash'){
    ctx.fillStyle='rgba(50,24,86,.16)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle=G_vig;ctx.fillRect(0,0,W,H);
    ctx.fillStyle=G_crash;ctx.fillRect(0,0,W,H);
  }
  drawHUD();
}

/* ================= 主循环 ================= */
let lastT=0,acc=0;
function advance(dt){ // 推进游戏时间线（真实秒）
  if(trickMsgT>0)trickMsgT-=dt;
  if(recFlash>0)recFlash=Math.max(0,recFlash-dt*.55);
  if(state==='play'&&best>0&&!recBeaten&&Math.floor(meters)+trickScore>best){
    recBeaten=true;recFlash=1.6;
    if(bike)addPop((bike.rw.x+bike.fw.x)/2,bike.bd.y-80,'★ 破纪录！','#ffe066',26);
    sndTrick(3);
  }
  if(state==='crash'){ // 坠毁慢镜头（用真实时间推进）
    crashT+=dt;
    if(crashT>1.1)timeScale=Math.min(1,timeScale+dt*1.6);
    if(crashT>2.3)endRun('坠毁了！',crashReason);
  }
  acc+=dt*timeScale;
  let n=0;
  while(acc>=DT&&n<30){physStep(DT);acc-=DT;n++;}
  if(n>=30)acc=0;
  stepCam(dt);
  pruneTerrain(camX-2600);
}
function frame(t){
  requestAnimationFrame(frame);
  if(!lastT)lastT=t;
  let dt=(t-lastT)/1000;lastT=t;
  if(dt>.05)dt=.05;
  advance(dt);
  render(t);
  // 引擎声
  if(bike&&AC){
    const sp=Math.abs(bike.bd.x-bike.bd.px)/DT;
    const rpm=clamp(.12+(state==='play'&&inThr()?.45:0)+sp/MAXV*.5,0,1.25);
    engine(state==='play',rpm,dt);
  }
}
resetWorld();
requestAnimationFrame(frame);
})();
</script>
