<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>都市狂奔 · AI4399</title>
<meta name="description" content="三车道伪3D无尽跑酷：跳跃、滑铲、换道，在霓虹都市中狂奔。">
<style>
  :root {
    --bg: #0a0a12;
    --panel: #14141f;
    --text: #e8e8f0;
    --dim: #8888a0;
    --accent: #ffcc00;
    --border: #2a2a3d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
  }
  body { position: fixed; inset: 0; touch-action: none; -webkit-user-select: none; user-select: none; }
  a.back {
    position: fixed; top: 12px; left: 14px; z-index: 50;
    color: var(--accent); text-decoration: none; font-size: 14px;
    background: rgba(10,10,18,.55); border: 1px solid rgba(255,204,0,.25);
    padding: 5px 12px; border-radius: 8px; opacity: .7;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    transition: opacity .15s;
  }
  a.back:hover { opacity: 1; }
  #wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #stage { position: relative; box-shadow: 0 0 60px rgba(0,0,0,.7); }
  canvas { display: block; }

  /* ---------- HUD ---------- */
  #hud { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
  .hud-top {
    position: absolute; top: 46px; left: 12px; right: 12px;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .hud-box {
    background: linear-gradient(180deg, rgba(18,18,32,.72), rgba(10,10,18,.5));
    border: 1px solid rgba(255,204,0,.18);
    box-shadow: 0 2px 12px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.06);
    border-radius: 10px; padding: 6px 12px;
    font-weight: 700; font-size: 17px; line-height: 1.3;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 1px 4px rgba(0,0,0,.8);
  }
  #hudDist { color: #fff; }
  #hudDist small { font-size: 12px; color: var(--dim); font-weight: 400; }
  #hudCoin { color: var(--accent); text-align: right; }
  #hudCoin::before {
    content: ""; display: inline-block; width: 13px; height: 13px;
    border-radius: 50%; background: radial-gradient(circle at 35% 30%, #fff3b0, #ffcc00 55%, #b8860b);
    margin-right: 7px; vertical-align: -1px;
  }
  #chips { position: absolute; top: 94px; right: 12px; display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .chip {
    display: none; min-width: 128px;
    background: linear-gradient(180deg, rgba(18,18,32,.78), rgba(10,10,18,.6));
    border: 1px solid; border-radius: 9px; padding: 5px 10px 7px;
    font-size: 12px; font-weight: 700; letter-spacing: 1px;
    box-shadow: 0 2px 10px rgba(0,0,0,.4);
  }
  .chip.on { display: block; }
  .chip .sec { float: right; font-weight: 800; font-variant-numeric: tabular-nums; opacity: .95; }
  .chip .bar { height: 5px; border-radius: 3px; background: rgba(255,255,255,.1); margin-top: 5px; overflow: hidden; }
  .chip .bar i { display: block; height: 100%; border-radius: 3px; box-shadow: 0 0 8px 1px; }
  #chipMag { color: #5ad7ff; border-color: rgba(90,215,255,.45); }
  #chipMag .bar i { background: linear-gradient(90deg, #2f9fd0, #8ae9ff); }
  #chipDash { color: var(--accent); border-color: rgba(255,204,0,.45); }
  #chipDash .bar i { background: linear-gradient(90deg, #d0a300, #ffe46b); }

  /* ---------- overlays ---------- */
  .overlay {
    position: absolute; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(8,8,15,.72); text-align: center;
    backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
  }
  .overlay.hidden { display: none; }
  .game-title {
    font-size: 54px; font-weight: 900; letter-spacing: 8px;
    background: linear-gradient(135deg, #ffe46b, #ffcc00 40%, #ff8a3d 80%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 4px 18px rgba(255,204,0,.35));
    margin-bottom: 6px;
  }
  .game-sub { color: var(--dim); font-size: 14px; letter-spacing: 3px; margin-bottom: 30px; }
  .btn {
    pointer-events: auto; cursor: pointer; border: none; outline: none;
    font-family: inherit; font-size: 20px; font-weight: 800; letter-spacing: 4px;
    color: #14141f; background: linear-gradient(180deg, #ffe46b, #ffcc00);
    padding: 14px 52px; border-radius: 14px;
    box-shadow: 0 6px 22px rgba(255,204,0,.35), inset 0 -3px 0 rgba(0,0,0,.18);
    transition: transform .1s, box-shadow .1s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 9px 26px rgba(255,204,0,.45), inset 0 -3px 0 rgba(0,0,0,.18); }
  .btn:active { transform: translateY(1px); }
  .help {
    margin-top: 30px; color: var(--dim); font-size: 13px; line-height: 2.1;
    background: rgba(20,20,31,.75); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 26px;
  }
  .help b { color: var(--text); font-weight: 600; }
  .key {
    display: inline-block; min-width: 22px; padding: 1px 6px; margin: 0 2px;
    border: 1px solid var(--border); border-bottom-width: 2px; border-radius: 5px;
    background: #1c1c2c; color: var(--accent); font-size: 12px; font-weight: 700;
  }
  .menu-best { margin-top: 18px; color: var(--dim); font-size: 14px; }
  .menu-best b { color: var(--accent); font-size: 18px; }

  .over-title { font-size: 34px; font-weight: 900; letter-spacing: 6px; color: #ff5b5b; margin-bottom: 22px;
    text-shadow: 0 0 24px rgba(255,60,60,.4); }
  .stats {
    background: rgba(20,20,31,.85); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px 38px; margin-bottom: 26px; min-width: 230px;
  }
  .stats .row { display: flex; justify-content: space-between; gap: 34px; padding: 5px 0; font-size: 15px; color: var(--dim); }
  .stats .row b { color: var(--text); font-weight: 700; font-variant-numeric: tabular-nums; }
  .stats .row.total { border-top: 1px solid var(--border); margin-top: 8px; padding-top: 11px; font-size: 17px; }
  .stats .row.total b { color: var(--accent); font-size: 21px; }
  .stats .row.best b { color: #5ad7ff; }
  #newBest {
    display: none; color: #14141f; background: var(--accent); border-radius: 99px;
    font-size: 13px; font-weight: 800; padding: 3px 14px; margin: -8px auto 16px;
    animation: pop .5s ease;
  }
  #newBest.show { display: inline-block; }
  @keyframes pop { 0% { transform: scale(.3); } 70% { transform: scale(1.15); } 100% { transform: scale(1); } }
  @media (max-height: 640px) {
    .game-title { font-size: 40px; }
    .help { margin-top: 16px; line-height: 1.9; }
  }
</style>
</head>
<body>
<a class="back" href="../">← AI4399</a>
<div id="wrap">
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="hud">
      <div class="hud-top">
        <div class="hud-box" id="hudDist">0 <small>米</small></div>
        <div class="hud-box" id="hudCoin">0</div>
      </div>
      <div id="chips">
        <div class="chip" id="chipMag">磁铁<span class="sec"></span><div class="bar"><i></i></div></div>
        <div class="chip" id="chipDash">冲刺<span class="sec"></span><div class="bar"><i></i></div></div>
      </div>
    </div>

    <div class="overlay" id="menu">
      <div class="game-title">都市狂奔</div>
      <div class="game-sub">CITY RUSH · 无尽跑酷</div>
      <button class="btn" id="btnStart">开始奔跑</button>
      <div class="help">
        <b>键盘</b>：<span class="key">←</span><span class="key">→</span> 换道
        <span class="key">↑</span> 跳跃 <span class="key">↓</span> 滑铲<br>
        <b>手机</b>：左右滑动换道，上滑跳跃，下滑滑铲<br>
        低栏跳过 · 天桥滑过 · 卡车必须躲开 · 贴身闪避有「险过」加分
      </div>
      <div class="menu-best" id="menuBest"></div>
    </div>

    <div class="overlay hidden" id="over">
      <div class="over-title">奔跑结束</div>
      <div id="newBest">新纪录！</div>
      <div class="stats">
        <div class="row"><span>奔跑距离</span><b id="ovDist">0 米</b></div>
        <div class="row"><span>收集金币</span><b id="ovCoin">0</b></div>
        <div class="row"><span>险过奖励</span><b id="ovBonus">0</b></div>
        <div class="row total"><span>总分</span><b id="ovScore">0</b></div>
        <div class="row best"><span>最高分</span><b id="ovBest">0</b></div>
      </div>
      <button class="btn" id="btnRetry">再来一局</button>
    </div>
  </div>
</div>

<script>
'use strict';
/* ===================================================================
   都市狂奔 · CITY RUSH —— 三车道伪 3D 无尽跑酷
   透视核心：scale = F / (F + z)，z 随速度递减，物体迎面放大
   =================================================================== */

// ---------- 画布与自适应 ----------
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const stage = document.getElementById('stage');
let cw = 480, ch = 800, dpr = 1;

function resize() {
  const winW = window.innerWidth, winH = window.innerHeight;
  // 竖屏构图优先：手机吃满全屏；桌面居中，宽度按高度限定比例
  ch = winH;
  cw = Math.min(winW, Math.round(winH * 0.62));
  if (winW <= 560) cw = winW;            // 手机直接全宽
  dpr = Math.min(2, window.devicePixelRatio || 1);
  cv.width = Math.round(cw * dpr);
  cv.height = Math.round(ch * dpr);
  cv.style.width = cw + 'px';
  cv.style.height = ch + 'px';
  stage.style.width = cw + 'px';
  stage.style.height = ch + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ---------- 工具 ----------
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
const lerp = (a, b, t) => a + (b - a) * t;
const rnd = (a, b) => a + Math.random() * (b - a);
const irnd = (a, b) => Math.floor(rnd(a, b + 1));
const TAU = Math.PI * 2;

// ---------- 透视参数（每帧按画布尺寸取值）----------
const F = 300;             // 焦距：scale = F/(F+z)
const SPAWN_Z = 3600;      // 生成远端
let laneW, horizonY, baseY, cx;
function calcView() {
  laneW = cw * 0.27;
  horizonY = ch * 0.30;
  baseY = ch * 0.80;       // 角色脚底（屏幕下方约 1/4 处）
  cx = cw / 2;
}
calcView();
const proj = z => F / (F + Math.max(z, -F * 0.78));     // 透视比例
const groundY = s => horizonY + (baseY - horizonY) * s; // 地面纵坐标

// ---------- 音效（WebAudio 合成）----------
let AC = null;
function audioInit() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { AC = null; } }
  if (AC && AC.state === 'suspended') AC.resume();
}
function tone(f0, f1, dur, type, vol, delay) {
  if (!AC) return;
  const t = AC.currentTime + (delay || 0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type;
  o.frequency.setValueAtTime(Math.max(1, f0), t);
  o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(t); o.stop(t + dur + 0.03);
}
function noiseBurst(dur, vol, freq, delay) {
  if (!AC) return;
  const t = AC.currentTime + (delay || 0);
  const n = Math.floor(AC.sampleRate * dur);
  const buf = AC.createBuffer(1, n, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
  const src = AC.createBufferSource(); src.buffer = buf;
  const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = freq;
  const g = AC.createGain(); g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  src.connect(f); f.connect(g); g.connect(AC.destination);
  src.start(t);
}
const sfx = {
  coin()    { tone(988, 988, 0.06, 'square', 0.10); tone(1319, 1319, 0.13, 'square', 0.10, 0.06); },
  jump()    { tone(280, 640, 0.18, 'triangle', 0.16); },
  slide()   { noiseBurst(0.20, 0.12, 900); },
  lane()    { tone(240, 190, 0.06, 'square', 0.07); },
  power()   { [523, 659, 784, 1047].forEach((f, i) => tone(f, f, 0.1, 'square', 0.1, i * 0.07)); },
  near()    { tone(1568, 2093, 0.13, 'sine', 0.13); },
  smash()   { noiseBurst(0.25, 0.22, 1800); tone(180, 60, 0.22, 'sawtooth', 0.16); },
  crash()   { noiseBurst(0.5, 0.32, 1400); tone(220, 38, 0.55, 'sawtooth', 0.26); tone(110, 30, 0.7, 'square', 0.2, 0.05); },
};

// ---------- 游戏状态 ----------
const ST = { MENU: 0, PLAY: 1, DYING: 2, OVER: 3 };
let state = ST.MENU;
let dist = 0;            // 世界累计前进量
let speed = 0;           // 世界单位 / 秒
let coins = 0, bonus = 0;
let best = 0;
try { best = parseInt(localStorage.getItem('ai4399-runner-best') || '0', 10) || 0; } catch (e) { best = 0; }

let timeScale = 1, dieT = 0, shakeT = 0, shakeMag = 0, flashT = 0;
let nextSpawn = 0, prevSafe = 0, lastWallDist = -99999;

// 玩家
const P = {
  lane: 0, vLane: 0,        // 目标车道 / 平滑插值车道（-1,0,1）
  y: 0, vy: 0,              // 跳跃高度（世界像素，向上为正）
  sliding: 0,               // 滑铲剩余时间
  phase: 0,                 // 跑步动画相位
  magnet: 0, dash: 0,       // 道具剩余时间
  alive: true,
  deathSpin: 0,
};
const GRAV = 2900, JUMP_V = 1020, SLIDE_T = 0.62;

let obstacles = [];  // {type:'low'|'bar'|'block', lane, z, depth, h, passed, hue}
let coinsArr = [];   // {lane, z, h, ph, taken}
let powerups = [];   // {kind:'magnet'|'dash', lane, z, taken}
let floaters = [];   // {x, y, txt, life, color, size}
let parts = [];      // {x, y, vx, vy, life, max, color, r}
let trail = [];      // 冲刺残影

// ---------- 离屏预渲染套件（性能：渐变与细节只画一次）----------
function mkCanvas(w, h, fn) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  fn(c.getContext('2d'), w, h);
  return c;
}
const NEON = ['#ff4da6', '#36e0ff', '#ffcc00', '#9d6bff', '#3dff9e'];
const SPR = {};

// 立体金币（正面）
SPR.coin = mkCanvas(64, 64, g => {
  const r = 29;
  const rg = g.createRadialGradient(23, 23, 4, 32, 32, r);
  rg.addColorStop(0, '#fff7c4'); rg.addColorStop(0.5, '#ffd424'); rg.addColorStop(1, '#c8901a');
  g.fillStyle = rg;
  g.beginPath(); g.arc(32, 32, r, 0, TAU); g.fill();
  g.strokeStyle = '#8a6206'; g.lineWidth = 3.5;
  g.beginPath(); g.arc(32, 32, r - 1.5, 0, TAU); g.stroke();
  g.strokeStyle = 'rgba(138,98,6,.85)'; g.lineWidth = 2.5;
  g.beginPath(); g.arc(32, 32, r * 0.64, 0, TAU); g.stroke();
  // 五角星压纹
  g.fillStyle = 'rgba(176,122,12,.6)';
  g.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = -Math.PI / 2 + i * TAU / 5, a2 = a + TAU / 10;
    g.lineTo(32 + Math.cos(a) * 12.5, 32 + Math.sin(a) * 12.5);
    g.lineTo(32 + Math.cos(a2) * 5.4, 32 + Math.sin(a2) * 5.4);
  }
  g.closePath(); g.fill();
  // 斜向高光带
  g.save();
  g.beginPath(); g.arc(32, 32, r - 3, 0, TAU); g.clip();
  g.translate(32, 32); g.rotate(-0.7);
  g.fillStyle = 'rgba(255,255,255,.42)';
  g.fillRect(-34, -20, 68, 8);
  g.fillStyle = 'rgba(255,255,255,.18)';
  g.fillRect(-34, -8, 68, 4);
  g.restore();
});

// 径向光晕（道具/冲刺/车灯共用）
function mkGlow(col) {
  return mkCanvas(96, 96, g => {
    const rg = g.createRadialGradient(48, 48, 4, 48, 48, 46);
    rg.addColorStop(0, col + 'e6'); rg.addColorStop(0.5, col + '55'); rg.addColorStop(1, col + '00');
    g.fillStyle = rg;
    g.beginPath(); g.arc(48, 48, 46, 0, TAU); g.fill();
  });
}
SPR.glowGold = mkGlow('#ffcc00');
SPR.glowCyan = mkGlow('#5ad7ff');

// 月亮（带光晕与环形山）
SPR.moon = mkCanvas(160, 160, g => {
  const rg = g.createRadialGradient(80, 80, 16, 80, 80, 78);
  rg.addColorStop(0, 'rgba(255,238,180,.55)'); rg.addColorStop(0.45, 'rgba(255,238,180,.12)'); rg.addColorStop(1, 'rgba(255,238,180,0)');
  g.fillStyle = rg; g.fillRect(0, 0, 160, 160);
  g.save();
  g.beginPath(); g.arc(80, 80, 27, 0, TAU); g.clip();
  g.fillStyle = '#ffecb8'; g.fillRect(0, 0, 160, 160);
  g.fillStyle = 'rgba(205,170,105,.55)';
  g.beginPath(); g.arc(70, 74, 5.5, 0, TAU); g.fill();
  g.beginPath(); g.arc(88, 89, 4, 0, TAU); g.fill();
  g.beginPath(); g.arc(86, 67, 3, 0, TAU); g.fill();
  g.fillStyle = 'rgba(30,26,56,.32)';
  g.beginPath(); g.arc(92, 74, 26, 0, TAU); g.fill();
  g.restore();
});

// 夜云（两个变体）
SPR.clouds = [0, 1].map(seed => mkCanvas(220, 80, g => {
  g.fillStyle = 'rgba(125,112,178,.16)';
  for (let i = 0; i < 8; i++) {
    g.beginPath();
    g.arc(26 + i * 25 + Math.sin(seed * 5 + i * 1.7) * 9, 52 - Math.abs(Math.sin(i * 2.1 + seed)) * 16, 15 + (i % 3) * 7, 0, TAU);
    g.fill();
  }
  g.fillStyle = 'rgba(195,175,235,.10)';
  for (let i = 0; i < 5; i++) {
    g.beginPath();
    g.arc(50 + i * 32, 38 - Math.abs(Math.sin(i * 1.3 + seed * 2)) * 10, 12 + (i % 2) * 6, 0, TAU);
    g.fill();
  }
}));

// 低栏横板（金属框 + 警示斜纹 + 镜面高光）
SPR.hurdle = mkCanvas(240, 64, g => {
  const lg = g.createLinearGradient(0, 0, 0, 64);
  lg.addColorStop(0, '#5e5e7a'); lg.addColorStop(0.18, '#44445e'); lg.addColorStop(1, '#2e2e40');
  g.fillStyle = lg; g.fillRect(0, 0, 240, 64);
  g.save();
  g.beginPath(); g.rect(6, 11, 228, 43); g.clip();
  g.fillStyle = '#d8413c'; g.fillRect(6, 11, 228, 43);
  g.fillStyle = '#ffd24a';
  for (let x = -40; x < 270; x += 48) {
    g.beginPath();
    g.moveTo(x, 54); g.lineTo(x + 24, 54); g.lineTo(x + 46, 11); g.lineTo(x + 22, 11);
    g.closePath(); g.fill();
  }
  g.fillStyle = 'rgba(0,0,0,.20)'; g.fillRect(6, 41, 228, 13);
  g.fillStyle = 'rgba(255,255,255,.14)'; g.fillRect(6, 11, 228, 5);
  g.restore();
  g.fillStyle = 'rgba(255,255,255,.55)'; g.fillRect(4, 3, 232, 3);
  g.fillStyle = 'rgba(255,255,255,.18)'; g.fillRect(4, 6, 232, 2);
  g.strokeStyle = 'rgba(0,0,0,.45)'; g.lineWidth = 3; g.strokeRect(1.5, 1.5, 237, 61);
  g.fillStyle = '#cdcdde';
  for (const bx of [16, 224]) for (const by of [18, 48]) { g.beginPath(); g.arc(bx, by, 3.5, 0, TAU); g.fill(); }
});

// 天桥面板（铆接钢板 + 底缘霓虹）
SPR.bar = mkCanvas(256, 88, g => {
  const lg = g.createLinearGradient(0, 0, 0, 88);
  lg.addColorStop(0, '#364462'); lg.addColorStop(0.5, '#273550'); lg.addColorStop(1, '#1c2842');
  g.fillStyle = lg; g.fillRect(0, 0, 256, 88);
  g.strokeStyle = 'rgba(0,0,0,.32)'; g.lineWidth = 2;
  for (let x = 64; x < 256; x += 64) { g.beginPath(); g.moveTo(x, 4); g.lineTo(x, 84); g.stroke(); }
  g.fillStyle = 'rgba(165,195,225,.6)';

}

}
window.addEventListener('keydown', e => {

// ---------- 生成逻辑（保证至少一条可行路线）----------
function randLane() { return irnd(-1, 1); }
function pushObstacle(type, lane, z) {
  const o = { type, lane, z, passed: false, hue: Math.random() };
  if (type === 'low')   { o.depth = 36;  o.h = 55; }
  if (type === 'bar')   { o.depth = 36;  o.h = 0;  }
  if (type === 'block') { o.depth = Math.random() < 0.3 ? 300 : 170; o.h = 0; }
  obstacles.push(o);
  return o;
}
function coinLine(lane, z, n, hArc) {
  const gap = 130;
  for (let i = 0; i < n; i++) {
    let h = 42;
    if (hArc) h = 42 + Math.sin((i / (n - 1)) * Math.PI) * 120; // 弧线（跳跃轨迹）
    coinsArr.push({ lane, z: z + i * gap, h, ph: Math.random() * TAU, taken: false });
  }
}
function coinDiag(z) { // 斜穿三车道
  const from = Math.random() < 0.5 ? -1 : 1;
  for (let i = 0; i < 9; i++) {
    coinsArr.push({ lane: from - from * (i / 8) * 2, z: z + i * 125, h: 42, ph: Math.random() * TAU, taken: false });
  }
}
function spawnPowerup(z) {
  const kind = Math.random() < 0.5 ? 'magnet' : 'dash';
  powerups.push({ kind, lane: prevSafe, z, taken: false, ph: Math.random() * TAU });
}
function spawnRow(z) {
  const lanes = [-1, 0, 1];
  const roll = Math.random();
  const canWall = dist - lastWallDist > 2400;
  const placed = {}; // lane -> type

  if (roll < 0.30) {                       // 单个障碍
    placed[randLane()] = Math.random() < 0.42 ? 'block' : (Math.random() < 0.5 ? 'low' : 'bar');
  } else if (roll < 0.55) {                // 两个障碍
    const a = randLane(); let b = randLane();
    while (b === a) b = randLane();
    const tp = () => { const r = Math.random(); return r < 0.38 ? 'block' : r < 0.69 ? 'low' : 'bar'; };
    placed[a] = tp(); placed[b] = tp();
    if (placed[a] === 'block' && placed[b] === 'block') {
      const safe = lanes.find(l => l !== a && l !== b);
      if (Math.abs(safe - prevSafe) > 1) placed[a] = 'low'; // 不可达则降级
    }
  } else if (roll < 0.69 && canWall) {     // 卡车墙：两道封死
    const safe = clamp(prevSafe + irnd(-1, 1), -1, 1);
    lanes.forEach(l => { if (l !== safe) placed[l] = 'block'; });
    lastWallDist = dist;
  } else if (roll < 0.81) {                // 全员动作行：三道都是低栏/横杆
    const t1 = Math.random() < 0.5 ? 'low' : 'bar';
    lanes.forEach(l => placed[l] = Math.random() < 0.72 ? t1 : (t1 === 'low' ? 'bar' : 'low'));
  } else if (roll < 0.92) {                // 纯金币
    if (Math.random() < 0.35) coinDiag(z);
    else coinLine(prevSafe, z, irnd(5, 8), false);
    return;
  } else {                                 // 道具
    spawnPowerup(z);
    return;
  }

  // —— 可行性校验：必须存在一条「可达且可通过」的车道 ——
  let safeLanes = lanes.filter(l => placed[l] !== 'block');
  let reachable = safeLanes.filter(l => Math.abs(l - prevSafe) <= 1.01 || safeLanes.includes(prevSafe));
  if (reachable.length === 0) {
    // 兜底：把离 prevSafe 最近的 block 降级为低栏
    const near = lanes.slice().sort((a, b) => Math.abs(a - prevSafe) - Math.abs(b - prevSafe))[0];
    placed[near] = 'low';
    safeLanes = lanes.filter(l => placed[l] !== 'block');
  }
  lanes.forEach(l => { if (placed[l]) pushObstacle(placed[l], l, z); });
  // 更新安全车道记忆（优先保持当前）
  prevSafe = safeLanes.includes(prevSafe) ? prevSafe
           : safeLanes.slice().sort((a, b) => Math.abs(a - prevSafe) - Math.abs(b - prevSafe))[0];

  // 奖励金币：低栏上方弧线 / 安全道直线
  if (Math.random() < 0.5) {
    const lowLane = lanes.find(l => placed[l] === 'low');
    if (lowLane !== undefined && Math.random() < 0.6) coinLine(lowLane, z - 260, 5, true);
    else coinLine(prevSafe, z + 320, irnd(4, 6), false);
  }
}
function rowGap() {
  // 按「反应时间」给间距：随距离从 0.9s 收紧到 0.52s，速度越快世界间距越大
  const tGap = Math.max(0.52, 0.9 - dist * 0.000002);
  return speed * tGap;
}

// ---------- 开始 / 结束 ----------
function startGame() {
  state = ST.PLAY;
  dist = 0; coins = 0; bonus = 0;
  speed = 860;
  timeScale = 1; dieT = 0; shakeT = 0; flashT = 0;
  nextSpawn = 1500; prevSafe = 0; lastWallDist = -99999;
  P.lane = 0; P.vLane = 0; P.y = 0; P.vy = 0; P.sliding = 0;
  P.magnet = 0; P.dash = 0; P.alive = true; P.deathSpin = 0; P.phase = 0;
  obstacles = []; coinsArr = []; powerups = []; floaters = []; parts = []; trail = [];
  initBuilds();
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('over').classList.add('hidden');
}
function score() { return Math.floor(dist / 55) * 2 + coins * 15 + bonus; }
function gameOver() {
  state = ST.OVER;
  const s = score();
  const isNew = s > best;
  if (isNew) {
    best = s;
    try { localStorage.setItem('ai4399-runner-best', String(best)); } catch (e) {}
  }
  document.getElementById('ovDist').textContent = Math.floor(dist / 55) + ' 米';
  document.getElementById('ovCoin').textContent = coins;
  document.getElementById('ovBonus').textContent = bonus;
  document.getElementById('ovScore').textContent = s;
  document.getElementById('ovBest').textContent = best;
  document.getElementById('newBest').classList.toggle('show', isNew);
  document.getElementById('over').classList.remove('hidden');
}
function die() {
  if (!P.alive) return;
  P.alive = false;
  state = ST.DYING;
  dieT = 0; shakeT = 0.55; shakeMag = 14; flashT = 0.25;
  sfx.crash();

}

// ---------- 粒子 / 浮字 ----------
function burst(x, y, n, color) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * TAU, v = rnd(60, 420);
    parts.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v - 140, life: rnd(0.35, 0.8), max: 0.8, color, r: rnd(2, 5) });
  }
}
function addFloat(txt, x, y, color, size) {
  floaters.push({ txt, x, y, life: 1, color, size: size || 18 });
}
function gust(x, y) { // 险过擦风：两侧拉出白色风线
  for (let i = 0; i < 8; i++) {
    const dir = i % 2 ? 1 : -1;
    parts.push({
      x: x + dir * rnd(22, 52), y: y + rnd(-70, 30),
      vx: dir * rnd(380, 760), vy: rnd(-70, 70),
      life: rnd(0.16, 0.3), max: 0.3,
      color: 'rgba(225,242,255,.9)', r: 2, st: 1,
    });
  }
}

// ---------- 更新（dt 为真实秒）----------
function update(dt) {
  if (state === ST.MENU || state === ST.OVER) {
    P.phase += dt * 9;
    if (state === ST.MENU) {   // 菜单背景缓动（开局会重置）
      dist += dt * 320;
      bgScroll(dt * 320);
    }
    return;
  }
  if (state === ST.DYING) {
    // 真实时间推进死亡序列，慢动作时间推进画面
    dieT += dt;
    timeScale = lerp(timeScale, 0.1, 1 - Math.exp(-6 * dt));
    P.deathSpin += dt * 2.2;
    const ds = speed * timeScale * dt * 0.5;
    for (const o of obstacles) o.z -= ds;
    for (const c of coinsArr) c.z -= ds;
    for (const u of powerups) u.z -= ds;
    bgScroll(ds);
    updateFx(dt);
    if (dieT > 1.45) gameOver();
    return;
  }

  // —— 速度与距离 ——
  speed = Math.min(2450, 860 + dist * 0.011);
  const eff = speed * (P.dash > 0 ? 1.7 : 1);
  const ds = eff * dt;
  dist += ds;

  // —— 玩家 ——
  P.vLane += (P.lane - P.vLane) * (1 - Math.exp(-11 * dt));
  if (P.y > 0 || P.vy > 0) {
    P.y += P.vy * dt;
    P.vy -= GRAV * dt;
    if (P.y <= 0) { P.y = 0; P.vy = 0; }
  }
  if (P.sliding > 0) P.sliding -= dt;
  if (P.magnet > 0) P.magnet -= dt;
  if (P.dash > 0) P.dash -= dt;
  P.phase += dt * (7 + eff * 0.004);

  // 冲刺残影
  if (P.dash > 0) {
    trail.push({ x: cx + P.vLane * laneW, y: baseY - P.y, t: 0.28 });
  }
  for (let i = trail.length - 1; i >= 0; i--) { trail[i].t -= dt; if (trail[i].t <= 0) trail.splice(i, 1); }

  // —— 生成 ——
  while (nextSpawn < dist + SPAWN_Z) {
    spawnRow(nextSpawn - dist);
    nextSpawn += rowGap() * rnd(0.85, 1.35);
  }

  // —— 障碍 ——
  const pHalf = 34; // 玩家 z 半径
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    o.z -= ds;
    const front = o.z - o.depth / 2, back = o.z + o.depth / 2;
    const laneDist = Math.abs(P.vLane - o.lane);
    const overlap = front < pHalf && back > -pHalf;

    if (overlap && laneDist < 0.55 && P.alive) {
      let hit = false;
      if (o.type === 'low')   hit = P.y < o.h;
      if (o.type === 'bar')   hit = P.sliding <= 0;
      if (o.type === 'block') hit = true;
      if (hit) {
        if (P.dash > 0) {  // 冲刺无敌：撞碎障碍
          burst(cx + o.lane * laneW * proj(Math.max(0, o.z)), groundY(proj(Math.max(0, o.z))) - 50, 18, '#ffcc00');
          sfx.smash();
          bonus += 20;
          addFloat('+20 击碎', cx + P.vLane * laneW, baseY - 170, '#ffcc00', 20);
          obstacles.splice(i, 1);
          continue;
        }
        die();
      }
    }
    // 通过判定（险过）
    if (!o.passed && back < -pHalf) {
      o.passed = true;
      if (P.alive && state === ST.PLAY) {
        if (laneDist < 0.55 && o.type !== 'block') {
          bonus += 30; sfx.near();
          addFloat('险过 +30', cx + P.vLane * laneW, baseY - 190, '#5ad7ff', 22);
          gust(cx + P.vLane * laneW, baseY - 90);
        } else if (o.type === 'block' && laneDist >= 0.55 && laneDist < 0.95) {
          bonus += 30; sfx.near();
          addFloat('险过 +30', cx + P.vLane * laneW, baseY - 190, '#5ad7ff', 22);
          gust(cx + P.vLane * laneW, baseY - 90);
        }
      }
    }
    if (o.z < -220) obstacles.splice(i, 1);
  }

  // —— 金币 ——
  for (let i = coinsArr.length - 1; i >= 0; i--) {
    const c = coinsArr[i];
    c.z -= ds;
    c.ph += dt * 6;
    if (P.magnet > 0 && c.z < 850 && c.z > -40) { // 磁铁吸附
      c.lane += (P.vLane - c.lane) * Math.min(1, dt * (c.z < 300 ? 14 : 5));
      c.h += ((P.y + 46) - c.h) * Math.min(1, dt * 6);
    }
    const grab = P.magnet > 0 ? 1.2 : 0.5;
    if (c.z < 60 && c.z > -60 && Math.abs(P.vLane - c.lane) < grab && Math.abs((P.y + 46) - c.h) < 80) {
      coins++;
      sfx.coin();
      burst(cx + c.lane * laneW, baseY - c.h, 5, '#ffe46b');
      coinsArr.splice(i, 1);
      continue;
    }
    if (c.z < -160) coinsArr.splice(i, 1);
  }

  // —— 道具 ——
  for (let i = powerups.length - 1; i >= 0; i--) {
    const u = powerups[i];
    u.z -= ds;
    u.ph += dt * 4;
    if (u.z < 60 && u.z > -60 && Math.abs(P.vLane - u.lane) < 0.6) {
      sfx.power();
      if (u.kind === 'magnet') { P.magnet = 10; addFloat('磁铁！', cx + P.vLane * laneW, baseY - 200, '#5ad7ff', 24); }
      else { P.dash = 2.6; addFloat('无敌冲刺！', cx + P.vLane * laneW, baseY - 200, '#ffcc00', 24); }
      powerups.splice(i, 1);
      continue;
    }
    if (u.z < -160) powerups.splice(i, 1);
  }

  bgScroll(ds);
  updateFx(dt);
}
function bgScroll(ds) {
  for (const b of builds) {
    b.z -= ds * 1.0;
    if (b.z < -200) {
      let mz = -Infinity;
      for (const o of builds) if (o.z > mz) mz = o.z;
      const nb = mkBuild(mz + rnd(330, 520), b.side);
      Object.assign(b, nb);
    }
  }
}
function updateFx(dt) {
  if (shakeT > 0) shakeT -= dt;
  if (flashT > 0) flashT -= dt;
  for (let i = floaters.length - 1; i >= 0; i--) {
    const f = floaters[i];
    f.life -= dt * 0.9; f.y -= dt * 70;
    if (f.life <= 0) floaters.splice(i, 1);
  }
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.life -= dt;
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 800 * dt;
    if (p.life <= 0) parts.splice(i, 1);
  }
}

// ---------- 绘制 ----------
function draw() {
  calcView();
  ensureCaches();
  ctx.clearRect(0, 0, cw, ch);

  // 镜头抖动
  ctx.save();
  if (shakeT > 0) {
    const m = shakeMag * (shakeT / 0.55);
    ctx.translate(rnd(-m, m), rnd(-m, m));
  }

  drawSky();
  drawRoad();
  drawBuildings();
  drawEntities();
  drawSpeedLines();
  drawParticles();
  drawFloaters();

  ctx.restore();

  // 死亡慢动作：双重曝光色散 + 暗角
  if (state === ST.DYING) {
    const k = Math.min(1, dieT * 2.2);
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.13 * k;
    ctx.drawImage(cv, 6 * dpr * k, 0);
    ctx.drawImage(cv, -6 * dpr * k, 2 * dpr * k);
    ctx.restore();
    ctx.globalAlpha = k;
    ctx.drawImage(G.vig, 0, 0, cw, ch);
    ctx.globalAlpha = 1;
  }

  // 撞击红闪
  if (flashT > 0) {
    ctx.fillStyle = `rgba(255,40,40,${flashT * 1.6})`;
    ctx.fillRect(0, 0, cw, ch);
  }
}

function drawSky() {
  ctx.fillStyle = G.sky;
  ctx.fillRect(0, 0, cw, horizonY + 2);

  // 星星
  const t = performance.now() * 0.001;
  for (const s of stars) {
    const a = 0.25 + 0.45 * (0.5 + 0.5 * Math.sin(t * 1.4 + s.tw));
    ctx.fillStyle = `rgba(220,225,255,${a})`;
    ctx.fillRect(s.x * cw, s.y * horizonY * 0.85, s.r, s.r);
  }
  // 月亮（光晕 + 环形山）
  const mw = cw * 0.24;
  ctx.drawImage(SPR.moon, cw * 0.78 - mw / 2, horizonY * 0.32 - mw / 2, mw, mw);

  // 云层（多层视差，随奔跑缓慢倒退）
  for (let i = 0; i < 3; i++) {
    const sp = SPR.clouds[i % 2];
    const wD = cw * (0.55 + i * 0.22);
    const span = cw + wD;
    const x = span - (((i * 0.43 + t * 0.0045 * (i + 1) + dist * 0.0000012 * (i + 1)) % 1) * span + wD);
    ctx.globalAlpha = 0.75 - i * 0.18;
    ctx.drawImage(sp, x, horizonY * (0.10 + i * 0.18), wD, wD * 0.3);
  }
  ctx.globalAlpha = 1;

  // 巡航飞艇
  const bw = cw * 0.09;
  const bx = (1 - ((t * 0.011) % 1.3)) * (cw + bw * 3) - bw * 1.5;
  const by = horizonY * (0.46 + 0.04 * Math.sin(t * 0.6));
  ctx.fillStyle = '#1d1d33';
  ctx.beginPath(); ctx.ellipse(bx, by, bw, bw * 0.36, 0, 0, TAU); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(bx - bw * 0.92, by);
  ctx.lineTo(bx - bw * 1.3, by - bw * 0.3);
  ctx.lineTo(bx - bw * 1.3, by + bw * 0.3);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#2c2c4a';
  ctx.fillRect(bx - bw * 0.3, by + bw * 0.3, bw * 0.6, bw * 0.22);
  ctx.fillStyle = 'rgba(255,204,0,.55)';
  for (let i = 0; i < 4; i++) ctx.fillRect(bx - bw * 0.24 + i * bw * 0.16, by + bw * 0.35, 3, 3);
  if (Math.floor(t * 2) % 2) {
    ctx.fillStyle = '#ff7aa0';
    ctx.beginPath(); ctx.arc(bx + bw * 0.98, by, 2.2, 0, TAU); ctx.fill();
  }

  // 远层天际线（慢视差）
  const sl2 = (dist * 0.000008) % 1;
  ctx.fillStyle = '#0d0f1c';
  for (const b of skyline2) {
    const x = ((b.x - sl2) % 2.2 + 2.2) % 2.2 - 0.1;
    ctx.fillRect(x * cw, horizonY - b.h * horizonY * 0.9, b.w * cw + 1, b.h * horizonY * 0.9 + 2);
  }
  // 近层天际线
  const slide = (dist * 0.00002) % 1;
  ctx.fillStyle = '#12141f';
  for (const b of skyline) {
    const x = ((b.x - slide) % 2.2 + 2.2) % 2.2 - 0.1;
    ctx.fillRect(x * cw, horizonY - b.h * ch, b.w * cw + 1, b.h * ch + 2);
  }
  // 天际线霓虹灯火
  for (let i = 0; i < 24; i++) {
    const sx = ((i * 0.09 + 0.03 - slide) % 2.2 + 2.2) % 2.2 - 0.1;
    ctx.fillStyle = ['rgba(255,204,0,.32)', 'rgba(54,224,255,.28)', 'rgba(255,77,166,.28)'][i % 3];
    ctx.fillRect(sx * cw, horizonY - (0.012 + (i % 5) * 0.011) * ch, 2, 2);
  }
  // 地平线霓虹雾霭
  ctx.fillStyle = G.haze;
  ctx.fillRect(0, horizonY * 0.45, cw, horizonY * 0.55 + 2);
}

function drawRoad() {
  const edge = laneW * 1.5 + 12;
  const sBot = (ch - horizonY) / (baseY - horizonY); // 画布底缘的透视比例

  // 地面底色 / 路面（缓存渐变）
  ctx.fillStyle = G.ground;
  ctx.fillRect(0, horizonY, cw, ch - horizonY);
  ctx.beginPath();
  ctx.moveTo(cx, horizonY);
  ctx.lineTo(cx - edge * sBot, ch);
  ctx.lineTo(cx + edge * sBot, ch);
  ctx.closePath();
  ctx.fillStyle = G.road;
  ctx.fill();

  // 沥青斑驳（随路面滚动的碎斑）
  const spGap = 130;
  const spBase = Math.floor(dist / spGap);
  for (let k = 0; k < 26; k++) {
    const id = spBase + k;
    const z = id * spGap - dist;
    if (z < 0) continue;
    const s = proj(z);
    if (s > sBot) continue;
    const lx = Math.sin(id * 127.1) * 1.38;
    const a = 0.10 * Math.min(1, s * 1.6) * (0.4 + 0.6 * Math.abs(Math.sin(id * 31.7)));
    ctx.fillStyle = (id % 3) ? `rgba(195,205,255,${a.toFixed(3)})` : `rgba(0,0,0,${(a * 2.4).toFixed(3)})`;
    ctx.fillRect(cx + lx * laneW * s, groundY(s), Math.max(1, 4 * s), Math.max(1, 1.7 * s));
  }

  // 霓虹倒影拉丝（楼宇灯光在湿沥青上的纵向反射）
  const refCols = ['rgba(255,77,166,', 'rgba(54,224,255,', 'rgba(255,204,0,'];
  for (let i = 0; i < 3; i++) {
    const lx = [-1.16, 0.04, 1.2][i];
    const sway = Math.sin(dist * 0.0004 + i * 2.2) * 0.12;
    const s0 = proj(70 + i * 90), s1 = proj(2300 + i * 420);
    const x0 = cx + (lx + sway) * laneW * s0, y0 = groundY(s0);
    const x1 = cx + (lx + sway * 0.4) * laneW * s1, y1 = groundY(s1);
    const w0 = 24 * s0, w1 = 7 * s1;
    ctx.fillStyle = refCols[i] + '.075)';
    ctx.beginPath();
    ctx.moveTo(x0 - w0, y0); ctx.lineTo(x0 + w0, y0);
    ctx.lineTo(x1 + w1, y1); ctx.lineTo(x1 - w1, y1);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = refCols[i] + '.06)';
    ctx.beginPath();
    ctx.moveTo(x0 - w0 * 0.4, y0); ctx.lineTo(x0 + w0 * 0.4, y0);
    ctx.lineTo(x1 + w1 * 0.4, y1); ctx.lineTo(x1 - w1 * 0.4, y1);
    ctx.closePath(); ctx.fill();
  }

  // 横向光带（强化速度感）
  const bandGap = 760;
  ctx.lineWidth = 2;
  for (let k = 0; k < 7; k++) {
    const z = k * bandGap - (dist % bandGap);
    if (z < -F * 0.6) continue;
    const s = proj(z);
    if (s > sBot) continue;
    const y = groundY(s);
    ctx.strokeStyle = `rgba(90,215,255,${0.10 * s})`;
    ctx.beginPath();
    ctx.moveTo(cx - edge * s, y);
    ctx.lineTo(cx + edge * s, y);
    ctx.stroke();
  }

  // 车道分隔虚线（反光漆：晕光垫底 + 亮芯）
  const dashGap = 270, dashLen = 120;
  for (const lx of [-0.5, 0.5]) {
    for (let k = -1; k < 16; k++) {
      const z0 = k * dashGap - (dist % dashGap);
      const z1 = z0 + dashLen;
      if (z1 < -F * 0.6 || z0 > SPAWN_Z) continue;
      const s0 = Math.min(proj(z0), sBot + 0.4);
      const s1 = proj(Math.max(z1, -F * 0.6));
      const w0 = Math.max(2, 5 * s0), w1 = Math.max(1.5, 5 * s1);
      const x0 = cx + lx * laneW * s0, y0 = groundY(s0);
      const x1 = cx + lx * laneW * s1, y1 = groundY(s1);
      ctx.fillStyle = 'rgba(120,215,255,.10)';
      ctx.beginPath();
      ctx.moveTo(x0 - w0 * 2.1, y0); ctx.lineTo(x0 + w0 * 2.1, y0);
      ctx.lineTo(x1 + w1 * 2.1, y1); ctx.lineTo(x1 - w1 * 2.1, y1);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'rgba(214,222,245,.6)';
      ctx.beginPath();
      ctx.moveTo(x0 - w0, y0); ctx.lineTo(x0 + w0, y0);
      ctx.lineTo(x1 + w1, y1); ctx.lineTo(x1 - w1, y1);
      ctx.closePath(); ctx.fill();
    }
  }

  // 金色路缘灯带（外晕 + 亮线）
  for (const sg of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(cx + sg * edge * 0.06, horizonY);
    ctx.lineTo(cx + sg * edge * sBot, ch);
    ctx.strokeStyle = 'rgba(255,204,0,.14)';
    ctx.lineWidth = 9;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,214,40,.6)';
    ctx.lineWidth = 3;
    ctx.stroke();
  }
  // 路缘短柱（飞速掠过的灯桩）
  const poleGap = 420;
  for (let k = 0; k < 10; k++) {
    const z = k * poleGap - (dist % poleGap);
    if (z < 0) continue;
    const s = proj(z);
    const y = groundY(s);
    for (const sg of [-1, 1]) {
      const x = cx + sg * (edge + 26) * s;
      ctx.fillStyle = `rgba(255,204,0,${0.5 * Math.min(1, s * 2)})`;
      ctx.fillRect(x - 3 * s, y - 36 * s, 6 * s, 36 * s);
      ctx.fillStyle = `rgba(255,240,170,${0.85 * Math.min(1, s * 2)})`;
      ctx.fillRect(x - 2 * s, y - 38 * s, 4 * s, 5 * s);
    }
  }
}

function drawBuildings() {
  const sBot = (ch - horizonY) / (baseY - horizonY);
  // 空中天桥剪影（背景层，远远掠过头顶）
  {
    const gap = 3400;
    const z = gap - (dist % gap);
    if (z < SPAWN_Z) {
      const s = proj(z);
      const y = groundY(s);
      const edge = laneW * 1.5 + 12;
      const half = (edge + 330) * s;
      const y0 = y - 470 * s, hgt = 60 * s;
      ctx.globalAlpha = clamp(s * 2.2, 0.15, 0.9);
      ctx.fillStyle = '#0c0c16';
      ctx.fillRect(cx - half, y0, half * 2, hgt);
      ctx.fillRect(cx - (edge + 70) * s, y0 + hgt, 15 * s, y - y0 - hgt);
      ctx.fillRect(cx + (edge + 70) * s - 15 * s, y0 + hgt, 15 * s, y - y0 - hgt);
      ctx.fillStyle = 'rgba(90,215,255,.7)';
      for (let i = -4; i <= 4; i++) ctx.fillRect(cx + i * half / 4.5 - 1.5 * s, y0 + 8 * s, 3 * s, 3 * s);
      ctx.globalAlpha = 1;
    }
  }
  const list = builds.slice().sort((a, b) => b.z - a.z);
  const t = performance.now() * 0.001;
  for (const b of list) {
    if (b.z < -F * 0.5) continue;
    const s = Math.min(proj(b.z), sBot + 1);
    const fog = clamp(s * 3.4, 0.12, 1);
    const baseX = cx + b.side * (laneW * 1.75 + b.off) * s;
    const w = b.w * s, h = b.h * s;
    const gy = groundY(s);
    const x0 = b.side > 0 ? baseX : baseX - w;
    ctx.globalAlpha = fog;
    ctx.drawImage(b.spr.c, x0, gy - h, w, h);
    // 随机窗灯闪烁
    if (s > 0.2) {
      const fl = 0.5 + 0.5 * Math.sin(t * 11 + b.tw);
      if (fl > 0.55) {
        ctx.fillStyle = `rgba(255,232,150,${((fl - 0.55) * 1.7 * fog).toFixed(3)})`;
        ctx.fillRect(x0 + w * b.fx, gy - h + h * b.fy, 8 * s, 6 * s);
      }
    }
    ctx.globalAlpha = 1;
  }
}

// —— 实体绘制（远→近排序，玩家按 z=0 插入）——
function drawEntities() {
  const items = [];
  for (const o of obstacles) if (o.z > -F * 0.5 && o.z < SPAWN_Z) items.push({ z: o.z, f: () => drawObstacle(o) });
  for (const c of coinsArr)  if (c.z > -F * 0.5 && c.z < SPAWN_Z) items.push({ z: c.z, f: () => drawCoin(c) });
  for (const u of powerups)  if (u.z > -F * 0.5 && u.z < SPAWN_Z) items.push({ z: u.z, f: () => drawPowerup(u) });
  if (state !== ST.MENU) items.push({ z: 0, f: drawPlayer });
  items.sort((a, b) => b.z - a.z);
  for (const it of items) it.f();
}

function shadow(x, y, w, alpha) {
  ctx.fillStyle = `rgba(0,0,0,${alpha})`;
  ctx.beginPath();
  ctx.ellipse(x, y, w, w * 0.26, 0, 0, TAU);
  ctx.fill();
}

function drawObstacle(o) {
  const s = proj(o.z);
  const sBack = proj(o.z + o.depth);
  const x = cx + o.lane * laneW * s;
  const y = groundY(s);
  const lw = laneW * s;

  if (o.type === 'low') {           // 低栏 —— 跳过
    const h = o.h * s, w = lw * 0.82;
    shadow(x, y + 2 * s, w * 0.58, clamp(0.55 * s, 0.08, 0.5));
    // 金属支腿（暗部 + 受光面）
    for (const sg of [-1, 1]) {
      const lx2 = x + sg * (w / 2 - 3.5 * s);
      ctx.fillStyle = '#33334a';
      ctx.fillRect(lx2 - 3.5 * s, y - h, 7 * s, h);
      ctx.fillStyle = '#5b5b78';
      ctx.fillRect(lx2 - 3.5 * s, y - h, 2.5 * s, h);
    }
    // 警示横板（预渲染贴图）
    ctx.drawImage(SPR.hurdle, x - w / 2, y - h, w, 28 * s);
  }
  else if (o.type === 'bar') {      // 横杆 / 天桥 —— 滑铲过
    const w = lw * 0.96;
    const hLow = 66 * s, hTop = 150 * s;
    shadow(x, y, w * 0.5, clamp(0.4 * s, 0.06, 0.35));
    // 立柱（带受光棱线）
    for (const sg of [-1, 1]) {
      const lx2 = x + sg * (w / 2 - 4.5 * s);
      ctx.fillStyle = '#2e2e44';
      ctx.fillRect(lx2 - 4.5 * s, y - hTop, 9 * s, hTop);
      ctx.fillStyle = '#4c4c68';
      ctx.fillRect(lx2 - 4.5 * s, y - hTop, 3 * s, hTop);
    }
    // 钢板面板（预渲染：铆钉 + 底缘霓虹）
    ctx.drawImage(SPR.bar, x - w / 2, y - hTop, w, hTop - hLow);
    // 向下箭头提示（呼吸闪烁）
    const pulse = 0.6 + 0.4 * Math.sin(performance.now() * 0.006);
    ctx.fillStyle = `rgba(110,225,255,${(0.9 * pulse).toFixed(3)})`;
    const ax = x, ay = y - (hLow + hTop) / 2 + 4 * s, aw = 13 * s;
    ctx.beginPath();
    ctx.moveTo(ax - aw, ay - aw); ctx.lineTo(ax + aw, ay - aw); ctx.lineTo(ax, ay + aw * 0.7);
    ctx.closePath(); ctx.fill();
  }
  else {                            // 集装箱卡车 —— 必须换道
    const w = lw * 0.94;
    const hh = 165 * s;
    const xB = cx + o.lane * laneW * sBack;
    const yB = groundY(sBack);
    const wB = laneW * sBack * 0.94, hB = 165 * sBack;
    shadow(x, y + 3 * s, w * 0.62, clamp(0.6 * s, 0.1, 0.55));
    const warm = o.hue < 0.5;
    const cTop = warm ? '#8f3122' : '#234868';
    const cTopHi = warm ? '#a23a28' : '#2b5379';
    const cDark = warm ? '#6e2519' : '#193550';
    // 顶面（前上沿 → 后上沿，带受光条）
    ctx.fillStyle = cTop;
    ctx.beginPath();
    ctx.moveTo(x - w / 2, y - hh);
    ctx.lineTo(x + w / 2, y - hh);
    ctx.lineTo(xB + wB / 2, yB - hB);
    ctx.lineTo(xB - wB / 2, yB - hB);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = cTopHi;
    ctx.beginPath();
    ctx.moveTo(x - w / 2, y - hh);
    ctx.lineTo(x + w / 2, y - hh);
    ctx.lineTo(x + w / 2 * 0.92 + (xB - x) * 0.25, y - hh + (yB - hB - (y - hh)) * 0.25);
    ctx.lineTo(x - w / 2 * 0.92 + (xB - x) * 0.25, y - hh + (yB - hB - (y - hh)) * 0.25);
    ctx.closePath(); ctx.fill();
    // 侧面（朝向道路中心的一侧可见）
    if (o.lane !== 0) {
      const sgn = o.lane > 0 ? -1 : 1;
      ctx.fillStyle = cDark;
      ctx.beginPath();
      ctx.moveTo(x + sgn * w / 2, y);
      ctx.lineTo(x + sgn * w / 2, y - hh);
      ctx.lineTo(xB + sgn * wB / 2, yB - hB);
      ctx.lineTo(xB + sgn * wB / 2, yB);
      ctx.closePath(); ctx.fill();
    }
    // 前脸（预渲染：瓦楞 + 锈迹 + 警示纹 + 反光条）
    ctx.drawImage(warm ? SPR.truckW : SPR.truckC, x - w / 2, y - hh, w, hh);
    // 迎面车灯光晕
    const gw = 30 * s;
    ctx.globalAlpha = 0.55;
    ctx.drawImage(SPR.glowGold, x - w / 2 + 10 * s - gw / 2, y - 16 * s - gw / 2, gw, gw);
    ctx.drawImage(SPR.glowGold, x + w / 2 - 10 * s - gw / 2, y - 16 * s - gw / 2, gw, gw);
    ctx.globalAlpha = 1;
    // 顶角警示灯（交替闪烁）
    const blink = (Math.floor(performance.now() / 280) % 2) === 0;
    ctx.fillStyle = blink ? '#ffcc00' : '#ff5b5b';
    ctx.beginPath(); ctx.arc(x - w / 2 + 12 * s, y - hh + 12 * s, 5 * s, 0, TAU); ctx.fill();
    ctx.fillStyle = blink ? '#ff5b5b' : '#ffcc00';
    ctx.beginPath(); ctx.arc(x + w / 2 - 12 * s, y - hh + 12 * s, 5 * s, 0, TAU); ctx.fill();
  }
}

function drawCoin(c) {
  const s = proj(c.z);
  const x = cx + c.lane * laneW * s;
  const y = groundY(s) - c.h * s;
  const r = 16 * s;
  const cosP = Math.cos(c.ph);
  const squash = Math.max(0.14, Math.abs(cosP)); // 翻面压缩
  shadow(x, groundY(s), r * 0.8, 0.18 * s);
  // 磁铁吸附：弧线轨迹光
  if (P.magnet > 0 && c.z < 850 && c.z > -40 && state === ST.PLAY) {
    const tx = cx + P.vLane * laneW, ty = baseY - P.y - laneW * 0.45;
    ctx.strokeStyle = 'rgba(90,215,255,.26)';
    ctx.lineWidth = Math.max(1, 2.5 * s);
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.quadraticCurveTo((x + tx) / 2, Math.min(y, ty) - 36, tx, ty);
    ctx.stroke();
  }
  ctx.save();
  ctx.translate(x, y);
  // 硬币侧缘（厚度）
  ctx.fillStyle = '#9a7008';
  ctx.beginPath();
  ctx.ellipse(0, 0, r * squash + r * 0.1, r * 1.03, 0, 0, TAU);
  ctx.fill();
  // 正面贴图（椭圆压缩模拟旋转）
  ctx.scale(squash, 1);
  ctx.drawImage(SPR.coin, -r * 1.07, -r * 1.07, r * 2.14, r * 2.14);
  if (cosP < 0) { // 背面调暗
    ctx.fillStyle = 'rgba(80,52,0,.4)';
    ctx.beginPath(); ctx.arc(0, 0, r, 0, TAU); ctx.fill();
  }
  ctx.restore();
  // 翻正瞬间的星形闪光
  if (squash > 0.92 && Math.sin(c.ph * 1.7) > 0.65 && s > 0.25) {
    const gl = r * 0.55;
    ctx.fillStyle = 'rgba(255,255,235,.9)';
    ctx.fillRect(x - r * 0.45 - gl / 2, y - r * 0.45 - 1, gl, 2);
    ctx.fillRect(x - r * 0.45 - 1, y - r * 0.45 - gl / 2, 2, gl);
  }
}

function drawPowerup(u) {
  const s = proj(u.z);
  const x = cx + u.lane * laneW * s;
  const bob = Math.sin(u.ph) * 10 * s;
  const y = groundY(s) - 60 * s + bob;
  const r = 30 * s;
  shadow(x, groundY(s), r * 0.8, 0.2 * s);
  const col = u.kind === 'magnet' ? '#5ad7ff' : '#ffcc00';
  // 光晕（预渲染贴图，呼吸缩放）
  const gw = r * 3.8 * (1 + 0.12 * Math.sin(u.ph * 2));
  ctx.drawImage(u.kind === 'magnet' ? SPR.glowCyan : SPR.glowGold, x - gw / 2, y - gw / 2, gw, gw);
  // 圆框
  ctx.fillStyle = 'rgba(16,16,28,.92)';
  ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill();
  ctx.strokeStyle = col;
  ctx.lineWidth = Math.max(1.5, 3 * s);
  ctx.stroke();
  // 图标
  ctx.strokeStyle = col;
  ctx.fillStyle = col;
  if (u.kind === 'magnet') {  // U 形磁铁
    ctx.lineWidth = Math.max(2, 7 * s);
    ctx.beginPath();
    ctx.arc(x, y - r * 0.1, r * 0.45, Math.PI, 0, false);
    ctx.moveTo(x - r * 0.45, y - r * 0.1); ctx.lineTo(x - r * 0.45, y + r * 0.42);
    ctx.moveTo(x + r * 0.45, y - r * 0.1); ctx.lineTo(x + r * 0.45, y + r * 0.42);
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.fillRect(x - r * 0.45 - 3.5 * s, y + r * 0.3, 7 * s, r * 0.18);
    ctx.fillRect(x + r * 0.45 - 3.5 * s, y + r * 0.3, 7 * s, r * 0.18);
  } else {                    // 闪电
    ctx.beginPath();
    ctx.moveTo(x + r * 0.18, y - r * 0.55);
    ctx.lineTo(x - r * 0.32, y + r * 0.08);
    ctx.lineTo(x - r * 0.02, y + r * 0.08);
    ctx.lineTo(x - r * 0.18, y + r * 0.55);
    ctx.lineTo(x + r * 0.32, y - r * 0.1);
    ctx.lineTo(x + r * 0.02, y - r * 0.1);
    ctx.closePath(); ctx.fill();
  }
}

// —— 玩家：连帽衫少年（分层上色 + 围巾飘带）——
function drawPlayer() {
  const px = cx + P.vLane * laneW;
  const py = baseY - P.y;
  const u = laneW / 105;         // 身体比例单位
  const lean = (P.lane - P.vLane) * 0.45;

  // 冲刺残影（纵向拉伸的残像模拟径向模糊）
  for (const t of trail) {
    const k = t.t / 0.28;
    ctx.globalAlpha = k * 0.5;
    const gw = 56 * u, gh = 120 * u * (1.7 - k);
    ctx.drawImage(SPR.glowGold, t.x - gw / 2, t.y - 58 * u - gh / 2, gw, gh);
  }
  ctx.globalAlpha = 1;

  // 影子（始终贴地）
  shadow(px, baseY, laneW * 0.26 * (1 - P.y / 600), 0.45);

  // 磁铁光环
  if (P.magnet > 0) {
    const t = performance.now() * 0.004;
    ctx.strokeStyle = `rgba(90,215,255,${0.5 + 0.3 * Math.sin(t * 3)})`;
    ctx.lineWidth = 2.5;
    ctx.setLineDash([10, 8]);
    ctx.lineDashOffset = -t * 30;
    ctx.beginPath();
    ctx.ellipse(px, py - 55 * u, laneW * 0.42, laneW * 0.5, 0, 0, TAU);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  // 冲刺光晕（预渲染贴图）
  if (P.dash > 0) {
    const gw = laneW * 1.25;
    ctx.globalAlpha = 0.8;
    ctx.drawImage(SPR.glowGold, px - gw / 2, py - 55 * u - gw / 2, gw, gw);
    ctx.globalAlpha = 1;
  }

  ctx.save();
  ctx.translate(px, py);
  ctx.scale(u, u);
  ctx.rotate(lean);
  if (!P.alive) ctx.rotate(Math.min(P.deathSpin, Math.PI / 2) * 1.1);

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  const ph = P.phase;
  const sliding = P.sliding > 0 && P.alive;
  const airborne = P.y > 4;
  const rising = P.vy > 60;

  const HOOD = '#ffc02e', HOOD_D = '#c78d10', PANT = '#34375c', PANT_D = '#23253f',
        SHOE = '#f2f3fa', SHOE_D = '#aaadc2', SKIN = '#f2c9a0',
        SCARF = '#ff3d6e', SCARF_D = '#c22650';

  // 围巾尾带：lift>0 上扬，<0 下压
  function scarfTail(sx, sy, dir, lift) {
    let x = sx, y = sy;
    for (let i = 0; i < 4; i++) {
      const nx = x + dir * (7 + i * 2.4) + Math.sin(ph * 2.3 + i * 1.4) * 3.2;
      const ny = y + (6 - lift * 15) + i * 1.4 + Math.cos(ph * 2.3 + i) * 2.6;
      ctx.lineWidth = 7.5 - i * 1.5;
      ctx.strokeStyle = i % 2 ? SCARF_D : SCARF;
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(nx, ny); ctx.stroke();
      x = nx; y = ny;
    }
  }
  // 四肢：主色描边 + 鞋
  function leg(col, shoeCol, x0, y0, kx, ky, fx, fy, w) {
    ctx.strokeStyle = col; ctx.lineWidth = w;
    ctx.beginPath(); ctx.moveTo(x0, y0); ctx.quadraticCurveTo(kx, ky, fx, fy); ctx.stroke();
    ctx.strokeStyle = shoeCol; ctx.lineWidth = w * 0.78;
    ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx + (fx - kx) * 0.16 + 1.5, fy + 5); ctx.stroke();
    ctx.strokeStyle = '#36e0ff'; ctx.lineWidth = 2;   // 鞋侧霓虹条
    ctx.beginPath(); ctx.moveTo(fx - 2, fy + 2); ctx.lineTo(fx + 3, fy + 3.5); ctx.stroke();
  }
  // 兜帽头
  function hoodHead(hx, hy, r) {
    ctx.fillStyle = HOOD;
    ctx.beginPath(); ctx.arc(hx, hy, r, 0, TAU); ctx.fill();
    ctx.fillStyle = HOOD_D;
    ctx.beginPath(); ctx.arc(hx, hy + 2, r, Math.PI * 0.12, Math.PI * 0.88); ctx.fill();
    ctx.fillStyle = '#1c1c2c';   // 帽口
    ctx.beginPath(); ctx.ellipse(hx, hy + r * 0.5, r * 0.62, r * 0.34, 0, 0, Math.PI); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.5)'; ctx.lineWidth = 2;   // 月光高光
    ctx.beginPath(); ctx.arc(hx - 2.5, hy - 2.5, r * 0.74, Math.PI * 1.05, Math.PI * 1.62); ctx.stroke();
  }

  if (sliding) {
    // —— 滑铲：贴地飞铲，火花四溅 ——
    if (Math.random() < 0.7) parts.push({ x: px + rnd(-14, 14), y: baseY - 2, vx: rnd(-60, 60), vy: rnd(-180, -40), life: 0.25, max: 0.25, color: '#ffd24a', r: 2, st: 1 });
    scarfTail(2, -42, -1, 0.25);
    // 折叠后腿（暗）+ 前伸腿（亮）
    leg(PANT_D, SHOE_D, -4, -20, -13, -9, -19, -4, 10);
    leg(PANT, SHOE, 2, -21, 13, -9, 25, -5, 12);
    // 躯干后仰（暗部 + 受光面）
    ctx.strokeStyle = HOOD_D; ctx.lineWidth = 17;
    ctx.beginPath(); ctx.moveTo(-1, -21); ctx.lineTo(9, -38); ctx.stroke();
    ctx.strokeStyle = HOOD; ctx.lineWidth = 12;
    ctx.beginPath(); ctx.moveTo(-2, -23); ctx.lineTo(7, -38); ctx.stroke();
    // 撑地手 + 后摆手
    ctx.strokeStyle = HOOD; ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(7, -36); ctx.lineTo(21, -24); ctx.lineTo(25, -7); ctx.stroke();
    ctx.fillStyle = SKIN;
    ctx.beginPath(); ctx.arc(25, -7, 4, 0, TAU); ctx.fill();
    ctx.strokeStyle = HOOD_D; ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(5, -37); ctx.lineTo(-11, -31); ctx.stroke();
    // 头（压低）
    hoodHead(12, -50, 11);
  } else {
    const bob = airborne ? 0 : Math.abs(Math.sin(ph)) * 4.5;
    const hipY = -50 - bob, shY = -86 - bob, headY = -100 - bob;
    // —— 围巾（最底层，随相位飘动）——
    scarfTail(4, shY + 3, 1, airborne ? (rising ? -0.7 : 1.3) : 0.15 + Math.sin(ph) * 0.12);
    // —— 腿（远暗近亮；跳跃蜷腿/落地前伸）——
    for (const side of [-1, 1]) {
      const far = side < 0;
      const lp = ph + (side > 0 ? 0 : Math.PI);
      let kx, ky, fx, fy;
      if (airborne) {
        if (rising) { kx = side * 11; ky = hipY + 13; fx = side * 7; fy = hipY + 23; }      // 蜷腿上跳
        else { kx = side * 9; ky = hipY + 20; fx = side * 5 - 3; fy = hipY + 38 + side * 4; } // 落地前探
      } else {
        const lift = Math.max(0, Math.sin(lp));
        const back = Math.max(0, -Math.sin(lp));
        kx = side * 8 + lift * 2; ky = hipY + 26 - lift * 11;
        fx = side * 9 + lift * 4 - back * 3; fy = -2 - lift * 34 - back * 5;
      }
      leg(far ? PANT_D : PANT, far ? SHOE_D : SHOE, side * 6, hipY, kx, ky, fx, fy, far ? 10 : 12);
    }
    // —— 躯干：连帽衫（暗底 + 受光面）——
    const midY = (hipY + shY) / 2;
    ctx.fillStyle = HOOD_D;
    ctx.beginPath();
    ctx.moveTo(-9, hipY + 3);
    ctx.quadraticCurveTo(-13.5, midY, -11.5, shY - 2);
    ctx.quadraticCurveTo(0, shY - 9, 11.5, shY - 2);
    ctx.quadraticCurveTo(13.5, midY, 9, hipY + 3);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = HOOD;
    ctx.beginPath();
    ctx.moveTo(-8.5, hipY + 2);
    ctx.quadraticCurveTo(-12, midY, -10.5, shY - 2);
    ctx.quadraticCurveTo(-2, shY - 7.5, 6, shY - 3);
    ctx.quadraticCurveTo(8.5, midY, 4.5, hipY + 2);
    ctx.closePath(); ctx.fill();
    // 中缝 + 下摆收口
    ctx.strokeStyle = 'rgba(0,0,0,.25)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-1, shY - 3); ctx.lineTo(-1, hipY + 1); ctx.stroke();
    ctx.fillStyle = PANT_D;
    ctx.fillRect(-9, hipY, 18, 4.5);
    // 垂落的兜帽（颈后鼓包）
    ctx.fillStyle = HOOD_D;
    ctx.beginPath(); ctx.ellipse(0, shY - 3, 10, 7, 0, 0, TAU); ctx.fill();
    ctx.strokeStyle = HOOD; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(0, shY - 3, 10, 7, 0, Math.PI * 1.08, Math.PI * 1.92); ctx.stroke();
    // —— 手臂（摆臂；跳跃展开上扬）——
    for (const side of [-1, 1]) {
      const far = side < 0;
      const lp = ph + (side > 0 ? Math.PI : 0);
      let ex, ey, hx, hy;
      if (airborne) {
        if (rising) { ex = side * 20; ey = shY - 3; hx = side * 27; hy = shY - 21; }   // 双臂飞扬
        else { ex = side * 18; ey = shY + 9; hx = side * 25; hy = shY + 1; }
      } else {
        const sw = Math.sin(lp);
        ex = side * 15; ey = shY + 14 + sw * 4;
        hx = side * 13; hy = shY + 26 - Math.max(0, sw) * 27;
      }
      ctx.strokeStyle = far ? HOOD_D : HOOD; ctx.lineWidth = far ? 8 : 9;
      ctx.beginPath(); ctx.moveTo(side * 9, shY + 2); ctx.quadraticCurveTo(ex, ey, hx, hy); ctx.stroke();
      ctx.fillStyle = SKIN;
      ctx.beginPath(); ctx.arc(hx, hy, 4.2, 0, TAU); ctx.fill();
    }
    // —— 头（兜帽罩头）——
    hoodHead(0, headY, 12);
  }
  ctx.restore();
}

function drawSpeedLines() {
  if (state === ST.MENU) return;
  const eff = speed * (P.dash > 0 ? 1.7 : 1);
  const k = clamp((eff - 1100) / 1600, 0, 1) + (P.dash > 0 ? 0.45 : 0);
  if (k <= 0.02) return;
  const t = dist;
  for (let i = 0; i < 12; i++) {
    const sd = Math.sin(i * 37.7) * 0.5 + 0.5;
    const prog = ((t * (0.0012 + sd * 0.0008) + sd * 7) % 1);
    const ang = (i / 12) * TAU + sd;
    const cxr = cx, cyr = ch * 0.42;
    const r0 = (ch * 0.30) + prog * ch * 0.55;
    const r1 = r0 + 50 + k * 120;
    const dx = Math.cos(ang), dy = Math.sin(ang);
    // 只画屏幕边缘方向
    if (Math.abs(dx) < 0.45 && dy < 0) continue;
    const x0 = cxr + dx * r0, y0 = cyr + dy * r0 * 0.8;
    const x1 = cxr + dx * r1, y1 = cyr + dy * r1 * 0.8;
    ctx.strokeStyle = `rgba(190,210,255,${(0.07 * k).toFixed(3)})`;
    ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
    ctx.strokeStyle = `rgba(230,238,255,${(0.2 * k).toFixed(3)})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
  }
}

function drawParticles() {
  for (const p of parts) {
    ctx.globalAlpha = clamp(p.life / p.max, 0, 1);
    if (p.st) {       // 线状粒子（火花 / 擦风）
      ctx.strokeStyle = p.color;
      ctx.lineWidth = p.r;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.vx * 0.045, p.y - p.vy * 0.045);
      ctx.stroke();
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}
function drawFloaters() {
  ctx.textAlign = 'center';
  for (const f of floaters) {
    ctx.globalAlpha = clamp(f.life, 0, 1);
    ctx.font = `800 ${f.size}px "PingFang SC","Microsoft YaHei",system-ui`;
    ctx.strokeStyle = 'rgba(0,0,0,.7)';
    ctx.lineWidth = 4;
    ctx.strokeText(f.txt, f.x, f.y);
    ctx.fillStyle = f.color;
    ctx.fillText(f.txt, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

// ---------- HUD ----------
const elDist = document.getElementById('hudDist');
const elCoin = document.getElementById('hudCoin');
const chipMag = document.getElementById('chipMag');
const chipDash = document.getElementById('chipDash');
const barMag = chipMag.querySelector('i');
const barDash = chipDash.querySelector('i');
const secMag = chipMag.querySelector('.sec');
const secDash = chipDash.querySelector('.sec');
let hudDistTxt = '', hudCoinTxt = '';
function updateHUD() {
  const dTxt = Math.floor(dist / 55) + ' <small>米</small>';
  if (dTxt !== hudDistTxt) { hudDistTxt = dTxt; elDist.innerHTML = dTxt; }
  const cTxt = String(coins);
  if (cTxt !== hudCoinTxt) { hudCoinTxt = cTxt; elCoin.textContent = cTxt; }
  chipMag.classList.toggle('on', P.magnet > 0);
  chipDash.classList.toggle('on', P.dash > 0);
  if (P.magnet > 0) {
    barMag.style.width = (P.magnet / 10 * 100) + '%';
    secMag.textContent = Math.max(0, P.magnet).toFixed(1) + 's';
  }
  if (P.dash > 0) {
    barDash.style.width = (P.dash / 2.6 * 100) + '%';
    secDash.textContent = Math.max(0, P.dash).toFixed(1) + 's';
  }
}

// ---------- 主循环 ----------
const menuBest = document.getElementById('menuBest');
menuBest.textContent = best > 0 ? '历史最高分：' : '还没有记录，跑出你的第一个高分！';
if (best > 0) {
  const b = document.createElement('b');
  b.textContent = best;
  menuBest.appendChild(b);
}

let lastT = performance.now();
function frame(now) {
  let dt = (now - lastT) / 1000;
  lastT = now;
  if (dt > 0.05) dt = 0.05;
  update(dt);
  draw();
  if (state === ST.PLAY || state === ST.DYING) updateHUD();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// 失焦防 dt 跳变
document.addEventListener('visibilitychange', () => { lastT = performance.now(); });
</script>
