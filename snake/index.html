<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>霓虹贪吃蛇 · AI4399</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    background: #0a0a12;
    color: #e8e8f0;
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  a.back {
    position: fixed;
    top: 10px;
    left: 12px;
    z-index: 30;
    color: #8888a0;
    text-decoration: none;
    font-size: 13px;
    padding: 5px 12px;
    background: rgba(20, 20, 31, 0.65);
    border: 1px solid #2a2a3d;
    border-radius: 8px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: color .2s, border-color .2s;
  }
  a.back:hover { color: #ffcc00; border-color: #3d3d55; }
  #stage {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 44px 10px 10px;
    gap: 8px;
  }
  #hud {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 8px;
    width: 100%;
    max-width: 640px;
  }
  .chip {
    display: flex;
    align-items: baseline;
    gap: 6px;
    background: linear-gradient(180deg, rgba(26, 28, 48, 0.85), rgba(15, 15, 27, 0.92));
    border: 1px solid rgba(98, 110, 255, 0.30);
    border-radius: 10px;
    padding: 5px 12px;
    font-size: 13px;
    min-width: 76px;
    justify-content: center;
    box-shadow: 0 0 14px rgba(80, 90, 255, 0.12), inset 0 0 14px rgba(80, 90, 255, 0.06);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .chip .lab { color: #8888a0; font-size: 12px; }
  .chip .val { color: #e8e8f0; font-weight: 700; font-variant-numeric: tabular-nums; }
  .chip .val.gold { color: #ffcc00; text-shadow: 0 0 8px rgba(255, 204, 0, .45); }
  .chip .val.cyan { color: #4ef0ff; text-shadow: 0 0 8px rgba(78, 240, 255, .45); }
  #pauseBtn {
    background: linear-gradient(180deg, rgba(26, 28, 48, 0.85), rgba(15, 15, 27, 0.92));
    border: 1px solid rgba(98, 110, 255, 0.30);
    color: #9a9ab8;
    border-radius: 10px;
    padding: 5px 14px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 0 14px rgba(80, 90, 255, 0.12), inset 0 0 14px rgba(80, 90, 255, 0.06);
    transition: color .2s, border-color .2s, box-shadow .2s;
  }
  #pauseBtn:hover { color: #ffcc00; border-color: rgba(255, 204, 0, .45); box-shadow: 0 0 16px rgba(255, 204, 0, .18); }
  #wrap {
    position: relative;
    flex: 1;
    min-height: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas#game {
    display: block;
    border-radius: 10px;
    box-shadow:
      0 0 26px rgba(96, 82, 255, 0.22),
      0 0 70px rgba(0, 229, 255, 0.10),
      0 0 130px rgba(255, 46, 158, 0.07);
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(60, 50, 160, 0.22), rgba(0, 0, 0, 0) 60%),
      rgba(8, 8, 16, 0.72);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    z-index: 10;
    text-align: center;
    padding: 16px;
  }
  .overlay.hidden { display: none; }
  .panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    max-width: 92%;
    padding: 28px 36px 26px;
    border-radius: 18px;
    background: linear-gradient(165deg, rgba(24, 26, 50, 0.66), rgba(12, 12, 24, 0.82));
    border: 1px solid rgba(110, 120, 255, 0.32);
    box-shadow:
      0 0 32px rgba(80, 90, 255, 0.16),
      0 0 90px rgba(255, 46, 158, 0.07),
      inset 0 0 28px rgba(70, 90, 255, 0.07),
      inset 0 1px 0 rgba(180, 200, 255, 0.14);
    animation: panelGlow 3.4s ease-in-out infinite alternate;
  }
  @keyframes panelGlow {
    from { box-shadow: 0 0 26px rgba(80, 90, 255, 0.13), 0 0 80px rgba(255, 46, 158, 0.05), inset 0 0 24px rgba(70, 90, 255, 0.06), inset 0 1px 0 rgba(180, 200, 255, 0.14); }
    to   { box-shadow: 0 0 40px rgba(80, 160, 255, 0.22), 0 0 110px rgba(255, 46, 158, 0.10), inset 0 0 34px rgba(70, 90, 255, 0.10), inset 0 1px 0 rgba(180, 200, 255, 0.14); }
  }
  .neon-title {
    font-size: clamp(30px, 7vw, 46px);
    font-weight: 800;
    letter-spacing: 4px;
    color: #eafdff;
    text-shadow:
      0 0 4px rgba(234, 253, 255, .9),
      0 0 10px #4ef0ff, 0 0 24px #00c3ff, 0 0 52px #0080ff,
      0 0 90px rgba(255, 46, 158, 0.65);
    animation: flicker 3.2s infinite;
  }
  @keyframes flicker {
    0%, 18%, 22%, 60%, 100% { opacity: 1; }
    20% { opacity: .65; }
    61% { opacity: .85; }
  }
  .sub { color: #8888a0; font-size: 14px; line-height: 1.9; }
  .sub .k {
    display: inline-block;
    border: 1px solid #2a2a3d;
    background: #14141f;
    border-radius: 5px;
    padding: 1px 7px;
    color: #e8e8f0;
    font-size: 12px;
    margin: 0 2px;
  }
  .legend { display: flex; gap: 18px; font-size: 13px; color: #8888a0; }
  .legend .dot {
    display: inline-block; width: 10px; height: 10px; border-radius: 50%;
    margin-right: 6px; vertical-align: -1px;
  }
  .dot.pink { background: #ff2e7e; box-shadow: 0 0 8px #ff2e7e; }
  .dot.gold { background: #ffcc00; box-shadow: 0 0 8px #ffcc00; }
  .btn {
    margin-top: 6px;
    background: linear-gradient(180deg, #ffd84d, #ffb800);
    color: #1a1300;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 17px;
    font-weight: 700;
    padding: 12px 44px;
    cursor: pointer;
    box-shadow: 0 0 18px rgba(255, 204, 0, .35);
    transition: transform .12s, box-shadow .2s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 0 28px rgba(255, 204, 0, .55); }
  .btn:active { transform: translateY(0); }
  .score-big {
    font-size: 44px;
    font-weight: 800;
    color: #4ef0ff;
    text-shadow: 0 0 12px #00c3ff, 0 0 40px rgba(0, 195, 255, .5);
    font-variant-numeric: tabular-nums;
  }
  .best-line { color: #8888a0; font-size: 14px; }
  .best-line b { color: #ffcc00; font-weight: 700; }
  #newRecord {
    color: #ffcc00;
    font-weight: 700;
    font-size: 15px;
    text-shadow: 0 0 10px rgba(255, 204, 0, .6);
    animation: pop .5s ease-out;
  }
  @keyframes pop { 0% { transform: scale(.4); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .pause-text {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: 6px;
    color: #eafdff;
    text-shadow: 0 0 10px #4ef0ff, 0 0 30px #0080ff;
  }
  .hint { color: #8888a0; font-size: 12px; margin-top: 4px; }
</style>
</head>
<body>
<a class="back" href="../">← AI4399</a>
<div id="stage">
  <div id="hud">
    <div class="chip"><span class="lab">分数</span><span class="val cyan" id="score">0</span></div>
    <div class="chip"><span class="lab">长度</span><span class="val" id="len">4</span></div>
    <div class="chip"><span class="lab">速度</span><span class="val" id="spd">1</span></div>
    <div class="chip"><span class="lab">最高</span><span class="val gold" id="best">0</span></div>
    <button id="pauseBtn" type="button">暂停 (P)</button>
  </div>
  <div id="wrap">
    <canvas id="game"></canvas>

    <div class="overlay" id="startOv">
      <div class="panel">
        <div class="neon-title">霓虹贪吃蛇</div>
        <div class="legend">
          <span><i class="dot pink"></i>普通食物 +10</span>
          <span><i class="dot gold"></i>限时食物 +50</span>
        </div>
        <div class="sub">
          <span class="k">↑↓←→</span> 或 <span class="k">WASD</span> 转向 ·
          <span class="k">P</span> 暂停<br>手机上滑动屏幕转向 · 撞墙或咬到自己即失败
        </div>
        <button class="btn" id="startBtn" type="button">开始游戏</button>
        <div class="hint">按 回车 / 空格 也可开始</div>
      </div>
    </div>

    <div class="overlay hidden" id="overOv">
      <div class="panel">
        <div class="neon-title" style="font-size:clamp(24px,5vw,34px)">游 戏 结 束</div>
        <div class="score-big" id="finalScore">0</div>
        <div id="newRecord" class="hidden" style="display:none">★ 新纪录！</div>
        <div class="best-line">历史最高 <b id="finalBest">0</b></div>
        <button class="btn" id="retryBtn" type="button">再来一局</button>
        <div class="hint">按 回车 / 空格 重新开始</div>
      </div>
    </div>

    <div class="overlay hidden" id="pauseOv">
      <div class="panel">
        <div class="pause-text">已 暂 停</div>
        <button class="btn" id="resumeBtn" type="button">继续游戏</button>
        <div class="hint">按 P 也可继续</div>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';
(function () {
  var COLS = 24, ROWS = 24;
  var BEST_KEY = 'ai4399-snake-best';
  var BASE_MS = 165, MIN_MS = 78;          // tick 间隔：随长度从 165ms 提至 78ms 封顶
  var SPECIAL_LIFE = 7000;                  // 特殊食物存活 7s

  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  var gridCv = document.createElement('canvas');
  var gctx = gridCv.getContext('2d');
  var wrap = document.getElementById('wrap');

  function $(id) { return document.getElementById(id); }
  var scoreEl = $('score'), lenEl = $('len'), spdEl = $('spd'), bestEl = $('best');
  var startOv = $('startOv'), overOv = $('overOv'), pauseOv = $('pauseOv');
  var finalScoreEl = $('finalScore'), finalBestEl = $('finalBest'), newRecordEl = $('newRecord');
  var pauseBtn = $('pauseBtn');

  var dpr = 1, cssSize = 320, cell = cssSize / COLS;

  // ---------- 游戏状态 ----------
  var state = 'start';                      // start | play | pause | dying | over
  var snake = [], dir = { x: 1, y: 0 }, queue = [];
  var removedTail = null;                   // 本 tick 被移除的尾格（用于插值）
  var growth = 0, score = 0, best = 0;
  var interval = BASE_MS, acc = 0, lastTs = 0, time = 0;
  var food = null, special = null, nextSpecialIn = 9000;
  var particles = [], popups = [];
  var dieTime = 0, shake = 0;

  // ---------- 纯视觉状态（不影响玩法） ----------
  var rings = [];                           // 冲击波环
  var comboN = 0, lastEatT = -1e9;          // 连吃 combo（仅飘字展示）
  var dying = null;                         // 死亡逐节爆裂 { pts, idx }
  var trailCv = document.createElement('canvas');
  var trailCtx = trailCv.getContext('2d');  // 蛇行余辉轨迹层

  // 预渲染发光精灵（一次性构建，避免每帧渐变/shadowBlur）
  function makeGlow(stops) {
    var c = document.createElement('canvas');
    c.width = c.height = 96;
    var g2 = c.getContext('2d');
    var rg2 = g2.createRadialGradient(48, 48, 0, 48, 48, 48);
    for (var i = 0; i < stops.length; i++) rg2.addColorStop(stops[i][0], stops[i][1]);
    g2.fillStyle = rg2;
    g2.fillRect(0, 0, 96, 96);
    return c;
  }
  var sprPink = makeGlow([[0, 'rgba(255,255,255,0.95)'], [0.18, 'rgba(255,110,175,0.80)'], [0.5, 'rgba(255,46,126,0.28)'], [1, 'rgba(255,46,126,0)']]);
  var sprGold = makeGlow([[0, 'rgba(255,255,235,0.95)'], [0.18, 'rgba(255,214,90,0.80)'], [0.5, 'rgba(255,184,0,0.28)'], [1, 'rgba(255,184,0,0)']]);
  var sprCyan = makeGlow([[0, 'rgba(235,255,255,0.95)'], [0.18, 'rgba(120,240,255,0.70)'], [0.5, 'rgba(0,195,255,0.22)'], [1, 'rgba(0,195,255,0)']]);
  var sprRing = (function () {                // 特殊食物的"流光"彗尾环
    var c = document.createElement('canvas');
    c.width = c.height = 128;
    var g2 = c.getContext('2d');
    g2.lineCap = 'round';
    var segs = 60;
    for (var i = 0; i < segs; i++) {
      var a0 = i / segs * Math.PI * 2;
      var a1 = (i + 1.6) / segs * Math.PI * 2;
      var k = i / segs;
      g2.strokeStyle = 'rgba(255,' + Math.round(200 + 55 * k) + ',' + Math.round(60 + 180 * k) + ',' + (0.04 + 0.9 * k * k).toFixed(3) + ')';
      g2.lineWidth = 3 + 3.5 * k;
      g2.beginPath();
      g2.arc(64, 64, 47, a0, a1);
      g2.stroke();
    }
    return c;
  })();

  try { best = parseInt(localStorage.getItem(BEST_KEY), 10) || 0; } catch (e) { best = 0; }
  bestEl.textContent = best;

  // ---------- 工具 ----------
  function cx(x) { return (x + 0.5) * cell; }
  function freeCell() {
    var occ = {};
    var i;
    for (i = 0; i < snake.length; i++) occ[snake[i].x + ',' + snake[i].y] = 1;
    if (food) occ[food.x + ',' + food.y] = 1;
    if (special) occ[special.x + ',' + special.y] = 1;
    var cells = [];
    for (var y = 0; y < ROWS; y++) for (var x = 0; x < COLS; x++) {
      if (!occ[x + ',' + y]) cells.push({ x: x, y: y });
    }
    return cells.length ? cells[(Math.random() * cells.length) | 0] : null;
  }
  function segHue(f) { return 185 + f * 100; }  // 头部青色 → 尾部紫粉

  function updateSpeed() {
    var len = snake.length + growth;
    interval = Math.max(MIN_MS, BASE_MS - (len - 4) * 2.6);
    var tier = 1 + Math.round((BASE_MS - interval) / (BASE_MS - MIN_MS) * 9);
    spdEl.textContent = tier;
  }
  function updateHud() {
    scoreEl.textContent = score;
    lenEl.textContent = snake.length + growth;
    bestEl.textContent = best;
  }

  // ---------- 音效（WebAudio 合成）----------
  var actx = null;
  function audio() {
    if (!actx) {
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { actx = null; }
    }
    if (actx && actx.state === 'suspended') actx.resume();
    return actx;
  }
  function tone(f0, f1, dur, type, vol, delay) {
    var a = audio(); if (!a) return;
    var t0 = a.currentTime + (delay || 0);
    var o = a.createOscillator(), g = a.createGain();
    o.type = type;
    o.frequency.setValueAtTime(Math.max(1, f0), t0);
    o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(a.destination);
    o.start(t0); o.stop(t0 + dur + 0.03);
  }
  function sEat() { tone(520, 940, 0.09, 'square', 0.10); }
  function sSpecial() { tone(660, 1320, 0.12, 'square', 0.10); tone(990, 1980, 0.18, 'sine', 0.09, 0.06); }
  function sDeath() { tone(220, 42, 0.7, 'sawtooth', 0.20); tone(110, 28, 0.95, 'triangle', 0.16, 0.05); }
  function sPause() { tone(420, 300, 0.06, 'sine', 0.07); }
  function sStart() { tone(330, 660, 0.12, 'sine', 0.09); tone(660, 990, 0.1, 'sine', 0.07, 0.1); }

  // ---------- 粒子 / 飘字 / 冲击波（纯视觉） ----------
  var P_MAX = 380;                          // 粒子总量上限，保 60fps
  function spray(px, py, cols, count, speed, size) {
    if (particles.length > P_MAX) return;
    if (particles.length + count > P_MAX) count = P_MAX - particles.length;
    for (var i = 0; i < count; i++) {
      var ang = Math.random() * Math.PI * 2;
      var sp = (0.3 + Math.random() * 0.7) * speed;
      particles.push({
        x: px, y: py,
        vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp,
        life: 420 + Math.random() * 520, max: 950,
        r: (0.6 + Math.random() * 0.9) * size,
        color: cols[(Math.random() * cols.length) | 0]
      });
    }
  }
  function burst(gx, gy, color, count, speed, size) {
    spray(cx(gx), cx(gy), [color], count, speed, size);
  }
  function burstAt(px, py, color, count, speed, size) {
    spray(px, py, [color], count, speed, size);
  }
  function ring(px, py, color, rad, life, w) {
    rings.push({ x: px, y: py, r: rad, life: life, max: life, color: color, w: w || 2.5 });
  }
  function popup(gx, gy, text, color, scale) {
    popups.push({ x: cx(gx), y: cx(gy), text: text, color: color, life: 850, max: 850, scale: scale || 1 });
  }
  var FOOD_COLS = ['#ff2e7e', '#ff7eb3', '#ff5bd0', '#ffffff'];
  var SPEC_COLS = ['#ffcc00', '#ffe066', '#ff9d2e', '#ffffff'];
  function eatFx(gx, gy, kind) {              // 吃食反馈：取食物本色的爆裂 + 冲击波 + combo 飘字
    var cols = kind ? SPEC_COLS : FOOD_COLS;
    spray(cx(gx), cx(gy), cols, kind ? 44 : 28, kind ? 4.6 : 3.4, cell * (kind ? 0.17 : 0.14));
    ring(cx(gx), cx(gy), cols[0], cell * (kind ? 3.4 : 2.2), kind ? 520 : 380, kind ? 3 : 2);
    popup(gx, gy, kind ? '+50' : '+10', kind ? '#ffd84d' : '#ff7eb3', 1);
    comboN = (time - lastEatT < 2600) ? comboN + 1 : 1;
    lastEatT = time;
    if (comboN >= 2) {
      popup(gx, Math.max(0.6, gy - 1.1), 'COMBO ×' + comboN, '#9ef8ff', Math.min(1.7, 1.2 + comboN * 0.06));
    }
  }
  function updateFx(dt) {
    var i;
    for (i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.life -= dt;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      p.x += p.vx * dt * 0.06; p.y += p.vy * dt * 0.06;
      p.vx *= 0.985; p.vy *= 0.985; p.vy += dt * 0.0022; // 轻微下坠
    }
    for (i = popups.length - 1; i >= 0; i--) {
      var q = popups[i];
      q.life -= dt;
      if (q.life <= 0) { popups.splice(i, 1); continue; }
      q.y -= dt * 0.028;
    }
    for (i = rings.length - 1; i >= 0; i--) {
      rings[i].life -= dt;
      if (rings[i].life <= 0) rings.splice(i, 1);
    }
    if (shake > 0) shake = Math.max(0, shake - dt * 0.02);
  }

  // ---------- 输入 ----------
  var DIRS = {
    ArrowUp: { x: 0, y: -1 }, KeyW: { x: 0, y: -1 },
    ArrowDown: { x: 0, y: 1 }, KeyS: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 }, KeyA: { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 }, KeyD: { x: 1, y: 0 }
  };
  function pushDir(d) {
    if (state !== 'play') return;
    var last = queue.length ? queue[queue.length - 1] : dir;
    if (d.x === -last.x && d.y === -last.y) return;  // 禁止 180° 回头
    if (d.x === last.x && d.y === last.y) return;    // 重复方向不入队
    if (queue.length < 3) queue.push(d);
  }
  document.addEventListener('keydown', function (e) {
    var code = e.code;
    if (DIRS[code]) { e.preventDefault(); pushDir(DIRS[code]); return; }
    if (code === 'KeyP') { e.preventDefault(); togglePause(); return; }
    if (code === 'Enter' || code === 'Space') {
      e.preventDefault();
      if (state === 'start' || state === 'over') start();
      else if (state === 'pause') togglePause();
    }
  });

  // 触屏滑动转向（支持一次按住连续多段滑动）
  var touchPt = null;
  document.addEventListener('touchstart', function (e) {
    if (e.target.closest && e.target.closest('button, a')) return;
    var t = e.touches[0];
    touchPt = { x: t.clientX, y: t.clientY };
  }, { passive: true });
  document.addEventListener('touchmove', function (e) {
    e.preventDefault();
    if (!touchPt) return;
    var t = e.touches[0];
    var dx = t.clientX - touchPt.x, dy = t.clientY - touchPt.y;
    if (Math.abs(dx) < 24 && Math.abs(dy) < 24) return;
    if (Math.abs(dx) > Math.abs(dy)) pushDir({ x: dx > 0 ? 1 : -1, y: 0 });
    else pushDir({ x: 0, y: dy > 0 ? 1 : -1 });
    touchPt = { x: t.clientX, y: t.clientY };
  }, { passive: false });
  document.addEventListener('touchend', function () { touchPt = null; }, { passive: true });

  // ---------- 流程 ----------
  function reset() {
    snake = [];
    var cy = ROWS >> 1;
    for (var i = 0; i < 4; i++) snake.push({ x: 10 - i, y: cy });
    dir = { x: 1, y: 0 }; queue = [];
    removedTail = null; growth = 0; score = 0;
    acc = 0; food = freeCell(); special = null;
    nextSpecialIn = 8000 + Math.random() * 4000;
    particles = []; popups = []; shake = 0;
    rings = []; dying = null; comboN = 0; lastEatT = -1e9;
    trailCtx.setTransform(1, 0, 0, 1, 0, 0);
    trailCtx.clearRect(0, 0, trailCv.width, trailCv.height);
    updateSpeed(); updateHud();
  }
  function start() {
    reset();
    state = 'play';
    startOv.classList.add('hidden');
    overOv.classList.add('hidden');
    pauseOv.classList.add('hidden');
    pauseBtn.textContent = '暂停 (P)';
    var ae = document.activeElement;
    if (ae && ae.blur) ae.blur();
    sStart();
  }
  function togglePause() {
    if (state === 'play') {
      state = 'pause';
      pauseOv.classList.remove('hidden');
      pauseBtn.textContent = '继续 (P)';
      sPause();
    } else if (state === 'pause') {
      state = 'play';
      pauseOv.classList.add('hidden');
      pauseBtn.textContent = '暂停 (P)';
      var ae = document.activeElement;
      if (ae && ae.blur) ae.blur();
      sPause();
    }
  }
  function die() {
    state = 'dying';
    dieTime = 0;
    shake = 14;
    sDeath();
    // 死亡演出：记录蛇身路径，节段在 dying 期间逐个爆开（见主循环）
    dying = { pts: snakePoints(Math.min(1, acc / interval)), idx: 0 };
    // 撞击点冲击波：撞墙时贴墙荡开波纹，咬到自己时在头部荡开
    var head = snake[0];
    var ix = head.x + dir.x, iy = head.y + dir.y;
    var hitWall = ix < 0 || ix >= COLS || iy < 0 || iy >= ROWS;
    var wx = Math.max(2, Math.min(cssSize - 2, cx(ix)));
    var wy = Math.max(2, Math.min(cssSize - 2, cx(iy)));
    if (hitWall) {
      ring(wx, wy, '#ff4d6d', cell * 5.5, 720, 4);
      ring(wx, wy, '#ffffff', cell * 2.6, 430, 2);
    }
    ring(cx(head.x), cx(head.y), '#9ef8ff', cell * 4.2, 620, 3);
  }
  function gameOver() {
    state = 'over';
    var isRecord = score > best;
    if (isRecord) {
      best = score;
      try { localStorage.setItem(BEST_KEY, String(best)); } catch (e) { /* 忽略 */ }
    }
    updateHud();
    finalScoreEl.textContent = score;
    finalBestEl.textContent = best;
    newRecordEl.style.display = isRecord ? 'block' : 'none';
    overOv.classList.remove('hidden');
  }

  $('startBtn').addEventListener('click', start);
  $('retryBtn').addEventListener('click', start);
  $('resumeBtn').addEventListener('click', togglePause);
  pauseBtn.addEventListener('click', function () { togglePause(); pauseBtn.blur(); });
  document.addEventListener('visibilitychange', function () {
    if (document.hidden && state === 'play') togglePause();
  });

  // ---------- 核心 tick（按格移动）----------
  function tick() {
    // 从缓冲队列取一个有效方向
    while (queue.length) {
      var d = queue.shift();
      if (d.x === -dir.x && d.y === -dir.y) continue;
      if (d.x === dir.x && d.y === dir.y) continue;
      dir = d;
      break;
    }
    var head = snake[0];
    var nh = { x: head.x + dir.x, y: head.y + dir.y };
    // 撞墙
    if (nh.x < 0 || nh.x >= COLS || nh.y < 0 || nh.y >= ROWS) { die(); return; }
    // 撞自己（尾巴即将移走时不算）
    var solid = snake.length - (growth === 0 ? 1 : 0);
    for (var i = 0; i < solid; i++) {
      if (snake[i].x === nh.x && snake[i].y === nh.y) { die(); return; }
    }
    snake.unshift(nh);
    // 吃食物
    if (food && nh.x === food.x && nh.y === food.y) {
      growth += 1; score += 10;
      eatFx(food.x, food.y, 0);
      sEat(); shake = Math.max(shake, 3);
      food = freeCell();
      updateSpeed();
    } else if (special && nh.x === special.x && nh.y === special.y) {
      growth += 3; score += 50;
      eatFx(special.x, special.y, 1);
      sSpecial(); shake = Math.max(shake, 5);
      special = null;
      nextSpecialIn = 9000 + Math.random() * 6000;
      updateSpeed();
    }
    if (growth > 0) { growth--; removedTail = null; }
    else removedTail = snake.pop();
    updateHud();
  }

  // ---------- 渲染 ----------
  // 蛇的插值路径点：头尖 → 各格中心 → 尾尖
  function snakePoints(t) {
    var pts = [];
    if (snake.length < 2) return pts;
    pts.push({
      x: cx(snake[1].x) + (cx(snake[0].x) - cx(snake[1].x)) * t,
      y: cx(snake[1].y) + (cx(snake[0].y) - cx(snake[1].y)) * t
    });
    for (var i = 1; i < snake.length; i++) pts.push({ x: cx(snake[i].x), y: cx(snake[i].y) });
    if (removedTail) {
      var lastIdx = snake.length - 1;
      pts.push({
        x: cx(removedTail.x) + (cx(snake[lastIdx].x) - cx(removedTail.x)) * t,
        y: cx(removedTail.y) + (cx(snake[lastIdx].y) - cx(removedTail.y)) * t
      });
    }
    return pts;
  }

  // 中点二次贝塞尔：整条蛇平滑成连续带状，转弯圆滑
  function smoothPath(pts) {
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    var m = pts.length;
    if (m === 2) { ctx.lineTo(pts[1].x, pts[1].y); return; }
    ctx.lineTo((pts[0].x + pts[1].x) / 2, (pts[0].y + pts[1].y) / 2);
    for (var i = 1; i < m - 1; i++) {
      ctx.quadraticCurveTo(pts[i].x, pts[i].y, (pts[i].x + pts[i + 1].x) / 2, (pts[i].y + pts[i + 1].y) / 2);
    }
    ctx.lineTo(pts[m - 1].x, pts[m - 1].y);
  }
  // 第 i 个平滑小段（用于逐段着色，颜色沿全长渐变）
  function piecePath(pts, i, n) {
    ctx.beginPath();
    if (i === 0) {
      ctx.moveTo(pts[0].x, pts[0].y);
      ctx.lineTo((pts[0].x + pts[1].x) / 2, (pts[0].y + pts[1].y) / 2);
    } else if (i === n) {
      ctx.moveTo((pts[n - 1].x + pts[n].x) / 2, (pts[n - 1].y + pts[n].y) / 2);
      ctx.lineTo(pts[n].x, pts[n].y);
    } else {
      ctx.moveTo((pts[i - 1].x + pts[i].x) / 2, (pts[i - 1].y + pts[i].y) / 2);
      ctx.quadraticCurveTo(pts[i].x, pts[i].y, (pts[i].x + pts[i + 1].x) / 2, (pts[i].y + pts[i + 1].y) / 2);
    }
  }
  // 蛇身三层：外晕（整条路径一次 shadowBlur）→ 流动渐变色身体 → 高亮内芯
  function drawBody(pts, off, total, alpha) {
    var n = pts.length - 1;
    if (n < 1) return;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    // 外晕：单次描边 + 单次 shadowBlur，开销恒定
    ctx.globalAlpha = 0.40 * alpha;
    ctx.strokeStyle = '#5f7bff';
    ctx.shadowColor = '#5f7bff';
    ctx.shadowBlur = cell * 1.3;
    ctx.lineWidth = cell * 0.92;
    smoothPath(pts);
    ctx.stroke();
    ctx.shadowBlur = 0;
    var i, f, hue, wave;
    var tw = total > 0 ? total : 1;
    // 身体：色相沿全长 青→紫粉，明度波沿身体流动
    ctx.globalAlpha = alpha;
    for (i = 0; i <= n; i++) {
      f = (off + i) / tw;
      hue = segHue(f);
      wave = Math.sin(f * 9 - time * 0.0055);
      ctx.strokeStyle = 'hsl(' + hue + ',100%,' + (56 + 12 * wave) + '%)';
      ctx.lineWidth = cell * (0.66 - f * 0.22);
      piecePath(pts, i, n);
      ctx.stroke();
    }
    // 内芯：亮色细线，粗细随流光微脉动
    for (i = 0; i <= n; i++) {
      f = (off + i) / tw;
      hue = segHue(f);
      wave = Math.sin(f * 9 - time * 0.0055);
      ctx.strokeStyle = 'hsla(' + hue + ',100%,88%,0.92)';
      ctx.lineWidth = cell * (0.3 - f * 0.12) * (0.82 + 0.25 * wave);
      piecePath(pts, i, n);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
  function drawHead(pts) {
    var hx = pts[0].x, hy = pts[0].y;
    var dx = hx - pts[1].x, dy = hy - pts[1].y;
    var dl = Math.hypot(dx, dy) || 1;
    dx /= dl; dy /= dl;
    // 头部光晕（预渲染精灵）
    var s = cell * 2.8;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.55;
    ctx.drawImage(sprCyan, hx - s / 2, hy - s / 2, s, s);
    ctx.restore();
    // 接近食物时张口
    var mo = 0, tx, ty, d2;
    if (food) {
      tx = cx(food.x) - hx; ty = cx(food.y) - hy;
      d2 = Math.hypot(tx, ty);
      if (tx * dx + ty * dy > 0) mo = Math.max(mo, 1 - d2 / (cell * 2.6));
    }
    if (special) {
      tx = cx(special.x) - hx; ty = cx(special.y) - hy;
      d2 = Math.hypot(tx, ty);
      if (tx * dx + ty * dy > 0) mo = Math.max(mo, 1 - d2 / (cell * 2.6));
    }
    mo = Math.max(0, Math.min(1, mo));
    ctx.save();
    ctx.translate(hx, hy);
    ctx.rotate(Math.atan2(dy, dx));
    // 头壳：顺向略拉长的亮色椭圆
    ctx.fillStyle = '#dffaff';
    ctx.beginPath();
    ctx.ellipse(cell * 0.03, 0, cell * 0.46, cell * 0.37, 0, 0, Math.PI * 2);
    ctx.fill();
    // 张口：朝前的暗色楔形
    if (mo > 0.05) {
      var ma = 0.18 + mo * 0.5;
      ctx.fillStyle = '#0a0a12';
      ctx.beginPath();
      ctx.moveTo(-cell * 0.05, 0);
      ctx.arc(-cell * 0.05, 0, cell * 0.56, -ma, ma);
      ctx.closePath();
      ctx.fill();
    }
    // 眼睛（随头部朝向旋转，瞳孔前视）
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(cell * 0.1, -cell * 0.21, cell * 0.115, 0, Math.PI * 2);
    ctx.arc(cell * 0.1, cell * 0.21, cell * 0.115, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#071018';
    ctx.beginPath();
    ctx.arc(cell * 0.15, -cell * 0.21, cell * 0.06, 0, Math.PI * 2);
    ctx.arc(cell * 0.15, cell * 0.21, cell * 0.06, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.beginPath();
    ctx.arc(cell * 0.13, -cell * 0.24, cell * 0.024, 0, Math.PI * 2);
    ctx.arc(cell * 0.13, cell * 0.18, cell * 0.024, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  function drawSnake(t) {
    var pts = snakePoints(t);
    if (pts.length < 2) return;
    drawBody(pts, 0, pts.length - 1, 1);
    drawHead(pts);
  }

  function drawFood() {
    if (!food) return;
    var fx = cx(food.x), fy = cx(food.y);
    var pulse = 0.5 + 0.5 * Math.sin(time * 0.005);
    // 呼吸光晕 + 环绕微粒（预渲染精灵，零渐变开销）
    var s = cell * (2.3 + pulse * 0.8);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.drawImage(sprPink, fx - s / 2, fy - s / 2, s, s);
    var k, a2, orx, ory, ds;
    for (k = 0; k < 3; k++) {
      a2 = time * 0.0026 + k * (Math.PI * 2 / 3);
      orx = fx + Math.cos(a2) * cell * 0.58;
      ory = fy + Math.sin(a2) * cell * 0.58;
      ds = cell * (0.42 + 0.1 * Math.sin(time * 0.008 + k * 2.1));
      ctx.globalAlpha = 0.85;
      ctx.drawImage(sprPink, orx - ds / 2, ory - ds / 2, ds, ds);
    }
    ctx.restore();
    // 能量球本体
    ctx.fillStyle = '#ff2e7e';
    ctx.beginPath();
    ctx.arc(fx, fy, cell * (0.24 + pulse * 0.06), 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,' + (0.7 + pulse * 0.3).toFixed(2) + ')';
    ctx.beginPath();
    ctx.arc(fx - cell * 0.04, fy - cell * 0.04, cell * 0.1, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawSpecial() {
    if (!special) return;
    var sx = cx(special.x), sy = cx(special.y);
    var frac = special.life / SPECIAL_LIFE;
    var blink = special.life < 2000 ? (Math.sin(time * 0.022) > 0 ? 1 : 0.3) : 1;
    var pulse = 0.5 + 0.5 * Math.sin(time * 0.007);
    // 金色光晕 + 双向旋转流光环
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = blink * 0.9;
    var hs = cell * (2.9 + pulse * 0.6);
    ctx.drawImage(sprGold, sx - hs / 2, sy - hs / 2, hs, hs);
    ctx.translate(sx, sy);
    ctx.rotate(time * 0.0024);
    var rs = cell * 1.9;
    ctx.drawImage(sprRing, -rs / 2, -rs / 2, rs, rs);
    ctx.rotate(-time * 0.0058);
    ctx.globalAlpha = blink * 0.6;
    var rs2 = cell * 2.6;
    ctx.drawImage(sprRing, -rs2 / 2, -rs2 / 2, rs2, rs2);
    ctx.restore();
    ctx.save();
    ctx.globalAlpha = blink;
    // 倒计时弧
    ctx.strokeStyle = '#ffe066';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(sx, sy, cell * 0.66, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * frac);
    ctx.stroke();
    // 旋转菱形核心
    ctx.translate(sx, sy);
    ctx.rotate(time * 0.0022);
    var r = cell * (0.3 + pulse * 0.04);
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.moveTo(0, -r); ctx.lineTo(r, 0); ctx.lineTo(0, r); ctx.lineTo(-r, 0);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff7d0';
    ctx.beginPath();
    ctx.arc(0, 0, cell * 0.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawFx() {
    var i;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    // 冲击波环
    for (i = 0; i < rings.length; i++) {
      var w = rings[i];
      var pr = 1 - w.life / w.max;
      var ease = 1 - (1 - pr) * (1 - pr) * (1 - pr);
      ctx.globalAlpha = (w.life / w.max) * 0.9;
      ctx.strokeStyle = w.color;
      ctx.lineWidth = Math.max(0.5, w.w * (1 - pr * 0.6));
      ctx.beginPath();
      ctx.arc(w.x, w.y, Math.max(0.5, w.r * (0.12 + 0.88 * ease)), 0, Math.PI * 2);
      ctx.stroke();
    }
    // 粒子：双圈软光（外圈晕 + 内圈亮），不用 shadowBlur
    for (i = 0; i < particles.length; i++) {
      var p = particles[i];
      var a = Math.max(0, p.life / p.max);
      var rr = Math.max(0.4, p.r * a + 0.4);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = a * 0.22;
      ctx.beginPath();
      ctx.arc(p.x, p.y, rr * 2.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.arc(p.x, p.y, rr, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
    // 飘字
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (i = 0; i < popups.length; i++) {
      var q = popups[i];
      ctx.font = '800 ' + Math.round(cell * 0.62 * q.scale) + 'px "PingFang SC","Microsoft YaHei",system-ui,sans-serif';
      ctx.globalAlpha = Math.min(1, q.life / q.max * 1.6);
      ctx.fillStyle = q.color;
      ctx.shadowColor = q.color;
      ctx.shadowBlur = 9;
      ctx.fillText(q.text, q.x, q.y);
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  function draw() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (shake > 0.2) {
      ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    }
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(-20, -20, cssSize + 40, cssSize + 40);
    ctx.drawImage(gridCv, 0, 0, cssSize, cssSize);
    // 蛇行余辉轨迹层
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.75;
    ctx.drawImage(trailCv, 0, 0, cssSize, cssSize);
    ctx.restore();
    drawFood();
    drawSpecial();
    if (state !== 'dying' && state !== 'over') {
      var t = (state === 'start') ? 1 : Math.min(1, acc / interval);
      drawSnake(t);
    }
    // 死亡演出：残余蛇身渐隐 + 一瞬色差描边
    if (state === 'dying' && dying) {
      var totalN = dying.pts.length - 1;
      if (dying.idx < totalN) {
        var rem = dying.pts.slice(dying.idx);
        drawBody(rem, dying.idx, totalN, Math.max(0.25, 1 - dieTime / 900));
        if (dieTime < 160 && rem.length > 1) {
          ctx.save();
          ctx.globalCompositeOperation = 'lighter';
          ctx.globalAlpha = 0.45 * (1 - dieTime / 160);
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          ctx.lineWidth = cell * 0.3;
          ctx.translate(3.5, 0);
          ctx.strokeStyle = '#ff2040';
          smoothPath(rem);
          ctx.stroke();
          ctx.translate(-7, 0);
          ctx.strokeStyle = '#00e5ff';
          smoothPath(rem);
          ctx.stroke();
          ctx.restore();
        }
      }
    }
    drawFx();
  }

  // ---------- 网格底图（resize 时重绘）----------
  function drawGrid() {
    gridCv.width = Math.max(1, Math.round(cssSize * dpr));
    gridCv.height = gridCv.width;
    var g = gctx;
    g.setTransform(dpr, 0, 0, dpr, 0, 0);
    // 深色纵向渐变底
    var bg = g.createLinearGradient(0, 0, 0, cssSize);
    bg.addColorStop(0, '#0d0d1d');
    bg.addColorStop(0.55, '#0a0a14');
    bg.addColorStop(1, '#0d0a18');
    g.fillStyle = bg;
    g.fillRect(0, 0, cssSize, cssSize);
    // 中心紫晕 + 对角冷暖染色
    var rg = g.createRadialGradient(cssSize / 2, cssSize / 2, cssSize * 0.05, cssSize / 2, cssSize / 2, cssSize * 0.78);
    rg.addColorStop(0, 'rgba(95,70,190,0.13)');
    rg.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = rg;
    g.fillRect(0, 0, cssSize, cssSize);
    var c1 = g.createRadialGradient(0, 0, 0, 0, 0, cssSize * 0.6);
    c1.addColorStop(0, 'rgba(0,195,255,0.05)');
    c1.addColorStop(1, 'rgba(0,195,255,0)');
    g.fillStyle = c1;
    g.fillRect(0, 0, cssSize, cssSize);
    var c2 = g.createRadialGradient(cssSize, cssSize, 0, cssSize, cssSize, cssSize * 0.6);
    c2.addColorStop(0, 'rgba(255,46,158,0.05)');
    c2.addColorStop(1, 'rgba(255,46,158,0)');
    g.fillStyle = c2;
    g.fillRect(0, 0, cssSize, cssSize);
    // 暗网格线
    g.strokeStyle = 'rgba(130,140,230,0.07)';
    g.lineWidth = 1;
    g.beginPath();
    for (var i = 1; i < COLS; i++) {
      var p = Math.round(i * cell) + 0.5;
      g.moveTo(p, 0); g.lineTo(p, cssSize);
      g.moveTo(0, p); g.lineTo(cssSize, p);
    }
    g.stroke();
    // 交点微光（每 4 格一颗更亮）
    for (var gy2 = 1; gy2 < ROWS; gy2++) {
      for (var gx2 = 1; gx2 < COLS; gx2++) {
        var px2 = Math.round(gx2 * cell) + 0.5, py2 = Math.round(gy2 * cell) + 0.5;
        if (gx2 % 4 === 0 && gy2 % 4 === 0) {
          g.fillStyle = 'rgba(120,225,255,0.30)';
          g.fillRect(px2 - 1.25, py2 - 1.25, 2.5, 2.5);
        } else {
          g.fillStyle = 'rgba(150,165,255,0.15)';
          g.fillRect(px2 - 0.75, py2 - 0.75, 1.5, 1.5);
        }
      }
    }
    // 发光边界墙：外柔晕 + 渐变主描边 + 内侧细线 + 四角亮标
    var lg = g.createLinearGradient(0, 0, cssSize, cssSize);
    lg.addColorStop(0, '#00e5ff');
    lg.addColorStop(0.5, '#7a5cff');
    lg.addColorStop(1, '#ff2e9e');
    g.globalAlpha = 0.20;
    g.strokeStyle = lg;
    g.lineWidth = 7;
    g.strokeRect(3.5, 3.5, cssSize - 7, cssSize - 7);
    g.globalAlpha = 0.85;
    g.lineWidth = 2.5;
    g.shadowColor = '#7a5cff';
    g.shadowBlur = 14;
    g.strokeRect(1.5, 1.5, cssSize - 3, cssSize - 3);
    g.shadowBlur = 0;
    g.globalAlpha = 0.22;
    g.lineWidth = 1;
    g.strokeRect(6.5, 6.5, cssSize - 13, cssSize - 13);
    g.globalAlpha = 1;
    var cl = Math.max(10, cell * 0.8);
    g.strokeStyle = 'rgba(220,250,255,0.85)';
    g.lineWidth = 2.5;
    g.lineCap = 'round';
    g.beginPath();
    g.moveTo(2, 2 + cl); g.lineTo(2, 2); g.lineTo(2 + cl, 2);
    g.moveTo(cssSize - 2 - cl, 2); g.lineTo(cssSize - 2, 2); g.lineTo(cssSize - 2, 2 + cl);
    g.moveTo(cssSize - 2, cssSize - 2 - cl); g.lineTo(cssSize - 2, cssSize - 2); g.lineTo(cssSize - 2 - cl, cssSize - 2);
    g.moveTo(2 + cl, cssSize - 2); g.lineTo(2, cssSize - 2); g.lineTo(2, cssSize - 2 - cl);
    g.stroke();
  }

  function fit() {
    var rect = wrap.getBoundingClientRect();
    var s = Math.floor(Math.min(rect.width, rect.height));
    cssSize = Math.max(220, s);
    dpr = Math.min(2, window.devicePixelRatio || 1);
    canvas.width = Math.round(cssSize * dpr);
    canvas.height = Math.round(cssSize * dpr);
    canvas.style.width = cssSize + 'px';
    canvas.style.height = cssSize + 'px';
    cell = cssSize / COLS;
    trailCv.width = canvas.width;
    trailCv.height = canvas.height;
    drawGrid();
  }
  window.addEventListener('resize', fit);
  window.addEventListener('orientationchange', function () { setTimeout(fit, 80); });

  // ---------- 主循环 ----------
  function frame(ts) {
    requestAnimationFrame(frame);
    if (!lastTs) lastTs = ts;
    var dt = Math.min(50, ts - lastTs);
    lastTs = ts;
    time += dt;
    if (state === 'play') {
      acc += dt;
      var guard = 0;
      while (acc >= interval && state === 'play' && guard++ < 8) {
        tick();
        acc -= interval;
      }
      // 特殊食物：倒计时与生成
      if (special) {
        special.life -= dt;
        if (special.life <= 0) {
          burst(special.x, special.y, '#ffcc00', 8, 1.6, cell * 0.08);
          special = null;
          nextSpecialIn = 9000 + Math.random() * 6000;
        }
      } else {
        nextSpecialIn -= dt;
        if (nextSpecialIn <= 0) {
          var c = freeCell();
          if (c) {
            special = { x: c.x, y: c.y, life: SPECIAL_LIFE };
            ring(cx(c.x), cx(c.y), '#ffe066', cell * 2.4, 520, 2.5);  // 出现闪光
          } else nextSpecialIn = 3000;
        }
      }
    } else if (state === 'dying') {
      dieTime += dt;
      // 节段沿身体逐个爆开（头→尾，620ms 内扫完）
      if (dying) {
        var dn = dying.pts.length;
        var target = Math.min(dn, Math.floor(dieTime / (620 / dn)));
        while (dying.idx < target) {
          var dp = dying.pts[dying.idx];
          var df = dn > 1 ? dying.idx / (dn - 1) : 0;
          spray(dp.x, dp.y, ['hsl(' + segHue(df) + ',100%,65%)', '#ffffff'], 6, 3.8, cell * 0.16);
          if (dying.idx % 5 === 0) {
            ring(dp.x, dp.y, 'hsl(' + segHue(df) + ',100%,70%)', cell * 1.8, 380, 2);
          }
          dying.idx++;
        }
      }
      if (dieTime > 1000) gameOver();
    }
    // 余辉轨迹层：持续衰减，仅游戏中在蛇头处盖印
    trailCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    trailCtx.globalCompositeOperation = 'destination-out';
    trailCtx.fillStyle = 'rgba(0,0,0,' + Math.min(0.22, dt * 0.0042).toFixed(4) + ')';
    trailCtx.fillRect(0, 0, cssSize, cssSize);
    if (state === 'play' && snake.length > 1) {
      var tt = Math.min(1, acc / interval);
      var thx = cx(snake[1].x) + (cx(snake[0].x) - cx(snake[1].x)) * tt;
      var thy = cx(snake[1].y) + (cx(snake[0].y) - cx(snake[1].y)) * tt;
      trailCtx.globalCompositeOperation = 'lighter';
      trailCtx.globalAlpha = 0.16;
      var ts2 = cell * 1.7;
      trailCtx.drawImage(sprCyan, thx - ts2 / 2, thy - ts2 / 2, ts2, ts2);
      trailCtx.globalAlpha = 1;
    }
    updateFx(dt);
    draw();
  }

  fit();
  reset();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
