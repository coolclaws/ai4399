<script>
(()=>{
'use strict';
/* ================= 工具 ================= */
const TAU=Math.PI*2, PI=Math.PI;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const rand=(a,b)=>a+Math.random()*(b-a);
const wrapA=a=>((a+PI)%TAU+TAU)%TAU-PI;
const $=id=>document.getElementById(id);

const cv=$('cv'), ctx=cv.getContext('2d');
let W=innerWidth,H=innerHeight,DPR=1;
function resize(){
  DPR=Math.min(devicePixelRatio||1,2);
  W=innerWidth;H=innerHeight;
  cv.width=Math.round(W*DPR);cv.height=Math.round(H*DPR);
  cv.style.width=W+'px';cv.style.height=H+'px';
}
addEventListener('resize',resize);resize();

/* ================= 常量 ================= */
const PXM=40;            // 1 米 = 40px
const DT=1/240;          // 物理子步长
const G=2300;            // 重力 px/s^2
const R=16;              // 车轮半径
const HEADR=10;          // 头部碰撞半径
const MAXV=1250;         // 驱动最高速 px/s
const DRIVE=3000;        // 油门加速度（股市赛道大马力：长红坡可爬）
const REVA=900, REVMAX=380; // 倒车
const ALPHA=22, OMAX=9.5;   // 空中角加速度 / 角速度上限 rad
const WHEELIE=4.2;       // 地面油门抬头力矩
const REST=0.04;         // 车轮弹性
const STEP=6;            // 地形采样间距
const CUP='#ff5347',CDN='#2fbf83';        // 中国惯例：红涨绿跌
const DAYW=70;                            // 每个交易日的世界宽度 px
const KLOG=800;                           // 对数价格 → 高度缩放（±2%≈缓坡，±5%≈陡坡跳台）
const RUNWAY=1100;                        // 起跑平地长度

/* ================= 音频 ================= */
let AC=null,master=null,engO1=null,engO2=null,engF=null,engG=null,rpmS=0,thudT=0;
function initAudio(){
  if(AC)return;
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    master=AC.createGain();master.gain.value=.8;master.connect(AC.destination);
    engO1=AC.createOscillator();engO1.type='sawtooth';
    engO2=AC.createOscillator();engO2.type='square';
    engF=AC.createBiquadFilter();engF.type='lowpass';engF.Q.value=2;
    engG=AC.createGain();engG.gain.value=0;
    engO1.connect(engF);engO2.connect(engF);engF.connect(engG);engG.connect(master);
    engO1.start();engO2.start();
  }catch(e){AC=null;}
}
function engine(on,rpm,dt){
  if(!AC)return;
  rpmS+=(rpm-rpmS)*Math.min(1,dt*7);
  const t=AC.currentTime,f=42+rpmS*180;
  engO1.frequency.setTargetAtTime(f,t,.04);
  engO2.frequency.setTargetAtTime(f*.5,t,.04);
  engF.frequency.setTargetAtTime(230+rpmS*1500,t,.05);
  engG.gain.setTargetAtTime(on?.04+rpmS*.045:0,t,on?.06:.18);
}
function tone(f0,f1,dur,type,vol,when){
  if(!AC)return;
  const t=AC.currentTime+(when||0);
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.setValueAtTime(f0,t);
  if(f1!==f0)o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.connect(g);g.connect(master);o.start(t);o.stop(t+dur+.05);
}
function noiseHit(dur,vol,fc){
  if(!AC)return;
  const n=Math.floor(AC.sampleRate*dur),buf=AC.createBuffer(1,n,AC.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
  const s=AC.createBufferSource();s.buffer=buf;
  const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=fc;
  const g=AC.createGain();g.gain.value=vol;
  s.connect(f);f.connect(g);g.connect(master);s.start();
}
function sndCrash(){noiseHit(.4,.4,900);tone(110,28,.45,'triangle',.4,0);}
function sndTrick(n){
  const fs=[660,880,1108,1318];
  for(let i=0;i<Math.min(n+1,4);i++)tone(fs[i],fs[i],.1,'square',.1,i*.07);
}
function sndThud(v){
  const now=performance.now();
  if(now-thudT<160)return;thudT=now;
  noiseHit(.07,clamp(v,.05,.25),700);
}
function sndFanfare(){
  const fs=[523,659,784,1046,1318];
  for(let i=0;i<fs.length;i++)tone(fs[i],fs[i],.16,'square',.12,i*.09);
  tone(262,262,.5,'triangle',.18,.36);
}

/* ================= 地形（仅股市赛道，buildStockWorld 一次性生成） ================= */
let hs=[0],firstX=0;
function groundY(x){
  const f=(x-firstX)/STEP,i=Math.floor(f);
  if(i<0)return hs[0];
  if(i>=hs.length-1)return hs[hs.length-1];
  return hs[i]+(hs[i+1]-hs[i])*(f-i);
}
function hitTerrain(px,py,r){
  let i0=Math.floor((px-r-firstX)/STEP),i1=Math.ceil((px+r-firstX)/STEP);
  i0=Math.max(0,i0);i1=Math.min(hs.length-1,i1);
  let bd=0,bnx=0,bny=-1,hit=false;
  for(let i=i0;i<i1;i++){
    const ax=firstX+i*STEP,ay=hs[i],by=hs[i+1];
    const aby=by-ay,len2=STEP*STEP+aby*aby;
    let tt=((px-ax)*STEP+(py-ay)*aby)/len2;
    tt=tt<0?0:tt>1?1:tt;
    const cx=ax+STEP*tt,cy=ay+aby*tt;
    const dx=px-cx,dy=py-cy,d=Math.hypot(dx,dy);
    const il=1/Math.sqrt(len2),nux=aby*il,nuy=-STEP*il; // 朝上的法线
    const s=dx*nux+dy*nuy; // 有符号深度
    let depth,nx,ny;
    if(s>=0){
      if(d>=r)continue;
      depth=r-d;
      if(d>1e-4){nx=dx/d;ny=dy/d;}else{nx=nux;ny=nuy;}
    }else{ // 圆心陷入地下
      depth=r-s;nx=nux;ny=nuy;
    }
    if(!hit||depth>bd){hit=true;bd=depth;bnx=nx;bny=ny;}
  }
  return hit?{nx:bnx,ny:bny,d:bd}:null;
}

/* ================= 输入 ================= */
const keys={};
let tL=false,tR=false;
const isTouch=('ontouchstart'in window)||navigator.maxTouchPoints>0;
if(isTouch)document.body.classList.add('touch');
addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault();
  keys[e.code]=true;
  initAudio();if(AC&&AC.state==='suspended')AC.resume();
  if((e.code==='Space'||e.code==='Enter'||e.code==='KeyR')&&!e.repeat){
    if(state==='over'&&performance.now()-overAt>500)startGame();
  }
});
addEventListener('keyup',e=>{keys[e.code]=false;});
function bindZone(el,set){
  const on=e=>{e.preventDefault();set(true);el.classList.add('on');initAudio();if(AC&&AC.state==='suspended')AC.resume();};
  const off=e=>{e.preventDefault();set(false);el.classList.remove('on');};
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',on);
  el.addEventListener('mouseup',off);el.addEventListener('mouseleave',off);
}
bindZone($('zoneL'),v=>tL=v);
bindZone($('zoneR'),v=>tR=v);
let botOn=false;const botC={thr:false,brk:false,back:false,fwd:false}; // 自动驾驶（赛道可通性验证）
const inThr=()=>botOn?botC.thr:!!(keys.ArrowUp||keys.KeyW||keys.Space||tR);
const inBrk=()=>botOn?botC.brk:!!(keys.ArrowDown||keys.KeyS||tL);
const inBack=()=>botOn?botC.back:!!(keys.ArrowLeft||keys.KeyA||tL);
const inFwd=()=>botOn?botC.fwd:!!(keys.ArrowRight||keys.KeyD||tR);

/* ================= 摩托刚体（verlet 三质点） ================= */
function makePt(x,y,im){return{x,y,px:x,py:y,im};}
let bike=null;
const WB=76,BH=46; // 轴距 / 车身质点高
function makeBike(x){
  const ry=groundY(x-WB/2)-R,fy=groundY(x+WB/2)-R;
  const rw=makePt(x-WB/2,ry,1),fw=makePt(x+WB/2,fy,1);
  const bd=makePt(x,Math.min(ry,fy)-BH,.5);
  const len=(a,b)=>Math.hypot(b.x-a.x,b.y-a.y);
  return{
    rw,fw,bd,
    links:[
      {a:rw,b:fw,len:len(rw,fw),st:.95},  // 轴距：刚性
      {a:rw,b:bd,len:len(rw,bd),st:.28},  // 悬挂：弹性
      {a:fw,b:bd,len:len(fw,bd),st:.28},
    ],
    spin:0,angle:Math.atan2(fy-ry,WB),omega:0,
    air:0,airRot:0,cR:null,cF:null,maxX:x,leanVis:0,lastVt:0,
  };
}
function solveLink(L){
  const a=L.a,b=L.b;
  let dx=b.x-a.x,dy=b.y-a.y;
  const d=Math.hypot(dx,dy)||1e-6,diff=(d-L.len)/d*L.st;
  const w=a.im+b.im,wa=a.im/w,wb=b.im/w;
  a.x+=dx*diff*wa;a.y+=dy*diff*wa;
  b.x-=dx*diff*wb;b.y-=dy*diff*wb;
}
function bodySide(b){ // 防止车身质点翻过轮轴线（三角反折）
  const mx=(b.rw.x+b.fw.x)/2,my=(b.rw.y+b.fw.y)/2;
  let ux=b.fw.x-b.rw.x,uy=b.fw.y-b.rw.y;
  const l=Math.hypot(ux,uy)||1;ux/=l;uy/=l;
  const upx=uy,upy=-ux;
  const s=(b.bd.x-mx)*upx+(b.bd.y-my)*upy;
  if(s<20){const c=(20-s)*.6;b.bd.x+=upx*c;b.bd.y+=upy*c;}
}
function rotateBike(b,da){
  const pts=[b.rw,b.fw,b.bd];
  let cx=0,cy=0,tm=0;
  for(const p of pts){const m=1/p.im;cx+=p.x*m;cy+=p.y*m;tm+=m;}
  cx/=tm;cy/=tm;
  const s=Math.sin(da),c=Math.cos(da);
  for(const p of pts){
    const dx=p.x-cx,dy=p.y-cy;
    p.x=cx+dx*c-dy*s;p.y=cy+dx*s+dy*c;
  }
}
function contactPass(p,fric,rest){
  const h=hitTerrain(p.x,p.y,R);
  if(!h)return null;
  p.x+=h.nx*h.d;p.y+=h.ny*h.d;p.px+=h.nx*h.d;p.py+=h.ny*h.d;
  const tx=-h.ny,ty=h.nx;
  let vx=p.x-p.px,vy=p.y-p.py;
  let vn=vx*h.nx+vy*h.ny,vt=vx*tx+vy*ty;
  const impact=vn<0?-vn:0;
  if(vn<0)vn=-vn*rest;
  vt*=fric;
  p.px=p.x-(h.nx*vn+tx*vt);
  p.py=p.y-(h.ny*vn+ty*vt);
  return{nx:h.nx,ny:h.ny,impact};
}
function riderPose(b){
  let ux=b.fw.x-b.rw.x,uy=b.fw.y-b.rw.y;
  const l=Math.hypot(ux,uy)||1;ux/=l;uy/=l;
  const px=uy,py=-ux;
  const mx=(b.rw.x+b.fw.x)/2,my=(b.rw.y+b.fw.y)/2;
  const at=(a,u)=>({x:mx+ux*a+px*u,y:my+uy*a+py*u});
  const ln=b.leanVis;
  const hip=at(-9+ln*3,30),chest=at(-2+ln*7,52);
  const head={x:chest.x+ux*(4+ln*5)+px*15,y:chest.y+uy*(4+ln*5)+py*15};
  return{hip,chest,head,hand:at(21,41),foot:at(2,12),knee:at(15,21),ux,uy,px,py,mx,my,at};
}

/* ================= 布娃娃 / 头盔 ================= */
let rag=null,helmet=null;
function buildRagdoll(){
  const p=riderPose(bike);
  const vx=bike.bd.x-bike.bd.px,vy=bike.bd.y-bike.bd.py;
  const mk=(pt,kx,ky)=>{
    const o=makePt(pt.x,pt.y,1);
    o.px-=vx+kx;o.py-=vy+ky;return o;
  };
  const head=mk(p.head,rand(-1,1),rand(0,1.5));
  const chest=mk(p.chest,0,0),hip=mk(p.hip,0,0);
  const hand=mk(p.hand,rand(-1,1),0),foot=mk(p.foot,0,0);
  rag={
    pts:[head,chest,hip,hand,foot],
    links:[
      {a:head,b:chest,len:15,st:.9},
      {a:chest,b:hip,len:26,st:.9},
      {a:chest,b:hand,len:24,st:.7},
      {a:hip,b:foot,len:30,st:.7},
      {a:head,b:hip,len:38,st:.25},
    ],
    head,chest,hip,hand,foot,
  };
  helmet={x:p.head.x,y:p.head.y,px:p.head.x-vx*.7-rand(1,3),py:p.head.y-vy*.7+rand(2,4),rot:0,vr:rand(-.2,.2)};
}
function stepRagdoll(dt){
  if(!rag)return;
  for(const p of rag.pts){
    const vx=(p.x-p.px)*.999,vy=(p.y-p.py)*.999;
    p.px=p.x;p.py=p.y;p.x+=vx;p.y+=vy+G*dt*dt;
  }
  for(let k=0;k<3;k++)for(const L of rag.links)solveLink(L);
  for(const p of rag.pts){
    const h=hitTerrain(p.x,p.y,5);
    if(h){
      p.x+=h.nx*h.d;p.y+=h.ny*h.d;p.px+=h.nx*h.d;p.py+=h.ny*h.d;
      const tx=-h.ny,ty=h.nx;
      let vx=p.x-p.px,vy=p.y-p.py;
      let vn=vx*h.nx+vy*h.ny,vt=(vx*tx+vy*ty)*.9;
      if(vn<0)vn=-vn*.15;
      p.px=p.x-(h.nx*vn+tx*vt);p.py=p.y-(h.ny*vn+ty*vt);
    }
  }
  if(helmet){
    const h=helmet,vx=(h.x-h.px)*.999,vy=(h.y-h.py)*.999;
    h.px=h.x;h.py=h.y;h.x+=vx;h.y+=vy+G*dt*dt;h.rot+=h.vr;
    const c=hitTerrain(h.x,h.y,9);
    if(c){
      h.x+=c.nx*c.d;h.y+=c.ny*c.d;h.px+=c.nx*c.d;h.py+=c.ny*c.d;
      const tx=-c.ny,ty=c.nx;
      let wx=h.x-h.px,wy=h.y-h.py;
      let vn=wx*c.nx+wy*c.ny,vt=(wx*tx+wy*ty)*.97;
      if(vn<0)vn=-vn*.45;h.vr*=.92;
      h.px=h.x-(c.nx*vn+tx*vt);h.py=h.y-(c.ny*vn+ty*vt);
    }
  }
}

function stepParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.life+=dt;
    if(p.life>p.max){parts.splice(i,1);continue;}
    if(p.col===2)continue; // 光环原地扩散
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vx*=Math.exp(-1.8*dt);
    p.vy=p.vy*Math.exp(-1.8*dt)+(p.col===1?900:p.col===3?-36:p.col===4?430:160)*dt;
  }
  for(let i=ghosts.length-1;i>=0;i--){
    ghosts[i].a+=dt;

  for(let i=pops.length-1;i>=0;i--){

function niceStep(x){
  const e=Math.pow(10,Math.floor(Math.log10(x))),m=x/e;
  return (m<1.5?1:m<3.5?2:m<7.5?5:10)*e;
}
function buildStockWorld(st){
  const rows=st.rows,N=rows.length,base=rows[0][4];
  const py=p=>-Math.log(p/base)*KLOG;
  const Y=rows.map(r=>py(r[4]));
  const finishX=(N-1)*DAYW;
  firstX=-RUNWAY;
  const endX=finishX+1300,n=Math.ceil((endX-firstX)/STEP);
  hs=new Array(n+1);
  for(let i=0;i<=n;i++){
    const x=firstX+i*STEP;
    let y;
    if(x<=0)y=0;
    else if(x<finishX){ // Catmull-Rom 平滑收盘价
      const f=x/DAYW,d=Math.floor(f),t=f-d;
      const p0=Y[Math.max(0,d-1)],p1=Y[d],p2=Y[Math.min(N-1,d+1)],p3=Y[Math.min(N-1,d+2)];
      y=.5*((2*p1)+(-p0+p2)*t+(2*p0-5*p1+4*p2-p3)*t*t+(-p0+3*p1-3*p2+p3)*t*t*t);
    }
    else if(x<finishX+700)y=Y[N-1];                  // 终点平台
    else if(x<finishX+1100)y=Y[N-1]-(x-finishX-700); // 收尾缓停坡
    else y=Y[N-1]-400;
    hs[i]=y;
  }
  // 骑行面平滑（K 线视觉不变）：缓和 V 形谷与锐利坡顶；区间向跑道延伸避免衔接台阶
  // 半径随波动率自适应：地狱级标的锯齿磨得更圆，保证可骑
  const R1=Math.max(4,Math.round(st.vol*2.6));
  const si0=Math.max(1,Math.ceil((-300-firstX)/STEP)),si1=Math.min(n-1,Math.floor((finishX+650-firstX)/STEP));
  for(let pass=0;pass<2;pass++){
    const src=hs.slice();
    for(let i=si0;i<=si1;i++){
      let s=0;
      for(let k=-R1;k<=R1;k++)s+=src[clamp(i+k,0,n)];
      hs[i]=s/(2*R1+1);
    }
  }
  // 深 V 谷垫底：宽核均值与原面取高者（填谷不削峰，峰仍是跳台）
  const vFill=R2=>{
    const src=hs.slice();
    for(let i=si0;i<=si1;i++){
      let s=0;
      for(let k=-R2;k<=R2;k++)s+=src[clamp(i+k,0,n)];
      s/=2*R2+1;
      if(s<hs[i])hs[i]=s;
    }
  };
  vFill(26);
  // 难度兜底：仅对骑行面做坡度软限幅，保证极端跳空与连续大阳线可通过
  // 下坡限幅随波动率收紧：地狱股的悬崖更缓，免高坠硬着陆
  const MAXUP=.38*STEP,MAXDN=Math.max(.9,1.6-st.vol*.16)*STEP;
  for(let i=1;i<=n;i++){
    if(hs[i]<hs[i-1]-MAXUP)hs[i]=hs[i-1]-MAXUP;
    else if(hs[i]>hs[i-1]+MAXDN)hs[i]=hs[i-1]+MAXDN;
  }
  vFill(22); // 二次填谷：圆滑限幅产生的坡脚折角
  // 月份刻度
  const months=[];let pm=-1;
  for(let i=0;i<N;i++){
    const d=new Date(rows[i][0]*86400000),m=d.getUTCMonth();
    if(m!==pm){pm=m;months.push({x:i*DAYW,label:d.getUTCFullYear()+'.'+(m+1)});}
  }
  // 价格网格（1-2-5 阶梯）
  let lo=1e18,hi=-1e18;
  for(const r of rows){lo=Math.min(lo,r[3]);hi=Math.max(hi,r[2]);}
  const stp=niceStep((hi-lo)/9),levels=[];
  for(let p=Math.ceil(lo/stp)*stp;p<=hi;p+=stp)levels.push({p,y:py(p)});
  // MA20 均线（真实 20 日收盘均值）
  const ma=new Array(N).fill(null);
  let a20=0;
  for(let i=0;i<N;i++){
    a20+=rows[i][4];
    if(i>=20)a20-=rows[i-20][4];
    if(i>=19)ma[i]=py(a20/20);
  }
  stk={st,N,finishX,base,py,months,levels,ma,bestProg:stockBestGet(st.sym)};
  chCache.clear();rdCache.clear();
  buildWatermark(st.sym);
  buildTape(st);
}
function dayAt(x){return clamp(Math.round(x/DAYW),0,stk.N-1);}
function priceAt(x){
  if(x<=0)return stk.base;
  const f=x/DAYW,d=Math.floor(f);
  if(d>=stk.N-1)return stk.st.rows[stk.N-1][4];
  const t=f-d,c0=stk.st.rows[d][4],c1=stk.st.rows[d+1][4];
  return c0*Math.pow(c1/c0,t);
}

/* ====== 选股卡片：sparkline 迷你走势图 ====== */
function drawSpark(cvs,s){
  const dpr=Math.min(devicePixelRatio||1,2);
  const w=Math.max(120,cvs.clientWidth||160),h=38;
  cvs.width=Math.round(w*dpr);cvs.height=Math.round(h*dpr);
  const g=cvs.getContext('2d');
  g.scale(dpr,dpr);
  const rows=s.rows,N=rows.length;
  let lo=1e18,hi=-1e18;
  for(const r of rows){lo=Math.min(lo,r[4]);hi=Math.max(hi,r[4]);}
  const span=Math.max(1e-9,hi-lo);
  const col=s.ret>=0?CUP:CDN;
  const X=i=>2+(w-4)*i/(N-1),Y=p=>3+(h-8)*(1-(p-lo)/span);
  const k=Math.max(1,Math.floor(N/140));
  g.beginPath();
  g.moveTo(X(0),Y(rows[0][4]));
  for(let i=k;i<N;i+=k)g.lineTo(X(i),Y(rows[i][4]));
  g.lineTo(X(N-1),Y(rows[N-1][4]));
  // 渐变填充
  const gr=g.createLinearGradient(0,0,0,h);
  gr.addColorStop(0,col+'3c');gr.addColorStop(1,col+'00');
  g.save();
  g.lineTo(X(N-1),h);g.lineTo(X(0),h);g.closePath();
  g.fillStyle=gr;g.fill();
  g.restore();
  g.beginPath();
  g.moveTo(X(0),Y(rows[0][4]));
  for(let i=k;i<N;i+=k)g.lineTo(X(i),Y(rows[i][4]));
  g.lineTo(X(N-1),Y(rows[N-1][4]));
  g.strokeStyle=col;g.lineWidth=1.6;g.lineJoin='round';g.stroke();
  // 收盘端点
  g.fillStyle=col;
  g.beginPath();g.arc(X(N-1),Y(rows[N-1][4]),2,0,TAU);g.fill();
}

/* ================= 摩托物理步进 ================= */
function stepBike(dt){
  const b=bike;
  const play=state==='play';
  const thr=play&&inThr(),brk=play&&inBrk();
  // 积分
  for(const p of [b.rw,b.fw,b.bd]){
    let vx=(p.x-p.px)*.9996,vy=(p.y-p.py)*.9996;
    const sp=Math.hypot(vx,vy),cap=6500*dt;
    if(sp>cap){vx*=cap/sp;vy*=cap/sp;}
    p.px=p.x;p.py=p.y;
    p.x+=vx;p.y+=vy+G*dt*dt;
  }
  const airborne=b.air>.07;
  // 空中配重翻转
  if(play&&airborne){
    let dir=0;
    if(inBack())dir-=1;
    if(inFwd())dir+=1;
    if(dir<0&&b.omega>-OMAX)rotateBike(b,-ALPHA*dt*dt);
    else if(dir>0&&b.omega<OMAX)rotateBike(b,ALPHA*dt*dt);
  }
  // 地面油门抬头
  if(thr&&b.cR&&!airborne)rotateBike(b,-WHEELIE*dt*dt);
  // 约束 + 无摩擦投影碰撞
  for(let k=0;k<5;k++){
    for(const L of b.links)solveLink(L);
    bodySide(b);
    for(const w of [b.rw,b.fw]){
      // 半径略减：留余量给最终接触检测（摩擦/驱动），否则接触永远测不到
      const h=hitTerrain(w.x,w.y,R-.6);
      if(h){w.x+=h.nx*h.d;w.y+=h.ny*h.d;w.px+=h.nx*h.d;w.py+=h.ny*h.d;}
    }
  }
  // 最终接触（摩擦 + 微弹）：刹车强摩擦只在前向行驶时生效，倒车用滚动摩擦
  const fr=(brk&&b.lastVt>80*dt)?.962:.9995;
  b.cR=contactPass(b.rw,fr,REST);
  b.cF=contactPass(b.fw,fr,REST);
  // 驱动 / 倒车
  if(play&&b.cR){
    const n=b.cR,tx=-n.ny,ty=n.nx;
    let vx=b.rw.x-b.rw.px,vy=b.rw.y-b.rw.py;
    let vt=vx*tx+vy*ty;
    const vn=vx*n.nx+vy*n.ny;
    if(thr&&vt<MAXV*dt)vt=Math.min(MAXV*dt,vt+DRIVE*dt*dt);
    if(brk&&!thr&&vt<=80*dt)vt=Math.max(-REVMAX*dt,vt-REVA*dt*dt);
    b.lastVt=vt;
    b.rw.px=b.rw.x-(tx*vt+n.nx*vn);
    b.rw.py=b.rw.y-(ty*vt+n.ny*vn);
    b.spin+=vt/R;
    // 数据光点（轮下溅起）
    if(thr&&Math.random()<dt*55&&Math.abs(vt)>30*dt)
      addDust(b.rw.x-n.nx*R*.9,b.rw.y-n.ny*R*.9,-tx*Math.abs(vt)/dt*.25,-40,1);
  }else if(thr){
    b.spin+=26*dt; // 空中给油空转
  }
  // 落地冲击反馈
  for(const c of [b.cR,b.cF]){
    if(c&&c.impact>380*dt){
      const w=b.cR===c?b.rw:b.fw;
      addDust(w.x,w.y+R*.6,0,-60,Math.min(10,c.impact/dt/120),0);
      if(c.impact>650*dt)addRing(w.x,w.y+R*.5,c.impact>1000*dt); // 落地光环
      sndThud(c.impact/dt/2200);
    }
  }
  // 姿态角 / 空翻统计
  const a=Math.atan2(b.fw.y-b.rw.y,b.fw.x-b.rw.x);
  const da=wrapA(a-b.angle);
  b.omega=da/dt;b.angle=a;
  const contact=!!(b.cR||b.cF);
  if(contact){
    if(b.air>.25&&play){
      // 落地姿态判定
      const n=b.cR||b.cF;
      const upx=Math.sin(a),upy=-Math.cos(a);
      const updot=upx*n.nx+upy*n.ny;
      if(updot<-.2){
        doCrash('落地姿态失衡');
      }else{
        const deg=Math.abs(b.airRot)*180/PI;
        const flips=Math.floor((deg+28)/360);
        if(flips>=1){
          combo++;flipsTotal+=flips;
          const base=flips===1?500:flips===2?1600:flips*flips*400;
          const gain=Math.round(base*(1+(combo-1)*.5)/10)*10;
          trickScore+=gain;
          const dirTxt=b.airRot<0?'后空翻':'前空翻';
          const name=(flips>=3?flips+' 周':flips===2?'双重':'')+dirTxt;
          trickMsg=name+'！+'+gain+(combo>1?'（连击 ×'+combo+'）':'');
          trickMsgT=2.4;
          addPop((b.rw.x+b.fw.x)/2,b.bd.y-46,name+'！+'+gain,'#ffcc00',24);
          sndTrick(flips);
        }
      }
    }
    b.air=0;b.airRot=0;
  }else{
    b.air+=dt;b.airRot+=da;
    // 空翻残影采样（纯视觉）
    if(b.air>.15&&Math.abs(b.omega)>4){
      ghostCD-=dt;
      if(ghostCD<=0){
        ghostCD=.03;
        ghosts.push({rx:b.rw.x,ry:b.rw.y,fx:b.fw.x,fy:b.fw.y,a:0});
        if(ghosts.length>16)ghosts.shift();
      }
    }
  }
  // 头部 / 躯干触地判定
  if(play){
    const pose=riderPose(b);
    // 排气微烟（纯视觉）
    if(thr&&Math.random()<dt*24){
      const ex=pose.at(-34,19);
      addSmoke(ex.x,ex.y,-pose.ux*55,-pose.uy*55-26);
    }
    const hh=hitTerrain(pose.head.x,pose.head.y,HEADR);
    if(hh&&hh.d>1.2){doCrash('骑手头部着地');}
    else{
      const ch=hitTerrain(pose.chest.x,pose.chest.y,7);
      if(ch&&ch.d>5)doCrash('骑手摔落');
    }
  }
  // 视觉前后倾
  if(play){
    const tgt=(thr?.3:0)+(inFwd()?.6:0)-(brk?.35:0)-(inBack()?.6:0);
    b.leanVis+=(clamp(tgt,-1,1)-b.leanVis)*Math.min(1,dt*10);
  }
  // 里程
  const mx=(b.rw.x+b.fw.x)/2;
  if(mx>b.maxX)b.maxX=mx;
  meters=Math.max(meters,b.maxX/PXM);
  // 冲线
  if(stk&&play&&!finished&&b.maxX>=stk.finishX){
    finished=true;state='finish';finishT=0;
    const pnl=(stk.st.rows[stk.N-1][4]/stk.base-1)*100;
    addConfetti(b.bd.x,b.bd.y-40);
    addPop(b.bd.x+230,b.bd.y-170,'🎉 成功落袋！','#ffe066',36);
    addPop(b.bd.x+230,b.bd.y-120,pctTxt(pnl),pnl>=0?'#ff7a64':'#5ee8aa',30);
    sndFanfare();
  }
  // 受困检测：给油却动不了
  if(play){
    const spd=Math.hypot(b.bd.x-b.bd.px,b.bd.y-b.bd.py)/dt;
    if((thr||brk)&&spd<26)stuckT+=dt;else stuckT=Math.max(0,stuckT-dt*2);
    if(stuckT>3.5)endStock(false,'套牢了！','横盘太久，原地动弹不得');
    // 防软锁：跌出地形范围
    if(b.bd.y-groundY(mx)>1800)endStock(false,'爆仓！','坠入了虚空');
  }
}

function physStep(dt){

/* ================= 摄像机 ================= */
function stepCam(dt){
  if(!bike)return;
  const b=bike;
  const follow=rag?rag.chest:{x:(b.rw.x+b.fw.x)/2,y:b.bd.y,};
  const vx=rag?0:(b.bd.x-b.bd.px)/DT;
  const sp=Math.abs(vx);
  const tz=baseZoom()*clamp(1.04-sp/MAXV*.38,.6,1.04);
  zoom+=(tz-zoom)*Math.min(1,dt*2.2);
  const tx=follow.x+clamp(vx*.3,-260,260);
  const gAhead=groundY(follow.x+180);
  const ty=Math.min(follow.y,gAhead)-30;
  const k=1-Math.exp(-4.5*dt);
  camX+=(tx-camX)*k;
  camY+=(ty-camY)*(1-Math.exp(-3*dt));
  shake*=Math.exp(-6*dt);
}

const chCache=new Map();

function candleChunk(j){
  let e=chCache.get(j);
  if(e){chCache.delete(j);chCache.set(j,e);return e;} // 刷新 LRU 顺序
  const rows=stk.st.rows,N=stk.N;
  const d0=Math.max(0,Math.floor(j*CHW/DAYW)-1),d1=Math.min(N-1,Math.ceil((j+1)*CHW/DAYW)+1);
  let y0=1e9,y1=-1e9;
  for(let i=d0;i<=d1;i++){y0=Math.min(y0,stk.py(rows[i][2]));y1=Math.max(y1,stk.py(rows[i][3]));}
  y0-=30;y1+=40;
  const c=mkCanvas(Math.ceil(CHW*CHS),Math.ceil((y1-y0)*CHS)),g=c.getContext('2d');
  g.scale(CHS,CHS);g.translate(-j*CHW,-y0);
  const bw=DAYW*.52;
  for(let i=d0;i<=d1;i++){
    const r=rows[i],x=i*DAYW;
    const yO=stk.py(r[1]),yH=stk.py(r[2]),yL=stk.py(r[3]),yC=stk.py(r[4]);
    const up=r[4]>=r[1];

    // 实体（红涨绿跌，退到背景的氛围层）
    g.fillStyle=up?'rgba(255,83,71,.13)':'rgba(47,191,131,.13)';

    g.strokeStyle=up?'rgba(255,130,112,.22)':'rgba(98,222,168,.22)';
    g.lineWidth=1;g.strokeRect(x-bw/2,bt,bw,bb-bt);
  }
  e={c,y0,h:y1-y0};
  chCache.set(j,e);
  if(chCache.size>8){const k=chCache.keys().next().value;chCache.delete(k);}

const rdCache=new Map();
const RCH=1536,RCS=1.25,FILLH=260;
const ROAD_COLS=[ // [外晕, 中层, 核线, 填充顶色（向中性蓝靠拢，避免成排色柱）]
  ['rgba(110,170,255,.15)','rgba(140,190,255,.5)','#cfe4ff','rgba(110,160,255,'],
  ['rgba(255,83,71,.17)','rgba(255,112,98,.55)','#ffd6cf','rgba(204,110,135,'],
  ['rgba(47,191,131,.17)','rgba(72,212,156,.55)','#cdf6e4','rgba(69,180,174,'],

function roadChunk(j){
  let e=rdCache.get(j);

  const xa=j*RCH,xb=xa+RCH,n=hs.length-1;
  let i0=Math.floor((xa-firstX)/STEP)-3,i1=Math.ceil((xb-firstX)/STEP)+3;

  for(let i=i0;i<=i1;i++){yTop=Math.min(yTop,hs[i]);yBotS=Math.max(yBotS,hs[i]);}
  const y0=yTop-46,y1=yBotS+FILLH;
  const c=mkCanvas(Math.ceil(RCH*RCS),Math.ceil((y1-y0)*RCS)),g=c.getContext('2d');
  g.scale(RCS,RCS);g.translate(-xa,-y0);
  g.lineJoin='round';g.lineCap='round';
  // —— 面积图渐变填充：逐样本竖条，渐变锚定在线本身（颜色随当前段涨跌）——
  for(let i=i0;i<i1;i++){
    const x0=firstX+i*STEP,x1=x0+STEP;
    const ci=segDir(Math.floor((x0+STEP*.5)/DAYW));
    const top=Math.min(hs[i],hs[i+1]);

    g.lineTo(x1+.3,top+FILLH);g.lineTo(x0-.3,top+FILLH);

  // —— 发光价格线：按涨跌色分段连续描边 ——
  let runs=[],cur=null;
  for(let i=i0;i<i1;i++){
    const ci=segDir(Math.floor((firstX+(i+.5)*STEP)/DAYW));
    if(!cur||cur.ci!==ci){cur={ci,a:i,b:i+1};runs.push(cur);}else cur.b=i+1;
  }
  for(const r of runs){

  const d0=Math.max(0,Math.ceil((xa-30)/DAYW)),d1=Math.min(stk.N-1,Math.floor((xb+30)/DAYW));
  for(let d=d0;d<=d1;d++){

    g.beginPath();g.arc(x,y,4.4,0,TAU);g.fill();
    g.fillStyle='rgba(255,255,255,.85)';
    g.beginPath();g.arc(x,y,1.9,0,TAU);g.fill();
  }
  e={c,y0,h:y1-y0};
  rdCache.set(j,e);
  if(rdCache.size>8){const k=rdCache.keys().next().value;rdCache.delete(k);}

      ctx.strokeRect(sx-tw/2,30,tw,17);
      ctx.fillStyle='rgba(196,220,255,.92)';
      ctx.fillText(dtx,sx,42);
    }
  }
  ctx.textAlign='start';

  if(bike&&(state==='play'||state==='finish')){
    const x=(bike.rw.x+bike.fw.x)/2;

      const di=dayAt(x),rows=stk.st.rows;
      const r=rows[di][4]/rows[Math.max(0,di-4)][4]-1;
      const a=clamp(Math.abs(r)*1.1,0,.085);
      if(a>.01){
        ctx.fillStyle=(r>=0?'rgba(255,84,52,':'rgba(46,200,140,')+a.toFixed(3)+')';
        ctx.fillRect(0,0,W,H);
      }

  }

/* ===== 车轮精灵：辐条 + 胎纹，高速叠加旋转模糊环 ===== */
const wheelSpr=(()=>{
  const s=(R+5)*2*SS,c=mkCanvas(s,s),g=c.getContext('2d');
  g.translate(s/2,s/2);g.scale(SS,SS);
  g.fillStyle='#1a1a22';
  g.beginPath();g.arc(0,0,R,0,TAU);g.fill();
  // 胎纹块
  g.strokeStyle='#06060a';g.lineWidth=3;
  for(let i=0;i<10;i++){
    const a=i*TAU/10;
    g.beginPath();
    g.moveTo(Math.cos(a)*(R-3.5),Math.sin(a)*(R-3.5));
    g.lineTo(Math.cos(a)*(R+.5),Math.sin(a)*(R+.5));
    g.stroke();
  }
  // 胎侧 / 轮辋
  g.strokeStyle='#34343f';g.lineWidth=2.5;
  g.beginPath();g.arc(0,0,R-4.5,0,TAU);g.stroke();
  g.strokeStyle='#b9b9c8';g.lineWidth=1.8;
  g.beginPath();g.arc(0,0,R-6.5,0,TAU);g.stroke();
  // 交叉辐条
  g.strokeStyle='#9a9aac';g.lineWidth=1.3;
  for(let i=0;i<7;i++){
    const a=i*TAU/7;
    g.beginPath();g.moveTo(Math.cos(a)*2.5,Math.sin(a)*2.5);g.lineTo(Math.cos(a+.5)*(R-7),Math.sin(a+.5)*(R-7));g.stroke();
    g.beginPath();g.moveTo(Math.cos(a)*2.5,Math.sin(a)*2.5);g.lineTo(Math.cos(a-.5)*(R-7),Math.sin(a-.5)*(R-7));g.stroke();
  }
  // 轮毂
  g.fillStyle='#d8d8e6';g.beginPath();g.arc(0,0,3.6,0,TAU);g.fill();
  g.fillStyle='#5a5a6a';g.beginPath();g.arc(0,0,1.8,0,TAU);g.fill();
  return c;
})();
const wheelBlur=(()=>{ // 高转速下的辐条拖影环
  const s=(R+5)*2*SS,c=mkCanvas(s,s),g=c.getContext('2d');

})();

  g.strokeStyle='#b6451f';g.lineWidth=4;
  g.beginPath();g.arc(38,0,R+4,PI*1.25,PI*1.95);g.stroke();
  // 车把 + 握把 + 头灯
  ln(27,35,33,45,3,'#6a6a7c');
  g.fillStyle='#1c1c26';g.beginPath();g.arc(33,-45,2.4,0,TAU);g.fill();
  g.fillStyle='rgba(255,210,130,.35)';g.beginPath();g.arc(28,-29,4.6,0,TAU);g.fill();
  g.fillStyle='#ffe9b0';g.beginPath();g.arc(28,-29,2.4,0,TAU);g.fill();

function drawWheel(p,spin,spd){
  const s=(R+5)*2;
  ctx.save();
  ctx.translate(p.x,p.y);ctx.rotate(spin);
  ctx.drawImage(wheelSpr,-s/2,-s/2,s,s);
  ctx.restore();
  if(spd>16){ // 转速旋转模糊
    ctx.globalAlpha=Math.min(.75,(spd-16)/26);
    ctx.drawImage(wheelBlur,p.x-s/2,p.y-s/2,s,s);
    ctx.globalAlpha=1;
  }
}
function limb(a,b,w,col){
  ctx.strokeStyle=col;ctx.lineWidth=w;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
}
function torsoQuad(a,b,wa,wb,col){ // 有体积的躯干
  let dx=b.x-a.x,dy=b.y-a.y;
  const l=Math.hypot(dx,dy)||1,nx=-dy/l,ny=dx/l;
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.moveTo(a.x+nx*wa,a.y+ny*wa);
  ctx.lineTo(b.x+nx*wb,b.y+ny*wb);
  ctx.lineTo(b.x-nx*wb,b.y-ny*wb);
  ctx.lineTo(a.x-nx*wa,a.y-ny*wa);
  ctx.closePath();ctx.fill();
}
function drawHelmetAt(x,y,rot){
  ctx.save();ctx.translate(x,y);ctx.rotate(rot);
  ctx.drawImage(helmetSpr,-15,-15,30,30);
  ctx.restore();
}
function drawGhosts(){ // 空翻旋转残影
  for(const g of ghosts){
    const a=1-g.a/.38;
    if(a<=0)continue;
    ctx.strokeStyle='rgba(120,200,255,'+(a*.32).toFixed(3)+')';
    ctx.lineWidth=3.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(g.rx,g.ry);ctx.lineTo(g.fx,g.fy);ctx.stroke();
  }
}
function drawRider(p){
  // 腿：骑行裤分色 + 靴
  limb(p.hip,p.knee,6,'#27304a');
  limb(p.knee,p.foot,5,'#1f2738');
  ctx.fillStyle='#12161f';
  ctx.beginPath();ctx.arc(p.foot.x,p.foot.y,3.4,0,TAU);ctx.fill();
  // 躯干：骑行服主色 + 背部亮条
  torsoQuad(p.hip,p.chest,5.5,7,'#b8432a');
  limb({x:lerp(p.hip.x,p.chest.x,.18),y:lerp(p.hip.y,p.chest.y,.18)},
       {x:lerp(p.hip.x,p.chest.x,.88),y:lerp(p.hip.y,p.chest.y,.88)},2.8,'#e8dcc8');
  // 手臂：大臂 / 小臂分色 + 手套
  const elb={x:(p.chest.x+p.hand.x)/2,y:(p.chest.y+p.hand.y)/2-4};
  limb(p.chest,elb,5,'#a03a24');
  limb(elb,p.hand,4.2,'#8c3120');
  ctx.fillStyle='#161b28';
  ctx.beginPath();ctx.arc(p.hand.x,p.hand.y,2.8,0,TAU);ctx.fill();
  drawHelmetAt(p.head.x,p.head.y,Math.atan2(p.uy,p.ux));
}
function drawBike(){
  const b=bike,p=riderPose(b);
  const ang=Math.atan2(b.fw.y-b.rw.y,b.fw.x-b.rw.x);
  const spd=Math.abs(b.rw.x-b.rw.px)/DT/R; // 近似轮角速度 rad/s
  drawGhosts();
  drawWheel(b.rw,b.spin,spd);
  drawWheel(b.fw,b.spin,spd);
  // 车体：预渲染精灵按姿态角旋转
  ctx.save();
  ctx.translate(p.mx,p.my);ctx.rotate(ang);
  ctx.drawImage(bodySpr,-60,-58,120,72);
  ctx.restore();
  // 动态后减震：连到物理车身质点，随悬挂压缩伸缩
  const s1=p.at(-26,8);
  const s2={x:lerp(p.at(-8,26).x,b.bd.x,.45),y:lerp(p.at(-8,26).y,b.bd.y,.45)};
  limb(s1,s2,3.5,'#caa53f');
  limb(s1,s2,1.4,'#f5dd8a');
  // 空中旋转弧线提示
  if(state==='play'&&b.air>.15&&Math.abs(b.omega)>4){
    const dir=b.omega>0?1:-1;
    const s0=dir>0?ang-2.3:ang+.5,e0=dir>0?ang-.5:ang+2.3;
    ctx.strokeStyle='rgba(140,200,255,.35)';ctx.lineWidth=2.5;ctx.lineCap='round';
    ctx.beginPath();ctx.arc(p.mx,p.my,54,s0,e0);ctx.stroke();
    ctx.strokeStyle='rgba(140,200,255,.15)';
    ctx.beginPath();ctx.arc(p.mx,p.my,61,s0,e0);ctx.stroke();
  }
  if(state!=='crash'&&state!=='over'||!rag)drawRider(p);
}

function drawParts(){
  ctx.font='700 10px "Menlo",monospace';
  ctx.textAlign='center';
  for(const p of parts){
    const a=1-p.life/p.max;
    if(p.col===1){ // 火花（爆仓红）
      ctx.fillStyle='rgba(255,99,80,'+(a*.9).toFixed(3)+')';
      ctx.fillRect(p.x-1.5,p.y-1.5,3,3);
    }else if(p.col===2){ // 落地冲击数据光环
      const k=p.life/p.max,r=p.r+k*85;
      ctx.strokeStyle='rgba(120,200,255,'+((1-k)*.45).toFixed(3)+')';
      ctx.lineWidth=3*(1-k)+1;
      ctx.beginPath();ctx.ellipse(p.x,p.y,r,r*.3,0,0,TAU);ctx.stroke();
    }else if(p.col===3){ // 排气微烟
      ctx.fillStyle='rgba(130,148,176,'+(a*.2).toFixed(3)+')';
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*(1+p.life*2.4),0,TAU);ctx.fill();
    }else if(p.col===4){ // 冲线彩带
      ctx.save();
      ctx.translate(p.x,p.y);ctx.rotate(p.life*9+p.x*.13);
      ctx.globalAlpha=clamp(a*1.5,0,1);
      ctx.fillStyle=p.hue;
      ctx.fillRect(-p.r,-p.r*.55,p.r*2,p.r*1.1);
      ctx.restore();ctx.globalAlpha=1;
    }else if(p.col===5){ // 数字雨字符
      ctx.fillStyle='rgba(120,210,255,'+(a*.75).toFixed(3)+')';
      ctx.fillText(p.ch,p.x,p.y);
    }else{ // 数据光点
      ctx.fillStyle='rgba(110,205,255,'+(a*.18).toFixed(3)+')';
      ctx.fillRect(p.x-3,p.y-3,6,6);
      ctx.fillStyle='rgba(170,225,255,'+(a*.8).toFixed(3)+')';
      ctx.fillRect(p.x-1.2,p.y-1.2,2.4,2.4);
    }
  }
  ctx.textAlign='start';
}

let lastScoreTxt='',lastTrickTxt='',lastSHDate='',lastSHPnl='',lastSub2='';
function drawHUD(){

  if(sTxt!==lastScoreTxt){$('scoreV').textContent=sTxt;lastScoreTxt=sTxt;}
  const sub='空翻 '+flipsTotal+' ｜ 最佳 '+stk.bestProg.toFixed(0)+'%';
  if(sub!==lastSub2){$('scoreSub2').textContent=sub;lastSub2=sub;}
  let t='';
  if(state==='play'){
    if(b.air>.18&&Math.abs(b.airRot)>.7)
      t='空中旋转 '+Math.round(Math.abs(b.airRot)*180/PI)+'°';
    else if(trickMsgT>0)t=trickMsg;
    else if(combo>1)t='连击 ×'+combo;
  }
  if(t!==lastTrickTxt){$('trick').textContent=t;lastTrickTxt=t;}
}
/* ===== 自动驾驶 bot：验证 14 只股票全部可通关 ===== */
function botThink(){
  const b=bike;
  botC.thr=true;botC.brk=false;botC.back=false;botC.fwd=false;
  if(!b)return;
  if(b.air>.04){ // 空中：弹道预测落点 + PD 对齐落点坡度
    let px0=b.bd.x,py0=b.bd.y,vx=(b.bd.x-b.bd.px)/DT,vy=(b.bd.y-b.bd.py)/DT,lx=px0+60,tta=2.2;
    for(let s=0;s<44;s++){
      px0+=vx*.05;py0+=vy*.05;vy+=G*.05;
      lx=px0;
      if(py0>=groundY(px0)-26){tta=s*.05;break;}
    }
    if(tta>.18){ // 小跳不折腾，长滞空才调姿
      const ta=Math.atan2(groundY(lx+45)-groundY(lx-45),90);
      const da=wrapA(ta-b.angle);
      const want=clamp(da*2.5,-4,4);
      if(b.omega<want-.3)botC.fwd=true;
      else if(b.omega>want+.3)botC.back=true;
      if(b.air>.12&&Math.abs(da)>2.6)botC.thr=false; // 姿态全乱时专心调姿
    }
  }else{ // 地面
    const sl=Math.atan2(groundY(b.bd.x+60)-groundY(b.bd.x-60),120);
    const slA=Math.atan2(groundY(b.bd.x+95)-groundY(b.bd.x),95);
    const desc=sl>.18;                              // 已在下坡
    if(!desc&&!b.cF&&slA>.12)botC.thr=false;        // 越坡顶前轮离地：松油防栽头
    if(wrapA(b.angle-sl)<-.8)botC.thr=false;        // 车头仰过头，松油
    const vx0=(b.bd.x-b.bd.px)/DT;
    const g0=groundY(b.bd.x),g1=groundY(b.bd.x+170),g2=groundY(b.bd.x+340);
    const climbAhead=groundY(b.bd.x+330)-g0<-55;    // 前方大爬坡：放开限速攒动能
    if(!climbAhead&&vx0>560)botC.thr=false;         // 巡航限速：稳比快重要
    if(!climbAhead&&vx0>720)botC.brk=true;
    if(vx0>900)botC.thr=false;
    if(desc){                                       // 陡降：控速滑行，低速持油稳车头
      const v2=Math.hypot(b.bd.x-b.bd.px,b.bd.y-b.bd.py)/DT;
      if(v2>380){botC.thr=false;botC.brk=true;}
      else{botC.thr=true;botC.brk=false;}
    }
    // V 谷 / 悬崖预判：提前刹车控速
    if(vx0>420&&g1-g0>45&&g1-g2>32){botC.thr=false;botC.brk=true;}      // V 谷
    if(vx0>340&&g1-g0>85){botC.thr=false;botC.brk=true;}                // 大悬崖：贴崖缓降
  }
}
window.__botRun=function(sym,maxSec){
  const st=STONKS.find(s=>s.sym===sym);
  if(!st)return{sym,result:'no-such-sym'};
  startStock(st);
  botOn=true;
  maxSec=maxSec||900;
  let t=0,res='timeout';
  while(t<maxSec){
    botThink();
    physStep(DT);t+=DT;
    if(state==='finish'){res='finish';break;}
    if(state!=='play'){res=state;break;}
  }
  const prog=Math.round(clamp(bike.maxX/stk.finishX*100,0,100)*10)/10;
  botOn=false;
  return{sym,result:res,prog,sec:Math.round(t),reason:crashReason,day:dayAt(Math.max(0,bike.maxX)),x:Math.round(bike.maxX)};
};
window.__botAll=function(){return STONKS.map(s=>window.__botRun(s.sym));};
window.__tick=function(sec){ // 后台标签 rAF 暂停时手动推进（验收用）
  let t=0;
  while(t<sec){advance(1/60);t+=1/60;}
  render(performance.now());
  return{state,x:bike?Math.round(bike.bd.x):0};
};

function render(t){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ensureGrads();
  drawBG(t);
  if(!bike||!stk)return;
  const ox=W*.42,oy=H*.55;
  const shx=shake>.4?rand(-shake,shake):0,shy=shake>.4?rand(-shake,shake):0;
  ctx.save();
  ctx.translate(ox+shx,oy+shy);
  ctx.scale(zoom,zoom);
  ctx.translate(-camX,-camY);
  const wl=camX-ox/zoom-60,wr=camX+(W-ox)/zoom+60;
  drawGridWorld(wl,wr);
  drawCandles(wl,wr);
  drawMA(wl,wr);
  drawRoad(wl,wr);
  drawGates(t);
  drawParts();
  drawBike();
  drawRagdoll();
  drawPops();
  ctx.restore();
  drawStockScreen(ox,oy);
  // 坠毁慢镜头：色偏 + 暗角 + 红晕（均为缓存渐变）
  if(state==='crash'){
    ctx.fillStyle='rgba(40,20,80,.16)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle=G_vig;ctx.fillRect(0,0,W,H);
    ctx.fillStyle=G_crash;ctx.fillRect(0,0,W,H);
  }
  drawHUD();
}

/* ================= 主循环 ================= */
let lastT=0,acc=0;
function advance(dt){ // 推进游戏时间线（真实秒）
  if(trickMsgT>0)trickMsgT-=dt;
  if(state==='crash'){ // 爆仓慢镜头（用真实时间推进）
    crashT+=dt;
    if(crashT>1.1)timeScale=Math.min(1,timeScale+dt*1.6);
    if(crashT>2.3)endStock(false,'爆仓！',crashReason);
  }
  if(state==='finish'){ // 冲线庆祝：滑行 + 彩带，然后结算
    finishT+=dt;
    if(finishT>2.6)endStock(true);
  }
  acc+=dt*timeScale;
  let n=0;
  while(acc>=DT&&n<30){physStep(DT);acc-=DT;n++;}
  if(n>=30)acc=0;
  stepCam(dt);
}
function frame(t){
  requestAnimationFrame(frame);
  if(!lastT)lastT=t;
  let dt=(t-lastT)/1000;lastT=t;
  if(dt>.05)dt=.05;
  advance(dt);
  render(t);
  // 引擎声
  if(bike&&AC){
    const sp=Math.abs(bike.bd.x-bike.bd.px)/DT;
    const rpm=clamp(.12+(state==='play'&&inThr()?.45:0)+sp/MAXV*.5,0,1.25);
    engine(state==='play',rpm,dt);
  }
}
buildCards();
requestAnimationFrame(frame);
})();
</script>
