<script>
'use strict';
/* ============ 基本常量 ============ */
const W=1000,H=600,R=16,SP=R*2;          // 设计坐标系 / 珠半径 / 珠间距
const SHOT_V=980, RETREAT=265, RUSH_V=330;
const COLORS=[
  {c:'#ef4b41',d:'#7e1812'},   // 红
  {c:'#f8c61e',d:'#8a6a06'},   // 黄
  {c:'#46b95f',d:'#175c29'},   // 绿
  {c:'#4490e8',d:'#173f7e'},   // 蓝
  {c:'#ab5fe8',d:'#4f1f80'},   // 紫
  {c:'#e9e9f2',d:'#74748c'},   // 白
];
const PU_TYPES=['back','slow','bomb','aim'];
const PU_LABEL={back:'倒退！',slow:'减速！',bomb:'爆炸！',aim:'瞄准线！'};

/* ============ 轨道几何：Catmull-Rom + 等弧长查找表 ============ */
function buildTrack(raw){
  const pts=raw.slice();
  const P=[ [2*pts[0][0]-pts[1][0], 2*pts[0][1]-pts[1][1]], ...pts,
            [2*pts[pts.length-1][0]-pts[pts.length-2][0], 2*pts[pts.length-1][1]-pts[pts.length-2][1]] ];
  const rawPts=[];
  for(let i=1;i<P.length-2;i++){
    const p0=P[i-1],p1=P[i],p2=P[i+1],p3=P[i+2];
    for(let k=0;k<28;k++){
      const t=k/28,t2=t*t,t3=t2*t;
      rawPts.push([
        .5*(2*p1[0]+(-p0[0]+p2[0])*t+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3),
        .5*(2*p1[1]+(-p0[1]+p2[1])*t+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3)
      ]);
    }
  }
  rawPts.push(P[P.length-2].slice());
  // 等弧长重采样
  const ds=3, px=[rawPts[0][0]], py=[rawPts[0][1]];
  let acc=0, prev=rawPts[0];
  for(let i=1;i<rawPts.length;i++){
    let cur=rawPts[i];
    let d=Math.hypot(cur[0]-prev[0],cur[1]-prev[1]);
    while(acc+d>=ds){
      const t=(ds-acc)/d;
      prev=[prev[0]+(cur[0]-prev[0])*t, prev[1]+(cur[1]-prev[1])*t];
      px.push(prev[0]); py.push(prev[1]);
      d=Math.hypot(cur[0]-prev[0],cur[1]-prev[1]); acc=0;
    }
    acc+=d; prev=cur;
  }
  const n=px.length, tx=new Float32Array(n), ty=new Float32Array(n);
  for(let i=0;i<n;i++){
    const a=Math.max(0,i-1), b=Math.min(n-1,i+1);
    const dx=px[b]-px[a], dy=py[b]-py[a], L=Math.hypot(dx,dy)||1;
    tx[i]=dx/L; ty[i]=dy/L;
  }
  return {px,py,tx,ty,ds,len:(n-1)*ds};
}
function trkPos(s){
  const t=track, f=Math.min(Math.max(s,0),t.len)/t.ds, i=Math.min(Math.floor(f),t.px.length-2), u=f-i;
  return [t.px[i]+(t.px[i+1]-t.px[i])*u, t.py[i]+(t.py[i+1]-t.py[i])*u];
}
function trkTan(s){
  const t=track, i=Math.min(Math.max(Math.round(s/t.ds),0),t.px.length-1);
  return [t.tx[i],t.ty[i]];
}

/* ============ 关卡定义 ============ */
function spiralPts(cx,cy,sx,turns,r0,r1,a0){
  const pts=[],steps=Math.round(turns*13);
  for(let i=0;i<=steps;i++){
    const t=i/steps, a=a0+t*turns*Math.PI*2, r=r0+(r1-r0)*t;
    pts.push([cx+Math.cos(a)*r*sx, cy+Math.sin(a)*r]);
  }
  return pts;
}
function ringSpiralPts(){
  const cx=500,cy=300,sx=1.64,a0=-0.6,pts=[[1090,95]];
  for(let i=0;i<=16;i++){
    const a=a0+i/16*Math.PI*2, r=270+13*Math.sin(i*2.1);
    pts.push([cx+Math.cos(a)*r*sx, cy+Math.sin(a)*r]);
  }
  for(let i=1;i<=17;i++){
    const t=i/17, a=a0+Math.PI*2*(1+t*1.3), r=270+(126-270)*t;
    pts.push([cx+Math.cos(a)*r*sx, cy+Math.sin(a)*r]);
  }
  return pts;
}
const LEVELS=[
 {name:'大回环',colors:4,total:60,speed:17,par:120,shooter:[500,385],pts:()=>[
   [-90,200],[60,115],[250,58],[520,45],[780,68],[930,150],[958,300],[898,452],[700,548],
   [450,558],[228,520],[98,428],[80,308],[148,208],[290,158],[430,168],[538,238]]},
 {name:'S 蛇形',colors:4,total:70,speed:18.5,par:140,shooter:[500,415],pts:()=>[
   [-90,75],[150,68],[400,62],[650,68],[855,95],[938,180],[888,262],[700,292],[450,300],
   [200,288],[92,352],[96,448],[210,512],[430,528],[650,522],[838,498],[925,425],[878,348]]},
 {name:'双螺旋向心',colors:5,total:80,speed:20,par:160,shooter:[500,300],
   pts:()=>spiralPts(500,300,1.62,2.35,345,118,-0.35)},
 {name:'之字险径',colors:5,total:86,speed:21.5,par:170,shooter:[500,278],pts:()=>[
   [-90,60],[300,60],[700,60],[872,60],[932,108],[932,158],[872,205],[600,205],[300,205],
   [128,205],[68,252],[68,302],[128,350],[400,350],[700,350],[872,350],[932,398],[932,448],
   [872,495],[600,495],[300,495],[160,498],[80,545]]},
 {name:'外环内旋',colors:6,total:94,speed:23,par:185,shooter:[500,300],pts:ringSpiralPts},
];

/* ============ 全局状态 ============ */
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let cssScale=1, dpr=1;
let state='menu';            // menu | intro | play | clearwait | win | drain | over | victory
let levelIdx=0, lvl=LEVELS[0], track=null;
let balls=[], shots=[], parts=[], floats=[], swallows=[], rings=[];
let score=0, best=0, levelStartScore=0, chainCombo=0, levelTime=0, stateTimer=0;
let curBall=0, nxtBall=1, aimAng=-Math.PI/2, cooldown=0, recoil=0, swapT=0;
let fx={back:0,slow:0,aim:0};
let rushTarget=0, danger=0, hbT=0, bgmT=0, bgmStep=0, swallowSndT=0;
let shooter=[500,300];
try{best=+localStorage.getItem('ai4399-zuma-best')||0}catch(e){}

/* ============ 工具 ============ */
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const rnd=(a,b)=>a+Math.random()*(b-a);
function minGap(a,b){return R*(a.grow+b.grow);}
function hexRgb(h){const n=parseInt(h.slice(1),16);return[(n>>16)&255,(n>>8)&255,n&255];}
function mix(h1,h2,t){const a=hexRgb(h1),b=hexRgb(h2);
  return `rgb(${a.map((v,i)=>Math.round(v+(b[i]-v)*t)).join(',')})`;}

/* ============ 音效（WebAudio 合成） ============ */
let AC=null,master,muted=false;
function audioInit(){
  if(!AC){
    const C=window.AudioContext||window.webkitAudioContext; if(!C)return;
    AC=new C(); master=AC.createGain(); master.gain.value=.5; master.connect(AC.destination);
  }
  if(AC.state==='suspended')AC.resume();
}
function tone(f0,f1,d,type,v,dt0){
  if(!AC||muted)return;
  const t=AC.currentTime+(dt0||0), o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(f0,t);
  if(f1)o.frequency.exponentialRampToValueAtTime(Math.max(f1,1),t+d);
  g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(.0001,t+d);
  o.connect(g); g.connect(master); o.start(t); o.stop(t+d+.03);
}
function noiseS(d,v,f,type,dt0){
  if(!AC||muted)return;
  const t=AC.currentTime+(dt0||0), len=Math.max(1,(AC.sampleRate*d)|0);
  const buf=AC.createBuffer(1,len,AC.sampleRate), ch=buf.getChannelData(0);
  for(let i=0;i<len;i++)ch[i]=Math.random()*2-1;
  const src=AC.createBufferSource(); src.buffer=buf;
  const fl=AC.createBiquadFilter(); fl.type=type||'bandpass'; fl.frequency.value=f; fl.Q.value=1.2;
  const g=AC.createGain(); g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(.0001,t+d);
  src.connect(fl); fl.connect(g); g.connect(master); src.start(t); src.stop(t+d+.02);
}
const sShoot=()=>{tone(540,200,.11,'triangle',.22); noiseS(.05,.1,3200);};
const sThock=()=>{tone(170,90,.07,'sine',.4); noiseS(.04,.22,500,'lowpass');};
const sClack=()=>{noiseS(.03,.3,2600); tone(900,500,.04,'square',.07);};
const sSwap=()=>{tone(330,470,.08,'triangle',.16);};
function sMatch(combo){
  const m=1+Math.min(combo,6)*.13;
  [0,1,2].forEach(i=>tone(430*m*Math.pow(1.26,i),null,.17,'sine',.2,i*.055));
  noiseS(.12,.12,1800,'highpass');
}
const sBoom=()=>{noiseS(.45,.5,300,'lowpass'); tone(95,34,.4,'sine',.55);};
const sPower=()=>{tone(620,1240,.18,'square',.12); tone(310,620,.18,'triangle',.14,.05);};
const sSwallow=()=>{tone(280,55,.3,'sawtooth',.14);};
const sHeart=()=>{tone(60,42,.13,'sine',.55); tone(54,40,.11,'sine',.45,.16);};
const sWin=()=>{[523,659,784,1046,1318].forEach((f,i)=>tone(f,null,.3,'triangle',.22,i*.12));};
const sLose=()=>{tone(196,49,1.3,'sawtooth',.25); tone(98,30,1.3,'sine',.3,.1);};

/* ============ 预渲染：背景 / 轨道 / 珠子贴图（纯视觉层） ============ */
const QS=2, PHASES=3, SR=42;
let bgCv=null, trackCv=null, fogCv=null;
const sprites=[];                 // sprites[色][相位] = 可旋转珠体
let glossCv=null, shadowCv=null;  // 不随滚动旋转的高光层 / 投影层
const glowCache=new Map();
function glowSpr(rgb){
  let g=glowCache.get(rgb); if(g)return g;
  g=document.createElement('canvas'); g.width=g.height=64;
  const c=g.getContext('2d');
  const gr=c.createRadialGradient(32,32,1,32,32,31);
  gr.addColorStop(0,'rgba(255,255,255,.9)');
  gr.addColorStop(.25,`rgba(${rgb},.75)`);
  gr.addColorStop(1,`rgba(${rgb},0)`);
  c.fillStyle=gr; c.fillRect(0,0,64,64);
  glowCache.set(rgb,g); return g;
}
(function makeSprites(){
  // 底部投影（偏右下，独立层，不随珠体旋转）
  shadowCv=document.createElement('canvas'); shadowCv.width=shadowCv.height=96;
  let c=shadowCv.getContext('2d');
  let g=c.createRadialGradient(52,58,5,52,58,42);
  g.addColorStop(0,'rgba(0,0,0,.46)'); g.addColorStop(.6,'rgba(0,0,0,.3)'); g.addColorStop(1,'rgba(0,0,0,0)');
  c.fillStyle=g; c.beginPath(); c.ellipse(52,58,40,36,0,0,7); c.fill();
  // 高光层：左上镜面高光 + 右下环境反光
  glossCv=document.createElement('canvas'); glossCv.width=glossCv.height=96;
  c=glossCv.getContext('2d'); c.translate(48,48); c.lineCap='round';
  c.beginPath(); c.arc(0,0,35,Math.PI*.08,Math.PI*.6);
  c.strokeStyle='rgba(255,255,255,.15)'; c.lineWidth=7; c.stroke();
  c.beginPath(); c.arc(0,0,32,Math.PI*.2,Math.PI*.46);
  c.strokeStyle='rgba(255,255,255,.13)'; c.lineWidth=4; c.stroke();
  g=c.createRadialGradient(-16,-18,1,-16,-18,17);
  g.addColorStop(0,'rgba(255,255,255,.9)'); g.addColorStop(.4,'rgba(255,255,255,.4)'); g.addColorStop(1,'rgba(255,255,255,0)');
  c.fillStyle=g; c.beginPath(); c.ellipse(-15,-17,15,11,-.72,0,7); c.fill();
  c.beginPath(); c.ellipse(-15,-18,7,4.4,-.72,0,7); c.fillStyle='rgba(255,255,255,.92)'; c.fill();
  c.beginPath(); c.arc(7,-27,2.4,0,7); c.fillStyle='rgba(255,255,255,.5)'; c.fill();
  // 每色 3 帧纹理相位的玻璃珠体
  for(const col of COLORS){
    const dRgb=hexRgb(col.d).join(','), frames=[];
    for(let ph=0;ph<PHASES;ph++){
      const s=document.createElement('canvas'); s.width=s.height=96;
      const cc=s.getContext('2d'); cc.translate(48,48);
      let bg=cc.createRadialGradient(-13,-15,3,0,2,46);
      bg.addColorStop(0,mix(col.c,'#ffffff',.6));
      bg.addColorStop(.22,mix(col.c,'#ffffff',.16));
      bg.addColorStop(.62,col.c);
      bg.addColorStop(1,col.d);
      cc.beginPath(); cc.arc(0,0,SR,0,7); cc.fillStyle=bg; cc.fill();
      // 内部旋涡纹理（随相位转动）
      cc.save();
      cc.beginPath(); cc.arc(0,0,SR-3,0,7); cc.clip();
      cc.rotate(ph*.7); cc.lineCap='round';
      for(let k=0;k<3;k++){
        cc.save(); cc.rotate(k*2.094);
        cc.beginPath(); cc.moveTo(-4,0); cc.quadraticCurveTo(15,-18,28,2);
        cc.strokeStyle='rgba(255,255,255,.09)'; cc.lineWidth=6; cc.stroke();
        cc.beginPath(); cc.moveTo(-2,-25); cc.quadraticCurveTo(-20,-7,-12,14);
        cc.strokeStyle=`rgba(${dRgb},.45)`; cc.lineWidth=5; cc.stroke();
        cc.restore();
      }
      // 星点
      const fl=[[8,-12,2.2],[21,6,1.6],[-10,19,1.9],[-23,-7,1.5],[3,25,1.4],[15,-23,1.7]];
      for(let k=0;k<fl.length;k++){
        const a=ph*.7+k;
        cc.globalAlpha=.3+.3*Math.abs(Math.sin(a));
        cc.beginPath(); cc.arc(fl[k][0],fl[k][1],fl[k][2],0,7);
        cc.fillStyle='#fff'; cc.fill();
      }
      cc.globalAlpha=1; cc.restore();
      // 边缘暗化（球体厚度感）
      let dg=cc.createRadialGradient(0,0,26,0,0,SR);
      dg.addColorStop(0,'rgba(0,0,0,0)'); dg.addColorStop(.78,'rgba(0,0,0,.16)'); dg.addColorStop(1,'rgba(0,0,0,.45)');
      cc.beginPath(); cc.arc(0,0,SR,0,7); cc.fillStyle=dg; cc.fill();
      cc.beginPath(); cc.arc(0,0,SR-.8,0,7); cc.strokeStyle='rgba(0,0,0,.35)'; cc.lineWidth=1.6; cc.stroke();
      frames.push(s);
    }
    sprites.push(frames);
  }
})();
/* —— 萤火虫（程序漂移，零状态更新）—— */
const fireflies=[];
for(let i=0;i<22;i++)fireflies.push({
  x:Math.random()*W, y:Math.random()*H,
  ph:Math.random()*7, sp:.18+Math.random()*.5, r:2.5+Math.random()*4.5});
function makeBg(){
  bgCv=document.createElement('canvas'); bgCv.width=W*QS; bgCv.height=H*QS;
  const c=bgCv.getContext('2d'); c.scale(QS,QS);
  let seed=7;
  const rng=()=>{seed=(seed*16807)%2147483647;return seed/2147483647;};
  // 神庙暗调底色
  let g=c.createLinearGradient(0,0,W*.22,H);
  g.addColorStop(0,'#131a19'); g.addColorStop(.5,'#0d1213'); g.addColorStop(1,'#0a0e10');
  c.fillStyle=g; c.fillRect(0,0,W,H);
  // 远景石墙砖缝（下半部）
  c.strokeStyle='rgba(130,140,150,.05)'; c.lineWidth=1;
  for(let row=0,y=216;y<H+40;y+=48,row++){
    c.beginPath(); c.moveTo(0,y); c.lineTo(W,y); c.stroke();
    for(let x=(row%2)*46;x<W;x+=92){
      const j=(rng()-.5)*8;
      c.beginPath(); c.moveTo(x+j,y); c.lineTo(x+j,y+48); c.stroke();
    }
  }
  // 残柱剪影
  for(const[px,pw,phh]of[[108,46,330],[836,54,390],[505,38,250]]){
    c.fillStyle='rgba(4,6,7,.5)';
    c.beginPath();
    c.moveTo(px-pw/2,H); c.lineTo(px-pw/2+4,H-phh);
    c.quadraticCurveTo(px,H-phh-14,px+pw/2-4,H-phh);
    c.lineTo(px+pw/2,H); c.closePath(); c.fill();
    c.fillRect(px-pw/2-7,H-phh-4,pw+14,9);
  }
  // 石面苔斑
  for(let i=0;i<130;i++){
    const x=rng()*W, y=rng()*H, r=8+rng()*26;
    c.beginPath(); c.ellipse(x,y,r,r*(.5+rng()*.4),rng()*3.14,0,7);
    c.fillStyle=`rgba(${24+rng()*14|0},${38+rng()*18|0},${30+rng()*14|0},.13)`; c.fill();
  }
  // 顶部垂藤 + 叶
  for(let v=0;v<7;v++){
    const x0=40+rng()*(W-80), len=60+rng()*150, sway=(rng()-.5)*90;
    c.strokeStyle='rgba(22,38,22,.6)'; c.lineWidth=2.5+rng()*2;
    c.beginPath(); c.moveTo(x0,-4);
    c.quadraticCurveTo(x0+sway*.4,len*.5,x0+sway,len);
    c.stroke();
    for(let k=1;k<5;k++){
      const t=k/5, lx=x0+sway*t*t, ly=len*t;
      c.save(); c.translate(lx,ly); c.rotate(rng()*6.3);
      c.beginPath(); c.ellipse(5,0,7+rng()*4,3,0,0,7);
      c.fillStyle='rgba(26,46,26,.55)'; c.fill(); c.restore();
    }
  }
  // 底角大叶剪影
  for(const[bx,by,fl]of[[30,H+10,1],[W-30,H+16,-1]]){
    for(let k=0;k<5;k++){
      const a=-Math.PI/2+(k-2)*.36*fl;
      c.save(); c.translate(bx,by); c.rotate(a);
      c.beginPath(); c.moveTo(0,0);
      c.quadraticCurveTo(26*fl,-60,8*fl,-120-k*10);
      c.quadraticCurveTo(-14*fl,-66,0,0);
      c.fillStyle='rgba(8,18,10,.65)'; c.fill(); c.restore();
    }
  }
  // 左上体积光斜射
  c.save(); c.translate(140,-80); c.rotate(.6);
  for(const[off,w,a]of[[0,130,.05],[40,56,.08],[150,30,.1],[230,80,.045]]){
    const N=8;
    for(let k=0;k<N;k++){
      const f=Math.sin((k+.5)/N*Math.PI);
      const lg=c.createLinearGradient(0,0,0,H*1.5);
      lg.addColorStop(0,`rgba(225,240,185,${(a*f).toFixed(4)})`);
      lg.addColorStop(.7,`rgba(225,240,185,${(a*f*.35).toFixed(4)})`);
      lg.addColorStop(1,'rgba(225,240,185,0)');
      c.fillStyle=lg; c.fillRect(off+k*w/N,0,w/N+1,H*1.6);
    }
  }
  c.restore();
  // 地面浮雾
  for(const[my,mh,ma]of[[H-90,90,.05],[H-180,70,.035]]){
    const mg=c.createLinearGradient(0,my,0,my+mh);
    mg.addColorStop(0,'rgba(150,180,168,0)');
    mg.addColorStop(.6,`rgba(150,180,168,${ma})`);
    mg.addColorStop(1,'rgba(150,180,168,0)');
    c.fillStyle=mg; c.fillRect(0,my,W,mh);
  }
  // 渐晕
  const v=c.createRadialGradient(W/2,H/2,160,W/2,H/2,620);
  v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(0,0,5,.58)');
  c.fillStyle=v; c.fillRect(0,0,W,H);
}
function makeFog(){
  fogCv=document.createElement('canvas'); fogCv.width=512; fogCv.height=192;
  const c=fogCv.getContext('2d');
  let seed=23;
  const rng=()=>{seed=(seed*16807)%2147483647;return seed/2147483647;};
  for(let i=0;i<26;i++){
    const x=rng()*512, y=30+rng()*132, r=40+rng()*68;
    const g=c.createRadialGradient(x,y,2,x,y,r);
    g.addColorStop(0,'rgba(172,196,186,.09)'); g.addColorStop(1,'rgba(172,196,186,0)');
    c.fillStyle=g; c.beginPath(); c.arc(x,y,r,0,7); c.fill();
  }
}
function makeTrackCv(){
  trackCv=document.createElement('canvas'); trackCv.width=W*QS; trackCv.height=H*QS;
  const c=trackCv.getContext('2d'); c.scale(QS,QS);
  c.lineJoin='round'; c.lineCap='round';
  const path=()=>{c.beginPath(); c.moveTo(track.px[0],track.py[0]);
    for(let i=4;i<track.px.length;i+=4)c.lineTo(track.px[i],track.py[i]);
    c.lineTo(track.px[track.px.length-1],track.py[track.py.length-1]);};
  const off=(dx,dy,fn)=>{c.save(); c.translate(dx,dy); fn(); c.restore();};
  let seed=11+levelIdx*7;
  const rng=()=>{seed=(seed*16807)%2147483647;return seed/2147483647;};
  // 整体落影
  off(0,5,()=>{path(); c.strokeStyle='rgba(0,0,0,.5)'; c.lineWidth=SP+28; c.stroke();});
  // 石缘双层立体（上缘受光、下缘背光）
  off(0,-2,()=>{path(); c.strokeStyle='#6e6757'; c.lineWidth=SP+24; c.stroke();});
  off(0,2.5,()=>{path(); c.strokeStyle='#26221c'; c.lineWidth=SP+24; c.stroke();});
  path(); c.strokeStyle='#4c463c'; c.lineWidth=SP+21; c.stroke();
  // 内级台阶
  path(); c.strokeStyle='#2b2730'; c.lineWidth=SP+12; c.stroke();
  off(0,1.5,()=>{path(); c.strokeStyle='#191622'; c.lineWidth=SP+10; c.stroke();});
  // 槽壁与槽底
  path(); c.strokeStyle='#12101a'; c.lineWidth=SP+2; c.stroke();
  path(); c.strokeStyle='rgba(6,6,11,.92)'; c.lineWidth=SP-8; c.stroke();
  path(); c.strokeStyle='rgba(80,90,130,.05)'; c.lineWidth=3; c.stroke();
  // 沿途等距石刻刻度（双侧凿痕，暗刻+下缘受光）
  for(let s=26;s<track.len-20;s+=44){
    const p=trkPos(s), t=trkTan(s), nx=-t[1], ny=t[0];
    for(const side of[-1,1]){
      c.beginPath();
      c.moveTo(p[0]+nx*side*(R+5.5),p[1]+ny*side*(R+5.5));
      c.lineTo(p[0]+nx*side*(R+10.5),p[1]+ny*side*(R+10.5));
      c.strokeStyle='rgba(0,0,0,.4)'; c.lineWidth=2.2; c.stroke();
      c.beginPath();
      c.moveTo(p[0]+nx*side*(R+5.5),p[1]+ny*side*(R+5.5)+1.2);
      c.lineTo(p[0]+nx*side*(R+10.5),p[1]+ny*side*(R+10.5)+1.2);
      c.strokeStyle='rgba(205,192,150,.10)'; c.lineWidth=1; c.stroke();
    }
  }
  // 金色菱形镶刻
  for(let s=92;s<track.len-40;s+=176){
    const p=trkPos(s), t=trkTan(s), a=Math.atan2(t[1],t[0]);
    for(const side of[-1,1]){
      const x=p[0]-t[1]*side*(R+8), y=p[1]+t[0]*side*(R+8);
      c.save(); c.translate(x,y); c.rotate(a+Math.PI/4);
      c.strokeStyle='rgba(255,204,0,.14)'; c.lineWidth=1.4;
      c.strokeRect(-2.6,-2.6,5.2,5.2); c.restore();
    }
  }
  // 槽缘青苔
  for(let i=0;i<42;i++){
    const s=rng()*track.len, p=trkPos(s), t=trkTan(s);
    const side=rng()<.5?-1:1, d=R+6+rng()*5;
    const x=p[0]-t[1]*side*d, y=p[1]+t[0]*side*d;
    const g=c.createRadialGradient(x,y,1,x,y,4+rng()*6);
    g.addColorStop(0,'rgba(72,116,56,.2)'); g.addColorStop(1,'rgba(72,116,56,0)');
    c.fillStyle=g; c.beginPath(); c.arc(x,y,10,0,7); c.fill();
  }
}

/* ============ 关卡装载 ============ */
function loadLevel(i){
  levelIdx=i; lvl=LEVELS[i]; track=buildTrack(lvl.pts());
  shooter=lvl.shooter.slice();
  balls=[]; shots=[]; parts=[]; floats=[]; swallows=[]; rings=[];
  fx={back:0,slow:0,aim:0}; chainCombo=0; levelTime=0; danger=0;
  rushTarget=track.len*.45;
  // 生成珠链：保证无初始三连，随机特殊珠
  const cols=[]; let lastPu=-9;
  for(let k=0;k<lvl.total;k++){
    let col;
    do{ col=(Math.random()*lvl.colors)|0; }
    while(k>=2&&cols[k-1]===col&&cols[k-2]===col);
    cols.push(col);
  }
  for(let k=0;k<lvl.total;k++){
    const b={s:SP-k*SP, color:cols[k], pu:null, grow:1, check:false};
    if(k>5&&k-lastPu>4&&Math.random()<.085){
      b.pu=PU_TYPES[(Math.random()*4)|0]; lastPu=k;
    }
    balls.push(b);
  }
  balls.reverse();           // 索引升序 = s 升序，队尾[0]，队首[length-1]
  curBall=pickColor(); nxtBall=pickColor();
  makeTrackCv();
  hud();
}
function pickColor(){
  const present=new Set(); for(const b of balls)present.add(b.color);
  if(!present.size)return (Math.random()*lvl.colors)|0;
  const arr=[...present]; return arr[(Math.random()*arr.length)|0];
}
function recolorGuns(){
  if(!balls.length)return;
  const present=new Set(); for(const b of balls)present.add(b.color);
  if(!present.has(curBall))curBall=pickColor();
  if(!present.has(nxtBall))nxtBall=pickColor();
}

/* ============ 珠链核心逻辑 ============ */
function segmentsOf(){
  // 缺口判定固定用满尺寸间距：生长中的新珠不会被误判成缺口
  const segs=[]; let st=0;
  for(let i=1;i<balls.length;i++)
    if(balls[i].s-balls[i-1].s>SP+1.5){segs.push([st,i-1]); st=i;}
  if(balls.length)segs.push([st,balls.length-1]);
  return segs;
}
function runAt(i){
  const c=balls[i].color; let a=i,b=i;
  while(a>0&&balls[a-1].color===c&&balls[a].s-balls[a-1].s<=SP+4)a--;
  while(b<balls.length-1&&balls[b+1].color===c&&balls[b+1].s-balls[b].s<=SP+4)b++;
  return [a,b];
}
function removeRun(a,b,combo){
  const n=b-a+1, puQ=[];
  let cx=0,cy=0;
  for(let i=a;i<=b;i++){
    const p=trkPos(balls[i].s); cx+=p[0]; cy+=p[1];
    burst(p[0],p[1],COLORS[balls[i].color].c,14);
    if(balls[i].pu)puQ.push([balls[i].pu,p[0],p[1]]);
  }
  cx/=n; cy/=n;
  const pts=n*10*Math.min(Math.max(combo,1),8);
  score+=pts;
  floats.push({x:cx,y:cy,txt:'+'+pts,col:'#e8e8f0',t:0,big:false});
  if(combo>=2){
    floats.push({x:cx,y:cy-26,txt:'连锁 x'+combo+'!',col:'#ffcc00',t:0,big:true});
    sparkBurst(cx,cy,'255,205,80',12);
  }
  sMatch(combo);
  balls.splice(a,n);
  for(const[pu,x,y]of puQ)triggerPu(pu,x,y);
  recolorGuns(); hud();
}
function triggerPu(pu,x,y){
  floats.push({x,y,txt:PU_LABEL[pu],col:'#7fd3ff',t:0,big:true});
  if(pu==='back'){fx.back=3; sPower();}
  else if(pu==='slow'){fx.slow=5; sPower();}
  else if(pu==='aim'){fx.aim=10; sPower();}
  else if(pu==='bomb'){
    sBoom(); burst(x,y,'#ffb347',40); rings.push({x,y,t:0,r0:10,r1:120,col:'255,160,60'});
    const cand=[];
    for(let i=0;i<balls.length;i++){
      const p=trkPos(balls[i].s), d=Math.hypot(p[0]-x,p[1]-y);
      if(d<118)cand.push([d,balls[i]]);
    }
    cand.sort((u,v)=>u[0]-v[0]);
    const kill=cand.slice(0,5).map(c=>c[1]), puQ=[];
    let got=0;
    for(const k of kill){
      const idx=balls.indexOf(k); if(idx<0)continue;
      const p=trkPos(k.s);
      burst(p[0],p[1],COLORS[k.color].c,12);
      if(k.pu&&k.pu!=='bomb')puQ.push([k.pu,p[0],p[1]]);
      balls.splice(idx,1); got++;
    }
    if(got){score+=got*15; floats.push({x,y:y+22,txt:'+'+got*15,col:'#ffb347',t:0,big:false});}
    for(const[p2,x2,y2]of puQ)triggerPu(p2,x2,y2);
    recolorGuns(); hud();
  }
}
function updateChain(dt){
  if(!balls.length)return;
  // 记录缺口边界（对象引用，供合拢检测）
  const segs=segmentsOf(), pairs=[];
  for(let k=1;k<segs.length;k++)pairs.push([balls[segs[k][0]-1],balls[segs[k][0]]]);
  // 尾段推进
  const head=balls[balls.length-1];
  let v;
  if(fx.back>0)v=-95;
  else if(segs.length>1)v=0;                       // 有缺口：后段暂停
  else{
    v=lvl.speed*(fx.slow>0?.32:1);
    if(head.s<rushTarget)v=RUSH_V;                 // 开局快速进场
  }
  for(let i=segs[0][0];i<=segs[0][1];i++)balls[i].s+=v*dt;
  // 前段回吸
  for(let k=1;k<segs.length;k++){
    const [a,b]=segs[k];
    const gap=balls[a].s-balls[a-1].s-minGap(balls[a-1],balls[a]);
    const mv=Math.min(Math.max(gap,0),RETREAT*dt);
    for(let i=a;i<=b;i++)balls[i].s-=mv;
  }
  // 插入生长 + 挤开约束（只向前推，不破坏缺口）
  for(const b of balls)if(b.grow<1)b.grow=Math.min(1,b.grow+dt/.13);
  for(let i=1;i<balls.length;i++){
    const mg=minGap(balls[i-1],balls[i]);
    if(balls[i].s<balls[i-1].s+mg)balls[i].s=balls[i-1].s+mg;
  }
  // 缺口合拢检测（咔哒 + 同色连锁）
  for(const[p,q]of pairs){
    const i=balls.indexOf(q);
    if(i<1||balls[i-1]!==p)continue;
    if(q.s-p.s<=minGap(p,q)+1){
      sClack();
      const pp=trkPos(q.s); rings.push({x:pp[0],y:pp[1],t:0,r0:6,r1:34,col:'200,210,255'});
      if(p.color===q.color){
        const [a,b]=runAt(i);
        if(b-a+1>=3){chainCombo=Math.max(chainCombo,1)+1; removeRun(a,b,chainCombo);}
        else chainCombo=0;
      }else chainCombo=0;
    }
  }
  // 插入落位后的消除检查
  for(let i=balls.length-1;i>=0;i--){
    const b=balls[i];
    if(b.check&&b.grow>=1){
      b.check=false;
      const [a,b2]=runAt(i);
      if(b2-a+1>=3){chainCombo=1; removeRun(a,b2,chainCombo);}
      else chainCombo=0;
    }
  }
  // 危险 & 失败
  if(balls.length){
    const hs=balls[balls.length-1].s;
    danger=clamp((hs-(track.len-210))/210,0,1);
    if(hs>=track.len-1&&state==='play')startDrain();
  }else danger=0;
}
function startDrain(){
  state='drain'; stateTimer=0; shots=[]; sLose();
}
function updateDrain(dt){
  for(const b of balls)b.s+=640*dt;
  while(balls.length&&balls[balls.length-1].s>=track.len){
    const b=balls.pop();
    const p=trkPos(track.len);
    swallows.push({x:p[0],y:p[1],col:b.color,t:0});
    score=Math.max(0,score-10);
    floats.push({x:p[0],y:p[1]-20,txt:'-10',col:'#ff6b5e',t:0,big:false});
    swallowSndT-=1;
    if(swallowSndT<=0){sSwallow(); swallowSndT=2;}
    hud();
  }
  if(!balls.length){
    stateTimer+=dt;
    if(stateTimer>.9)gameOver();
  }
}

/* ============ 发射 / 插入 ============ */
function muzzlePos(){
  return [shooter[0]+Math.cos(aimAng)*(46-recoil), shooter[1]+Math.sin(aimAng)*(46-recoil)];
}
function shoot(){
  if(state!=='play'||cooldown>0)return;
  const m=muzzlePos();
  shots.push({x:m[0],y:m[1],dx:Math.cos(aimAng),dy:Math.sin(aimAng),color:curBall,bounced:0,dist:0});
  curBall=nxtBall; nxtBall=pickColor();
  cooldown=.16; recoil=7; sShoot();
}
function swapBalls(){
  if(state!=='play')return;
  const t=curBall; curBall=nxtBall; nxtBall=t; swapT=.28; sSwap();
}
function updateShots(dt){
  for(let si=shots.length-1;si>=0;si--){
    const sh=shots[si];
    let dead=false;
    const SUB=3, step=SHOT_V*dt/SUB;
    for(let k=0;k<SUB&&!dead;k++){
      sh.x+=sh.dx*step; sh.y+=sh.dy*step; sh.dist+=step;
      // 边缘反弹（一次）
      if(sh.x<R||sh.x>W-R||sh.y<R||sh.y>H-R){
        if(sh.bounced<1){
          if(sh.x<R){sh.x=R;sh.dx=Math.abs(sh.dx);}
          if(sh.x>W-R){sh.x=W-R;sh.dx=-Math.abs(sh.dx);}
          if(sh.y<R){sh.y=R;sh.dy=Math.abs(sh.dy);}
          if(sh.y>H-R){sh.y=H-R;sh.dy=-Math.abs(sh.dy);}
          sh.bounced++;
        }else if(sh.x<-R*2||sh.x>W+R*2||sh.y<-R*2||sh.y>H+R*2){dead=true;break;}
      }
      // 命中珠链
      const hit2=(2*R-3)*(2*R-3);
      for(let i=0;i<balls.length;i++){
        const b=balls[i]; if(b.s<R)continue;
        const p=trkPos(b.s), dx=sh.x-p[0], dy=sh.y-p[1];
        if(dx*dx+dy*dy<hit2){
          insertBall(i,sh); dead=true; break;
        }
      }
    }
    if(dead)shots.splice(si,1);
  }
}
function insertBall(i,sh){
  const b=balls[i], p=trkPos(b.s), t=trkTan(b.s);
  const ahead=(sh.x-p[0])*t[0]+(sh.y-p[1])*t[1]>0;
  const nb={s:b.s+(ahead?1.5:-1.5), color:sh.color, pu:null, grow:0, check:true};
  balls.splice(ahead?i+1:i,0,nb);
  sThock();
  const ip=trkPos(nb.s);
  rings.push({x:ip[0],y:ip[1],t:0,r0:8,r1:30,col:'255,255,255'});
}

/* ============ 粒子 / 飘字 ============ */
function burst(x,y,col,n){
  const rgb=hexRgb(col).join(',');
  parts.push({kind:'flash',x,y,t:0,life:.16,col:rgb,sz:R*2.3});
  for(let i=0;i<n;i++){
    const a=Math.random()*6.3, sp=rnd(40,250);
    if(i%5<3)parts.push({kind:'shard',x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-55,
      life:rnd(.4,.75),t:0,col,sz:rnd(3,6.5),rot:Math.random()*6.3,vr:rnd(-9,9)});
    else parts.push({kind:'spark',x,y,vx:Math.cos(a)*sp*.7,vy:Math.sin(a)*sp*.7-30,
      life:rnd(.25,.55),t:0,col:rgb,sz:rnd(4,9)});
  }
}
function sparkBurst(x,y,rgb,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*6.3, sp=rnd(60,210);
    parts.push({kind:'spark',x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-60,
      life:rnd(.4,.7),t:0,col:rgb,sz:rnd(5,10)});
  }
}
function updateFx(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i]; p.t+=dt;
    if(p.t>p.life){parts.splice(i,1);continue;}
    if(p.kind==='flash')continue;
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=320*dt; p.vx*=1-2.2*dt;
    if(p.kind==='shard')p.rot+=p.vr*dt;
  }
  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i]; f.t+=dt;
    if(f.t>1.2)floats.splice(i,1);
  }
  for(let i=swallows.length-1;i>=0;i--){
    swallows[i].t+=dt;
    if(swallows[i].t>.4)swallows.splice(i,1);
  }
  for(let i=rings.length-1;i>=0;i--){
    rings[i].t+=dt;
    if(rings[i].t>.4)rings.splice(i,1);
  }
}

/* ============ 渲染 ============ */
function drawHole(under){
  const p=trkPos(track.len), t=trkTan(track.len);
  if(under){
    const g=ctx.createRadialGradient(p[0],p[1],4,p[0],p[1],36);
    g.addColorStop(0,'#000');
    g.addColorStop(.55,danger>0?`rgb(${30+80*danger|0},7,7)`:'#05060a');
    g.addColorStop(1,'rgba(5,6,10,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p[0],p[1],36,0,7); ctx.fill();
    return;
  }
  const pulse=.6+.4*Math.sin(perfNow*8);
  const glow=danger>0?(.35+.65*danger)*pulse:0;
  // 洞口石环 + 凿痕
  ctx.save(); ctx.translate(p[0],p[1]);
  ctx.strokeStyle='#221f1a'; ctx.lineWidth=9;
  ctx.beginPath(); ctx.arc(0,0,27,0,7); ctx.stroke();
  ctx.strokeStyle='#4c463c'; ctx.lineWidth=6;
  ctx.beginPath(); ctx.arc(0,0,27,0,7); ctx.stroke();
  ctx.strokeStyle='#6b6354'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,0,30.5,0,7); ctx.stroke();
  ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.lineWidth=2;
  for(let k=0;k<10;k++){
    const a=k*Math.PI/5+.31;
    ctx.beginPath(); ctx.moveTo(Math.cos(a)*24,Math.sin(a)*24);
    ctx.lineTo(Math.cos(a)*30,Math.sin(a)*30); ctx.stroke();
  }
  if(glow>0){
    ctx.globalAlpha=glow*.8;
    ctx.drawImage(glowSpr('255,42,25'),-34,-34,68,68);
    ctx.globalAlpha=1;
  }
  ctx.restore();
  // 石雕骷髅（嘴朝来珠方向；近珠时眼亮+张口）
  ctx.save();
  ctx.translate(p[0]+t[0]*25,p[1]+t[1]*25);
  ctx.rotate(Math.atan2(t[0],-t[1]));
  ctx.scale(1.22,1.22);
  let jaw=danger*6.5;
  if(state==='drain')jaw=5+3.5*Math.sin(perfNow*16);
  const bone=ctx.createRadialGradient(-5,-9,3,0,-3,20);
  bone.addColorStop(0,danger>0?`rgb(236,${204-86*danger|0},${182-110*danger|0})`:'#ded8c2');
  bone.addColorStop(.7,'#9c947f'); bone.addColorStop(1,'#5c564a');
  ctx.fillStyle=bone;
  ctx.beginPath();
  ctx.arc(0,-5,14.5,Math.PI*.92,Math.PI*2.08);
  ctx.quadraticCurveTo(13.8,4,9,7); ctx.lineTo(-9,7);
  ctx.quadraticCurveTo(-13.8,4,-14.4,-3.5);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(20,16,10,.55)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.strokeStyle='rgba(40,34,24,.4)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,-19.2); ctx.lineTo(0,-12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-7,-15); ctx.quadraticCurveTo(-4,-12,-6,-9); ctx.stroke();
  // 眼窝 + 发光
  ctx.fillStyle='#0a0a12';
  ctx.beginPath(); ctx.ellipse(-5.6,-5,4.2,4.8,.15,0,7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(5.6,-5,4.2,4.8,-.15,0,7); ctx.fill();
  const amber=glowSpr('255,180,70');
  ctx.globalAlpha=Math.max((.3+.22*Math.sin(perfNow*2.2))*(1-danger),0);
  ctx.drawImage(amber,-11.6,-11,12,12); ctx.drawImage(amber,-.4,-11,12,12);
  if(danger>0){
    const red=glowSpr('255,42,25');
    ctx.globalAlpha=glow;
    ctx.drawImage(red,-13.6,-13,16,16); ctx.drawImage(red,-2.4,-13,16,16);
  }
  ctx.globalAlpha=1;
  // 鼻 + 上排牙
  ctx.fillStyle='#0a0a12';
  ctx.beginPath(); ctx.moveTo(0,-1.5); ctx.lineTo(-2.4,3.2); ctx.lineTo(2.4,3.2); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#cfc7ae';
  for(let k=-3;k<=3;k++){if(!k)continue; ctx.fillRect(k*2.6-1.1,6,2.2,4.2);}
  // 口腔暗部（张口可见）
  if(jaw>0){ctx.fillStyle='#0a0a12'; ctx.fillRect(-7.5,8.6,15,2.4+jaw);}
  // 下颌（张口动画）
  ctx.translate(0,9.5+jaw);
  ctx.beginPath(); ctx.moveTo(-8.5,1); ctx.quadraticCurveTo(0,8,8.5,1);
  ctx.lineTo(7,-1.5); ctx.lineTo(-7,-1.5); ctx.closePath();
  ctx.fillStyle='#b3aa92'; ctx.fill();
  ctx.strokeStyle='rgba(20,16,10,.5)'; ctx.lineWidth=1.2; ctx.stroke();
  ctx.fillStyle='#cfc7ae';
  for(let k=-2;k<=2;k++)ctx.fillRect(k*3-1,-4.4,2,3.4);
  ctx.restore();
}
function drawTunnel(){
  const p=trkPos(2), t=trkTan(2);
  ctx.save(); ctx.translate(p[0],p[1]); ctx.rotate(Math.atan2(t[1],t[0]));
  const g=ctx.createRadialGradient(0,0,2,0,0,30);
  g.addColorStop(0,'#000'); g.addColorStop(1,'#0e1410');
  ctx.fillStyle=g; ctx.beginPath(); ctx.ellipse(-4,0,16,R+10,0,0,7); ctx.fill();
  // 石拱
  ctx.strokeStyle='#221f1a'; ctx.lineWidth=8;
  ctx.beginPath(); ctx.ellipse(-4,0,16,R+11,0,-Math.PI/2,Math.PI/2); ctx.stroke();
  ctx.strokeStyle='#4c463c'; ctx.lineWidth=5.5;
  ctx.beginPath(); ctx.ellipse(-4,0,16,R+11,0,-Math.PI/2,Math.PI/2); ctx.stroke();
  ctx.strokeStyle='#6b6354'; ctx.lineWidth=1.6;
  ctx.beginPath(); ctx.ellipse(-4,0,19,R+14,0,-Math.PI/2,Math.PI/2); ctx.stroke();
  // 拱石刻缝
  ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.lineWidth=1.6;
  for(let k=-2;k<=2;k++){
    const a=k*.52;
    ctx.beginPath();
    ctx.moveTo(-4+Math.cos(a)*13,Math.sin(a)*(R+7));
    ctx.lineTo(-4+Math.cos(a)*19,Math.sin(a)*(R+14));
    ctx.stroke();
  }
  // 拱顶石
  ctx.save(); ctx.translate(13.5,0); ctx.rotate(Math.PI/4);
  ctx.fillStyle='#57503f'; ctx.fillRect(-3.4,-3.4,6.8,6.8);
  ctx.strokeStyle='rgba(255,204,0,.2)'; ctx.lineWidth=1; ctx.strokeRect(-3.4,-3.4,6.8,6.8);
  ctx.restore();
  ctx.restore();
}
function drawBall(x,y,col,r,rot,ph){
  const sc=(r||R)/SR*48;
  ctx.drawImage(shadowCv,x-sc,y-sc,sc*2,sc*2);
  const f=sprites[col][ph||0];
  if(rot){
    ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
    ctx.drawImage(f,-sc,-sc,sc*2,sc*2);
    ctx.restore();
  }else ctx.drawImage(f,x-sc,y-sc,sc*2,sc*2);
  ctx.drawImage(glossCv,x-sc,y-sc,sc*2,sc*2);
}
function drawPuIcon(x,y,pu){
  const pul=.65+.35*Math.sin(perfNow*6);
  ctx.save(); ctx.translate(x,y); ctx.globalAlpha=pul;
  ctx.strokeStyle='#fff'; ctx.fillStyle='#fff'; ctx.lineWidth=2.4; ctx.lineCap='round';
  ctx.shadowColor='rgba(255,255,255,.9)'; ctx.shadowBlur=8;
  if(pu==='back'){
    ctx.beginPath(); ctx.moveTo(2,-6); ctx.lineTo(-5,0); ctx.lineTo(2,6); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(9,-6); ctx.lineTo(2,0); ctx.lineTo(9,6); ctx.closePath(); ctx.fill();
  }else if(pu==='slow'){
    for(let k=0;k<3;k++){
      const a=k*Math.PI/3;
      ctx.beginPath(); ctx.moveTo(Math.cos(a)*8,Math.sin(a)*8);
      ctx.lineTo(-Math.cos(a)*8,-Math.sin(a)*8); ctx.stroke();
    }
  }else if(pu==='bomb'){
    ctx.beginPath(); ctx.arc(0,1,5.5,0,7); ctx.fill();
    ctx.beginPath(); ctx.moveTo(3,-3); ctx.lineTo(7,-8); ctx.stroke();
    ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.arc(7,-8,2.2,0,7); ctx.fill();
  }else{
    ctx.beginPath(); ctx.arc(0,0,7,0,7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-10,0); ctx.lineTo(10,0); ctx.moveTo(0,-10); ctx.lineTo(0,10); ctx.stroke();
  }
  ctx.restore();
}
function castAim(){
  let x=shooter[0]+Math.cos(aimAng)*48, y=shooter[1]+Math.sin(aimAng)*48;
  let dx=Math.cos(aimAng), dy=Math.sin(aimAng), b=0;
  const pts=[[x,y]], hit2=(2*R-3)*(2*R-3);
  for(let i=0;i<340;i++){
    x+=dx*7; y+=dy*7;
    if(x<R||x>W-R||y<R||y>H-R){
      if(b<1){
        if(x<R){x=R;dx=Math.abs(dx);} if(x>W-R){x=W-R;dx=-Math.abs(dx);}
        if(y<R){y=R;dy=Math.abs(dy);} if(y>H-R){y=H-R;dy=-Math.abs(dy);}
        pts.push([x,y]); b++;
      }else break;
    }
    let hit=false;
    for(const bl of balls){
      if(bl.s<R)continue;
      const p=trkPos(bl.s), ddx=x-p[0], ddy=y-p[1];
      if(ddx*ddx+ddy*ddy<hit2){hit=true;break;}
    }
    if(hit){pts.push([x,y]); return {pts,hit:true};}
  }
  pts.push([x,y]);
  return {pts,hit:false};
}
function drawShooter(){
  const sx=shooter[0], sy=shooter[1];
  ctx.save(); ctx.translate(sx,sy);
  // 神庙石座
  let g=ctx.createRadialGradient(-10,-12,4,0,0,40);
  g.addColorStop(0,'#5a5347'); g.addColorStop(.65,'#3a352c'); g.addColorStop(1,'#211e18');
  ctx.beginPath(); ctx.arc(0,4,39,0,7); ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fill();
  ctx.beginPath(); ctx.arc(0,0,38,0,7); ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle='#6b6354'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(0,0,38,0,7); ctx.stroke();
  ctx.strokeStyle='rgba(255,204,0,.3)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(0,0,31.5,0,7); ctx.stroke();
  // 符文刻饰
  ctx.fillStyle='rgba(255,204,0,.18)';
  for(let k=0;k<8;k++){
    const a=k*Math.PI/4+Math.PI/8;
    ctx.save(); ctx.translate(Math.cos(a)*34.5,Math.sin(a)*34.5); ctx.rotate(a+Math.PI/2);
    ctx.fillRect(-1.5,-3.2,3,6.4); ctx.restore();
  }
  /* —— 石蛙图腾（随瞄准转向，发射有后坐）—— */
  ctx.rotate(aimAng);
  ctx.translate(-recoil*.9,0);
  // 后腿
  ctx.fillStyle='#33502c';
  ctx.beginPath(); ctx.ellipse(-16,-19,11,7,-.55,0,7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-16,19,11,7,.55,0,7); ctx.fill();
  // 身体
  g=ctx.createRadialGradient(7,-8,4,0,0,34);
  g.addColorStop(0,'#82a45c'); g.addColorStop(.55,'#4f7140'); g.addColorStop(1,'#243520');
  ctx.beginPath(); ctx.ellipse(-1,0,28,22,0,0,7); ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle='rgba(10,16,8,.6)'; ctx.lineWidth=1.5; ctx.stroke();
  // 背部斑纹
  ctx.fillStyle='rgba(18,30,14,.45)';
  for(const[dx2,dy2,r2]of[[-11,-9,3.2],[-17,4,2.6],[-7,12,3],[-2,-13,2.4],[-20,-4,2]]){
    ctx.beginPath(); ctx.arc(dx2,dy2,r2,0,7); ctx.fill();
  }
  // 喉部浅色
  ctx.beginPath(); ctx.ellipse(12,0,13,14,0,0,7);
  ctx.fillStyle='rgba(216,226,160,.22)'; ctx.fill();
  // 前爪
  ctx.fillStyle='#3d5c34';
  ctx.beginPath(); ctx.ellipse(17,-16,7.5,5,.45,0,7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(17,16,7.5,5,-.45,0,7); ctx.fill();
  ctx.fillStyle='#2c4423';
  for(const sgn of[-1,1])for(let k=0;k<3;k++){
    ctx.beginPath(); ctx.ellipse(22+k*1.2,sgn*(13+k*2.6),3,1.6,sgn*.4,0,7); ctx.fill();
  }
  // 口腔（待发珠嵌在口中）
  g=ctx.createRadialGradient(42,0,2,42,0,R+8);
  g.addColorStop(0,'#070c06'); g.addColorStop(1,'#1c2c16');
  ctx.beginPath(); ctx.ellipse(42,0,11,R+6,0,0,7); ctx.fillStyle=g; ctx.fill();
  // 上下唇
  ctx.strokeStyle='#2c4423'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.ellipse(40,0,12,R+6.5,0,-Math.PI*.62,-Math.PI*.1); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(40,0,12,R+6.5,0,Math.PI*.1,Math.PI*.62); ctx.stroke();
  ctx.strokeStyle='rgba(150,180,100,.35)'; ctx.lineWidth=1.6;
  ctx.beginPath(); ctx.ellipse(40,0,13.5,R+8,0,-Math.PI*.5,-Math.PI*.14); ctx.stroke();
  // 鼓眼（发射瞬间发亮）
  const eg=glowSpr('255,210,80'), ea=.4+clamp(recoil/7,0,1)*.6;
  for(const sgn of[-1,1]){
    ctx.beginPath(); ctx.arc(25,sgn*15.5,7,0,7); ctx.fillStyle='#4f7140'; ctx.fill();
    ctx.strokeStyle='rgba(10,16,8,.55)'; ctx.lineWidth=1.4; ctx.stroke();
    g=ctx.createRadialGradient(26,sgn*15.5-2,1,25,sgn*15.5,6);
    g.addColorStop(0,'#e8e3b0'); g.addColorStop(1,'#7a7430');
    ctx.beginPath(); ctx.arc(25,sgn*15.5,5.2,0,7); ctx.fillStyle=g; ctx.fill();
    ctx.globalAlpha=ea; ctx.drawImage(eg,25-6,sgn*15.5-6,12,12); ctx.globalAlpha=1;
    ctx.beginPath(); ctx.ellipse(26,sgn*15.5,1.6,3.4,0,0,7); ctx.fillStyle='#141408'; ctx.fill();
  }
  ctx.restore();
  /* —— 当前珠（口中）/ 备用珠（背上），换珠时弧线翻转 —— */
  const m=muzzlePos();
  const bx=sx-Math.cos(aimAng)*22, by=sy-Math.sin(aimAng)*22;
  if(swapT>0){
    const t=1-swapT/.28, e=t*t*(3-2*t);
    const px2=-Math.sin(aimAng), py2=Math.cos(aimAng), arc=Math.sin(e*Math.PI)*16;
    drawBall(lerp(m[0],bx,e)-px2*arc,lerp(m[1],by,e)-py2*arc,nxtBall,lerp(R,R*.62,e));
    drawBall(lerp(bx,m[0],e)+px2*arc,lerp(by,m[1],e)+py2*arc,curBall,lerp(R*.62,R,e));
  }else{
    drawBall(m[0],m[1],curBall,R);
    drawBall(bx,by,nxtBall,R*.62);
  }
}
let perfNow=0;
function drawFog(al,y,spd){
  const fw=W+240;
  const ox=((perfNow*spd)%fw+fw)%fw-fw;
  ctx.globalAlpha=al;
  ctx.drawImage(fogCv,ox,y,fw,200);
  ctx.drawImage(fogCv,ox+fw,y,fw,200);
  ctx.globalAlpha=1;
}
function render(){
  ctx.drawImage(bgCv,0,0,W,H);
  if(!track)return;
  ctx.drawImage(trackCv,0,0,W,H);
  drawFog(.4,96,8);                       // 远景雾
  drawHole(true);
  // 珠链（纹理随弧长滚动）
  for(const b of balls){
    if(b.s<-R||b.s>track.len)continue;
    const p=trkPos(b.s);
    drawBall(p[0],p[1],b.color,R*Math.max(b.grow,.25),b.s/R,(((b.s/26)|0)%3+3)%3);
    if(b.pu)drawPuIcon(p[0],p[1],b.pu);
  }
  // 吞珠动画
  for(const sw of swallows){
    const k=1-sw.t/.4;
    ctx.globalAlpha=k;
    drawBall(sw.x,sw.y,sw.col,R*k);
    ctx.globalAlpha=1;
  }
  drawTunnel();
  drawHole(false);
  // 飞行珠（滚转）
  for(const sh of shots)drawBall(sh.x,sh.y,sh.color,R,(sh.dist||0)/R);
  // 瞄准线
  if(state==='play'){
    ctx.save();
    if(fx.aim>0){
      const a=castAim();
      ctx.setLineDash([7,9]); ctx.lineDashOffset=-perfNow*60;
      ctx.strokeStyle='rgba(255,204,0,.55)'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.moveTo(a.pts[0][0],a.pts[0][1]);
      for(let i=1;i<a.pts.length;i++)ctx.lineTo(a.pts[i][0],a.pts[i][1]);
      ctx.stroke();
      if(a.hit){
        const e=a.pts[a.pts.length-1];
        ctx.setLineDash([]);
        ctx.strokeStyle='rgba(255,204,0,.8)';
        ctx.beginPath(); ctx.arc(e[0],e[1],R,0,7); ctx.stroke();
      }
    }else{
      const m=muzzlePos();
      ctx.setLineDash([5,9]);
      ctx.strokeStyle='rgba(255,236,200,.22)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(m[0]+Math.cos(aimAng)*14,m[1]+Math.sin(aimAng)*14);
      ctx.lineTo(m[0]+Math.cos(aimAng)*130,m[1]+Math.sin(aimAng)*130);
      ctx.stroke();
    }
    ctx.restore();
  }
  if(state==='play'||state==='drain'||state==='clearwait')drawShooter();
  // 冲击环
  for(const r of rings){
    const k=r.t/.4;
    ctx.strokeStyle=`rgba(${r.col},${(1-k)*.8})`; ctx.lineWidth=3*(1-k)+1;
    ctx.beginPath(); ctx.arc(r.x,r.y,r.r0+(r.r1-r.r0)*k,0,7); ctx.stroke();
  }
  // 粒子：玻璃碎片 / 光斑 / 消除闪光
  for(const p of parts){
    const k=1-p.t/p.life;
    if(p.kind==='flash'){
      ctx.globalAlpha=k*.85;
      ctx.drawImage(glowSpr(p.col),p.x-p.sz,p.y-p.sz,p.sz*2,p.sz*2);
    }else if(p.kind==='spark'){
      const s=p.sz*(.45+k*.55);
      ctx.globalAlpha=k;
      ctx.drawImage(glowSpr(p.col),p.x-s,p.y-s,s*2,s*2);
    }else{
      const co=Math.cos(p.rot)*p.sz, si=Math.sin(p.rot)*p.sz;
      ctx.globalAlpha=k;
      ctx.beginPath();
      ctx.moveTo(p.x+co,p.y+si);
      ctx.lineTo(p.x-si*.62,p.y+co*.62);
      ctx.lineTo(p.x-co*.85,p.y-si*.85);
      ctx.closePath();
      ctx.fillStyle=p.col; ctx.fill();
      ctx.globalAlpha=k*.5;
      ctx.beginPath();
      ctx.moveTo(p.x+co,p.y+si);
      ctx.lineTo(p.x-si*.3,p.y+co*.3);
      ctx.lineTo(p.x+co*.45,p.y+si*.45);
      ctx.closePath();
      ctx.fillStyle='#fff'; ctx.fill();
    }
  }
  ctx.globalAlpha=1;
  // 近景雾 + 萤火
  drawFog(.5,330,-13);
  for(const f of fireflies){
    const t=perfNow*f.sp+f.ph;
    const x=f.x+Math.sin(t*.7)*42+Math.sin(t*.23)*58;
    const y=f.y+Math.cos(t*.53)*30+Math.sin(t*.31)*44;
    const a=.18+.5*Math.pow(.5+.5*Math.sin(t*2.3),2);
    ctx.globalAlpha=a;
    ctx.drawImage(glowSpr('190,235,110'),x-f.r*2,y-f.r*2,f.r*4,f.r*4);
  }
  ctx.globalAlpha=1;
  // 飘字（COMBO 金光）
  ctx.textAlign='center';
  for(const f of floats){
    const k=f.t/1.2, al=1-k*k, y=f.y-36*k;
    if(f.big){
      const gold=f.col==='#ffcc00';
      ctx.globalAlpha=al*.55;
      ctx.drawImage(glowSpr(gold?'255,205,80':'120,200,255'),f.x-52,y-40,104,64);
      const fs=Math.round(24*(1+.5*Math.exp(-f.t*7)));
      ctx.globalAlpha=al;
      ctx.font='900 '+fs+'px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.lineWidth=4; ctx.lineJoin='round';
      ctx.strokeStyle=gold?'rgba(60,30,0,.65)':'rgba(0,25,50,.65)';
      ctx.strokeText(f.txt,f.x,y);
      if(gold){
        const gr=ctx.createLinearGradient(0,y-fs*.8,0,y+fs*.3);
        gr.addColorStop(0,'#fff6cc'); gr.addColorStop(.55,'#ffcc00'); gr.addColorStop(1,'#d18a06');
        ctx.fillStyle=gr;
      }else ctx.fillStyle=f.col;
      ctx.fillText(f.txt,f.x,y);
    }else{
      ctx.globalAlpha=al;
      ctx.font='bold 16px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.fillStyle=f.col;
      ctx.shadowColor='rgba(0,0,0,.7)'; ctx.shadowBlur=4;
      ctx.fillText(f.txt,f.x,y);
      ctx.shadowBlur=0;
    }
  }
  ctx.globalAlpha=1;
  // 过关：轨道流光庆祝
  if(state==='clearwait'||state==='win'||state==='victory'){
    const gg=glowSpr('255,214,96'), gw=glowSpr('255,255,255');
    const n=26, sp2=track.len/n;
    for(let i=0;i<n;i++){
      const s=(perfNow*300+i*sp2)%track.len, p=trkPos(s);
      ctx.globalAlpha=.35+.35*Math.sin(perfNow*6+i*1.7);
      ctx.drawImage(i%3?gg:gw,p[0]-13,p[1]-13,26,26);
    }
    ctx.globalAlpha=1;
  }
  // 危险红色脉动渐晕
  if(danger>0&&(state==='play'||state==='drain')){
    const a=danger*(.2+.14*Math.sin(perfNow*8));
    const g=ctx.createRadialGradient(W/2,H/2,260,W/2,H/2,640);
    g.addColorStop(0,'rgba(255,30,20,0)');
    g.addColorStop(.72,`rgba(255,30,20,${a*.45})`);
    g.addColorStop(1,`rgba(255,24,14,${a})`);
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  }
  // 特效状态提示
  if(state==='play'){
    let tip='';
    if(fx.back>0)tip+='⏪倒退 '; if(fx.slow>0)tip+='❄减速 '; if(fx.aim>0)tip+='✛瞄准 ';
    if(tip){
      ctx.font='13px "PingFang SC",sans-serif'; ctx.textAlign='left';
      ctx.fillStyle='rgba(127,211,255,.85)';
      ctx.fillText(tip,12,H-12);
    }
  }
}

/* ============ BGM / 心跳 ============ */
function updateAudio(dt){
  if(!AC||muted)return;
  if(state!=='play'&&state!=='drain')return;
  bgmT-=dt;
  if(bgmT<=0){
    const itv=lerp(.52,.27,danger);
    bgmT=itv; bgmStep++;
    if(bgmStep%2===0)tone(64,44,.1,'sine',.34);            // 鼓点
    else noiseS(.025,.05,7000,'highpass');                  // 镲
    if(bgmStep%8===1)tone(110,null,.22,'triangle',.06);
    if(bgmStep%8===5)tone(146,null,.22,'triangle',.05);
  }
  if(danger>0){
    hbT-=dt;
    if(hbT<=0){sHeart(); hbT=lerp(.95,.42,danger);}
  }
}

/* ============ HUD / 界面 ============ */
const $=id=>document.getElementById(id);
function hud(){
  $('hLvl').textContent=levelIdx+1;
  $('hName').textContent=lvl.name;
  $('hScore').textContent=score;
  $('hBest').textContent=best;
  const frac=lvl.total?balls.length/lvl.total:0;
  $('pbar').style.width=(frac*100).toFixed(1)+'%';
  $('pbar').classList.toggle('warn',danger>0);
}
function saveBest(){
  if(score>best){best=score; try{localStorage.setItem('ai4399-zuma-best',best)}catch(e){}}
  $('hBest').textContent=best;
}
function showPanel(html){$('panel').innerHTML=html; $('overlay').classList.add('show');}
function hidePanel(){$('overlay').classList.remove('show');}
function menu(){
  state='menu';
  showPanel(`<h1>轨道弹珠</h1>
  <div class="orn">◆ ◆ ◆</div>
  <div class="sub">祖玛玩法 · 珠链消除 · 五段石槽轨道</div>
  <div class="info">发射彩珠插入珠链，凑齐 <em>3 颗同色</em> 即可消除。<br>
  缺口两端会相互吸合，同色再消触发 <em>连锁</em>！<br>
  别让珠链坠入骷髅之口……</div>
  <button class="btn" id="bStart">开始游戏</button>
  <div class="help"><b>鼠标移动</b> 瞄准 · <b>点击</b> 发射 · <b>右键 / 空格 / 点炮台</b> 换珠<br>
  触屏：<b>点按</b> 发射 · <b>双击</b> 换珠 &nbsp;|&nbsp; 历史最高 <b>${best}</b></div>`);
  $('bStart').onclick=()=>{audioInit(); score=0; intro(0);};
}
function intro(i){
  state='intro'; levelIdx=i; lvl=LEVELS[i]; levelStartScore=score;
  showPanel(`<h2>第 ${i+1} 关 · ${lvl.name}</h2>
  <div class="info">珠子 <em>${lvl.total}</em> 颗 · 颜色 <em>${lvl.colors}</em> 种<br>
  消除全部珠子即可过关</div>
  <button class="btn" id="bGo">出发！</button>`);
  $('bGo').onclick=()=>{audioInit(); hidePanel(); loadLevel(i); state='play';};
}
function levelClear(){
  state='win'; saveBest();
  const bonus=Math.max(0,Math.ceil(lvl.par-levelTime))*12;
  score+=bonus; saveBest(); hud();
  sWin();
  const last=levelIdx>=LEVELS.length-1;
  if(last){
    state='victory';
    showPanel(`<h2>🏆 恭喜通关！</h2>
    <div class="orn">◆ ◆ ◆</div>
    <div class="info">五条石道全部征服<br>时间奖励 <em>+${bonus}</em><br>
    最终得分 <em>${score}</em> · 历史最高 <em>${best}</em></div>
    <button class="btn" id="bAgain">再来一局</button>`);
    $('bAgain').onclick=()=>{score=0; intro(0);};
  }else{
    showPanel(`<h2>过关！</h2>
    <div class="info">用时 ${levelTime.toFixed(1)} 秒 · 时间奖励 <em>+${bonus}</em><br>
    当前得分 <em>${score}</em></div>
    <button class="btn" id="bNext">下一关</button>`);
    $('bNext').onclick=()=>intro(levelIdx+1);
  }
}
function gameOver(){
  state='over'; saveBest(); hud();
  showPanel(`<h2>珠链坠入深渊…</h2>
  <div class="info">止步 第 <em>${levelIdx+1}</em> 关 · ${lvl.name}<br>
  得分 <em>${score}</em> · 历史最高 <em>${best}</em></div>
  <button class="btn" id="bRetry">重试本关</button>
  <button class="btn ghost" id="bRestart">再来一局</button>`);
  $('bRetry').onclick=()=>{score=levelStartScore; intro(levelIdx);};
  $('bRestart').onclick=()=>{score=0; intro(0);};
}

/* ============ 主循环 ============ */
let lastT=0;
function frame(ts){
  requestAnimationFrame(frame);
  const dt=Math.min((ts-lastT)/1000||0,.05); lastT=ts; perfNow=ts/1000;
  cooldown=Math.max(0,cooldown-dt);
  recoil=Math.max(0,recoil-dt*60);
  swapT=Math.max(0,swapT-dt);
  for(const k in fx)fx[k]=Math.max(0,fx[k]-dt);
  if(state==='play'){
    levelTime+=dt;
    updateChain(dt);
    updateShots(dt);
    if(!balls.length&&state==='play'){state='clearwait'; stateTimer=0;}
    hudLite();
  }else if(state==='drain'){
    updateDrain(dt);
  }else if(state==='clearwait'){
    stateTimer+=dt;
    if(stateTimer>.8)levelClear();
  }
  updateFx(dt);
  updateAudio(dt);
  if(track)render();
}
let hudAcc=0;
function hudLite(){ hudAcc++; if(hudAcc%12===0)hud(); }

/* ============ 输入 ============ */
function canvasXY(e){
  const r=cv.getBoundingClientRect();
  return [(e.clientX-r.left)/cssScale,(e.clientY-r.top)/cssScale];
}
cv.addEventListener('mousemove',e=>{
  const [x,y]=canvasXY(e);
  aimAng=Math.atan2(y-shooter[1],x-shooter[0]);
});
cv.addEventListener('mousedown',e=>{
  if(e.button!==0)return;
  audioInit();
  const [x,y]=canvasXY(e);
  if(Math.hypot(x-shooter[0],y-shooter[1])<42){swapBalls(); return;}
  aimAng=Math.atan2(y-shooter[1],x-shooter[0]);
  shoot();
});
cv.addEventListener('contextmenu',e=>{e.preventDefault(); swapBalls();});
window.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault(); audioInit(); swapBalls();}
});
let lastTap=0,lastTapX=0,lastTapY=0;
cv.addEventListener('touchstart',e=>{
  e.preventDefault(); audioInit();
  const t=e.changedTouches[0], [x,y]=canvasXY(t), now=performance.now();
  if(now-lastTap<300&&Math.hypot(x-lastTapX,y-lastTapY)<40){
    swapBalls(); lastTap=0; return;
  }
  lastTap=now; lastTapX=x; lastTapY=y;
  if(Math.hypot(x-shooter[0],y-shooter[1])<46){swapBalls(); return;}
  aimAng=Math.atan2(y-shooter[1],x-shooter[0]);
  shoot();
},{passive:false});
$('muteBtn').onclick=()=>{
  audioInit(); muted=!muted;
  $('muteBtn').textContent=muted?'✕':'♪';
  $('muteBtn').style.color=muted?'#8888a0':'#e8e8f0';
};

/* ============ 自适应 ============ */
function resize(){
  dpr=window.devicePixelRatio||1;
  const aw=window.innerWidth-16, ah=window.innerHeight-58;
  cssScale=Math.min(aw/W,ah/H);
  cv.style.width=(W*cssScale)+'px';
  cv.style.height=(H*cssScale)+'px';
  cv.width=Math.round(W*cssScale*dpr);
  cv.height=Math.round(H*cssScale*dpr);
  ctx.setTransform(cssScale*dpr,0,0,cssScale*dpr,0,0);
  document.getElementById('stage').style.width=(W*cssScale)+'px';
}
window.addEventListener('resize',resize);

/* ============ 启动 ============ */
makeBg();
makeFog();
resize();
loadLevel(0);            // 预载第一关供菜单背景展示
state='menu';
menu();
hud();
requestAnimationFrame(frame);

// 调试钩子（不影响游戏）
window.__zuma={
  get state(){return state}, get balls(){return balls}, get score(){return score},
  get track(){return track}, get fx(){return fx},
  go:i=>{hidePanel(); score=0; levelStartScore=0; loadLevel(i); state='play';},
  fire:(a,c)=>{aimAng=a; if(c!==undefined)curBall=c; cooldown=0; shoot();},
  setCur:c=>{curBall=c;},
  win:levelClear, lose:startDrain
};
</script>
